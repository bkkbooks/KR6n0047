body:
  text: 蕅益沙門智旭述已上第三能變廣釋六位心所別相中初釋徧行別境竟二釋善心所二初舉頌二論釋今初已說徧行別境二位善位心所其相云何頌曰善謂信慚愧無貪等三根勤安不放逸行捨及不害二論釋三初正釋頌文二料簡別立三餘門分別初中二初總標二別釋今初論曰唯與善心俱起故名為善心所謂信慚等定有十一二別釋二初釋信等名二釋及字初中八初釋信二釋慚愧三釋無貪無瞋無癡四釋勤五釋安六釋不放逸七釋行捨八釋不害今初云何為信於實德能深忍樂欲心淨為性對治不信樂求諸善為業然信差別略有三種一信實有謂於諸法實事理中深信其為實有而隨順忍可故二信有德謂於三寶真淨德中深信而喜樂故三信有能謂於一切世出世善深信其有力能得樂果能成聖道起希望故由斯對治不信彼實德能之心愛樂證修世出世善此正釋信之體性并業用也實德能是信依處忍是信之因樂欲是信之果心淨是信之自性諸法實事即俗諦諸法實理即第一義諦希望即欲也餘可知問曰忍謂勝解此即是信之因樂欲二種謂即是欲此即是信之果確陳此信自相是何答曰豈不適言心淨為性又問此猶未了彼心淨言若持業釋則淨即心應非心所若依主釋則令心淨慚等何殊若鄰近釋則是與心俱之淨法亦與慚等何別為難亦然答曰此信之體自性澄清亦能淨于心心所等以心勝故但立心淨之名如水清珠能清濁水慚等雖善非以淨為其相此信心所以淨為相無濫彼慚等之失又諸染法各有別相唯有不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他信正翻彼不信故獨以淨為相此問答釋疑也此下更斥異解有說信者愛樂為相斥曰是則應通三性又體應即別境中欲又應苦集二諦無可愛樂非信所緣有執信者隨順為相斥曰則亦應通三性又即是勝解及欲若印順者即勝解故若樂順者即是欲故離彼解欲二體無順相故由此應知心淨是信初釋信竟二釋慚愧云何為慚依自法力崇重賢善為性對治無慚止息惡行為業謂依自身及法生于尊貴增上由斯崇尚敬重賢能善者羞耻過惡而不敢為別則對治無慚通則息諸惡行云何為愧依世間力輕拒暴惡為性對治無愧止息惡行為業謂依世間他人訶厭增上輕拒暴惡由此羞耻過罪而不敢為別則對治無愧通亦息諸惡業此正釋慚愧之體性業用也輕拒暴惡者輕彼暴人而不親拒彼惡法而不住暴人即有惡之人也羞耻過惡是二通相故諸聖教假說為體若執羞耻為二別相應慚與愧體無差別則此二法定不相應非受想等有此義故若待自他立二別者應非實有便違聖教若許慚愧實而別起復違論說十遍善心此復釋慚愧二法須以崇善拒惡而為別相不以羞耻過惡為別相也因諸聖教每每以羞耻過惡釋慚愧義昧者遂執以為別相故今釋曰慚愧二法各有通別二相其中皆云羞耻過惡者乃是二法之通相故諸聖教假說羞耻以為慚愧體耳若遂執羞耻為慚愧別體則此二法應無差別既無差別則應不俱生既不俱生則定不相應譬如受想等相應之法定各有體非有此體無差別之義故也量云慚愧是有法各有別體宗因云定相應故喻如受想等或申違量云慚愧若同以羞耻為體是有法定不相應宗因云無一心中有二羞耻故同喻如忿恨等異喻如受想等執者救曰止一羞耻但約對待自他故立慚愧二種別名寧不俱起今破之曰若待自他立二別者則依分位假立應非實有便違聖教中說慚愧二法是實有矣執者又救曰慚是對自愧是對他二俱是實故不俱起今破之曰若許慚愧實而別起則正起慚時便應無愧正起愧時便應無慚復違論說十一善心所中唯有輕安不遍餘十定徧善心之義矣崇重輕拒若二別相所緣有異應不俱生二失既同何乃偏責此執者反難也謂若以崇重善境為慚之別相輕拒惡境為愧之別相則所緣善惡之境有異亦應不得俱生與前所說實而別起其失是同何乃偏致責耶答曰誰言二法所緣有異難曰不爾如何答曰善心起時隨緣何境皆有崇重善及輕拒惡義故慚與愧俱遍善心所緣之境無別救曰豈不我說羞耻過惡為二別相亦有此義破曰汝執慚愧自相既同何理能遮前所設難然聖教說此慚愧二法顧待自他而有者不同汝執體無別也聖教乃以自法名自世間名他或即此中崇拒善惡於己益損名自他故此展轉答釋以明慚愧體各別有故得俱起而遍善心也自法名自世間名他知顧自者必即顧他正崇善時即必拒惡又或崇善于己有益即名為自拒惡于己無損即名為他豈似汝執同以羞耻為體設云是假則違聖教設云是實復違論文也哉二釋慚愧竟三釋無貪無瞋無癡三善根無貪等者等無瞋癡此三名為善根者能生善法最為勝故又于三不善根能為近對治故此先總釋三善根義也一能生善二能對治云何無貪於三有及三有之資具無所貪著為性別則對治貪著通則能作眾善為業有謂三界果報有具謂三界惑業及依報也云何無瞋於三苦及三苦之資具無恚為性別則對治瞋恚通則能作眾善為業苦謂三界苦果樂是壞苦苦是苦苦不苦不樂是行苦故名三苦苦具即三界苦因及弊惡依報也問曰依正二苦全由自惑業招為恚可矣三界苦因既是惑業云何可無恚耶答曰惑業無性但不起惑造業則已何勞瞋之又過去惑業達其已滅即名懺除故不須瞋現在惑業知其不住勿令相續亦不須瞋未來惑業今尚未有防令勿起亦不須瞋他人惑業亦復無性但應憐愍更不須瞋若一起瞋即成惑業如水益深如火益熱故曰劫功德賊莫過瞋恚又曰一念瞋心起百萬障門開也問曰大乘了知惑業無性三際叵得可無瞋矣小乘未達法空視煩惱賊及諸惡業不啻怨毒安得無瞋答曰小乘於已起惑業如法懺除未起惑業深生厭離亦非瞋也問曰如有經云我是貪欲文殊瞋恚文殊又云一法不捨名為大貪一法不取名為大瞋其旨若何答曰此不思議無性法門即修惡而達性惡即性惡便是性善如指氷即水水現而氷自融如指木即火火出而木即盡如因醜像而悟現像之鏡知此醜像惟鏡所現能現醜像之鏡即是能現美像之鏡故得不離塵勞而見佛性既見佛性豈復滯塵勞哉是故大貪者究竟無貪之別名也大瞋者究竟無瞋之別名也大癡者究竟無癡之別名也於有有具無所著故能一法不捨假使著有有具則所捨者多矣於苦苦具無所恚故能一法不取假使恚苦苦具則所取者亦多矣又一法不取名大瞋即是此中所謂無貪一法不捨名大貪即是此中所謂無瞋誰謂性相二宗不同一致也耶善心起時隨緣何境皆於有等無著無恚以此二善根但觀待有等而立非要緣彼有等之境亦如前所明慚愧二法但觀待善惡而立故此無貪無瞋二種俱遍善心此釋伏難也難曰無貪於有有具無著無瞋於苦苦具無恚所緣之境既別則其起不同時何能俱遍善心今釋之曰善心若起法爾皆於有有具苦苦具無著無恚但約觀待有等而立非要別緣二種境也量云無貪無瞋是有法觀待有等立非緣彼境宗因云俱遍善心同時起故喻如慚愧是故貪瞋二惑決不同起無貪無瞋決定相應迷局解通於斯可驗大貪大瞋是解非迷止爭解迷不爭名字觀心之士于此宜思云何無癡於諸諦理及諸實事明解為性別則對治愚癡通則能作眾善為業有義無癡即慧為性集論說此無癡以報智教智證智之決擇為體謂生得聞思修所生慧如次皆是決擇性故此雖即慧為顯善品有勝功能如煩惱中之見雖即是慧以染故復別說今此善慧亦爾此正釋無癡體性業用兼辨假實今初有義妄謂是假有也由聞果報智而生得聞慧由思聖教智而生得思慧由修證智而生得修慧此三皆以決擇為性決擇即是智慧故謂無癡即以慧為體也此雖下釋疑可知有義無癡非即是慧別有自性正對無明例有無貪無瞋以是三善根所攝故瑜伽論說諸佛大悲是無瞋無癡所攝非言悲是慧根攝故若彼無癡即以慧為性無別體者則應大悲亦如十力四無畏等應亦是慧等根攝不是無瞋無癡攝矣又若無癡無別自性則便如不害等應非實物便違論說十一善中三世俗有餘皆是實此正明無癡是實有也量云無癡是有法別有自性宗因云正對無明善根攝故喻如無貪瞋又大悲既是無瞋癡攝設無癡以慧為體則大悲亦應以慧為體矣何故瑜伽論中不云大悲是慧根攝耶三世俗有者謂不放逸行捨不害此三皆是依義假立非別有體名世俗有具如下文所明餘八善法各有自性名為實有故知無癡非即慧性然集論說慧為體者舉彼三慧之因果顯此明解之自性如以忍樂表信自體理必應爾此通初家所引集論之義也聞思二慧即無癡之因喻如忍為信之因修慧即無癡之果喻如樂欲為信之果明解是無癡自性喻如心淨是信自性也以貪瞋癡是六識相應正煩惱攝起惡勝故立三不善根之名斷彼三不善根必由通別對治通唯善慧別即此三善根由此無癡必應別有此結成善根對治無明之正義也三釋三善根竟四釋勤勤謂精進於善惡品修斷事中勇猛強悍為性對治懈怠成滿善事為業勇表勝進簡諸染法悍表精純簡淨無記即顯精進唯善性攝於修善斷惡事中勇猛故名進強悍故名精也諸染法謂惡及有覆無記淨無記即無覆無記惡及有覆是退墮法今不退墮即是勝進無覆無記與善性別今不相襍乃是精純此相差別略有五種所謂被甲精進加行精進無下精進無退精進無足精進即經所說有勢精進有勤精進有勇精進堅猛精進不捨善軛精進如次應知此五種精進差別義者凡有四義一約行別謂初發心行自分行勝進行又就自分行中有下中上三品別故或二約修別謂初發心修長時修無間修殷重修無餘修有差別故或三約位別謂資糧等五道別故問曰究竟道中何用精進答曰二乘究竟道欣大菩提故諸佛究竟道樂利樂他故或四約道別謂資糧加行二位之中二加行道及無間道解脫道勝進道別故四釋勤竟五釋安安謂輕安遠離麤重雜染法品調暢身心于善法中堪任修持為性對治沉轉捨染依轉得淨依為業謂此輕安伏除能障定之惛沉法令所依止之身心轉安適故六釋不放逸不放逸者即精進及無貪等三根於所斷惡所修善防令不生修令增長為性對治放逸成滿一切世出世間善事為業謂即精進無貪等四法於斷修事皆能防修即名為不放逸非別有體以其無異相故於防惡事修善事中離精進等四法功能亦無別用故雖信慚等亦有此防修之能而方于彼四則勢用微劣以非善根亦非徧䇿故非此不放逸之所依此正釋不放逸之體性業用依精進三根假立也難曰豈不防修即是此不放逸之相用答曰防修何異精進三根若謂彼四法要待此不放逸方有作用者則此不放逸應復待餘法便有無窮失又難曰勤唯遍筞一切善法根但普為善法依持如何說彼有防修用破曰汝所計防修用其相云何若云是普依持則仍即無貪等若云是遍䇿錄則仍不異精進若云止惡進善則仍即總四法若云令不散亂則又應是等持若云令同取境則又與觸何別若云令不忘失又復即應是念如是推尋不放逸用離無貪等竟不可得故不放逸定無別體此問答破異解也六釋不放逸竟七釋行捨云何行捨亦即精進及無貪等三根又能令心平等正直無功用住為性對治掉舉靜住為業謂即四法令心遠離掉舉等障寂靜安住名之為捨所言平等正直無功用住乃約初中後位以辯捨之差別相也簡非捨受故名行捨初位名平等中位名正直後位名為無功用住此正釋體性業用亦依四法假立也由不放逸先除雜染捨復令心寂靜而住故此行捨亦無別體如不放逸離彼四法無相用故能令寂靜者即彼精進等四法故所令寂靜者又即心心所等故此釋伏難也難曰不放逸與行捨既皆以四法為體云何而知此二有別故以先後功能答之雖約先後功能差別其實更無別體也七釋行捨竟問曰不放逸與行捨既分先後何得俱遍善心答曰未有既不放逸而猶不靜住者亦未有正靜住而仍放逸者義雖先後起必相應八釋不害云何不害於諸有情不為侵損逼惱即以無瞋為性能對治害悲傷憐愍為業謂即無瞋於有情所不為損惱假名不害當知無瞋翻對斷物命之瞋不害正違損惱物之害所云無瞋與樂不害拔苦是謂此二麤相差別據理實論則無瞋實有自體不害不過依彼無瞋一分假立為顯慈悲二相有差別故又復利樂有情彼慈悲二法最為勝故無瞋即慈故能與樂不害即悲故能拔苦此正釋假立不害之義也有說不害非即無瞋別有自體謂賢善性問曰此相云何答曰謂不損惱破曰無瞋亦爾寧別有性謂於有情不為損惱慈悲賢善是無瞋故此破異解可知初釋信等名竟二釋及字及顯十一外之義別心所謂欣厭等善心所法雖義有別說種種名而體無異故不別立今更約義略為釋出欣謂與善欲俱起之無瞋一分於所欣境不憎恚故不忿不恨不惱不嫉等亦然隨應正翻瞋一分之忿恨惱嫉四小隨煩惱故此欣心所雖不別立而用最大故首釋之凡外修六行觀展轉欣上是淨妙離故能厭下諸苦麤障但以見思未斷僅成世間有漏之善二乘欣樂涅槃故能厭離生死但以塵沙未斷僅成出世偏真之善權位菩薩欣樂大乘故能厭離小道但以無明未伏僅成從空入假之善地前菩薩欣樂中道故能厭離二邊但以無明未斷僅成相似中道之善唯有圓人欣樂無分別之實法故能厭捨二邊虗妄戲論分別於諸無明圓伏圓斷成就無上具足妙善從名字善乃至究竟善也又復圓人了達欣厭之極與不欣厭亦非異轍故獨熾然欣樂求生極樂世界厭離娑婆無量眾苦於此一欣一厭之中便能圓淨四種佛土只此欣心亦名不忿亦名不恨亦名不惱亦名不嫉只此厭心亦名不慳亦名不憍欣淨者必厭穢厭穢者必欣淨故此二善起必同時成佛作祖莫此為要欣即大貪厭即大瞋豈似下劣貪瞋有名無實者哉厭謂與善慧俱起之無貪一分於所厭境不染著故不慳不憍等當知亦然隨應正翻貪一分之慳憍二小隨煩惱故厭欲界者不染著欲界乃至厭無所有處者不染著無所有處此世間善也厭生死者不染著生死此二乘善也厭偏真者不染著偏真此通菩薩善也厭二邊者不染著二邊此別十迴向菩薩善也厭但中者不染著但中此別地菩薩善也圓厭四穢土者不染著四穢土此泯絕凡聖不歷階級一超直入不思議之最勝善也是故厭離娑婆求生淨土名為第一圓頓無上法門不覆不誑不諂即無貪癡一分隨應正翻貪癡一分之覆誑諂三小隨惑故有義不覆唯無癡一分無處說覆亦貪一分故中二煩惱正翻為慚愧十小煩惱惟害有翻餘九不翻故今一一翻示然覆亦通貪一分攝如下文所明也有義不慢信一分攝謂若信彼不慢彼故有義不慢捨一分攝心平等者不高慢故有義不慢慚一分攝若崇重彼不慢彼故此正翻根本惑之慢也三義皆通故無破立有義不疑即信所攝謂若信彼無猶豫故有義不疑即正勝解以決定者無猶豫故有義不疑即正慧攝以正見者無猶豫故此正翻根本惑之疑也亦復三義皆通故無破立問曰根本慢疑皆各有體翻惑成善何無自體答曰下不云乎悟解理通說多同體迷情事局隨相分多譬如水結成冰可分多塊冰融成水豈隔方隅問曰若爾何故十一善中仍云八實三假耶答曰此亦約理世俗說假實耳天台有隨情隨智隨情智等三種分別所應深思不散亂體即正定攝翻大隨散亂正見翻根本邪見正知翻大隨不正知俱善慧攝不忘念者即是正念翻大隨失念悔眠尋伺通染不染如徧行觸等及別境欲等故皆無別翻對染即不善及有覆無記不染即善及無覆無記也初正釋頌文竟二料簡別立問曰何緣諸染有二十六所翻善中有十一是別建立有餘十五是不爾者答曰相用別者便別立之餘善不然故不應責又諸染法徧六識者作用勝故翻之而別立善法慢等忿等唯意識俱故不翻立慢等等於疑及五見忿等等于小隨九法唯除害也害雖亦然而數現起損惱他故又障無上乘勝因之大悲故為了知彼增上過失所以翻立不害此釋難也難曰若是唯意識俱便不翻立害亦唯意識俱何故翻立不害答釋可知失念散亂及不正知翻入別境中之正念正定正慧故此十一善中不說亦釋難也難曰若徧六識勝故翻之失念散亂及不正知亦徧六識何故不翻答釋可知問曰染淨相翻淨寧反少于染答曰淨法殊勝染法微劣少淨便能敵多染故又淨法悟解理通說多同體故不廣立染法迷情事局隨相差別是以分多故於染淨不應齊責只此染淨相翻一語便是密顯染淨無性故解之則理通乃解即事之理迷之則事局正迷全理成事須知說染說淨皆屬于事染淨無性方名為理但淨是順事故能順顯無性之理而事隨理通染是違事故唯違覆無性之理而理隨事局也二料簡別立竟三餘門分別十初假實門至十結例餘門今初此十一法三是假有謂不放逸捨及不害義如前說餘八實有相用別故二遍不遍門有二家解次家為正有義十一之中四遍善心精進三根遍善品故餘七不定推尋事理未決定時不生信故慚愧同類一依自法一依世間所依之處各別隨起一時第二無故要世間道斷煩惱時方得有輕安故不放逸捨無漏道時方得起故悲愍有情時乃有不害故是故論說十一善心所在於六位中起謂決定位有信相應止息染時有慚愧起顧自他故於善品位有精進三根世間道時有輕安起於出世道有捨不放逸攝眾生時有不害故此即初解世間道謂四禪八定有漏善品出世道即無漏道也餘可知有義彼說未為應理推尋事理未決定心信若不生應非是善如染心等無淨信故慚愧之類是異所依雖別所緣境同俱遍善心前已說故若出世道輕安不生應此輕安覺支非無漏故若世間道無捨不放逸應非寂靜防惡修善故又應不伏掉放逸故有漏善心既具精進三根四法如出世道應有行捨不放逸之二故善心起時皆不損物正以違能損法乃有不害之名故然而論說六位起十一者乃依彼彼增勝而作此此說耳故彼初解所說餘七不定定非應理此即第二正解先破前非次論說下會釋彼所引論也依彼彼增作此此說者謂決定位則信增息染位則慚愧增乃至攝生時則不害增耳應說信等十一法中十徧善心輕安不徧要在定位方有輕安以調暢身心乃餘位之所無故決擇分說十善心所若定地若不定地皆遍善心定地心中增輕安故此正釋十徧一不徧也定地即定位謂四禪八定等三昧心中不定地即欲界散心位中有義定加行亦得定地名彼亦微有調暢義故由斯欲界亦有輕安不爾便違本地分說信等十一通一切地此更出異解也定加行謂定前方便即指未到地定言之有義輕安唯在定有由定滋養方得有調暢故論說欲界諸心心所由闕輕安名不定地其說一切地有十一者通指定中有尋伺等三地皆有故此正明欲界無輕安也次更釋彼所引論意論說一切地有十一者乃指有尋伺等三三昧地非指三界九地以欲界名不定地正由闕于輕安故耳言三地者一根本初禪名有尋有伺三麼地二二禪加行名無尋有伺三麼地三根本二禪已上皆名無尋無伺三麼地二遍不遍門竟三諸識俱起門此十一種前已具說第七八識隨位有無第六識中定位皆具若非定位唯闕輕安有義五識唯有十種自性散動無輕安故有義五識亦有輕安定所引五識之善者亦有調暢故成所作智俱必有輕安故第七第八于未轉位無十一善若已轉位皆定相應第六有漏散善則無輕安有漏定善便具十一無漏不必言矣五識二解第二解正然約有漏位中鼻舌二識唯欲界繫則無輕安眼耳身識通于初禪則是定所引之善者亦有調暢若至無漏位中成所作智相應五識則必皆有輕安也四諸受相應門問曰此善十一何受相應答曰十箇善心所得與五受相應輕安一種則除憂苦二受以凡有逼迫受決定無調暢故五別境相應門此與別境皆得相應信等與欲等不相違故六三性相攝門十一唯善七三界繫屬門輕安非欲界所繫餘十皆通三界八學等三攝門皆學等三初果二果三果及菩薩十地之十一善即皆有學所攝也四果支佛如來之十一善皆無學所攝也一切凡夫之十一善皆非學非無學所攝也九三斷相攝門非見所斷瑜伽論說信等六根唯修所斷非見所斷六根謂信根進根念根定根慧根及未知當知根也信等五根通漏無漏若無漏者即攝入于三無漏根此中五根且指有漏言之加行位中所有無漏九根名未知當知根有學位中無漏九根名已知根無學位中無漏九根名具知根雖由未知當知根得入見道既見道已無所未知可當知故即名為具知根見道一剎那後便屬修道位攝是故修道位中即斷未知當知根及有漏五根也此十一善不與分別煩惱相應故非見道所斷若有漏善及無漏加行善即屬修道所斷若正無漏善即屬非所斷攝九根者信等五根及意根喜根樂根捨根十例結餘門餘門分別如理應思對後煩惱不定等自在下文也二釋善心所竟三釋根本煩惱二初舉頌二論釋今初如是已說善位心所煩惱心所其相云何頌曰煩惱謂貪瞋癡慢疑惡見二論釋二初正釋頌文二諸門分別初中二初略釋通名二廣釋別名今初論曰此貪等六性是根本煩惱攝故得煩惱名如樹有根本方有枝葉由此六種煩惱出生一切隨煩惱法故名此六以為根本餘隨煩惱皆此等流或此分位故如枝葉也二廣釋別名六初釋貪至六釋惡見今初云何為貪於有有具染著為性能障無貪生苦為業謂由貪愛之力後五取蘊復得生故有有具解現善中五蘊皆是妄情之所取著故名取蘊二釋瞋云何為瞋於苦苦具憎恚為性能障無瞋不安隱性惡行所依為業謂瞋必令身心熱惱起諸惡業不善性故苦苦具亦如前解身心熱惱故云不安隱性起諸惡業故云惡行所依此唯是惡不通有覆無記故云不善性也三釋癡云何為癡於諸理事迷闇為性能障無癡一切雜染所依為業謂由無明力故引起疑及邪見貪等根本煩惱及忿等諸隨煩惱而作諸業能招後三有生雜染法故獨頭無明多迷諦理相應無明亦迷事相故云於諸理事迷闇為性也一切雜染即指三界煩惱業生四釋慢云何為慢恃己所長於他有情心生高舉為性能障不慢生苦為業謂若有慢於三寶真淨德中及一切有德之人心不謙下競生人我由此生死輪轉無窮受諸苦故此慢差別有七九種謂於三品我德處生一切皆通見修所斷聖位之中俱生我慢既得現行則凡慢之流類由斯于聖位中容得現起義亦無失七種慢者一慢謂不敬等類藐視劣類二過慢謂於等類妄視為劣及於勝類妄視為等三慢過慢謂於勝類反視為劣四我慢謂妄執有我而生貢高五增上慢謂少有所得自謂滿足如妄認四禪為四果等六卑劣慢謂自實甚劣妄謂少劣或雖知彼勝不肯起敬七邪慢謂自實無德妄謂有德也九種慢者約我德處各有勝等劣三品我即所執虗妄假名之體德即所修之德處即受用處所或我勝我等我劣或德勝德等德劣或處勝處等處劣是名九種依之起于或慢或過慢或慢過慢或卑劣慢可以意知是中不論七種九種若依分別煩惱起者即見所斷若依俱生煩惱緣事生者即修所斷也五釋疑云何為疑於諸諦理未達是有是無猶豫不決為性能障不疑及諸善品為業謂猶豫者善不生故問曰猶豫則善不生過誠大矣然貪瞋癡慢苟知其過猶可作意蠲除至於理實未明安可強不知以為知耶答曰強不知以為知正是疑之根也若欲除疑惟有虗心博學審問慎思憑正教為指南依師友為眼目又須如舜之好問好察如孔之善惡皆師方能永斷疑根直至不疑之地有義此疑以慧為體由其于所觀境猶豫簡擇說為疑故毗助末底是疑義故末底般若義無異故此出異解也毗此也助輔也末底及般若皆翻慧也言毗助末底是疑義者猶所云大疑大悟小疑小悟不疑不悟也有義此疑別有自體由此疑故令慧不決此疑非即慧故瑜伽論說六煩惱中惟惡見是世俗有以即是慧分故餘五皆是實有以各別有性故若因疑能毗助末底汝便執慧以為疑體亦可因識能毗助若南而智便應為識體耶非由助力義便轉變是故此疑非慧為體此正解也若南此云智也智之與慧同是別境中慧不論有漏無漏若善若染皆可名慧亦皆名智無漏位中或以無分別者名慧有分別者名智然根本後得同稱為智道慧道種慧同稱為慧故知約義則隨意立名約體則元無二性也識是心王智是心所若疑以慧為體則識亦應以智為體豈可乎哉先申違量云識是有法應智為體宗因云毗助智故喻如疑助慧次申正量云毗助慧之疑是有法非慧為體宗因云別有性故非由助力義便轉變故喻如毗助智之識五釋疑竟六釋惡見二初總釋相用二詳示差別今初云何惡見於諸諦理顛倒推求即以染汙相應之慧為性能障善見招苦為業謂惡見者多受苦故以推求故體即是慧以顛倒故名之為染何謂顛倒即是妄執實我實法而已九十六種外道何甞不求出離生死秪因我法二執所纏故種種苦行無非唐喪此世他生不能解脫然則欲出生死可不以破惡見為急務也哉二詳示差別二初標數二釋相今初此見行相差別有五二釋相四初釋身見至四釋二取今初一薩迦耶見謂於五取蘊執我我所一切見趣所依為業此通分別俱生二攝此見差別有二十句六十五等但是分別起攝薩迦耶義翻積聚謂積聚四大五蘊假名為身依身妄起我我所執故名薩迦耶見此見復為一切惡見根本一切邊邪等見皆依身見而生故也就此根本身見若第七識緣第八識之見分起自心相任運執我即是俱生惑攝若第六識緣五取蘊或總或別起自心相任運執我我所亦是俱生惑攝若第六識緣于邪教及邪思惟起二十句六十五等種種戲論則惟是分別惑攝也二十句者一云我大色小色在我中二云色大我小我在色中三云即色是我四云離色是我受想行識亦各四句故合有二十句六十五句者隨執一蘊為我餘四蘊為我所四中各具瓔珞僮僕窟宅三法我與我所合十三句五蘊互論成六十五二釋邊見二邊執見謂即於彼薩迦耶見隨執斷常障處中行出離為業此通分別俱生二攝此見差別於諸惡見趣中有執前際四徧常論一分常論及計後際有想十六無想俱非各有八論七斷滅論等皆惟分別起攝處中行即非斷非常緣起正理也由達緣起正理方能正信因果依教修行出離生死今斷常二執正障此行然亦有俱生分別二種不同具如下文所明若夫四徧常等則依邪教邪思惟起惟屬分別惑矣四徧常者一計二十劫常二計四十劫常三計八十劫常四以捷疾相智妄言為常一分常者一梵天常我無常二由戲笑故無常三由相觀視故無常四捷疾觀察謂常無常後際有想十六者一有色見二無色見三有色無色見四非有色非無色見五有邊見六無邊見七有邊無邊見八非有邊非無邊見九有樂見十有苦見十一有樂有苦見十二不苦不樂見十三一想十四若于想十五少想十六無量想無想八論者一有色二無色三有色無色四非有色非無色五有邊六無邊七有邊無邊八非有邊非無邊俱非八論者名相與無想八論同七斷滅論者一身滅二欲天滅三色天滅四空處滅五識處滅六不用處滅七有想無想處滅此等皆出阿含梵動經中亦名梵網六十二見此是西域外道宗本不應引大佛頂經陰魔文釋以佛頂經中行陰六十二見乃修心誤墮與此不盡同也三釋邪見三邪見謂謗因果作用實事及非四見所攝之諸餘邪執皆此見攝如增上緣名義遍故此見差別於諸惡見趣中有執前際二無因論四有邊等不死矯亂及計後際五現涅槃或計自在世主梵釋及餘物類常恒不易或計自在等是一切物因或有橫計諸邪解脫或有妄執非道為道諸如是等皆邪見攝一者撥無善惡諸因二者撥無善惡所招苦樂諸果三者撥無善行惡行作用四者撥無世出世間父子聖凡種種俗諦實事及身邊等四見之所不攝皆此邪見所攝譬如因緣等三緣之所不攝皆增上緣所攝也二無因者一則從無想來自謂本無今有一則捷疾觀察妄謂無因而有四有邊者一有邊想二無邊想三上方有邊四方無邊四非有邊非無邊不死矯亂者一云善惡有報耶無報耶二云有他世無他世耶三云何善何不善四乃愚冥暗鈍隨他言答五現涅槃者一云現在五欲自恣即是涅槃二云初禪是涅槃三云二禪是涅槃四云三禪是涅槃五云四禪是涅槃或計自在等即如初卷所破諸邪解脫即非果計果非道為道即非因計因四釋二取四見取謂於諸見之中隨執一見及所依蘊執為此因最勝能得清淨之果一切鬬諍所依為業五戒禁取謂於隨順諸見之戒禁及所依蘊執為此因最勝能得清淨之果無利勤苦所依為業此正釋二取之相也由有見執故互相違反而𩰖諍滋生由持邪戒故枉受勤苦而空無利益然有處說執為最勝是非果計果名為見取執能清淨是非因計因名戒取者是互相影略而說或是隨轉理門若不爾者如何非滅計滅非道計道諸論皆說為邪見非說為二取之所攝耶此通妨也文義可知意顯雙計因果方名二取單計因果止屬邪見耳初正釋頌文竟二諸門分別十一初俱生分別門至十一例結餘門今初如是總別十煩惱中六通俱生及分別起任運思察俱得生故疑及後之三見唯分別起要由惡友及邪教力自審思察方得生故總則唯六別須分十故云總別十煩惱也貪瞋癡慢身見邊見此六種中一分任運生者名俱生惑一分思察生者名分別惑若疑及邪見見取戒取四種唯分別起也俱生惑即修所斷惑亦名思惑分別惑即見所斷惑亦名見惑邊執見中通俱生者有義唯有斷見通于俱生常見相麤必由惡友等力方引生故瑜伽等說何邊執見是俱生耶謂斷見攝以見道前學現觀者已伏分別現起諸惑而于心中起如是怖今者我我何所在耶故禽獸等若遇違緣皆恐我斷而起驚怖此下重辨邊執見之俱生義也斷常二執名邊執見釋此有兩家解今初家但許斷見通於俱生一者學現觀人已伏見惑猶起斷怖二者禽獸無惡友教不起見惑亦起斷怖故知斷見通于俱生有義彼論依麤相說理實俱生亦通常見謂禽獸等執我常存熾然造集長時資具故顯揚等諸論皆說於五取蘊執斷計常或是俱生或分別起此第二解正許常見亦通俱生也義並可知初俱生分別門竟二自類相應門問曰此十煩惱誰幾相應答曰貪與瞋疑定不俱起貪愛瞋憎二境必不同故於境不決故疑無染著故不貪貪與慢見或得相應而不一定所愛為貪所陵為慢境非一故說不俱起所染為貪所恃為慢境可同故說得相應於五見境皆可愛故貪與五見相應無失瞋與慢疑或得俱起亦不一定所瞋為瞋所恃為慢境非一故說不相應所蔑為慢所憎為瞋境可同故說得俱起初猶豫時為疑未憎彼故非瞋說不俱起久思不決是疑便憤發故是瞋說得相應疑順違事隨應亦爾順事猶豫則不瞋違事猶豫則憤發瞋與見戒二取必不相應執為勝道不憎彼故此瞋與身邊邪三見或得相應而不一定於有樂蘊起身常見不生憎故說不相應於有苦蘊起身常見生憎恚故說得俱起斷見翻此說瞋有無邪見誹撥惡事好事如次說瞋或無或有于樂蘊起斷見則生瞋于苦蘊起斷見則不瞋故曰翻此說瞋有無也邪見誹撥惡事則不生瞋妄計無惡果故邪見誹撥好事則得生瞋妄計無善果故慢於境定疑則不然故慢與疑無相應義慢與五見皆容俱起行相展轉不相違故然與斷見必不俱生執我斷時無陵恃故與身邪見一分亦爾慢於境定謂所恃之我所陵之人皆決定無疑惑也與身邪見一分亦爾者謂執苦劣蘊為身者不能恃己陵他邪見誹撥好事者亦無所恃以陵他故疑不審決與見相違故疑與見定不俱起五見展轉必不相應非一心中有多慧故五見皆以染慧為體故一心中決不並起癡與九種皆定相應諸煩惱生必由癡故癡即無明及諸煩惱根本不破無明而能斷諸煩惱不可得也然於諸理事明解則名無癡於諸理事迷闇則名為癡當知理即空中二理事即俗諦差別因果作用實事也迷于中理名根本無明迷於空理及迷事者皆名枝末無明解中理者名為中觀解空理者名為空觀解諸事者名為假觀是故理事二名攝盡三諦解迷二種心所攝盡三惑三觀若不達秖一理事分合差別則有七種二諦五種三諦四種四諦四種一諦四種無諦之不同何能捨迷得解以解融迷也哉二自類相應門竟三諸識相應門問曰此十煩惱何識相應答曰藏識全無末那有四謂癡見慢愛意識具十五識唯三謂貪瞋癡無分別故由稱量等起慢等故無分別謂前五識無隨念計度二種分別但有自性分別也由稱量故起慢由思察故起疑起見今五識既無隨念計度二種分別故不能稱量思察不與慢疑五見相應四諸受相應門問曰此十煩惱何受相應答曰貪瞋癡三不論俱生分別一切容與五受相應以貪會違緣亦與憂苦俱故瞋遇順境亦與喜樂俱故有義俱生分別起慢容與非苦之四受相應恃苦劣蘊亦得與憂相應故有義俱生慢亦與苦受俱起意有苦受前已說故分別慢等純苦趣無以彼純苦趣中無有邪師邪教等故然彼不造引惡趣業要由分別起之煩惱乃能發彼引惡趣業今彼純苦趣中無分別起惑故疑及後三惡見容四受俱但除苦受欲界之人疑未來無苦等亦喜受俱故二取若緣憂俱見等爾時得與憂相應故恐有問曰疑何容喜故今釋曰欲疑無苦亦喜受俱又恐問曰二取執為勝淨何得有憂故今釋曰若緣憂俱之見戒及所依蘊亦得與憂相應如投灰拔髮等種種苦事亦有憂故有義俱生身邊二見但與喜樂捨受相應非五識俱故無苦受唯有覆無記故故無憂受分別身邊二見容四受俱但除苦受執苦俱蘊為我我所常得有憂受斷見翻此執樂蘊斷與憂相應故有義身邊二見若俱生者亦苦受俱純受苦處緣極苦蘊苦相應故論說俱生一切煩惱皆於三受現行可得廣說如前餘如前說廣說如前指第五卷釋三受文餘如前說謂分別二見同初義所說容四受俱也此依實義細釋也若隨麤相一往明其梗概者貪慢四見樂喜捨俱瞋唯憂苦捨受俱起癡與五受皆得相應邪見及疑四俱除苦已上若細若麤正判諸受相應竟貪癡俱之樂受通下四地餘七所俱之樂受除欲界通三禪疑及獨行癡在欲界中唯憂捨二受得俱餘受俱起如理應知此更以諸受相應之惑而判屬界地也下四地者一雜居二初禪三二禪四三禪也四禪已上唯捨受故餘七者除去貪瞋癡三也慢疑五見但與意識相應欲界無意地樂故除欲界唯通三禪疑及獨行癡亦唯在意識故欲界中無苦樂受并無喜者前約細相故云欲疑無苦亦喜受俱今隨麤相則疑惑未決安得有喜又獨行癡凡有二種一是主獨行獨能發業二非主獨行但與小隨同起此之二種在欲界中若隨麤相亦無喜受故亦唯憂捨俱也餘苦受喜受俱起之惑所通界地並可准思故不繁述四諸受相應門竟五別境相應門問曰此與別境幾互相應答曰貪瞋癡慢容與別境五心所俱起以貪瞋癡慢專注一境之時亦得有定故疑及五見各容與四別境心所俱疑則但除勝解以不決定故五見非與慧俱以不異慧故六三性相攝門問曰此十煩惱何性所攝答曰瞋唯不善損自他故餘九通于不善及有覆無記二性上二界者唯無記攝以被定所伏故若欲界繫分別起者唯不善攝發惡行故若是俱生發惡行者亦不善攝損自他故餘俱生不發惡行者皆無記攝細不障善非極損惱自他處故當知俱生身邊二見唯無記攝以其不發惡業雖數現起不障善故七界繫現緣門又三初明界繫二明現起三明互緣今初問曰此十煩惱何界繫耶答曰瞋唯在欲餘通三界二明現起生在下地未離下染上地煩惱不現在前要得彼上地之根本定者然後彼上地之煩惱容現前故凡夫外道所修世間味禪諸有漏道以無二空觀智雖不能伏分別起惑及第七識中細俱生惑而能伏除六識中之俱生麤惑漸次證得上地之根本定以彼俱生麤惑但迷事境緣外五塵而起依外門轉散亂麤動正障定故所以伏此麤俱生惑得彼上地定已然後彼上地之分別俱生諸惑皆容現前若夫生在上地者則下地諸惑不論分別不論俱生皆容現起何以知之以生第四禪定之中有中者由謗解脫便生于地獄故故知上地得起下地分別惑又身在上地將生下時起下地潤生之俱生愛故故知上地得起下地俱生惑也而有處言生上不起下者乃依多分而說或是隨轉理門謗解脫者無聞比丘證得四禪起增上慢妄謂己得四果不受後有迨命終後於中有中見彼四禪受生之處不知己實未證四果却云我今已證四果仍復有受生處則佛所云羅漢不受後有定是誑語由其於中有中起此一念謗佛所說解脫之心於是四禪後有隨滅地獄後有隨生也潤生愛者於後有處任運染著如入胎時於父母起顛倒愛之類是也三明互緣下地煩惱亦緣上地瑜伽等說欲界繫貪求上地生味上定故既說瞋恚可以憎嫉滅道二諦亦應憎嫉離欲地故又復總緣諸行執我我所斷常慢者得緣上故既此貪瞋身邊慢五惑得緣上地則餘癡疑見戒邪五惑亦得緣上其理極成而有處言貪瞋慢等不緣上者依麤相說或依別緣謂從不見世間別執他地之法以為我及我所等故故說身見不緣上地邊見必依身見起故故說邊見不緣上地總緣諸行等者謂有外道總緣三界色心諸行執謂我及我所計斷計常高舉於他故身邊慢亦得緣上若依別緣則不爾也上地煩惱亦緣下地說生上者於下有情恃己勝德而陵彼故又復總緣諸行執我我所斷常愛者得緣下故疑及後之三見亦得緣下如理應思而說上惑不緣下者彼亦依多分說又或約別緣說不言瞋癡者上地無瞋故癡徧染心故七界繫現緣門竟八學等三攝門問曰此十煩惱學等何攝答曰非學無學彼學無學唯是善故問初果以上思惑尚存何故非學攝耶答研真斷惑名為學真窮惑盡名無學初果以上雖有思惑正研真時惑不現起出觀失念煩惱方行故曰唯聖罔念作狂唯狂克念作聖內外凡位雖未證果而能修觀伏惑即可云一念相應一念佛則知三乘有學雖已稱聖而出無漏觀時或起煩惱例可云一念失照一念狂也九見等所斷門問曰此十煩惱何所斷耶答曰非非所斷彼非所斷非染法故分別起者唯見所斷麤易斷故若俱生者唯修所斷細難斷故見所斷之十種煩惱實俱頓斷以真見道之時總緣四諦故然十煩惱之迷諦相有總有別總謂十種皆迷四諦苦集是彼十惑因依處故滅道是彼十惑怖畏處故別謂別迷四諦相起身邊二見唯迷苦諦不依集滅道起餘八煩惱通迷四諦以身邊二見唯迷苦諦果處而起是以別修空觀及非我觀以對治之唯屬苦諦境故此二唯迷苦義也謂疑及身邊邪三見親迷苦理見戒二取執彼三見戒禁及所依蘊為勝能淨於自他見及彼眷屬如次隨應起貪恚慢故二取貪恚慢迷苦則疎相應無明與九同其迷之親疎不共無明親迷苦理此十通迷苦義也疑及邪見親迷集等三諦二取貪恚慢等准苦應知迷集滅道亦疎然瞋亦能親迷滅道由怖畏彼滅道生憎嫉故迷諦親疎麤相如是此既判見修二斷復明迷諦有總有別有親有疎也於自他見等者貪自見恚他見慢彼眷屬也委細說者若貪瞋慢三與分別惑五見及疑俱時生起者隨應如彼見道所斷若俱生身邊二見及與彼二見相應之愛慢無明此五雖迷苦諦以細而難斷故修道方斷復有瞋及餘愛等迷別事而生者不違諦觀故亦修道所斷此復細判二斷也見疑俱生謂與五見及疑相應而起之貪瞋慢也俱生二見謂一分任運之身邊二見也九見等所斷門竟十隨境立名門雖諸煩惱皆有相分而所仗本質或有或無即名為緣有事緣無事之煩惱彼煩惱之親所緣相分雖皆有漏而所仗之本質亦通無漏即名為緣有漏緣無漏之煩惱緣自地境之所起者其煩惱之相分似于本質名緣分別所起事境緣滅道諦及他地境之所起者其煩惱之相分與彼本質不相似故名緣分別所起名境但有名字而無質影故也所仗質或有或無者緣現境則有本質可托緣過未則無本質可托也親所緣皆有漏者能變之心是煩惱故所變相分定惟有漏也所仗質通無漏者或緣道滅二諦或緣佛法僧寶而起癡疑邪見及瞋慢等故也夫現前一念不起煩惱前已于此十煩惱中隨起一種煩惱皆有相分既有相分即有見分既有見相二分即有自證及證自證便是四分此四分中相分屬色見等三分屬名名色二字收一切法即無不盡又見分則通三量自證及證自證唯是現量又此四分或攝為三第四攝入自證分故或攝為二後三俱是能緣性故或攝為一體無別故則此煩惱之性可思議耶不可思議耶又此煩惱既能緣有事亦能緣無事既能緣有漏亦能緣無漏既能緣事境亦能緣名境則何法不具何法不造又能緣有漏自地他地則攝盡六凡法界能緣無漏則攝盡四聖法界能緣有事則攝盡現在十界能緣無事則攝盡過去未來十界可謂微塵剎土自他不隔於毫端十世古今始終不離於當念矣誰謂煩惱實性非即佛性也哉十一例結餘門餘門分別如理應思正欲人觸類旁通即於煩惱而見法界理也三釋根本煩惱竟四釋隨煩惱二初舉頌二論釋今初已說根本六煩惱相諸隨煩惱其相云何頌曰隨煩惱謂忿恨覆惱嫉慳誑諂與害憍無慚及無愧掉舉與沉不信并懈怠放逸及失念散亂不正知二論釋二初正釋頌文二諸門分別初中三初略釋通名二廣釋別相三釋與并及今初論曰唯是根本煩惱之分位差別及等流性故名隨煩惱此二十種類別有三謂忿等十各別起故名小隨煩惱無慚等二徧不善故名中隨煩惱掉舉等八徧染心故名大隨煩惱分位差別指無自體者言之等流性指有自體者言之不善即惡也染心即不善及有覆無記心也二廣釋別相三初釋十小隨二釋二中隨三釋八大隨初中十初釋忿至十釋憍今初云何為忿依對現前不饒益境憤發為性能障不忿執仗為業謂懷忿者多發暴惡身表業故此即瞋恚一分為體離瞋無別忿相用故暴惡身表業即執持器仗互相𨷖戰之惡相也一朝之忿忘身及親結禍速讐莫此為甚故首明之二釋恨云何為恨由忿為先懷惡不捨結怨為性能障不恨熱惱為業謂結恨者不能含忍恒熱惱故此亦瞋恨一分為體離瞋無別恨相用故不念舊惡怨是用希懷恨不釋徒自熱惱而已三釋覆云何為覆於自作罪恐失利養名譽隱藏為性能障不覆後必悔惱為業謂覆罪者後必悔惱不安隱故有義此覆乃是癡一分攝論唯說此癡一分故不懼當來苦果覆自罪故有義此覆應是貪癡各一分攝亦恐失利譽乃覆自罪故論據麤顯唯說癡分如說掉舉是貪分故然又說掉舉徧諸染心不可執為唯是貪分罪無大小發露則消滅覆藏則增長譬如樹根露則樹枯埋則樹茂是故有智慧者發露懺悔能因重罪而悟無生諸愚癡人貪惜覆藏每因小愆而招劇苦大佛頂經云菩薩觀覆如戴高山履于巨海修心之士可不慎哉四釋惱云何為惱忿恨為先追觸暴熱狠戾為性能障不惱䖧螫為業謂追往惡觸現違緣心便狠戾多發囂暴凶鄙麤言䖧螫他故此亦瞋恚一分為體離瞋無別惱相用故蛆知列切螫施隻切蟲行毒以傷人也由此惱惑起惡口業毒逾蛇虺乃至死後受毒蟲身無有出期修心者宜深戒之又忿恨惱皆瞋為體忿緣現在恨緣過去惱追過去而觸現在忿發身業恨專在意惱發口業是謂三種差別之相五釋嫉云何為嫉殉自名利不耐他榮妬忌為性能障不嫉憂慼為業謂嫉妬者聞見他榮深懷憂慼不安隱故此亦瞋恚一分為體離瞋無別嫉相用故大乘理趣經云彼人富貴皆宿福生以我貪嫉豈能侵奪若不斷嫉常受貧窮無復威力若能于他富貴起隨喜心不捨毫𨤲獲大功德六釋慳云何為慳耽著財法不能慧捨秘悋為性能障不慳鄙畜為業謂慳悋者心多鄙澁畜積財法不能捨故此即貪愛一分為體離貪無別慳相用故慳財者世世貧窮慳法者生生愚暗不可不戒七釋誑云何為誑為獲利譽矯現有德詭詐為性能障不誑邪命為業謂矯誑者心懷異謀多現不實邪命事故此即貪癡一分為體離貪癡二無別誑相用故一身衣食所需幾何作此欺誑招無量罪如末利夫人轝夫四人往因亦可為寒心也事出觀佛三昧海經須者尋之八釋諂云何為諂為罔他故矯設異儀險曲為性能障不諂教誨為業謂諂曲者為罔冐他曲順時宜矯設方便為取他意或藏己失不任師友正教誨故此亦貪癡一分為體離二無別諂相用故直心是道場諂曲之心與道相違故不任教誨九釋害云何為害於諸有情心無悲愍損惱為性能障不害遍惱為業謂有害者逼惱他故此亦瞋恚一分為體離瞋無別害相用故瞋害別相准善應說無瞋名慈不害名悲故無慈即瞋無悲即害也障菩提道招劇報苦損逼他人終成自損而已哀哉十釋憍云何為憍於自盛事深生染著醉傲為性能障不憍染依為業謂憍醉者生長一切雜染法故此亦貪愛一分為體離貪無別憍相用故盛必有衰何可憍醉所恃盛事未必長保而所生雜染則相隨不離矣不亦悲夫初釋十小隨竟二釋中二隨二初別釋二通簡初中二初釋無漸二釋無愧今初云何無慚不顧自法輕拒賢善為性能障礙慚生長惡行為業謂於自法無所顧者輕拒賢善不恥過惡障慚生長諸惡行故尊重己靈名顧自法不顧自法即自暴自棄也二釋無愧云何無愧不顧世間崇重暴惡為性能障礙愧生長惡行為業謂於世間無所顧者崇重暴惡不恥過罪障愧生長諸惡行故護惜譏嫌名顧世間不顧世間即甘為人下也二通簡不恥過惡是二通相故諸聖教假說為體若執不恥為二別相則應此二體無差別由斯二法應不俱生非受想等有此義故若待自他立二別者應非實有便違聖教若許此二實而別起復違論說俱遍惡心不善心時隨緣何境皆有輕拒善及崇重惡義故此二法俱遍惡心所緣不異無別起失然諸聖教說不顧自他者自法名自世間名他或即此中拒善崇惡於己益損名自他故而論說為貪等分者是彼貪等等流非即彼性拒善則於己無益名不顧自崇惡則于己有損名不顧他餘如慚愧中釋可知貪等者等于瞋癡由無慚愧令貪瞋癡皆得生長助成貪等是彼等流故無慚愧名為惡法與諸禽獸不相異也二釋二中隨竟三釋八大隨八初釋掉舉至八釋不正知今初云何掉舉令心於境不寂靜為性能障行捨奢摩他為業有義掉舉乃是貪一分攝論唯說此是貪分故此由憶昔樂事生故有義掉舉非唯貪攝論說掉舉徧染心故又掉舉相謂不寂靜說是煩惱共相攝故掉舉離此煩惱共相無別相故雖依一切煩惱假立而貪位增說為貪分有義掉舉別有自性遍諸染心如不信等非因假說他分體便非實勿不信等亦假有故而論說此掉舉以為世俗有者例如睡眠等雖實有體而隨他無明相說掉舉別相謂即囂動能令與彼俱生之心心所法不寂靜故若離諸煩惱無別此掉舉相不應別說障奢摩他故不寂靜非此掉舉別相奢摩他此翻為止釋有三義第三為正二釋沉云何沉令心於境無堪任為性能障輕安毗鉢舍那為業有義沉乃是癡一分攝論唯說此是癡分故昧沉重是癡相故有義沉非但癡攝謂無堪任是沉相一切煩惱皆無堪任離此煩惱無堪任相無別沉相故雖依一切煩惱假立而癡相增但說癡分有義沉別有自性雖名癡分而是癡之等流如不信等非即癡攝論中隨他相說名世俗有如睡眠等是實有性沉別相謂即懵重能令與彼俱生之心心所法無堪任故若離諸煩惱無別沉相不應別說障毗鉢舍那故無堪任非此惛沉別相此與癡相有差別者謂癡於境迷闇為相正障無癡而非懵重沉於境懵重為相正障輕安而非迷闇毗鉢舍那此翻為觀釋亦三義第三為正懵故名重故名沉與癡差別如文可知三釋不信云何不信於實德能不忍樂欲心穢為性能障淨信墮依為業謂不信者多懈怠故不信三相翻信應知然諸染法各有別相唯此不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他是故說此心穢為性由不信故於實德能不忍樂欲非謂不忍樂欲別有自性若於餘事邪忍樂欲是此不信之因果非此自性若有疑者猶可生信若直不信則佛亦無如之何故極穢濁也四釋懈怠云何懈怠於善惡品修斷事中懶墮為性能障精進增染為業謂懈怠者滋長染故於諸染事而䇿勤者亦名懈怠退善法故若於無記事而䇿勤者於諸善品無進退故是欲勝解所攝非別有性喻如於無記事而忍可樂欲非淨非染無信不信當知亦非精進亦非懈怠也五釋放逸云何放逸於染淨品不能防修縱恣流蕩為性障不放逸增惡損善所依為業謂由懈怠及貪瞋癡不能防修染淨品法總名放逸非別有體雖慢疑等亦有此能而方彼貪瞋癡懈四法則勢用微劣惟彼四法障三善根及障徧䇿法故推究此放逸更無別相如不放逸中可例六釋失念云何失念於諸所緣不能明記為性能障正念散亂所依為業謂失念者心散亂故有義失念即是念一分攝說是煩惱相應之念故有義失念乃是癡一分攝瑜伽說此失念是癡分故癡令念失故名失念有義失念乃是念癡俱一分攝由前二文但是影略說故論復說此徧染心故釋有三義亦以第三為正七釋散亂云何散亂於諸所緣令心流蕩為性能障正定惡慧所依為業謂散亂者發惡慧故有義散亂乃是癡一分攝瑜伽說此是癡分故有義散亂乃是貪瞋癡攝集論等說是三分故瑜伽說此是癡分者遍染心故謂貪瞋癡令心流蕩勝餘法故說為散亂有義散亂別有自體集論說三分者是彼貪瞋癡之等流如無慚等非即彼貪瞋癡所攝但以隨他相說名世俗有散亂自有別相謂即躁擾令與彼俱生之心心所法皆流蕩故若離彼貪瞋癡三法無別自體不應別說障三麼地亦以第三義為正也惡慧謂邪簡擇三摩地即是正定問曰掉舉散亂二用何別答曰彼掉舉令易解此散亂令易緣雖一剎那解緣無易而於相續有易義故問曰染汙心時由掉亂力常應念念易解易緣何故有時專注一境答曰或由念等力所制伏如繫猿猴有暫時住故掉與亂俱遍染心此更料簡并釋疑也初一問答是對掉舉料簡用別易解者改其能知之心易緣者更其所緣之境也次一問答釋疑可知八釋不正知云何不正知於所觀境謬解為性能障正知毀犯為業謂不正知者多所毀犯故有義不正知乃是慧一分攝說是煩惱相應慧故有義不正知乃是癡一分攝瑜伽說此是癡分故令知不正名不正知有義不正知乃是慧癡俱一分攝由前二文影略說故論復說此遍染心故亦第三義為正二廣釋別相竟三釋與并及頌中與并及之為言顯隨煩惱非唯二十以雜事等說復有會等多種隨煩惱故當知隨煩惱名亦攝根本煩惱以即是前根本煩惱之等流性故若夫煩惱同類之餘染汙法則但可名為隨煩惱以非根本煩惱攝故煩惱同類餘染汙法如有覆無記之悔眠尋伺等是也然今唯說二十隨煩惱者謂非根本煩惱又唯染麤不可悔眠等通于善及細故此餘染法或即此之分位或是此之等流皆此二十所攝隨其類別如理應知初正釋頌文竟二諸門分別十二初假實門至十二隨境立名門今初如是二十隨煩惱中小十大三定是假有無慚無愧不信懈怠定是實有教理成故掉舉沉散亂三種有義是假有義是實所引理教如前應知大三假有者放逸失念不正知也二俱生分別門二十皆通俱生分別隨于俱生分別二種根本煩惱之勢力起故三自類相應門此二十中小十展轉定不俱起互相違故行相麤猛各為主故中二一切不善心俱隨其所應不善之法皆得與小隨大隨俱起論說大八徧諸染心展轉于小隨中隨皆容俱起有處說六遍染心者以掉增時不俱起故沉增盛則無掉舉掉舉增盛則無沉故說此二不徧染心惟六法徧也有處但說五遍染者以掉等違唯善故沉掉舉不信懈怠放逸此之五法唯于善心中無而于不善及有覆無記心中皆有故說五遍其忘念不正知二法若以癡一分為性者則徧染心若以念慧一分為性者則不徧染心散亂一法雖通不善及有覆無記然有時被制伏故所以亦不說遍也四諸識俱起門此二十煩惱唯染性故非與第八識俱第七識中唯有八大取捨差別如上應知第六識中容有一切小十麤猛五識中無中二大八相通五識容有五諸受相應門由斯中二大八之相既通得與五受相應有義小十除諂誑憍三其忿等七法唯與喜憂捨三受相應而諂誑憍之三法與四受俱但除苦受有義忿等七法與四受俱但除樂受諂誑憍三五受俱起意有苦受前已說故此受俱相如煩惱說實義如是若隨麤相則忿恨惱嫉害但與憂捨二受俱其覆慳二法但與喜捨二受俱餘諂誑憍三法更增樂受若中二與大八即隨麤相亦如實義得與五受相應小十二義後義為正實義如是即結成第二正義也次更隨麤相略判可知六別境相應門如是二十與別境五皆容俱起不相違故染念染慧雖非與念慧俱而此二之癡一分攝者亦得相應故染念即忘念染慧即不正知也念亦緣現在與曾習相類之境忿亦得緣剎那過去未久之境故忿與念亦得相應染定起時心亦躁擾故亂與定相應無失此釋伏難也難曰念緣曾習境忿緣現在境何得相應答釋可知又難曰定與散亂何得相應釋亦可知七根本相應門中二大八與十根本煩惱俱小十定非與見疑俱起此小十相麤動彼見疑審細故忿等五法容與慢癡俱非與貪恚並以即是瞋分故慳與癡慢俱非與貪瞋並以即是貪分故憍唯與癡俱與慢解別是貪分故覆誑與諂得與貪癡慢俱以行相無違但是貪癡分故忿等五法謂忿恨惱嫉害也既是瞋分則一心中不容二瞋又瞋與貪定不俱起故但得與慢癡俱耳慳是貪分不與貪瞋並起憍亦貪分不與貪瞋並起而言與慢解別者貪令心下慢令心舉故也問曰法華文句以憍釋慢此云何通答曰前文亦云所染所恃境可同故說貪與慢或得相應又復憍以醉傲為性傲即慢也世人每云憍傲亦云憍慢此中且約小隨麤相正憍醉時未必陵他故云解別耳言行相無違等者貪分所攝之覆誑與諂不與癡違癡分所攝之覆誑與諂亦不與貪慢違也八三性相攝門小七中二唯不善攝小三大八亦通有覆無記小七謂忿恨覆惱嫉慳害也五皆瞋分故惟不善覆兼貪癡滋長罪垢故唯不善慳悋鄙澁永塞福路故唯不善諂誑憍三若與無慚愧俱則名為惡若未至於不顧自他猶名有覆無記大八若與十不善中隨一俱起則名為惡若與其餘任運煩惱相應亦但名有覆無記也九界繫現緣門又三初明界繫二明現起三明互緣今初小七中二唯欲界攝誑諂通欲色二界餘憍及八大皆通三界二明現起生在下地容起上地之十一謂八大及憍誑諂以耽上定於他起憍誑諂故上地無忿等五以無瞋故亦無覆慳無不善故故不言之若生上地起下後十謂中二大八以邪見謗解脫愛俱潤生惑容起彼故小十則生上者無由起下非正潤生及謗滅故三明互緣中二大八下亦緣上與上緣之貪等相應起故有義小十下不緣上行相麤近不遠取故有義嫉等亦得緣上於勝地法生嫉等故大八及諂誑上亦緣下與下緣之慢等相應起故梵於釋子起諂誑故憍不緣下以下地非其所恃境故小十二義後義為長餘可知九界繫現緣門竟十學等相攝門二十皆非學無學攝此二十但是染彼學無學唯淨故義如根本煩惱中釋十一三斷相攝門後十唯通見修所斷非非所斷以與分別俱生二種根本煩惱相應起故見所斷者隨迷諦相或總或別之根本煩惱俱時而生故隨所應皆通四諦部分其迷諦親疎等皆如根本煩惱中說前十有義唯修所斷緣麤事境任運生故有義亦通見修所斷依分別俱生二種根本煩惱之勢力起故以外道緣他見等生忿等故所以亦通見所斷也見所斷者隨其所應緣總緣別根本惑力皆通四部所攝此中有義忿等但緣迷諦惑生非親迷諦行相麤淺不深取故有義嫉等亦親迷諦於滅道等生嫉等故後十即中二大八前十即小隨十也此中有義下又判迷諦親疎有兩家解可以並參故無去取十二隨境立名門然忿等十但緣有事要託本質方得生故小十但緣有事不緣無事則知中二大八通緣有事無事也以大八遍染中二遍不善故緣有漏等准上應知謂二十皆緣有漏無漏亦皆緣事境名境也於此二十法中隨拈一法亦復不可思議若此而眾生迷不自覺甘受虗妄顛倒輪迴譬如闇中觸寶傷身又如翳見空華亂舞豈不哀哉四釋隨煩惱竟
