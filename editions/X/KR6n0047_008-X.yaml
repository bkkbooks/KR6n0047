body:
  text: 蕅益沙門智旭述二傍論十因三初明依處立因二明依處攝因三明因緣依處得果初中二初標徵二正釋今初如是四緣依十五處義差別故立為十因云何此十因依十五處立宗鏡云十因者隨說因為諸法先導之門觀待因了現得作用之事牽引因則令成自果攝受因則能攝萬緣生起因令萬類能生引發因使諸果成辦定異因則種類各別同事因則體總一如相違因能起障礙之門不違因隨順緣生之理二正釋二初明十因依十五處立二以二因攝上十因初中十初隨說因依於語依處立至十不相違因依於不障礙依處立今初一語依處謂有一法必有一名如名取相之想所起語言之性即依此處立隨說因謂依此語隨見聞等說諸義故此即以能說之語為所說諸義之因有論說此隨說因是名想見由如名字取相執著隨起說故若依彼論所說便可以顯此因是語依處有論指集論也餘可知二觀待因依於領受依處立二領受依處謂所觀待有能受所受之性即依此處立觀待因謂觀待此能受所受令彼諸事或生或住或成或得故此領受依處是彼觀待因能所受者如手為能受所持之物為所受等舉業時萟為能受科名甲第為所受等乃至淨業為能受淨土為所受等觀待所受之果乃立能受之因令彼舉業淨業等事未生者生已生者住未成者成未得者得也三牽引因依於習氣依處立三習氣依處謂於內外種未成熟位即依此處立牽引因謂能牽引遠自果故內種謂不共種外種謂共種也由此習氣相續相牽令後自果漸漸成熟即種引種令不斷絕名牽引因四生起因依於有潤種子依處立四三有潤生種子依處謂內外種已成熟位即依此處立生起因謂能生起近自果故謂三有種子已經愛取所潤故能近生自果名生起因五攝受因依於六依處立五無間滅依處謂心心所等無間緣六境界依處謂心心所之所緣緣七根依處謂心心所所依六根八作用依處謂於所作業一切作具之作用即除種子之外所有餘助現緣皆名作具九士用依處謂於所作業一切能作者之作用即除種子之外所有餘作現緣皆名作者十真實見依處謂無漏見唯除引自種外但於無漏法能助引證者皆名為真實見總依此六處立攝受因謂攝受前五能辦世間有漏法具攝受六能辦出世無漏法故六引發因依於隨順依處立十一隨順依處謂無記法染法善法之現行種子一切諸行能隨順同類勝品諸法即依此處立引發因謂能引起同類勝無記勝染勝善行及能引得無為法故無記引發無記染引發染善引發善後倍於前故名勝品善又兼能引得無為以無為性雖自平等由善品力滅無記染性乃顯現故也七定異因依於差別功能依處立十二差別功能依處謂有為法各於自果有能起能證差別勢力望所生果不相雜亂即依此處立定異因謂各能生自界等果及各能得自界果故差別功能即色心等各別種子且約十八界言根定非塵等塵定非識等識定非根等又眼定非耳等色定非聲等眼識定非耳識等各自種子各於自果能生能住能成能得故名為定異因文中但舉生得影略住成也八同事因依於和合依處立十三和合依處謂從第二領受依處乃至第十二差別功能依處於所生住成得果中有和合力即依此處立同事因謂從第二觀待因乃至第七定異因皆同生等一事業故合前十一依處總名和合依處合前六因總名同事因也以同一生果住果成果得果之事業故九相違因依於障礙依處立十四障礙依處謂於生住成得果中能障礙法即依此處立相違因謂彼能違生等事故如染能障淨淨亦障染有漏能障無漏無漏亦障有漏皆名為相違因十不相違因依於不障礙依處立十五不障礙依處謂於生住成得事中不障礙法即依此處立不相違因謂彼不違生等事故不必增上相助但令不相障礙即名不相違因也初明十因依十五處立竟二以二因攝上十因二初標二釋今初如是十因二因所攝一能生二方便二釋為二初通攝二局攝初中二初引菩薩地二引有尋等地皆瑜伽論十七地中之名也初又二初引文二釋義今初菩薩地說牽引種子生起種子名能生因所餘諸因方便因攝二釋義此菩薩地乃說牽引生起引發定異同事不相違凡六因中諸因緣種各有生熟之別若在未成熟位名牽引種若至已成熟位名生起種彼上文所說六因中之諸因緣種皆攝在此菩薩地所說牽引生起二位中故雖有現起亦是能生因如彼隨說觀待攝受相違四因之中皆有能生自種子者而多間斷所以此菩薩地略不說之或四因中現起之行能親辦種果者雖是現行亦立種名如說現行穀麥等亦得名為種故所餘因謂初隨說二觀待五攝受九相違及牽引等六因中之非因緣法此等皆是生因緣種熟因緣種之餘故總說為方便因攝非可謂此菩薩地中牽引生起二種唯屬彼前所說十因中之牽引生起二因以餘引發定異同事不相違四因之中亦有因緣種故非唯彼前所說十因之八一概名所餘因以彼前所說牽引生起二因之中亦有非因緣種故菩薩地中所說牽引種子生起種子其名雖同十因中之三牽引因四生起因而義有異故特釋之二引有尋等地二初引文二釋義今初有尋等地說唯生起因是能生因餘皆方便因攝二釋義此文意說牽引等六因中若現行若種子但是因緣攝者皆名為生起因能親生起自類果故此所餘因皆方便攝非可謂此有尋等地所說生起之因唯屬彼前所說十因中之生起因以餘五因中亦有因緣故非唯彼前所說十因中之餘九名所餘因以彼前所說生起因中亦有非因緣故有尋等地所說生起因其名亦同十因中之生起因而義亦異故特釋之初通攝竟二局攝或菩薩地所說牽引種子生起種子即彼十因中所說牽引生起二因所餘諸因即彼十因中之餘八雖牽引生起二因之內亦有非能生因而因緣種勝顯故偏說雖餘因內亦有非方便因而增上者多顯故偏說有尋等地說生起因是能生因餘皆是方便者亦可此中所說生起即是彼十因中之生起因此中所說餘因應知即彼十因中之餘九雖生起中亦有非因緣種而去果近親顯故偏說雖牽引中亦必有因緣種而去果遠疎隱故不說餘九皆方便攝准上應知准上應知謂九因內雖有非方便因而增上者多顯故偏說也初明依處立因竟二明依處攝因二初問二答今初所說四緣依何處立復如何攝十因二因一問四緣依處二問四緣攝因也二答為二初答四緣依十五處二答四緣攝十因二因今初論說因緣依種子依處立依無間滅依處而立等無間緣依境界依處而立所緣緣依所餘依處而立增上緣此引論正答也下復申明通攝局攝此中所言種子即是三習氣依處四有潤種子依處十一隨順依處十二差別功能依處十三和合依處十五不障礙依處如是六依處中之因緣種攝雖於現起之初語依處二領受依處五無間滅依處九士用依處如是四處亦有因緣而多間斷是故此略不說或彼現行亦能親辦自種子果如外麥等亦立種名此明因緣依種子立約通攝也或此中種子之言唯屬第四有潤種子依虗親疎隱顯取捨如前此明因緣依種子立約局攝也准前局攝義可知言無間滅依處及境界依處者應知總顯等無間及所緣二緣之依處非唯五無間滅依處六境界依處定屬二緣以餘十三種依處中亦有中間等無間及所緣二緣義故此明依無間滅立等無間依境界立所緣亦有通攝義也或此所言無間滅及境界者唯指五六餘處雖有而少隱故略不說之此明無間滅及境界亦有局攝義也增上緣寬故不必辨勝答四緣依十五處竟二答四緣攝十因二因論說四緣中之因緣即二因中之能生因攝四緣中之增上緣性即二因中之方便因四緣中間之等無間及所緣二緣即十因中第五攝受因攝雖方便因內具後三緣而增上緣多故此偏說餘九因中亦有中間二緣然唯攝受因中顯故偏說初能生因攝因緣義進退如前既知十因攝歸二因則知四緣亦二因攝既知二因可攝十因則知四緣亦攝十因若以四緣對二因則因緣是能生因餘三皆方便因也若以四緣對十因則因緣攝彼能生等無間及所緣緣攝彼攝受增上攝彼餘八然亦各各有通有局如前進退可思二明依處攝因竟三明因緣依處得果二初問二答今初所說因緣必應有果此果有幾依何處得一問因緣得果二問果數有幾三問果之依處二答三初明果唯五數二答依處得果三答因緣得果今初果有五種一者異熟謂前六識所作有漏善及不善法引滿二業所招自相續之真異熟及異熟生無記總名為異熟果異熟凡有四義一異時而熟謂受果時非造因時二異性而熟謂因通善惡果唯無記三異類而熟謂一趣造業五趣受報四異聖而熟謂依二障種子建立言有漏者簡無漏善不招異熟果也由發業無明所造善及不善名為引業能招總報名真異熟由潤生無明所造善及不善名為滿業能招別報名異熟生真異熟即第八果報識體異熟生即報得諸心心所諸根器界種種差別此真異熟及異熟生同屬無記性攝依此復起善惡而體非善惡故二者等流謂習善等三性所引同類或似先業而後果隨轉平等流類故名等流然有二種一真二似一真等流者前世習善今亦生而好善前世習惡今亦生而喜惡或施或慳或淨或染或忍或瞋或進或懈或定或散或智或愚或信不信或貪無貪或慚無慚或害不害等無量差別生性即然不假熏習皆真等流也二似等流者夙世慈心不害今感長壽無病夙世損害眾生今感短命多病夙世不慳不貪今感富饒安樂夙世慳貪偷竊今感貧窮失脫夙世不犯外色今感眷屬貞良夙世多犯邪婬今感妻孥邪僻夙世實語義語軟語和合今感口氣香潔發言誠證聲音清朗辨才不斷夙世妄言綺語惡口兩舌今感謇喫瘖瘂言無人信等種種後果並隨先業而轉皆似等流也三者離繫謂無漏道斷障所證善無為法無為法性無去來今由二障故令不顯現生空法空二觀名無漏道以無漏道斷二障種則證二空所顯真如以出纏故名離繫果二乘斷煩惱障離分段繫大乘斷所知障離變易繫也四者士用謂諸作者假諸作具所辦事業作者名為士即士農工商等是也作具名為用即文筆學問器械伎術等是也所辦事業名為果即功名富貴穀麥器物等是也五者增上謂除前四果外其餘所得之果如眼識是眼根之增上果耳識是耳根之增上果乃至身不散壞是命根之增上果等宗鏡云異熟則因生果熟異時而成等流則因果性同流類無濫增上則力用殊勝能助他緣士用則功業所成能獲財利離繫則斷障證真超諸漏縛初明果唯五數竟二答依處得果三初引文二約通釋三約局釋今初瑜伽等說習氣依處得異熟果隨順依處得等流果真見依處得離繫果士用依處得士用果所餘依處得增上果二約通釋當知此中習氣處言乃通顯諸依處感異熟果一切功能不單指習氣依處隨順處言乃通顯諸依處引等流果一切功能不單指隨順依處真見處言乃通顯諸依處證離繫果一切功能不單指真見依處士用處言乃通顯諸依處招士用果一切功能不單指士用依處所餘處言乃通顯諸依處得增上果一切功能不盡收餘十一依處不爾便應所餘處言太寬習氣隨順真見士用處言太狹三約局釋或此中所言習氣者唯屬第三習氣依處雖異熟因餘處亦有此習氣依處亦有非異熟因而異熟因去果相遠習氣亦爾故此偏說此言隨順唯屬第十一隨順依處雖等流果餘處亦得此隨順依處亦得非等流果而此等流因招善惡勝行相顯隨順亦爾故偏說之此中真見處言唯詮第十真見依處雖證離繫餘處亦能此真見依處亦能得非離繫之果而此真見證離繫相顯故偏說此中士用處言唯詮第九士用依處雖士用果餘處亦招此士用依處亦能招增上等而名相顯是故偏說此中所餘處言唯屬餘十一處雖十一處亦得餘果招增上果餘四依處亦能而此十一多招增上餘四依處已顯餘之四果故此偏說文義並顯可知二答依處得果竟三答因緣得果如是即說此五果中若異熟果則以牽引生起定異同事不相違之五因增上緣之一緣而得若等流果則以牽引生起攝受引發定異同事不相違之七因初因緣後增上之二緣而得若離繫果則以攝受引發定異同事不相違之五因增上緣之一緣而得若士用果有義以觀待攝受同事不相違之四因增上緣之一緣而得有義以觀待牽引生起攝受引發定異同事不相違之八因但除所緣緣之一緣以餘三緣而得若增上果十因四緣一切容得士用果中二義第二為正餘可知二傍論十因竟三正示緣生二初結前起後二釋緣生相今初傍論已了應辯正論二釋緣生相二初明種現生分別二明現種生種子初中二初明前半頌種生分別二明後半頌現起分別今初本識中種容作三緣生現分別除等無間謂八識各有親種是彼八識現行之親因緣即此種子是第八識之相分故為所緣緣於能緣者若此識種於彼現識有能助力或不障礙即皆是增上緣生淨現行應知亦爾初本識中種下先明生染分別次生淨現行下例明生淨分別也除等無間者唯依現識前後相望立此緣故言能緣者即指第八識及相應五心所之見分二明後半頌現起分別二初明染分別二明淨分別初中二初總標二別釋今初現起分別展轉相望容作三緣無因緣故一者種引種二者種生現三者現熏種皆有因緣義今以現望現故無因緣義也二別釋五初約有情自他相望二約自八識展轉相望三約自類前後相望四約同聚心心所相望五約同體四分相望今初謂有情類自他展轉容作增上及所緣之二緣除等無間二約自八識展轉相望自八識聚展轉相望定有增上緣必無等無間所緣緣義或有或無第八於前七有所緣緣義謂第七緣八之見分前五緣八之相分第六通緣八之見相二分故若前七於第八則無所緣緣義以餘七非八所仗質故第七於前六五識無所緣緣義以五識不緣第七識故唯一第六識有緣第七之義餘六識於彼第七識一切皆無以第七不緣前六故第六於前五識無所緣緣義餘五識於彼第六識有所緣緣義五識唯託第八識之相分為本質故所以不緣第六識也三約自類前後相望自類前後第六容三惟除因緣餘第八第七前五皆更除所緣以但取現境故若許五識後念見分得緣前念之相分者則五與七自類前後亦有三緣前七轉識於第八識所緣緣義亦可容有以前七現行能熏成彼第八識中相見種故初正釋自類相望次前七於八下復追補展轉相望中未盡之義也若論餘七非八所仗質義則無疎所緣緣若論現行熏種子義則亦容有疎所緣緣以種子由現行之所熏變不異相分仗本質而得變起故四約同聚心心所相望同聚異體展轉相望唯有增上諸相應法所仗質同不相緣故或依見分說不相緣若依相分而說亦得有相緣義謂諸相分互為質起如第八識中種子是相分為觸等五心所相分之本質若不爾者生無色界既無身器彼觸等五心所應無所緣境故設許無色界亦變為定果色然觸等五亦定緣種子而變似種相勿可謂相應心所之相分境不同心王所緣之本質故心與心所和合似一故名同聚然其相用各別故名異體各各見分決不互緣各各相分亦得互為所仗本質如無色界現無身器唯以本識所藏諸法種子為相分境相應觸等五心所託此本識相分種子以為本質變似種子之相而為所緣若不許彼互為質起則應觸等無所緣境縱許無色有定果色而心所心王所緣必同未有心王既緣三類性境心所不同本質變起相分者也五約同體四分相望同體相分為見分之增上及所緣二緣見分於彼相分但有增上緣之一義見與自證相望亦爾餘自證分及證自證分之二展轉相望俱作增上所緣二緣須知此中不依種相分說但說現起互為緣故見與自證相望亦爾者見於自證能為二緣自證於見但有增上以見分不能緣自證故初明染分別竟二明淨分別淨八識聚自他展轉皆有所緣以四智相應心品能徧緣故唯除見分非相分之所緣相分理無能緣用故圓鏡平等觀察皆具本後二智成所作智唯是後得根本實智但緣真如後得權智徧緣假實色心有漏無漏有為無為過現未來一切諸法是故自他展轉皆得有所緣緣義也且約同體四分相望有十二重一見分緣相分以現量證故即是變帶二見分緣見分三見分緣自證分四見分緣證自證分以無迷隔故了了自知故皆是挾帶五自證分緣相分以從自體所現故亦是變帶若約性宗元是菩提妙淨明體云何於中有是非是亦是挾帶六自證分緣見分與本染時不異故七自證分緣自證分當體無迷故八自證分緣證自證分亦與染時不異故皆是挾帶九證自證分緣相分即心之相故十證自證分緣見分即心之見故十一證自證分緣自證分與本染時不異故十二證自證分緣證自證分當體無迷故變帶挾帶准自證分可知唯有相分終不能緣見分以既名為相分則是心所變影決定無有能緣之用若謂能緣不應理故夫至佛果位中相分尚無能緣之用況染位哉今浮塵勝義兩種五根與器世界四大五塵同是第八識之相分本無親疎乃妄分別一為有情一為無情迷謬甚矣又六塵緣影秖是獨頭意識相分而大佛頂經之中阿難妄認為心不啻迷頭認影故如來直斥之曰咄阿難此非汝心此是前塵虗妄相想乃解者妄指此為六識尤可笑矣問曰若謂相分理無能緣之用則天台所立境照境及境照智復云何通答曰此中自有二義一者名融義別二者名義俱融言名融義別者約有分別色照無分別色為境照境約有分別色照無分別識為境照智有分別與無分別既得同名為識亦得同名為色故其名融有分別方為能照無分別但為所照故其義別此與相分理無能緣用之義仍同也言名義俱融者本是妙明無上菩提淨圓真心妄為色空等相分及與聞見等見分如於一月妄見二月誰為是月又誰非月則盡理而言有十六重其十二重已如上說更作四重一相緣相二相緣見三相緣自證四相緣證自證也問曰既云誰為是月又誰非月即所謂此見及緣元是菩提妙淨明體云何於中有是非是此則尚不名一云何有二尚非有二云何有四尚非有四云何妄作十六重耶答曰不離汝問即成我答汝既云尚不名一則知一亦無性故不妨舉體作二作四作十六也若不許作二作四作十六者便是定一云何得言尚不名一耶且如月若定二何故好目仍見是一月若定一何故揑目便見有二然揑目但見其二不知其一好目既知其一亦知其可以隨捏成二知二不知一者迷情也知一亦知二者妙解也若謂約俗諦則有四分一十二重約真諦則無能緣所緣者便是真俗分張真則定一而不異何殊數論之法性定一俗則定異而不融何殊勝論之法性定異況伽他云心意識八種俗故相有別真故相無別相所相無故謂俗是真家之俗如金之為器器別則金亦別非離真諦而俗諦自能成別也真是俗家之真如器之即金金無別則器亦無別非撥俗諦而真諦自居相外也故宗鏡云唯識大約有二種一具分二不具分以無性理故成真如隨緣義則不生滅與生滅和合非一非異名阿賴耶識即是具分若不全依真心事不依理故唯約生滅便非具分有云影外有質為半頭唯識質影俱影為具分者此乃唯識宗中之具分耳又引楞伽經釋云八識皆有生滅皆名轉相八識皆動盡名業相八之真性盡名真相噫可以思矣初明種現生分別竟二明現種生種子二初問二答今初既現分別緣種現生種亦理應緣現種起現種於種能作幾緣二答種必不由中二緣起以必得現起心及心所乃立彼等無間緣所緣緣之二義故現於親種具作二緣與非親種但為增上種望親種亦具二緣於非親種亦但增上已上廣釋頌義中正釋緣生竟二結斥指廣依斯內識互為緣起分別因果理教皆成所執外緣設有亦復無用況違理教何固執為此先結斥也雖分別言總顯三界心及心所而隨勝者諸聖教中多門顯示或說為二三四五等如餘論中具廣分別此復指廣也二謂染分別淨分別或真識現識或不墮意墮意等三謂心意識等四謂善不善有覆無記無覆無記等五謂因果苦樂捨等初釋分別由何難竟二釋生死由何難二初申難舉頌二以論釋成今初雖有內識而無外緣由何有情生死相續頌曰由諸業習氣二取習氣俱前異熟既盡復生餘異熟二以論釋成四初家約業取相續釋第二家約習氣相續釋第三家約障支相續釋第四家約因緣相續釋四釋俱有義理而第四家尤長然亦不得廢前三釋也今初論曰諸業謂福非福不動即有漏善不善思業業之眷屬亦立業名以能同招酬引業及酬滿業之二種異熟果故此業雖纔起無間即滅無義能招當異熟果而熏本識起自功能即此功能說為習氣是業氣分熏習所成簡曾現業故名習氣如是習氣展轉相續至成熟時招異熟果此顯當果勝增上緣此釋頌中第一句也善業名福業不善業名非福業禪定對欲界散動名不動業此三種業皆以思為體性餘心所法名為眷屬同招異熟亦名為業曾現業即過去時之現業現業已滅但由習氣熏於本識致感異熟果耳或取相見二分或取名色或取心及心所或取本末彼能所取皆二取攝即現行二取也彼二取所熏發親能生彼本識上之功能差別名二取習氣此顯來世異熟果心及彼相應諸因緣種俱謂業種與二取種俱是疎親緣互相義然業種雖疎招生義顯故頌先說此釋頌中第二句也名色即五蘊初蘊為色餘四為名本謂第八識末謂前七識業種是增上緣名疎相助二取種是因緣故得親名餘如文可知前異熟者謂前一生乃至前百千生中業力所感異熟之果餘異熟者謂感後一生乃至感後百千生業力之異熟果雖二取種熏處即生生處即熏受果無窮而業習氣受果有盡何謂有盡由異熟果性是無記與善不善業性別故必異世方熟而難招何謂無窮謂等流增上因果性同故可同時而易感由感當來餘生業等之種子成熟故于此身前異熟果受用盡時復別能生餘異熟果由斯生死輪轉無窮何假外緣方得相續此釋頌中第三第四句也業習氣受果有盡者如因戒善今報人天若不更修報盡則墮等此頌意說由諸業及二取習氣故有生死輪迴可見皆不離識以即心心所法為彼諸業二取習氣之體性故此總申頌意也初家釋竟第二家約習氣相續釋復次生死相續由諸習氣然諸習氣總有三種一名言習氣謂有為法三性之各別親種名言有二一表義名言即能詮義之音聲差別簡無詮聲彼非名故二顯境名言即能了境之心心所法隨二名言所熏成種作有為法各別因緣故名名言習氣名是聲上屈曲惟無記性不能熏成色心種子然因名起種故稱為名言種也前七識見分等實非名言譬如由言說名顯所詮義此心心所法能顯所了境有似彼名之能詮義故稱為顯境名言也二我執習氣謂虗妄執我我所之種我執有二一俱生我執即修所斷我我所執通于第六第七兩識二分別我執即見所斷我我所執惟在第六意識中有隨二我執所熏成種令有情等自他差別故名我執習氣此二我執種子即皆名言熏習令有自他差別故別立之三有支習氣謂招三界異熟業種有支有二一有漏善即是能招可愛果之業二諸不善即是能招非愛果之業隨二有支所熏成種令異熟果善惡趣別有支即十二因緣中之行支有支也應知我執有支二種習氣於當來世差別之果是增上緣此頌所言諸業習氣者應知即是第三有支習氣所言二取習氣應知即是第二我執第一名言二種習氣由其取我我所及取名言而熏成故皆說名取俱等餘文義如前釋第二家釋竟第三家約障支相續釋二初正約三障釋二以障攝有支今初復次生死相續由惑業苦發業潤生煩惱名惑能感後有諸業名業業所引生眾苦名苦惑業苦之種子皆名習氣前惑業二習氣與生死苦為增上緣助生苦故第三苦習氣望生死苦能作因緣親生苦故頌三習氣如應當知惑苦名二取惑是能取苦是所取故取是著義業不得名為取俱等餘文義如前釋發業煩惱即無明支潤生煩惱即愛取二支瞋等非不發潤取其尤者言之也感後有業即行支有支所引眾苦即識名色六入觸受生老死七支二以障攝有支三初標列指廣二別釋有支三結屬頌義今初此惑業苦應知總攝十二有支謂從無明乃至老死如論廣釋十二皆名有支者此支助有故名有支也二別釋有支三初正釋支體二料簡支義三諸門分別今初然十二支略攝為四一能引支謂無明行能引識等五果種故此中無明唯取能發正感後世善惡業者即彼所發乃名為行由此一切順現受之業及別助當受之業皆非行支識等即等取名色六入觸受也別助當業即能招別報之滿業也二所引支謂本識內親能生起當來異熟果攝之識等五支種子是前二支所引發故此五支中之識種謂即當來本識之親因識中種子唯除後六入觸受三因其餘因種皆是名色種攝後之三因如名次第即後六入觸受三法種子或可以名色種總攝識中五因於五因中隨其勝者立餘四種六處與識總別亦然名色總攝五因隨勝立餘四種者謂以名中所攝勝者則立識觸受三支及六入中之意入色中所攝勝者則立六入中之五入也六處與識總別亦然者或六入種總攝五因於中隨勝立餘四種或以識種總攝五因於中隨勝立餘四種也集論說識支不惟是所引亦是能引者彼以識中所持業種名識支故至于異熟識之種子則屬名色種所攝故緣起經說識支通于能所引者則以業種識種俱名為識支故識是名色所依非同集論以識種為名色所攝故此會釋經論之文義也若約業種則是能引若約識種則是所引前文但約識種集論但約業種緣起經雙約業種識種是故文言雖異其義則同識等五種由業熏發雖實同時而依主伴總別勝劣因果相異故諸聖教假說前後或依當來之果現起分位有次第故說有前後由斯義故識等五支亦說名為現行若在因時定無現行義故復由此當來現起果位得說所生所引同時以種生現必同時故若依識等初熏發位則不可說生引同時以潤未潤時必不俱故發業無明造作善惡引業頓熏未來識等五種決無先後何故立此五支差別釋有二義一者識支是主餘四是伴名色是總餘三是別六入是勝觸受是劣觸則是因受則是果約此相異故假說前後也二者既熏發後至成熟時先現起識次起名色次起六入次起觸受乃約當果次第立此五支因種也餘可知三能生支謂愛取有近生當來之生及老死故謂先緣迷內異熟果之愚愚于我相昧無我理于後生苦不如實知發正能招後有諸業為緣引發親生當來生老死位識等五果之種子已復依迷外增上果之愚緣境界受發起貪愛緣愛復生欲等四取愛取合潤于彼能引業種及潤彼所引五支之因即五支之種子轉而名為有支以俱能近有後有果故迷內異熟果愚即迷理無明也正能招後有業即行支也迷外增上果愚即迷事無明也欲等四取謂一欲取二見取三戒取四我語取也有處唯說業種名有者以唯此業種能正感異熟果故復有唯說識等五種名有者以親生當來識等種故此亦會釋論文之義也有處謂瑜伽第十復有謂瑜伽第三十八業種正感異熟者謂識等五種雖正為因能生然無力正生果故親生當來識等者謂業種雖復有力但屬增上緣故四所生支謂生老死是愛取有近所生故謂從中有自求父母乃至本有位中未經衰變以來皆生支攝諸衰變位總名為老身壞命終乃名為死初正釋支體竟二料簡支義一問生既別立老死何共答老非定有附死立支二問病何非支答病相不徧界趣亦不定有故又問老亦不定何故附立答老雖不定徧故立支謂諸界趣生除中夭者將終皆有衰朽行故三問名色不徧何故立支謂無色界及化生者無名色支故答以決定有故立為支謂胎卵濕三生者于六處未滿時定有名色位故又名色支亦是徧有且如有色化生初受生位雖具五根而未有用爾時未名六處支故是有色支也又初生無色雖定有意根而不明了未名意處故是有名支也由斯論說十二有支一切支中一分是上二界之所有謂無想天有色無名四空天有名無色故各一分也四問愛非徧有寧別立支以生惡趣者不愛彼故答定故別立除是不求方無有愛生善趣者定有愛故不還果人于潤生位對治力強愛雖不起然如彼取支決定有種故又愛亦徧生惡趣者於現我境亦有愛故但依無希求惡趣身之愛故經說為非有非謂彼惡趣中全無我愛也現我境謂第八識之見分五問何緣所生現果但立生及老死二支所引因種別立識等五支答因位難知差別相故依當果位別立五支謂續生時因識相顯次根未滿名色相增次根滿時六處明盛依斯發觸因觸起受爾時乃名受果究竟依此果位立所引因為五果位易了差別相故總立二支以顯生老死之三苦然所生果若在未來為生厭故說生老死若至現在為令了知分位相生說識等五續生時謂中有身於父母邊結生相續時也六問何緣發業總立無明潤業位中別立愛取一則立名不同二則廣略有異故問之也答雖諸煩惱皆能發潤而發業位無明力增以具十一殊勝事故謂所緣等廣如緣起經說於潤業位愛力偏增說愛如水能沃潤故要數溉灌方生有芽且依初後分位分為愛取二支若發業者一發則已無重發義是故但立一無明支又問既分愛取何云愛力偏增答雖于四種取支之中通攝諸煩惱法而愛于潤業偏勝所以說是愛力偏增十一殊勝事者一所緣殊勝徧緣染淨故二行相殊勝隱真顯妄故三因緣殊勝惑業生本故四等起殊勝等能發起能引能生所生緣起法故五轉異殊勝隨眠纏縛相應不共四轉異故六邪行殊勝依苦集諦起增益損減行故七相狀殊勝微細自相徧愛非愛共相轉故八作業殊勝作流轉所依事作寂止能障事故九障礙殊勝障礙勝法故十隨轉殊勝乃至有頂猶有轉故十一對治殊勝二種妙智所對治故且依初後分愛取二者初為愛後為取也七問諸支相望為是唯在自地或與他地亦互為緣答諸緣起支皆依自地然或有支所發行業亦依他地無明如下地無明能發上地行故設或不爾則如初伏下地染者所起上地之定應非行支以彼上地之無明猶未起故必先得彼定已彼地無明方得現故又問從上下地轉生下上地者彼緣何地之境界受而起愛支答彼愛亦緣當生地之受支若現若種而起於理無違八問諸支同世耶異世耶答此十二支前十是現在因後二是未來果定不同世于前十支因中前七支與愛取有三支或異世或同世若生老死之二愛取有之三無明等之七各定同世前七與愛取有或異或同者約未潤位則異世約已潤位則同世也九問或說有支兩重因果而歷三世此何唯一重耶答如是十二一重因果足顯輪轉及離斷常施設兩重實為無用或應過此便致無窮現在生老死果由於過去十支因現在十支因決招未來生老死果是故足顯輪轉因滅果生果生因滅果生故非斷因滅故非常是故得離斷常設謂一重不足須兩重者兩重又或不足須更設施三重便有無窮之失矣二料簡支義竟二諸門分別十五初假實門至十五惑業苦攝門今初此十二支義門別者九實三假即已潤之行等六支合為有支故所以有支是假即識等五果之上有生老死三相分位差別名之為生等故所以生及老死二支是假二一非一事門五是一事謂無明識觸受愛五餘七支非一事三染不染門三唯是染以無明愛取是煩惱性故七唯不染以識名色六入觸受及生老死皆是無覆無記異熟果故然此七支于現起分位之中容起染故所以瑜伽第十假說通染不染之二耳餘行有二支通染不染二種四獨雜門無明愛取說名獨相不與餘支相交雜故餘是雜相獨即純也餘九是雜相者已潤六支合為有故即識等五名生等故五色非色門六支唯心法而非色法謂無明識觸受愛取餘六支皆通色心二種六漏無漏為無為門亦可分為二門皆是有漏唯有為攝無漏無為非有支故七三性門無明愛取三支唯通不善及有覆無記行支唯善與惡有支通善通惡及通無覆無記餘七支唯是無覆無記然於七支分位之中亦起善染是故瑜伽假說通二八界地門雖皆通三界而有分有全有分謂上二界一切一分有全謂欲界也無想天唯有色之半支無色天唯有名之半支及六入中唯有意入之一分故上地之行支能伏下地煩惱即苦麤等六種行相有求地上生而起彼行故由下地惑發上地行由上地行伏下地惑所謂厭下苦麤障欣上淨妙離欣厭行成乃發上地業行也此亦可別名能治所治門九學等三攝門一切皆唯非學無學聖者所起有漏善業以智慧明而為緣故違有支故非有支攝由此應知聖必不造感後有業於後苦果不迷求故雜修靜慮資下故業生淨居等於理無違違有支故者謂聖必不造感後有業也雜修下釋難難曰若爾則雜修五淨居業應非行支若是行支聖便造業若非行支如何感生彼天今故釋曰不還果人以有漏無漏前後雜修第四靜慮資下福生福愛廣果三天之故業而生五淨居天非是新造此業故於理無違也十見等所斷門有義無明唯見所斷要迷諦理能發行故聖必不造後有業故愛取二支唯修所斷貪求當有而潤生故九種命終時心皆與俱生愛俱故餘之九支皆通見修所斷此門釋有二義第二為正今初義也九種命終心者如欲界命終時或起欲界心或起色界心或起無色界心色無色界命終亦爾三三成九有義一切皆通二斷論說預流果已斷一切一分有支無全斷者故若無明支唯見所斷寧說預流無全斷者若愛取支唯修所斷寧說彼已徧斷一切支之一分又彼論說全一界之一切煩惱皆能結生又說往惡趣行唯分別起之煩惱能發然彼不言潤生煩惱唯修所斷亦不謂一切感後有之行皆是見所斷惑發也由此故知無明愛取三支亦各各通見修所斷此下第二正義也全界一切煩惱皆能結生謂欲界煩惱結欲界生色界煩惱結色界生無色界煩惱結無色界生也但說全界煩惱皆能結生不言潤生唯修所斷則知愛取二支亦通見所斷矣但說往惡趣行唯分別惑能發不謂感後有行皆見所斷惑發則知無明一支亦通修所斷矣然無明支正發惡趣行者唯見所斷助發諸趣行者則便不定愛取二支正潤生者唯修所斷助潤生者則亦不定此明發業潤生煩惱皆有正有助故斷亦不定也惡趣謂地獄餓鬼畜生及無想天八難等處必由分別無明起於增盛善惡業行乃可熏成惡趣識等五果種子故須陀洹既見道已永斷三塗無想八難種子永不墮彼諸處也其餘俱生無明亦能助發諸趣業行若助發三塗惡行者雖屬俱生亦見所斷以證初果時永閉三惡趣門故助發人天行者則修所斷以設不勝進猶有七返來往故故云助者不定也正潤生之愛取唯屬俱生煩惱所以唯修所斷助潤生之愛取亦與分別煩惱相應若屬分別亦見所斷若屬俱生則修所斷故亦云助者不定也又染汙法自性應斷以對治彼之出世道若起時彼染汙法即永斷故若一切有漏不染汙法非性應斷以皆不違道品故問曰既云非性應斷如何又言皆通二斷答曰然有二義說之為斷一離縛故謂斷緣彼雜彼之煩惱故說為斷二不生故謂依分別煩惱方起彼法今既斷彼所依令永不起故說為斷依離縛義名斷故說行支有支中一分有漏善及識等五支生老死二支是無覆無記共有九支唯修所斷依不生義名斷故說行支有支中一分招諸惡趣之業及招無想果之有漏善定并有支中所攝識等五支以因該果兼具生老死等共有九支唯見所斷若夫說十二支通二斷者於前諸斷如應當知此更約自性應斷非性應斷以判見修二斷義也染汙法謂無明愛取三支及行支有支中各一分惡不論見修二斷皆名自性應斷以初起出世道時頓斷分別無明愛取及斷惡行惡有數數修習出世道時漸斷俱生無明愛取故一切有漏不染汙法謂行支有支中各一分善及識等五支生老死二支體唯異熟無覆無記不論見修二斷皆名非性應斷但約離縛名斷則是修所斷攝如善行善有及人天識等五支人天生老死支是也若約不生名斷則是見所斷攝如行支有支中之惡業及無想定乃至三塗八難無想天之識等五支生老死二支是也於前諸斷如應當知者無明愛取依正助說通於見修二斷所餘諸支依離縛不生二義亦通見修二斷十見等所斷門竟十一受俱門十樂捨俱除受支及老死支受不與受共相應故老死位中多分無樂及容捨故十一皆得與苦受俱但非與受支俱故十二三苦門十一少分壞苦所攝除死老支老死位中多無樂受依樂立壞故不說之十二少分苦苦所攝一切支中有苦受故十二全分行苦所攝諸有漏法皆行苦故若依捨受名為行苦說者則十一少分是行苦攝除老死支無容捨故如上文壞苦中說行苦自有通局二義若約有漏有為剎那遷變皆名行苦則通攝十二全分若約壞苦依樂受立苦苦依苦受立行苦惟依捨受立者則局攝十一少分也實義如是若諸聖教之中隨彼相增則所說不定十三四諦門皆苦諦攝是五取蘊性故無明愛取行有五支亦集諦攝行有是業無明愛取是煩惱性故十四四緣門諸支相望唯增上緣定有餘之三緣有無不定緣起契經依定有者所以唯說有一愛望於取愛是取種能生現取有望於生有即識等五種生即識等現行有因緣義若說識支是業種者則行望於識亦作因緣若說識支是識種者則行支非識親因餘支相望無因緣義而集論說無明望行有因緣者乃依無明俱時思業之習氣說以與無明俱故假說業種以為無明而實是行種非指無明為行因緣也瑜伽論說諸支相望容有三緣但無因緣者依現行愛支取支及唯以業種為有支而說無明現行癡心所望行現思心所愛支現行望於取支現行生位心心所望老死位心心所有餘二緣謂等無間及所緣緣有望於生受望於愛無等無間緣但有所緣緣餘支相望則等無間及所緣緣二俱非有但有增上緣耳此中且依隣近順次不相雜亂實緣起說若異此四義而互相望則為緣又復不定諸聰慧者如理應思一隣近則非隔越二順次則非逆次三不相雜亂則不以行種為無明等四實則不依假借說也若隔越相望如無明望識乃至望老死等若逆次相望如老死望生乃至行望無明等若相雜亂及隨轉門約假借說事非一槩但依前文四緣之理思之可得十五惑業苦攝門惑業苦三攝十二者無明愛取三支是惑所攝行支及有支中一分是業所攝識等及生老死七支與有支中一分是苦所攝有處說業全攝有支者應知彼依業有說故不依種有說也有處說識支是業所攝者彼說業種為識支故不依識種為識支說惑業所招識等七支獨名苦者唯苦諦攝不通集諦故又為令有情生厭離故二別釋有支竟三結屬頌意由惑業苦即十二支故此能令生死相續第三家釋竟第四家約因緣相續釋二初正明生死相續二例明淨法相續初中三初標徵二解釋三屬頌今初復次生死相續由內因緣不待外緣故唯有識因謂有漏無漏二業正感分段變易二種生死故說為因緣謂煩惱所知二障助感分段變易二種生死故說為緣所以者何生死有二有漏無漏二業皆屬增上緣攝但以業招生顯故復名因也餘可知二解釋二初釋分段生死二釋變易生死今初一分段生死謂諸有漏善不善業為因由煩惱障緣助勢力所感三界麤異熟果身命短長隨因緣力有定齊限故名分段二釋變易生死三初正釋二會異三料簡今初二不思議變易生死謂諸無漏有分別業為因由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定齊限故名變易無漏定願正所資感妙用難測名不思議無漏有分別業即有為無漏業也改轉身命謂改穢為淨轉短為長也二會異或名意成身謂隨大悲意願之所成故如勝鬘契經說譬如以取為緣以有漏業為因續後有者而生三有如是以無明習地為緣以無漏業為因有阿羅漢獨覺及已得自在菩薩生三種意成身此會勝鬘經所謂意成身即今不思議變易生死身也亦名變化身無漏定力轉令異于本時之身猶如變化非新生故如有論說問聲聞無學永盡後有云何能證無上菩提答依變化身證無上覺非業報身故不違理此釋不思議變易身復名變化身也如有論下引證可知二會異竟三料簡難曰若所知障助無漏業能感變易生死則二乘定性應不永入無餘涅槃喻如諸異生之拘于煩惱障故又無漏有分別業是道諦攝如何道諦乃實能感變易生死之苦答曰誰言實感難曰不爾如何答曰但由無漏勝定勝願資於三界已感異熟之故有漏業令所得果相續長時以無漏業資助令其展轉增勝假說名感非無漏業實能感苦也又如是感時由所知障為緣助力非無漏業獨能感也然所知障在菩薩分中雖助變易生死而在定性二乘分中仍復不障解脫以所知障無能發業潤生用故問曰何用資感變易生死苦為答曰為欲自證菩提利樂他故謂不定性獨覺聲聞及得自在大願菩薩已永斷伏煩惱障故無容復受當來之分段身恐廢長時修菩薩行遂以無漏勝定願力譬如世間延壽之法以資現身故業之因令彼故業因種長時與今現身之果不絕數數如是定願資助乃至證得無上菩提問曰既以無漏定願資現身因彼復何須所知障助答曰既未圓證無相大悲若不執菩提及有情皆是實有則無由發起猛利悲願又所知障障大菩提為永斷除此所知障所以留身久住又所知障為有漏依此障若無彼變易生死則定非有故於身住有大助力是中若所留身從有漏定願所資助者分段身攝以是二乘異生所知境故若從無漏定願所資助者變易身攝非彼二乘異生所知境故由此應知變易生死性是有漏異熟果攝於無漏業是增上果有聖教中說此變易之身以為無漏出三界者乃隨無漏業之助因而說二解釋竟三屬頌二初結屬二釋疑今初頌中所言諸業習氣即前所說有漏無漏二業種子二取習氣即前所說煩惱所知二障種子俱執著故名之為取俱等餘文義如前釋二釋疑變易生死雖無分段前後異熟別盡別生而數資助前後改轉亦有前盡餘復生義疑曰分段生死可云前異熟盡復生異熟變易既無分段何名既盡復生餘等答釋可知雖亦由現行令生死相續而惟種定有故頌偏說之若現行則不定有也或為顯示真異熟因果皆不離本識因是本識所執持故果即本識自果相故故不說現若夫前六轉識名為現異熟因要至未來方感異熟之果現在不即與果又酬前滿業之無記轉識多有間斷是異熟生非是真異熟故又疑曰現行諸業現行二取亦令生死相續何故頌中但舉習氣說耶答亦可知初正明生死相續竟二例明淨法相續前中後際生死輪迴不待外緣既由內識淨法相續應知亦然謂無始來依附本識有無漏種由轉識等數數熏發漸漸增勝乃至究竟得成佛時轉捨本來雜染識之種子轉得始起清淨種之淨識任持一切功德種子由本願力盡未來際起諸妙用相續無窮由此應知唯有內識二釋生死由何難竟三釋違經三性難二初正釋三性不離識二轉釋無性即識性初中二初設難舉頌二以論釋成今初若唯有識何故世尊處處經中說有三性應知三性亦不離識所以者何頌曰由彼彼徧計徧計種種物此徧計所執自性無所有依他起自性分別緣所生圓成實於彼依他性上常遠離前徧計所執性故此圓成與依他非異非不異喻如無常等性與無常等法乃非異不異非不見此圓成實而能了彼依他性也二以論釋成二初正釋頌文二義類相攝初中二初別釋頌文二總申頌意初又三初釋徧計所執性二釋依他起性三釋圓成實性初又二初略釋二廣釋今初論曰周徧計度故名徧計計度之心品類眾多說為彼彼此謂能徧計之虗妄分別心也即由彼彼虗妄分別徧計種種所徧計物此謂所妄執蘊處界等若法若我自性差別也此所妄執自性差別總名徧計所執自性如是自性都無所有理教推徵不可得故我自性謂橫計主宰我差別謂有情命者等預流一來等乃至二十句六十五句等法自性謂橫計軌持法差別謂蘊處界等實德業等乃至有無一異俱不俱等二廣釋二初總分文二別解釋今初或初句顯能徧計識第二句示所徧計境後半方申徧計所執若我若法自性非有已廣顯彼不可得故二別解釋三初釋能徧計二釋所徧計三對依他明徧計所執今初初能徧計自性云何假問徵起也釋有二義初義非第二正有義八識及諸心所有漏攝者皆能徧計虗妄分別為自性故皆似所取能取現故又聖教說阿賴耶識以徧計所執自性妄執之種子為所緣故所取能取即能緣所緣也此顯八識皆能徧計說阿賴下更引證以顯第八亦能徧計葢所緣既是妄執種子則能緣亦必是妄執矣有義第六第七心品之執我法者是能徧計經中唯說意識能徧計故以意及意識名為意與識故有計度及分別乃為能徧計故前五及第八非能徧計也執我法者必是慧心所故二執必與無明心所俱故第八無慧癡二心所相應非能徧計也不說無明有善性故癡無癡等不相應故諸善心所非能徧計也不見有執導空智故喻如執有執無不俱起故善慧心所亦非能徧計也曾無有執非能熏故第八但是所熏決非有我法二執也夫有漏諸心心所等不證實理故一切皆名虗妄分別然不皆名為能徧計以其雖似所取能取相現而非一切皆是能徧計攝尚以似能所取便名能徧計者勿無漏心亦有執故且如來後得無漏智心亦似能取所取相現豈亦應名為有執故經說佛後得智現身土等種種影像如鏡等故若無能所緣用應非智等雖聖教說藏識緣徧計種而不說唯緣徧計故非誠證由斯理趣唯於第六第七心品有能徧計識品雖只有二而有千二決乃至三四五六七八九十法等上所起徧計不同故言彼彼此護法正義也初第六下正簡前五第八及諸善心所等非能徧計次有漏心等下破斥初義次雖說藏識下通前所引聖教後由斯理趣下結成能徧計者唯是六七二識但由所徧計有不同故頌言彼彼耳宗鏡錄云一有徧非計如無漏諸心及有漏善識能徧廣緣而非計執無漏諸心即諸聖人無漏智慧了諸法空即無法不徧都無計執名為非計唯後得智也有漏善識即地前菩薩雖有漏心中能作無我觀故亦能觀一切法皆無有我亦是徧而非計二有計非徧如有漏第七識恒緣第八見分起我法二執從第六識入生空觀時第七識中猶尚緣第八見分起於法執故知計而非徧三亦徧亦計即眾生染心謂染汙相應之第六識也四非徧非計即有漏前五識及有漏第八識各了自相分境故不徧無計度隨念分別故非計也初釋能徧計竟二釋所徧計問曰次所徧計自性云何答曰攝大乘說是依他起徧計心等之所緣緣故問曰圓成實性寧非彼徧計執所緣之境答曰真非妄執所緣境故若依展轉而說亦可是所徧計然徧計所執雖是彼能徧計心之境而無實我法非所緣緣故非所徧計依展轉說亦所徧計者如計繩為蛇即是計麻為蛇也雖是彼境而非所緣緣者如計蛇時亦未甞有蛇仍惟有繩故蛇非所緣緣亦復非所徧計當知徧計之所緣緣惟是依他起性譬如妄計蛇時仍即于繩起計仍以本質繩為疎所緣緣眼識相分繩為親所緣緣意識于中妄起蛇怖名為非量名為徧計執也三對依他明徧計所執徧計所執其相云何與依他起復有何別此亦假問徵起也釋有二義初義非次義正有義三界所攝有漏心及心所由無始來虗妄熏習雖各體一而似二生謂見分及相分即是能取所取如是二分情之所有理之所無故此能所二相說為徧計所執此相見二分所依自證之體實託緣生此性非無名依他起以是虗妄分別緣所生故云何知然諸聖教說虗妄分別是依他起二取名為徧計所執此妄以自證分為依他起性見相二分為徧計所執也有義一切有漏無漏染與不染世出世間所有心及心所由熏習力所變二分從緣生故亦依他起徧計依斯相見二分妄執定實我法及執有無一異俱不俱等此有無之二或一異之二等方名徧計所執諸聖教說唯量唯二種種皆名依他起故又相分等四法十一識等論皆說為依他起攝故此護法正義也俱者亦有亦無或亦一亦異也不俱者非有非無或非一非異也此等執實戲論方名徧計所執若夫相見二分本是從緣生起豈非依他性哉唯量唯二等者攝論云一者唯量義無所有故二者唯二謂有相及見識故三者唯種種謂種種相生起故天親釋云唯量者唯是識量由所識義無所有故唯二者成立有相及見故即此一識一分成相第二分成見此是眼等識二分故唯種種者即此一識所起六塵為相意識為見意識境不定故說唯種種也相等四法即諸心心所各有四分所謂一相分二見分三自證分四證自證分也十一識者一身識謂眼等五界二身者識謂染汙意三受者識謂意界四應受識謂色等六外界五正受識謂六識界六世識謂生生相續不斷七數識謂算計一乃至無量八處識謂器世間九言說識謂見聞覺知四種言說此九從名言熏習種子生十自他差別識謂依身差別此從我見熏習種子生十一善惡兩道生死識謂生死趣無量種此從有支習氣種子生如是諸識論皆說為虗妄分別所攝名依他起不爾無漏後得智品所有相見二分亦應名為徧計所執汝若許者則應聖智不緣彼二分生或復緣彼二分之智品應是集諦而非道諦汝若不許無漏二分是徧計者應知有漏二分亦爾但是依他起性又若二分是徧計所執應如兔角等非所緣緣以凡徧計所執體非有故又應二分既非有體則便不熏成種既不熏種則此後識等復生應無二分又諸習氣即是第八識之相分所攝豈以非有之法而能作現行諸識之親因緣又若緣所生之內相見分非依他起則相見二分所依自證之體例亦應然同屬徧計以均是分別緣所生無異因故此破斥初義也文並易知初釋徧計所執性竟二釋依他起性二初承前出依他體二簡釋初承前出依他體即釋頌第五句也依他起自性由斯理趣眾緣所生心心所體及相見分有漏無漏皆依他起依他眾緣而得起故二簡釋即釋頌第六句也分別緣所生頌言分別緣所生者應知且說染分依他若夫淨分依他亦可名圓成故或諸染淨心心所法皆名分別以後得智亦有分別能緣慮故是則一切染淨依他皆是此中依他起攝淨分依他亦圓成者如四智菩提十力無畏等以是修德名淨依他以其稱性復可名圓成實二釋依他起性竟三釋圓成實性三初正釋圓成實體性二對依他明非一異三明證此能了依他初正釋圓成實體性即釋頌七八兩句也圓成實於彼常遠離前性二空所顯圓滿成就諸法實性名圓成實顯此徧常體非虗謬簡自共相虗空我等此先釋圓成實三字之義也徧故圓滿常故成就非虗謬故名實性諸法自相謂現量所得俗諦法體離名種等所有分別如色香味觸等以其各各差別故非徧圓諸法共相謂比量所得俗諦道理由名言等顯示不謬如無常無我等以其約義詮表故非常成虗空因色顯發對有質礙而得其名我非實有自性依五取蘊施設假名故皆虗謬無漏有為離倒究竟勝用周徧亦得此圓成實名然今頌中說初非後此料簡頌意也無漏有為即淨分依他所謂四智菩提等離倒故亦可名為實究竟故亦可名為成勝用周徧故亦可名為圓然頌中所說圓成實性但指二空所顯不指有為無漏也此圓成實性即於彼依他起上常遠離前徧計所執以二空所顯之真如為性頌中所說於彼二言乃是顯圓成實與依他起不即不離頌中常遠離三言乃是顯妄所執能所取性理恒非有頌中前之一言義顯但空徧計不空依他頌中性之一言乃顯二空非即是圓成實二空所顯乃名為圓成實以真如離有離無性故此正釋頌中於彼常遠離前性七字之義也二對依他明非一異即釋頌九十十一三句也故此與依他非異非不異如無常等性由前理故此圓成實與彼依他起非異非不異若言異者則應真如非彼依他之實性若言不異則此圓成實性應是無常又彼此俱應淨非淨境則根本後得二智之用亦應無別此先釋第九第十兩句也彼依他性通於染淨乃是後得智境此圓成實唯淨非染乃是根本智境故不得定言不異由此觀之馬鳴謂無明熏時即真如熏乃約異而不異如觸波時全觸于水非定一也護法謂賴耶受熏非關真如乃約不異而異如波動時濕性無動非定異也若執真如定實受熏則應變異何名真如若執真如定不受熏則應真如不徧一切離法性外別有諸法何異一分無常一分常之外道習二宗者曷深思之問曰云何二性非異非一答曰如彼無常無我等法無常等性與諸行等生滅之法若言異者則應彼行等法非無常等若言不異則此無常等應非彼行等法之共相由斯喻顯此圓成實與彼依他非一非異葢依他起法與圓成實法性理必應然以勝義世俗必相待而有故此釋第十一句也無常無我等法謂諸行無常亦復無我如色無常受想行識無常眼無常耳鼻舌身意無常色無常聲香味觸法無常眼識無常乃至意識無常既無常則無我無我故空不淨苦惱是故蘊處界等各有法體名為自相無常無我苦空不淨徧于諸法名為共相此自共相不一不異若言定異則蘊處界不應無常及無我等若言定一且如色與無常既一則受想等與色異故應非無常餘可例知故非定一定異也今依他法與圓成性亦復如是圓成實性是勝義諦依他起性是世俗諦二諦相待而有故亦不一不異波水繩麻等喻皆可准思三明證此能了依他即釋頌第十二句非不見此彼非不證見此圓成實而能見彼依他起性未達徧計所執性空不如實知依他有故無分別智證真如已後得智中方能了達依他起性如幻事等雖無始來心心所法已能緣自相見分等而我法執恒俱行故不如實知眾緣所引自心心所虗妄變現猶如幻事陽𦦨夢境鏡像光影谷響水月變化所成非有似有依如是義故有頌言非不見真如而能了諸行皆如幻事等雖有而非真問曰若必證見真如方了依他起性則初心修觀即應便觀真如何故大乘止觀乃令先觀徧計次觀依他後觀圓成實耶答曰真如不在依他性外初心若觀真如必將妄計一个無名無相曠若虗空者以為真如便成徧計所執此病最不可救以不達諸法當體無性墮惡取空不知所觀空理正是第六識之相分假使一切時中空境現前而又不破戒律不撥萬行亦秪可生無色天中若因見此空故破戒破見直墮阿鼻大地獄矣所以一切大乘法門皆令眾生即於現前諸法強觀無實既知無實便解如幻既解如幻便悟實性既悟實性方能從體起用夫強觀無實者觀徧計也解如幻者觀依他也悟實性者根本智也從體起用者後得智也譬如以麻作繩愚小無知妄計為蛇若不即從所計之蛇如實觀察何由得知蛇本非有故須蛇計既息然後知繩即麻知即麻者喻根本智知麻可作種種大小諸繩一一諸繩皆無實性隨意所作喻後得智故知大乘止觀成唯識論觀心妙訣曾無兩途初別釋頌文竟二總申頌意此中意說三種自性皆不遠離心心所法謂心心所及所變現眾緣生故如幻事等非有似有誑惑愚夫一切皆名依他起性愚夫於此橫執我法有無一異俱不俱等如空華等性相都無一切皆名徧計所執依他起上彼所妄執我法俱空此空所顯識等真性名圓成實是故此三不離心等此正所謂一依他一切依他一徧計一切徧計一真實一切真實也初正釋頌文竟二義類相攝十三初與六無為相攝至十三結略指廣今初問曰虗空擇滅非擇滅等何性攝耶答曰三皆容攝若于心等變似虗空等相隨心生故則是依他起攝若有愚夫於中妄執實有此即徧計所執性攝若於真如假施設有虗空等義則是圓成實攝然而有漏心等所緣六無為法定屬依他若是無漏心等所緣六無為法容二性攝以是眾緣生故攝屬依他以其無顛倒故亦可圓成實攝二與七真如相攝問曰如是三性與七真如云何相攝七真如者一流轉真如謂有為法流轉之實性二實相真如謂二無我所顯之實性三唯識真如謂染淨法唯識之實性四安立真如謂苦諦之實性五邪行真如謂集諦之實性六清淨真如謂滅諦之實性七正行真如謂道諦之實性答曰此七實性皆屬圓成實攝以是根本後得二智境故若隨相而相攝者則流轉苦集三種真如前二性攝妄執雜染故餘四皆是圓成實攝雖有七名唯一真如此真如體離名絕相唯根本智之所親證依此真體約義差別說七種名乃後得智之所建立故皆圓成實攝或可于無流轉中妄執流轉無苦集中妄成苦集即是徧計性攝又真如不變隨緣舉體而為流轉苦集諸雜染法即是依他性攝也三與六法相攝問曰三性與六法相攝云何答曰彼六法中皆具三性色受想行識及無為皆有妄執緣生理故六法即五蘊及無為法也妄執六法皆徧計性緣生六法皆依他性六法所依之理皆圓成實性也四與五事相攝即五法一相二名三分別亦名妄想四正智五真如亦名如如問曰三性與五事相攝云何答曰諸聖教說相攝不定謂或有處說依他起攝彼相名分別正智圓成實性攝彼真如徧計所執不攝五事彼說有漏心心所法變似所詮說名為相似能詮現施設為名能變之心心所等立為分別無漏心心所等離戲論故但總名正智而不說能詮所詮以上四事皆從緣生皆依他攝或復有處說依他起攝相分別徧計所執唯攝彼名正智真如圓成實攝彼說有漏心及心所之相分名為相餘見分及能變之體皆名為分別徧計所執都無體故為顯非有故但假說為名正智真如二無倒故圓成實攝或有處說依他起性唯攝分別徧計所執攝彼相名正智真如圓成實攝彼說有漏心及心所相見分等總名分別虗妄分別為自性故徧計所執能詮所詮隨情立為名相二事復有處說名屬依他起性義相即屬徧計所執彼說有漏心心所法相見分等由名勢力成所徧計故說為名徧執所執乃隨名而橫計其體則實非有所以假立義相之名以上諸聖教中所說五事文雖有異而義無違然初所說不相雜亂尤為盡善如瑜伽論廣說應知五與五相相攝一所詮相二能詮相三二相屬相四被執著相五不執著相問曰又聖教中說有五相與此三性相攝云何答曰所詮相能詮相各具三性謂妄所計屬初性攝相名分別之隨其所應所詮能詮屬依他起真如正智之隨其所應所詮能詮屬圓成實以後得智為他說法變似能詮相故二相屬相唯初性攝妄執義名定相屬故被執著相唯依他起虗妄分別為自性故不執著相唯圓成實無漏智等為自性故六與四真實相攝一世間所成真實二道理所成真實三煩惱障淨智所行真實四所知障淨智所行真實問曰又聖教中說四真實與此三性相攝云何答曰世間道理所成真實依他起攝相名分別三事攝故煩惱所知二障淨智所行真實圓成實攝正智真如二事攝故辯中邊論說初世間真實唯初徧計性攝以是共所執故第二道理真實通屬三性理通執無執雜染清淨故後二真實唯屬第三二釋並通第二通屬三性者執理則屬徧計無執則屬依圓雜望屬依他清淨屬圓成實也七與四諦相攝苦集滅道問曰三性與四諦相攝云何答曰四中一一皆具三性且苦諦中無常等四種行觀各有三性無常三者一無性無常性常無故徧計二起盡無常有生滅故圓成三垢淨無常位轉變故圓成苦有三者一觀所取五蘊是苦我法二執所依取故徧計二既緣起事相是苦以是三苦之事相故依他三觀和合是苦謂真如法與苦和合故圓成空有三者一觀無性空謂徧計所執性非有故二觀異性空謂依他起法與妄所執自性異故三觀自性空謂圓成實以二空所顯真如為自性故無我三者一觀無相無我謂徧計所執我相無故二觀依他異相無我謂與妄所執之我相異故三觀自相無我謂圓成實以二無我所顯真如為自相故集諦三者一習氣集謂能徧計心所執自性執之習氣是執彼之習氣故假立彼習氣集名二等起集謂業與煩惱即依他性三未離繫集謂未離障之真如即圓成實滅諦三者一自性滅徧計自性不生故二二取滅謂以擇滅智令能所二取不生故三本性滅空真如之性本寂滅故道諦三者一徧知道能知徧計所執性空故二永斷道能斷染分依他起故三作證道能證圓成實故然徧知道亦通後依圓之二性七三之三性如次配釋今於此中所配三性或假或實如理應知徧知道亦通後二者謂于三性皆悉通達乃名徧知道也七三者即苦諦四種行觀及集滅道三諦此七各有三句也如次配釋者謂皆初句屬徧計第二句屬依他第三句屬圓成實也或假或實者謂集諦三性惟約實配餘六三性或有假說也八與三解脫相攝問曰三解脫門所行境界與此三性相攝云何答曰理實皆通隨相各一空無願無相如次應知空解脫門知徧計空無願解脫門于依他法無所願求無相解脫門證圓成實離有無相也緣此復生三無生忍一本性無生忍我法本無故二自然無生忍緣起無作故三惑苦無生忍究竟不生故如次此三無生忍是彼三解脫境故九與二諦相攝問曰此三性云何攝彼真俗二諦答曰應知世俗具此三種勝義唯是圓成實性世俗有三一假世俗如軍林等但有假名二行世俗如蘊處界等隨緣生滅故亦名道理世俗三顯了世俗即安立世俗以後得智安立真如故如次應知即此三性勝義有三一義理勝義謂即真如乃最勝之義理故二所證得勝義謂即涅槃勝即義故三能證行勝義謂即聖道以勝而為義故此三勝義無變易無顛倒隨其所應故皆攝在圓成實性十凡聖智境問曰如是三性何智所行答曰徧計所執都非智所行以無自性非所緣緣故然愚夫妄執為有聖者達其本無亦得說為凡聖智境依他起性凡聖二智所行圓成實性唯聖智境十一假實分別問曰此三性中幾假幾實答曰遍計所執以其妄安立故可說為假以其無體相故亦可說非假非實依他起性有實有假聚集相續分位性故說為假有心心所色從緣生故說為實有若無實法假法亦無假依實因而施設故圓成實性唯是實有不依他緣而施設故聚集者根身器界諸和集相也相續者心及心所無間轉相也分位者二十四種不相應行也此皆別無自體故名為假心者八識心王也心所者五十一心所法也色者五根六塵十一種色法也現在剎那從種起現故名為實依此實心心所及色乃有聚集相似分位故云假依實因而施設也問曰二卷已破假說依實此復何云假依實有答曰心外實法決定是無所以假說不必依實今約唯識所現諸法有實有假實即道理世俗假即是假世俗此則有實然後有假而若假若實同名俗諦不同外道餘乘所執心外實法也問曰前云勝義世俗相待而有今云圓成實性不依他緣施設又云何通答曰不因世俗則不立勝義之名故云相待而有如因有水乃得有波有波之動乃說水為靜也然但可云波因水有不可云水因波有故圓成實性非依他緣而施設也十二異不異分別問曰此三性為異為不異耶答曰施說俱非以無別體故非異以妄執緣起真義三各別故非不異只此不思議法體妄執之則為徧計隨緣起則為依他約真義則是圓成實性是故十法界之五位百法皆依他也執十法界之五位百法以為我實實法皆徧計也十法界五位百法之真義皆圓成也性相真源從此和盤托出讀者幸深思之十三結略指廣如是三性義類無邊恐厭繁文略示綱要三釋違經三性難中初正釋三性不離識竟
