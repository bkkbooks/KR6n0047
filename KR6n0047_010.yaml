body:
  text: 蕅益沙門智旭述上來修習位中三釋十重障初標起二正釋竟三結屬二初正結二障所攝二申明二障斷義今初此十一障皆即煩惱所知二障所攝二申明二障斷義二初斷種現位二斷種頓漸今初煩惱障中見所斷之種子於極喜地見道初斷彼障之現起者地前已伏修所斷之種子金剛喻定現在前時一切頓斷彼障之現起者地前漸伏初地以上能頓伏盡令永不行猶如阿羅漢一般由故作意之力或于前七地中雖暫現起而不為失若八地以上畢竟不行所知障中見所斷之種子於極喜地見道初斷彼障之現起者地前已伏修所斷之種子於十地中漸次斷滅直至金剛喻定現在前時方永斷盡彼障之現起者地前漸伏乃至十地方永斷盡八地以上若與六識俱者不復現行以無漏觀心及生空智果相續能違彼第六識中俱生所知障之現行故若與第七識俱者猶可現行須是法空智果起位方伏前五轉識設未轉依由無漏觀之所伏故障不現起此正釋伏斷二障種子現行之位也雖於修道十地位中皆不斷滅煩惱障種而彼煩惱粗重無堪任性亦漸斷滅由斯故說二障粗重一一皆有三位斷義此釋伏難也難曰所知障種於十地中漸次斷滅可云三位皆有斷義若夫煩惱障種其分別者是見道頓斷其俱生者則是金剛喻定頓斷但有二位斷義何云亦有三位斷義耶答釋可知言三位者一通達位二修習位三究竟位也雖諸位中皆斷粗重而三位顯是所偏說亦釋伏難也難曰若粗重言但指無堪任性則資糧加行位中亦有斷粗重義何故不說耶答釋可知初斷種現位竟二斷種頓漸問斷二障種漸頓云何答第七識俱之煩惱障種三乘將得無學果時一剎那中三界頓斷所知障種將成佛時一剎那中一切頓斷以其任運內起無粗細故餘六識俱之煩惱障種若屬見所斷者三乘見位真見道中一切頓斷若屬修所斷者隨其所應或有一類二乘于三界九地俱生煩惱一一漸次九品別斷復有一類二乘三界九地俱生煩惱合為一聚九品別斷其在菩薩要起金剛喻定一剎那中三界頓斷所知障種初地初心頓斷一切見所斷者若夫修所斷者則後於十地修道位中漸次而斷乃至正起金剛喻定一剎那中方皆斷盡以彼六識相應之所知障通緣內外粗細境生品類差別有衆多故所以不容頓斷此正明所斷種也下復明能斷之道二乘根鈍故于漸斷六識俱生煩惱障時必各別起無間解脫二道若夫加行勝進則可或別或總若前之勝進即為後之加行則名為總或不同時則名為別也菩薩利根故于漸斷六識俱生所知障位非要別起無間解脫二道即于剎那剎那之中能斷證故所以加行等四道于剎那剎那前後相望皆容具有念念能斷即無間道念念能證即解脫道不住解脫即為勝進此位勝進又復即是後位加行正加行時又於後位若障若理能斷能證是故念念之中望前即為解脫為勝進望後即為加行為無間也三釋十重障竟四釋十真如十真如者一遍行真如謂此真如二空所顯無有一法而不在故初地無間道中深觀我法二空永斷異生性障故於解脫道中所證真如名曰遍行謂於五位百法一一無實補特伽羅亦無實法無實補特伽羅名為生空亦名我空亦名為人無我無有實法名為法空亦名為法無我了知我法俱不可得乃顯唯識實性此性不妄故名為真此性不改故名為如異生凡夫從無始來妄執實我實法雖此真如無所不在日用不知二乘雖斷我執而猶不知法空所顯真如無所不在仍於有為無為定作二解又或妄執色不相應及無為法不即唯識唯有大乘種性之人先信解此唯識理已發起深固大菩提心於資糧加行位中強觀諸法皆悉無性令二空觀漸熏漸著乃至通達位中頓斷分別二障種子方實觸證真如法界之理遍於五位百法無所不在故遂能得百法明門於彼一一法中具證真如無所不遍之性當知真如性本自遍非今始遍但由此位初證真如本遍之體獨得遍行之名已後諸位不過隨德立稱更無有二如也依此遍行真如實義故云初地具足一切諸地功德依後隨德立稱之義故云初地不知二地乃至等覺菩薩不知如來舉足下足事等金剛經云一切賢聖皆以無為法而有差別夫無為法豈有差別證無為法仍有差別如淺深皆大海而入海仍論淺深如丈尺顯虗空而虗空原非丈尺此遍行真如喻如哉生明之新月已見月之全體大用不異望後圓月亦不即望夜圓月思之思之二最勝真如謂此真如具無邊德於一切法最為勝故秖是二空所顯五位百法遍行真如之理本來具無邊德本來最勝但由無始迷惑而為邪行所障令此勝德不得顯現今由菩薩了知法性無染隨順修行尸波羅蜜斷邪行障是故全性所起三聚淨戒妙無作體具足無邊功德於一切法最為勝也經云心無盡故戒亦無盡當知所緣無邊故戒亦無邊如不殺戒遍於五位百法得不殺德如不盜戒遍於五位百法得不盜德如不邪淫戒遍於五位百法得不邪德如不妄語戒遍於五位百法得不妄德乃至十善一一皆爾又遍於五位百法有斷惡德即遍於五位百法有生善德亦遍於五位百法有度生德斷惡名律儀戒即成法身斷德生善名攝善法戒即成報身智德度生名饒益有情戒即成化身恩德又復即是法身般若解脫三德當知舉真如全體而為三聚淨戒仍舉三聚淨戒一一無非真如全體是故橫悉無邊豎悉最勝無有一法而不無邊無有一法而不最勝也三勝流真如謂此真如所流教法於餘教法極為勝故亦只二空所顯五位百法真如之理雖復四句皆不可說而有四悉檀因緣故亦可得說但由無始暗鈍所障不能契理契機稱性演說今由菩薩善巧增益聞思修慧勝定總持斷暗鈍障故於真如流出正智於正智中流出後得智於後得智中流出大悲心於大悲心流出十二部經極為勝妙若餘二乘凡夫等所說教法非證真如之所流出故不為勝四無攝受真如謂此真如無所繫屬非我執等所依取故亦只二空所顯五位百法真如之理本來無所繫屬本非我執我愛我慢我癡等之所依所取但由無始以來微細煩惱現行所障不能達其本無攝受今由菩薩善修無漏菩提分法斷此微細煩惱現行障已真如本無繫屬之性方得顯現名無攝受真如五類無別真如謂此真如類無差別非如眼等類有異故亦只二空所顯五位百法真如之理本來無有生死涅槃差別但由無始迷惑妄有生死對彼生死權立涅槃依此虗妄緣起生死涅槃妄生欣厭名為下乘般涅槃障今由菩薩深觀平等四諦斷此障已類無差別之真如理方顯現也言非如眼等類有別者謂真如不變隨緣則有五位百法類別且如同一色法而根與塵別又如同一根法而眼與耳別此皆依他起性如幻事等元非實我實法既非實我實法則同一真如體性所謂隨緣不變眼即非眼耳即非耳何得更有類別哉故曰真俗兩智行相互違合令相應名難勝地也若依文解義妄謂眼等一向類別真如一向無別則行相仍互違矣讀者思之六無染淨真如謂此真如本性無染亦不可說後方淨故亦只二空所顯五位百法真如之理在生死而無染證涅槃非新淨但由無始迷惑妄成流轉因於流轉權說還滅流轉名染還滅名淨執此染淨以為實有名粗相現行障今由菩薩深觀平等緣起斷此障已本無染淨之真如理方顯現也七法無別真如謂此真如雖多教法種種安立而無異故亦只二空所顯五位百法真如之理依之安立種種教法而此真理本來無異相即無相空有兩融但由不達相本無相作意勤求無相名細相現行障今由菩薩善修稱性方便滿足一切佛法斷此細相現行障已法無別之真如妙理方顯現也八不增減真如謂此真如離增減執不隨染淨有增減故即此亦名相土自在所依真如謂若證得此真如已現相現土俱自在故亦只二空所顯五位百法真如之理隨緣不變故非染淨所能增減不變隨緣故現相土無不自在但由不達性無增減猶於真如而有趣向名無相中作加行障今由菩薩善得無功用道深證無生法忍斷此加行障已隨緣不變之體任運顯現名不增減真如不變隨緣之用任運顯現名相土自在所依真如當知五法百法之中隨拈一法皆不增減皆相土自在也相約現身土約器界九智自在所依真如謂若證得此真如已於無礙解得自在故亦只二空所顯五位百法真如之理以一一法皆真如故所以隨一一法皆能總持一切所詮之義隨一一法皆能總持一切能詮之名句字隨一一法皆能總持一切言音訓釋隨一一法皆能遍逗一切衆生機宜巧說無盡令得四益是故名此真如為智自在所依也但由所知障故不達一義一切義一切義一義不達一法一切法一切法一法不達一言音一切言音一切言音一言音不達義義法法言言各具四教四門一一門中各具四悉遂於利樂有情事中不樂勤行名利他中不欲行障今由菩薩以無量智思量觀察一切法行如實了知一切稠林斷此不欲行障已真如顯現依之而發四無礙解無不自在也十業自在等所依真如謂若證得此真如已普於一切神通作業總持定門皆自在故亦只二空所顯五位百法真如之理隨一一法皆是真如不變全體皆具真如隨緣大用重重無盡無盡重重一切神通一切事業一切總持一切定門性即真如本無分劑但由微細所知障故未證能所不可思議未證體用不可思議猶於無分劑中而存分劑名為於諸法中未自在障今由菩薩智慧圓滿斷此障已真如圓顯普於諸業得自在也問曰前第十障後云猶有俱生微所知障及有任運煩惱障種金剛喻定現在前時彼皆頓斷入如來地此中胡不別明佛地所證真如答曰真如尚不名一云何有十前約十地分證故隨勝德假立十名至於圓滿菩提歸無所得則一切名義皆悉究竟無勞別立異名矣雖真如性實無差別而隨勝德假立十種雖初地中已達一切而能證之十勝行猶未圓滿為令圓滿十勝行故依于後後建立十名此總結十真如義兼釋伏難也難曰有為之法可有數量真如既非有為安得有十釋曰但隨勝德假立十名其實無差別也難曰真如既無差別則初地已證無差別性名為遍行真如何須建立後九若初地所證不即後九何名遍行若初地所證已即後九何須再證釋曰所證理體雖已頓達而能證事行猶未圓滿為滿勝行建立十名耳初明十地因竟問曰能所不二理事相即今胡得云所證理圓能證事行猶未滿耶答曰能所不二亦不定一理事相即亦不相濫若以事從理以理攝事則初地中亦能具足諸地功德而又不妨仍是初地若以理從事以事顯理則後後位乃能漸顯本來法性而又不妨仍自平等大佛頂經云理則頓悟乘悟併銷事非頓除因次第盡當知頓漸二悟同名為頓以即事之理理仍無差別故頓漸二修同名為漸以即理之事事仍有初後故豫於佛頂文句辨之頗詳幸細尋之二明轉依果三初來意二正釋三簡示今初如是菩薩於十地中勇猛修行十種勝行斷十重障證十真如於二轉依便能證得二正釋二初明位別二明義別今初轉依位別略有六種一損染力益淨能名之為轉謂初資糧二加行位由習勝解取慚愧故損本識中染種勢力益本識內淨種功能雖未斷障種實證轉依而漸伏二障現行亦名為轉二通達轉謂通達位由見道力通達真如斷分別生之二障粗重證得一分真實轉依三修習轉謂修習位由數修習十地行故漸斷俱生二障粗重漸次證得真實轉依然攝大乘論中又說通達轉在前六地者謂彼以有相無相二觀通達真俗間雜現前令真非真現不現故說修習轉在後四地者謂純無相觀長時現前勇猛修習斷餘粗重多令非真不顯現故前六地中或以有相觀通達俗諦則令非真現而真不現或以無相觀通達真諦則令真現而非真不現故名間雜現前餘可知四果圓滿轉謂究竟位由三大劫阿僧企耶修習無邊難行勝行故至金剛喻定現在前時永斷本來一切粗重頓證佛果圓滿轉依窮未來際利樂無盡阿僧企耶亦云阿僧祇此翻無數起信論云一切菩薩皆經三阿僧祇劫故無有超過之法問曰大佛頂經云狂心頓歇歇即菩提何藉劬勞肯綮修證又云不歷僧祇獲法身又云識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海經論明文何其碩異答曰依文解義三世佛冤豈不聞十世古今始終不離當念一剎那際三昧智入三世而無往來乎法華五十小劫謂如半日長入短也瞿目仙人執善財手已於無量佛所無量劫中修菩薩行短攝長也是故若唯約理則長短並空若唯約事則長短各異若約理事不二則互奪兩忘若約理事交徹則長短互在今由理不礙事故雖頓悟同於善財而一生之中三祇具足亦未嘗有所超過復由事不礙理故雖積行猶如釋迦而塵點劫來猶如今日亦未嘗出於剎那且善財雖云一生圓滿而彌勒菩薩仍記之云我成佛時汝及文殊皆得見我普賢又導之云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記由此觀之經所謂頓悟者悟此時劫原無實性也論所謂經劫者經此無實性之時劫也不悟無性則厭倦之心必生不經矌劫則稱性之修不滿不悟無性則不能稱性以起真修不事真修則無以除障而顯本性是故阿難頓獲法身之後方請入華屋門觀音超越世出世間仍居極樂補處閲經論者曷深思之五下劣轉謂二乘位一則專求自利二則厭苦欣寂三則唯能通達生空所顯真如四則唯斷煩惱障種五則唯能證真擇滅無為無勝堪能所以名下劣轉六廣大轉謂大乘位一則為利他故趣大菩提二則生死涅槃俱無欣厭三則具能通達二空所顯真如四則雙斷所知煩惱障種五則頓證無上菩提涅槃有如此勝堪能所以名廣大轉今此頌中之意正說廣大轉依以捨二障粗重而證得故前之四義豎約大乘五位而辨此之二義橫約三乘勝劣對辨仍結歸頌意也蓋下劣轉中亦有五位四義不同以非頌所說義故不辨之又大乘五位四轉亦同天台六即之義資糧即觀行轉加行即相似轉通達修習皆分證轉圓滿即究竟轉不言名字及理即者轉義未顯著故然非名字先轉何由得入資糧位轉又若性中不具理轉何由聞名得生信解又理轉者即是轉菩提為所知障轉涅槃為煩惱障名字已去即皆轉煩惱障成大涅槃轉所知障成大菩提故曰但轉其名無實性如水成氷氷還成水也初明位別竟二明義別三初總標二別釋三結指今初轉依義別略有四種二別釋四初釋能轉道二釋所轉依三釋所轉捨四釋所轉得今初一能轉道此復有二一能伏道謂伏二障之隨眠勢力令不引起二障之現行此通有漏無漏二道亦通加行根本後得三智隨其所應漸頓伏彼二障現行若有漏六行觀厭下苦粗障欣上淨妙理唯能漸伏俱生煩惱現行若有漏位中加行智能頓伏分別二障現行漸伏俱生二障現行若無漏根本智頓伏一切俱生現行若無漏後得智漸伏一切俱生現行又無漏位中加行智亦漸伏一切俱生現行二能斷道謂能永斷二障隨眠此道定非有漏道及加行智所能以有漏道是夙曾習又是相執所引未泯相故以加行智趣求所證真如所引本智未成辦故此正簡有漏道及加行智不能斷惑唯根本後得二無漏智乃為能斷道也相執所引者謂與第七識中煩惱相依有義根本無分別智親證二空所顯真理無境相故能斷隨眠後得不然故非斷道此辨後得智為能斷道共有二義今初義也言後得不然者謂變相觀空不能親證真如故有義後得無分別智雖不親證二空真理無力能斷迷理隨眠而於安立非安立相明了現前無倒證故亦能永斷迷事隨眠故瑜伽說修道位中有出世斷道亦有世出世斷道無有純以世間道而能永害隨眠者以世間道是曾習故又相執所引故由斯理趣諸見所斷及修所斷之迷理隨眠唯有根本無分別智親證理故能正斷彼餘修所斷之迷事隨眠根本後得俱能正斷此第二正義也迷理隨眠者迷二空理妄起我法二執所有分別俱生之種子也迷事隨眠者由迷二空故於事境不能了達起於貪瞋癡慢諸餘煩惱所有俱生之種子也出世斷道即根本智世出世斷道即後得智純世間道即有漏道及加行智餘可知初釋能轉道竟二釋所轉依二所轉依此復有二一持種依謂根本識由此能持染淨法之種子與染淨法俱為所依聖道轉令捨染能淨餘依他起性雖亦是依而不能持種故此不說餘依他起性指前七轉識也二迷悟依謂真如由此能作迷悟根本諸染法法依之得生聖道轉令捨染得淨餘雖亦作迷悟法依而非根本故此不說若論真如隨緣不變則迷不能染悟不能淨今約真如不變隨緣則迷之為在纏真如一切染法依之得生悟之為出纏真如一切淨法依之得生故以真如為迷悟依譬如方雖不轉而依方故迷依方故悟也餘雖亦作迷悟依者謂五蘊十二處十八界等一一皆以無性為性皆即真如故皆可作迷悟法依而隨相差別則非根本故不說之二釋所轉依竟三釋所轉捨三所轉捨此復有二一所斷捨謂二障種真無間道現在現時所治之障與能治之智相違彼二障種即便斷滅永不成就說之為捨彼種既已斷故不復現行妄執我法所執我法不復對彼虗妄遍計執情亦說為捨由此名捨遍計所執二所棄捨謂餘有漏善種及與劣無漏種金剛喻定現在前時引極圓明純淨本識非彼有漏及劣無漏種所依故皆永棄捨彼種捨已現有漏法及劣無漏畢竟不生既永不生亦說為捨由此名捨變易生死劣法有義所餘有漏法種及劣無漏種于金剛喻定現在前時皆已棄捨與俱生微細所知煩惱二障種子俱時捨故有義爾時但捨二障種子猶未捨彼有漏善種劣無漏種以彼與無間道不相違故若言爾時即已捨者菩薩應無一分變易生死法故又此位所持有漏等種若捨應亦無所熏能持之異熟識故是則住無間道之時不應猶名金剛後心菩薩即應名為佛故既即名佛後解脫道應無用故由此應知餘有漏等種子直俟解脫道起方棄捨之以第八淨識乃非彼二種之所依故餘有漏種者即十地中有相觀俱所修勝行之種也劣無漏種者即十地中無相觀俱所修勝行之種也此二皆能感於變易生死故名劣法捨此種時有兩家解初義在無間道次義在解脫道次義為正也四釋所轉得又三初總標二別釋三總示今初四所轉得此復有二二別釋二初釋所顯得二釋所得初又二初正釋二料簡今初一所顯得謂大涅槃此雖本來自性清淨而由客障覆令不顯真聖道生斷彼障故令其相顯名得涅槃此依真如離障施設名字故體即是清淨法界客障即所知煩惱二障也非本來有故名為客然亦不從真如外來以真如體無外故但以非我計我名煩惱障非法計法名所知障此障無體全是虗妄所以可斷了障本妄無可當情名真聖道故如明之與暗定不俱生非敵對斷也涅槃義別略有四種一本來自性清淨涅槃謂一切陰處界等法相所依真如之理雖有客染而本性淨具無數量微妙功德無生無滅湛若虗空一切有情平等共有與一切法不一不異離一切相一切分別尋思路絶名言道斷唯真聖者自內所證其性本寂故名涅槃一切諸法皆是因緣所生觀相元妄無可指陳觀性元真即真如理所謂五陰六入十二處十八界本如來藏妙真如性也雖有客染者幻妄稱相約迷情而言也而本性淨者染而不染離一切相因緣即空也具無數量微妙功德者即一切法因緣即假也無生無滅湛若虗空者離即離非是即非即因緣即中也是故真如本淨則陰入界等一切法無不本淨也真如具德則陰入界等一切法無不具德也真如無生無滅湛若虗空則陰入界等一切法無不無生無滅湛若虗空也一切有情惟其平等共有陰入界法所以即復平等共有真如若謂真如與法定一則真如無差別諸法亦應無別或諸法有差別真如亦應差別而實不然故不定一若謂真如與法定異則真如非諸法諸法應有自性諸法非真如真如應不遍常而實不然故不定異是故真如離一切有相無相雙亦相雙非相即諸法亦離一切有相無相雙亦相雙非相也真如離一切分別即諸法亦離一切分別也真如尋思路絶名言道斷即諸法亦尋思路絶名言道斷也唯於諸法尋思路絶名言道斷故證真如倘於真如虗妄尋思安立名言翻成遍計矣言自內所證者以無外故強名為內以挾帶故強名為證雖聖所證非是聖所獨有故云一切衆生即涅槃雖聖所證非是聖所獨有故云一切衆生即涅槃相不可復滅也二有餘依涅槃謂即真如出煩惱障雖有微苦所依未滅而障永寂故名涅槃三乘無學斷煩惱障證得生空所顯真如即此真如依義假名涅槃以其身智果縛尚在未滅苦依故名有餘依也三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅衆苦永寂故名涅槃身智都泯永無三界苦因苦果即此所顯真如之性依義假名無餘依涅槃也四無住處涅槃謂即真如兼復出所知障大悲般若常所輔翼由斯不住生死涅槃利樂有情窮未來際用而常寂故名涅槃即前本來自性清淨涅槃真如之理由出二障方能圓顯以般若故不住生死以大悲故不住涅槃以般若即大悲故利樂有情窮未來際以大悲即般若故用而常寂故復依義假名無住處涅槃也當知真如不變舉體隨於染緣則有煩惱所知二障而二障隨緣不變本無自性故復舉體隨於淨緣轉成大悲般若二德以此二德乃稱性所起不離本性故云常所輔翼耳初正釋竟二料簡七初約凡聖通簡至七簡頌唯指後三種今初一切有情皆有初一二乘無學容有前三唯我世尊可言具四自性清淨涅槃一切有情皆共有之所謂心佛衆生三無差別亦所謂諸法從本來常自寂滅相有佛無佛性相常住天台依此說六而常即約性德也二乘更加有餘無餘二種然未入滅時但有有餘而無無餘已入滅後但證無餘而非有餘故云容有惟我世尊并具無住處義所謂一切賢聖皆以無為法而有差別三乘因果歷然不濫天台依此說即而常六約修德也全性起修故平等不妨差別全修在性故差別不妨平等是謂常同常別法界法門二簡善逝有有餘依問如何善逝尚有微苦未盡之有餘依答雖無實依而現似有又或苦依盡故說之為無餘依非苦依在可說為有餘依是故世尊可言具四苦依盡者世尊金剛不壞之身不同羅漢果縛也非苦依在者無漏五蘊盡未來際常住不滅也此則四涅槃義同時具足不同二乘甚矣三簡二乘容有前三問若聲聞等有無餘依如何有處說彼非有又有處說彼二乘都無涅槃豈有餘依彼亦非有耶答然聲聞等智身在時由有所知障故苦依未盡圓寂義隱說無涅槃非彼實無煩惱障盡所顯真理之有餘涅槃也又因爾時未證無餘圓寂故亦說彼無無餘依非彼後時滅身智已無苦依盡之無餘涅槃也又或說二乘無涅槃者乃依無住處大涅槃說不依前三說也又說彼二乘無無餘依者依不定性二乘而說彼才證得有餘涅槃決定回心求無上覺由定願力留身久住非如一類定性二乘竟入無餘依也謂有一類定性二乘深樂圓寂得生空觀親證真如永滅感生煩惱障盡先顯依真理之有餘涅槃彼能感生之煩惱既得盡故則後有之異熟果無由更生所以現苦所依任運滅位餘有為法既無所依與彼苦依同時頓捨顯依真理之無餘涅槃爾時雖無二乘身智而先由彼身智證得此理故可假說彼有無餘涅槃此無餘涅槃位中惟有清淨真如離相湛然寂滅安樂依斯說彼二乘與佛無差但無菩提利樂他業故復說彼與佛有異不定性二乘即退大取小者或是通教利根二乘至已辦支佛地中接入別圓以其未斷故知障種未得法身應本故且留分段身久住世間上求下化也定性二乘即本來習小者或是藏教鈍根故不回心向大只待此身任運壽盡永入涅槃決不更受三有生身也餘有為法指彼所知障種然此論既是以別入通通含別圓故仍不壞界內教道若依釋論則出三界外有淨土一切聲聞緣覺出生其中受法性身非分段生法華亦云是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度更無餘乘當知此中所云清淨真如離相湛然秪是方便有餘但空法性土耳若有變易生死非大涅槃也四簡斷所知得無住處問諸所知障既不感生如何斷彼得無住處答彼能隱覆法空真如令不發生大悲般若窮未來際利樂有情故斷彼時顯法空理此理即是無住涅槃令於二邊俱不住故生死涅槃本來空寂由所知障障此法空所以不能稱性發生大悲般若如水成冰今斷彼障遂能不住生死不住涅槃如氷還成水也五簡斷所知不得擇滅問冰所知障亦障無住涅槃真理如何斷彼所知障種不得擇滅無為答擇滅是離煩惱縛彼所知障非分段生死縛故問既爾非縛則斷彼時亦寧得無住涅槃答非諸涅槃皆擇滅攝若不爾者性淨既非擇滅豈亦應非涅槃須知能縛有情住分段生死者斷此縛故說得擇滅無為諸所知障不感分段生死非如煩惱能縛有情故斷彼時不名為得擇滅然因斷彼所知障故法空理顯此理相寂故亦說為涅槃非必謂此無住涅槃亦以擇滅為性也故今四種圓寂于諸無為之中初後二種即真如無為中間擇種乃二滅無為所攝此正簡示有餘無餘二種涅槃乃名擇滅無為若自性清淨涅槃及無住處涅槃皆即真如無為也問若唯斷縛得擇滅者則不動等二屬無為于餘四無為中當屬誰攝答曰不動無為滅受想無為即非擇滅無為所攝說此二皆是暫離有似緣闕不生義故若夫擇滅無為唯究竟滅有非擇滅無為屬非永滅者故又或可無住處涅槃亦是擇滅無為所攝由法空智真擇之力滅所知障而顯得故是則擇滅有二一滅縛得謂斷感生之煩惱而得者二滅障得謂斷餘所知障而證得者故四圓寂于諸無為之中初一即真如後三皆擇滅若夫不動等二或那含及違行地前所入不過暫伏滅者即是非擇滅攝或無學果人所入即屬究竟滅者亦可擇滅所攝此復以六種無為互對簡也真如即是無為體性餘五皆是約義立名已如第二卷中所釋是故不動無為依入四禪假立滅受想無為依入滅定假立皆屬暫離非究竟滅並是非擇滅所攝耳就非擇滅元有二義若本性清淨義即是永滅若緣闕所顯義即非永滅今不動及受想滅二種無為既非永滅即同緣闕所顯義也或無住處下更作一解無住處亦可擇滅所攝不動等二亦可兩攝文並易知六簡所知障亦障涅槃問既所知障亦障無住涅槃如何但說是菩提障答如說煩惱障但障涅槃豈彼不能為菩提障應知聖教依勝用說各別障一理實俱能通障二果煩惱亦障無上菩提所知亦障無住涅槃但我執招感生死用勝法執隱覆正智用勝故云煩惱障障涅槃所知障障菩提耳七簡頌唯指後三種如是所說四涅槃中唯後三種名所顯得自性清淨涅槃不由斷障所顯得故初釋所顯得竟二釋所生得三初總釋二別釋三結成今初二所生得謂大菩提此雖本來有能生種而所知障礙故不生由聖道力斷彼障故令從種起名得菩提起已相續窮未來際此即四智相應心品本來有能生種即無始以來法爾所具無漏種子也即以智慧為性智慧本即別境心所由與十一善法遍行五法及欲解念定四法同時俱起故名菩提智品只此智品若與第八淨識相應即名大圓鏡智照一切法無不盡故若與第七淨識相應即名平等性智達二無我平等性故若與第六淨識相應即名妙觀察智善了諸法自共相等遍知一切衆生機故若與前五淨識相應即名成所作智能起三輪不思議化成就利樂衆生事故八淨識為所依慧心所為能依餘二十善心所為助伴異類合成一聚故名為品八識相用有別故說有四以其有漏障斷無漏智起故名生得實非本無今有之謂也思之二別釋二初正釋智品二諸門分別今初云何四智相應心品一大圓鏡智相應心品謂此心品離諸分別所緣行相微細難知不妄不愚于一切境相性相清淨離諸雜染純淨圓滿功德之現行種子所依持體能現能生自受用等三身四土及後三智之影無間無斷窮未來際如大圓鏡現衆色像此智圓融無礙無所不照故以大圓鏡為喻也不緣非量故不妄無有迷暗故不愚無雜故純無染故淨功德現行皆依於此功德種子皆此所持一切現行皆此所緣故能現一切種子皆此所持故能生也二平等性智相應心品謂此心品觀一切法自他有情悉皆平等大慈悲等恆共相應隨諸十地大機有情所樂示現他受用身及他受用土影像差別為妙觀察智之不共所依無住涅槃之所建立一味相續窮未來際證得十平等故名為平等性智如第四卷所明也由與悲智相應依之建立無住涅槃性唯無漏故名一味餘可知三妙觀察智相應心品謂此心品善觀諸法自相共相無礙而轉攝藏觀察無量總持之門及所發生功德珍寶於大衆會能現無邊作用差別皆得自在雨大法雨斷一切疑令諸有情皆獲利樂諸法自相謂依他起性當體各別故諸法共相謂圓成實性同一真如故又自相謂心心所色等各有自體故共相謂苦無常空等無不皆然故能不忘失名之為攝能善照察名之為觀功德珍寶即六度道品作用差別即神通妙用餘可知四成所作智相應心品謂此心品為欲利樂諸有情故普於十方示現種種變化三業成本願力所應作事佛地經論云身化復有三種一現神通化二現受生化三現業果化語化亦有三種一慶慰語化二方便語化三辨揚語化意化復有四種一決擇意化二造作意化三發起意化四受領意化成所作智能起如是三業化用此是以用顯體皆是智上所現相分也如是四智相應心品雖各定有二十二法能變所變種子現行俱生而智用增故但以智名顯故此四品總攝佛地一切有為功德皆盡二十二法者每一心王皆有二十一心所相應也能變指內二分所變指外二分有為功德指稱性所起修德初正釋智品竟二諸門分別四初轉得門二初起門三緣境門四作用門今初此四智品即轉有漏八七六識及相應品如次而得智雖非識而依識轉識為主故說轉識得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故說轉八識而得此四智初此轉下一約轉識成智釋次智雖下二約智依識轉釋後又有下三約轉強得強釋也智雖非識者識是心王智是慧心所故智強識劣者智則無惡慧而決斷勝故強識則有淨分而無染分故劣也二初起門大圓鏡智相應心品有義菩薩金剛喻定現在前時即初現起異熟識種與極微細所知障種俱時捨故若圓鏡智爾時未起便無能持淨種之本識故有義此品須俟解脫道時初成佛故乃得初起以彼異熟識種金剛喻定現在前時猶未頓捨與無間道不相違故彼無聞道但違二障種子非障有漏善及劣無漏法此有漏善及劣無漏但與佛果定相違故又若金剛喻定無所熏之異熟識則無漏不復增長即應已成佛故由斯此品從初成佛盡未來際相續不斷持無漏種令不失故釋有二義第二為正如文可知平等性智相應心品菩薩見道初現前位違分別我法二執故方得初起後十地中俱生二執猶未斷故故于有漏等位或有間斷直至法雲地後與淨第八相依相續盡未來際有漏等位者等於無漏位也若第六識入法空觀則此智便得現前若第六識但入生空觀時雖名無漏此智亦不現前或第六識出觀之後名有漏位此智亦不現前故云或有間斷直至十地後心法空智果恆時相續乃令此智恆無間斷妙觀察智相應心品有二種別一者生空觀品二乘見位亦得初起此後展轉至無學位方得究竟其在大乘或至菩薩解行地終初見道時此智初起或至上七地位若于非有漏心時或于非入滅盡定無心時皆容現起二者法空觀品惟于菩薩見位方得初起此後展轉乃至上十地位若非有漏心又非但生空智果或非入滅定無心時皆容現起言此後展轉者二乘見道之後若有漏心則生空觀便不現起若入滅定則生空觀亦不現起故仍有間斷也菩薩七地已前亦然法空觀品雖菩薩見道方能有之然於十地已前或於有漏心中或於但生空智心中或於滅盡定中皆不現起除此三位方得現前故亦有間斷也成所作智相應心品有義菩薩修道位中為第六識後得智所引故亦得初起有義成佛方得初起以十地中依異熟識所變眼等非無漏故設以有漏之不共必俱同境五根而發無漏五識理不相應故此二於境明昧異故由斯此品要得成佛依于無漏五根方容現起而數間斷以必待作意緣力方引起故明昧異者有漏根識於境昧無漏根識於境明也問曰小乘神通名為作意佛地神通名為無記化化今云成所作智作意方起何異小乘耶答曰小乘神通作意方有不作意則無佛果神通任運恆有但應機方現若無前機不浪起應故名作意起耳此四種性雖皆本有而要熏發方得現行因位漸增佛果圓滿不增不減盡未來際何故不增不減以其但從種生不復更熏成種何不更熏成種勿前佛德勝後佛故種皆本有者性德也熏發現行者修德也因位漸增者全性起修無差而差也佛果圓滿不增不減者全修在性差而無差也所知障如氷四智品如水所知障如月之黑四智品如月之白氷還成水濕性何殊白月漸圓月體不動性相不二之旨於此亦可思矣二初起門竟三緣境門大圓鏡智相應心品有義但緣真如為境是無分別非後得智行相所緣不可知故有義此品緣一切法莊嚴論說大圓鏡智於一切境不愚迷故佛地經說如來鏡智諸處境識衆像現故又此決定緣無漏種及身土等諸影故但以行緣微細說不可知猶如阿賴耶識亦緣俗故當知緣真如故是無分別緣餘境故即是後得智攝其體是一隨用分二但以了俗由證真故說為後得非實有先後也餘一分二准此應知釋有二義後義為正也初證二智必先證真而後了俗所以說有前後既在佛地則念念真俗並照但約緣真如義即名為根本智約遍緣餘境義即名為後得智耳餘平等性智及妙觀察智亦各一體隨用分二准此應知平等性智相應心品有義但緣第八淨識如染第七緣藏識故有義但緣真如為境緣一切法平等性故有義遍緣真俗為境佛地經說平等性智證得十種平等性故莊嚴論說緣諸有情自他平等隨他勝解示現無邊佛影像故由斯此品通緣真俗亦是根本後得二智所攝於理無違釋有三義第三為正也十平等性已現第四卷中妙觀察智相應心品緣一切法自相共相皆無障礙二智所攝成所作智相應心品有義但緣五種現境莊嚴論說如來五根一一皆於五境轉故有義此品亦能遍緣三世諸法不違正理佛地經說成所作智起作三業諸變化事決擇有情心行差別領受去來現在等義若不遍緣無此能故然此心品隨意樂力或緣一法或二或多莊嚴論中且一往說五根於五境轉然不言唯爾故不相違此智隨作意生緣事相境以起化他業故唯屬後得智攝釋亦二義後義為正也三緣境門竟四作用門此四心品雖皆遍能緣一切法而用有異謂鏡智品現自受用身淨土相持無漏種平等智品現他受用身淨土相成事智品能現變化身及土相觀察智品觀察自他功能過失雨大法雨破諸疑網利樂有情如是等門差別多種二釋所生得中二別釋竟三結成此四心品名所生得四釋所轉得中二別釋竟三結示此所生得總名菩提及前所顯得之涅槃二皆名所轉得二明義別中二別釋竟三結指雖轉依義總有能轉道等四種而今頌意但取所顯所生之二所轉得以頌說證得轉依之言故二明轉依果中二正釋竟三簡示此修習位但說能證得義非是說已證得以屬因位攝故即四義中初能轉道義也四釋修習位竟五釋究竟位二初舉頌二論釋今初後究竟位其相云何頌曰此即無漏界不思議善常安樂解脫身大牟尼名法二論釋六初釋無漏界二釋不思議三釋善四釋常五釋安樂六釋解脫身大牟尼名法初中二初正釋二釋妨今初論曰前修習位所得轉依應知即是究竟位相此者謂此前所說二轉依果即是究竟無漏界攝諸漏永盡非漏隨增性淨圓明故名無漏界是藏義此中含容無邊希有大功德故或是因義能生五乘世出世間利樂事故性淨者簡異二乘圓明者簡異十地五乘者一人乘二天乘三聲聞乘四緣覺乘五大乘也人天是世間利樂事後三乘是出世利樂事二釋妨二初釋四智唯無漏妨二釋佛應無五根等妨今初問清淨法界可唯無漏攝四智心品如何唯無漏答道諦攝故唯無漏攝謂佛功德及身土等皆是無漏種性所生有漏法種已永捨故雖有示現作生死身業煩惱等似苦集諦而實無漏道諦所攝作生死身似苦諦也業煩惱等似集諦也似苦諦則同形九界似集諦則示行逆惡而皆稱性施設總屬無漏所謂三千果成咸稱常樂煩惱即菩提生死即涅槃性惡法門此為誠證矣二釋佛應無五根等妨問集論等說十五界等唯是有漏如來豈無五根五識五外界等十五界即五根果五識界五塵界也五塵名外界者妄情不執為自身故隨情說外非謂在心外也此因上文說四智心品唯屬無漏而興難問謂佛若有前十五界則不應唯無漏攝若佛唯是無漏則不應有十五界以十五界集論等說唯有漏故下文有三家答第三為正有義如來功德身土甚深微妙非有非無離諸分別絶諸戲論非界處等法門所攝故與彼集論等說理不相違此初家答也雖似有理而實儱侗無有的義近時宗門及圓頓教多墮此見有義如來五根五境從首楞嚴等妙定生故但是法界色攝其九界非佛之五識雖依此如來法界所攝色為本質變相而緣然所變者粗為質者細其體各異故非五塵境攝而如來之五識亦非五識界攝以經說佛心恆在定故論說五識性散亂故問曰既如來五識非五識界則成所作智與何淨識相應答曰與第六淨識相應由觀機而起三類分身之化用故問曰既與第六淨識相應則與妙觀察智性有何別答曰彼觀察智善觀諸法自共相等此成所作智唯起化用故有差別問曰若然則此二智品應不並生以一類二識不俱起故答曰許不並起亦於理無違又或同體而約用分則俱起仍亦非失又成所作智或與第七淨識相應以其依眼等五根緣色等五境即是平等智之作用差別耳問曰此則與平等性智有何差別答曰謂即淨第七識起他受用身土相者則屬平等品攝起變化者則屬成事品攝問曰既依五根緣五塵境豈不此成所作智品如其所應攝歸五識亦得答曰非是轉彼五識而得此智便謂此智體即是彼五識如轉生死言得涅槃不可涅槃同生死攝是故於此不應為難此次家答也雖不似初家一味儱侗而義多牽強終違正理有義如來功德身土如應攝在五蘊十二處十八界中以彼蘊處界三皆通有漏無漏故而集論等說十五界等唯有漏者彼依二乘粗淺境說非說一切也謂餘九界有情成就十八界中唯有後意根意識法塵三界通無漏攝若佛所成就十八界者雖皆無漏而非二乘所知境攝然餘處說佛功德等非界等者但以不同二乘劣智所知界等相故理必應爾所以者何經說一切有為法皆屬五蘊攝故又說一切有漏無漏法皆是十八界十二處攝故設使蘊界處外別有佛法即是第六蘊第十三處第十九界而十九界等乃是聖所遮故又若謂絶諸戲論便非界處等攝亦不應說即無漏界善常安樂解脫身等又處處說轉無常五蘊獲得常住五蘊十八界十二處亦然寧可竟說如來非蘊處界故凡言非蘊處界等者但是密意說耳又論說五識性散亂者乃說餘九界之所成者非說佛所成之五識亦散亂也故佛身中十八界等皆悉具足而純無漏此第三正答也佛身具足十八界等故與衆生平等無二而蘊處界皆純無漏故顯一一無非法界是故如來蘊處界等一一含容無邊希有大功德聚一一能生五乘世出世間利樂事業又如來蘊處界等既皆即無漏界當知衆生蘊處界等未嘗不具無漏界性故曰轉無常蘊獲得常蘊界處亦然如轉氷得水濕性無殊氷喻九界有漏蘊處界法水喻佛界無漏蘊處界法濕喻真如無為實性與有為法不一不異此則性相融通本來無二分而愈合旨趣彰明矣紛紛諍論豈理也哉初釋無漏界竟二釋不思議此二轉依果又不思議超過尋思言議道故微妙甚深自內證故故不可思非諸世間喻所喻故故不可議三釋善此二轉依果又唯是善以是白淨法性故謂清淨法界遠離生滅極安隱故四智心品妙用無方極巧便故此二種皆有順益相故違不善法之違損相故俱說為善難曰論說十二處等惟五根與香味觸三塵性是無記餘通三性不唯無記今言佛四智等亦唯是善如來豈無無記五根及香味觸三無記境此中亦有三釋廣釋如前無漏界中今第三正釋曰一切如來身土等法皆是滅道二諦所攝故唯是善聖說滅道唯善性故說佛土等非苦集故佛識所變有漏不善無記相等皆從無漏善種所生無漏善攝佛識所變相自有二種一者大悲願力同流九界變為九界蘊處界相如其所應或同無漏或同有漏或同小善或同不善或同有覆無覆二種無記而皆無漏善種所生正是巧用性惡法門故一切諸法無非佛法也二者九界有漏不善無記相等以為本質變起佛識無漏相分所謂諸佛心內衆生塵塵極樂者也理具事造兩重三千同居一念於此亦可悟矣四釋常此二轉依果又皆是常無盡期故謂清淨法界無生無滅性無變易故說為常四智心品所依法界常故永永無斷盡故亦說為常然而非自性常心四智品從因生故生者歸滅一向說故不見色心非無常故然四智品亦非無常由本願力所化有情無盡期故窮未來際無斷無盡前已具明真如與一切法不一不異今故但言法界是自性常四智非自性常即顯常與無常二鳥雙遊之義矣仍恐迷者執文失旨故特申明四智非自性常亦非無常以雙遮之既可雙遮便可雙照既知四智雙遮雙照便可例知清淨法界亦必雙遮雙照何以言之真如不變隨緣則有在纏出纏之分非常即無常乎真如隨緣不變原無增減垢淨之別非無常即常乎又不變隨緣故雙照常與無常隨緣不變故雙非常與無常又四智心品為能依真如法界為所依如波依水不一不異無有水而不波無有波而非水波無常即水相無常水常即波性常矣乃至理事性修體用不二而二二而不二莫不皆然思之思之五釋安樂此二轉依果又皆安樂無逼惱故謂清淨法界衆相寂靜故名安樂四智心品永離智體之害故名安樂此二自性皆無逼惱及能安樂一切有情故二轉依俱名安樂體害即法執能障所知妙理故名智體之害也六釋解脫身大牟尼名法二初釋解脫身二釋大牟尼名法今初二乘所得二轉依果唯永遠離煩惱障縛無殊勝法故恆名解脫身二乘二轉依果者一是擇滅無為二是生空智品也但出分段生死苦輪無有菩提利樂他業故恆名解脫身恆或作但二釋大牟尼名法二初略明頌義二廣解法身今初大覺世尊成就無上寂默法故名大牟尼此牟尼尊所得菩提涅槃二轉依果永離所知煩惱二障亦即名為法身法者謂無量無邊力無畏等大功德法所莊嚴故身者謂體義依義聚義總說名身故此法身總以真如及四智菩提五法為性非但以清淨法界一種獨名為法身也以二轉依果皆此法身所攝故梵語牟尼此云寂默謂永寂二邊默契中道也法身總以五法為性即是體義合此五法以為法身即是聚義下云大功德法所依止故即是依義二廣解法身三初明能依之身二明所依之土三身土合簡初中四初正釋三身二五法相攝三三身德別四自他利殊今初如是法身有三相別即法報應三身也法身名自性身報身名受用身應身名變化身相雖三別皆名法身即一而三即三而一不縱不橫不並不別分而言之法身是依義報應二身是體義三相總名法身是聚義合而言之一一皆有體依聚義一自性身謂諸如來所證真淨法界乃受用身及變化身之平等所依離相寂然絶諸戲論具無邊際真常功德是一切法平等實性即此自性亦名三身中之法身以是大功德法所依止故一切法平等實性所謂有佛無佛性相常住悟不能增迷不能減者也然於衆生分中名為在纏真如亦名本性清淨法身而於諸佛分中名為出纏真如亦名離垢妙極法身是故諸佛如來無別所證全證衆生理本而已二受用身此有二種一自受用謂諸如來三無數劫修集無量福慧資糧引生本具無漏種子所起現行四智菩提無邊真實功德及大圓鏡智所變極圓滿極清淨常遍色身相續湛然盡未來際恆自受用廣大法樂二他受用身謂諸如來由證自受用故以平等智力示現微妙淨功德身居純淨土為住十地諸菩薩衆現大神通轉正法輪決衆疑網令彼受用大乘法樂合此二種名受用身自受用身正名報身等覺以下所不能見他受用身亦名報身亦名勝應如華嚴經所明盧舍那身隨十地機所見不等故名勝應即托自受用身以為本質令彼各各變相而見不同所示界內分段生身故亦名報也純淨土即實報無障礙土三變化身謂諸如來由證自受用故以成事智力變現無量隨類化身居淨穢土為未登地諸菩薩衆及二乘人并一切異生稱彼機宜現通說法令各獲得諸利樂事隨類化身謂十法界影像身也淨穢土謂方便有餘土及凡聖同居土或淨或穢差別無量初正釋三身竟二五法相攝以五法性攝三身者五法性即一真法界及四智菩提也有兩家釋義不同第二義正有義初一真法界二大圓鏡智攝自性身經說真如是法身故論說轉去阿賴耶識得自性身而圓鏡智品乃轉去藏識而證得故中平等性妙觀察二智品攝受用身說平等智於純淨土為諸菩薩現佛身故說觀察智大集會中說法斷疑現自在故說轉諸轉識得受用身故後成所作一智品攝變化身說成事智於十方土現無量種難思化故又智殊勝具攝三身故知三身皆有實智此初義也智殊勝具攝三身者謂佛三身皆是智殊勝攝有義初一真法界攝自性身說自性身本性常故說佛法身無生滅故說法身是證因得非生因所生故又說法身諸佛共有遍一切法猶若虗空無相無為非色心故然論中說轉去藏識得自性身者謂由轉滅第八識中二障粗重然後顯法身故又智殊勝中說攝法身者謂法身是彼四智所依止是彼四智之實性故其實自性法身雖有真實無邊功德而無為故不可說為色心等物此下皆第二正義也今先明自性身唯是一真法界所攝不應亦是大圓鏡智所攝一者自性身是本性常而鏡智非本性常二者自性身無生無滅而鏡智無滅有生三者自性身是了因所了而鏡智是生因所生了因即本文所云證因四者自性身無相無為非色非心而鏡智有相有為體是心法又能持於色法然說轉去下通前所引二文可知四智品中真實功德及鏡智所起常遍色身攝自受用平等智品所現佛身攝他受用成事智品所現隨類種種身相攝變化身此正釋四智攝後二身之義然四智心品皆是自受用攝平等智品所起乃名為他受用非徑以平等智攝他受用成所作智所起乃名為變化身非徑以成事智攝變化身也應說圓鏡智是自受用佛以轉諸轉識而得受用故雖轉藏識亦得自受用然已說轉彼藏識而顯法身故所以於得受用之義略不說之又說法身無生無滅唯證因得并色心等今圓鏡智品與此法身之義相違若使非自受用身攝屬何身攝又自受用身攝佛不與二乘共之有為實德故四智品實有色心皆受用攝又他受用及變化身皆為化他方便示現故不可說實智為體雖說化身亦是智殊勝攝而似智現或智所起假說智名體實非智但說平等成所作智能現他受用身及三業化身不說他受用及變化二身即是二智故此二智亦是自受用攝此轉釋自受用身總攝四智之義也先明大圓鏡智既非法身所攝必應攝屬自受用身次明他受用及變化身但是平等成事二智所起體非二智故此二智亦必攝屬自受用身然變化身及他受用雖無真實心及心所而有化現心心所法良以無上覺者神力難思故能化現無形質法若不爾但是化現者云何如來現貪瞋等以如來于貪瞋等久已斷故又云何聲聞及傍生等亦能知如來心以如來實心謂等覺菩薩尚不知故由此經說化無量類皆令有心又說如來成所作智化作三業又說變化有依他心謂依他實心以為本質而有心心所相分假現起故雖他處說變化人無根心等而依餘三乘及異生等所變化人說不依如來所變化人說也又餘人雖化色根心心所法而無根等實用故不說有若如來難思妙化所變根等則便有實用故此釋伏難也難曰若他受用及變化身不以實智為體云何現有心心所用釋曰皆是化現而有又難曰色有形質故可化現心無形質豈可化現釋曰佛力難思故能化現若謂是佛實心非化現者佛豈實有貪瞋等心又豈等覺以下所能知哉由此經說下連引三文以證可知又難曰若佛果能化作三業何故復說變化無根心等釋曰此依餘所化說不依如來所化說也二五法相攝竟三三身德別如是三身雖皆具足無邊功德而各有異謂自性身唯有真實常樂我淨離諸雜染衆善所依無為功德無色心等差別相用自受用身具無量種妙色心等真實功德若他受用及變化身唯具無邊似色心等利樂他用化相功德皆具足無邊功德者異而不異三即一也而各有異者不異而異一即三也自性身如濕性自受用身如水他受用及變化身如波自性身如月體自受用身如圓滿白月他受用及變化身如千江月影觸波之時全觸水濕覩月影時便覩光體是故智者觀於土木等像三身宛然四德無減以是如來大悲大智遍入衆生心想仗因托緣而顯現故因緣所生即空假中無有微塵許法出於法界外故皆非遍計所行境故如彼愚小計繩為蛇而繩未嘗不即麻故四自他利殊又自性身正自利攝寂靜安樂無動作故亦兼利他為增上緣令諸有情得利樂故又與受用及變化身為所依止故俱利攝自受用身唯屬自利若他受用及變化身唯屬利他為他現故自性身為增上緣者法界妙理生佛體同由此同體法性所以佛與衆生得有感應道交之事也餘皆可知初明能依之身竟二明所依之土又自性身依法性土雖此身土體無差別而屬佛法相性異故此佛身土俱非色攝雖不可說形量大小然隨受用變化身土等事相其量無邊譬如虗空遍一切處屬佛法相性異者謂法性屬佛名法性身法性屬法名法性土性隨能依所依之相而異蓋於無能所中而說能所雖分能所能所不二也非色攝者謂色即是空故不可說形量大小而復空即是色故隨事相其量無邊所謂性色真空性空真色清淨本然周遍法界故曰譬如虗空遍一切處非指太虗以為圓佛也自受用身還依自土謂圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴自受用身常依而住如淨土量身量亦爾諸根相好一一無邊無限善根所引生故功德智慧既非色法雖不可說形量大小而依所證二空真如及所依自性法身亦可說言遍一切處純淨佛土因緣者無漏種子為因福慧二修為緣也法性身土皆約性德受用身土皆約修德就法性中能依名身所依名土此性德能所本自不二不二而二名為身土而性德身土皆為所證今之修德乃是能證就修德中復約能依名自受用身所依名自受用土此修德能所亦復不二不二而二名為身土又全性起修全修在性則性修不二亦以不二而二故約性德名法性身土約修德名受用身土耳其實二而不二離法性外無受用離受用外無法性也又法性不變隨緣故迷之者成分段變易二種身土悟之者成無漏純淨受用身土此全性起於逆順二修無差而差聖凡條別也法性隨緣不變故分段變易身土真如之性不垢不減無漏純淨身土真如之性不淨不增此逆順二修無不全即在性差而無差聖凡平等也今所明自受用身即圓滿報身自受用土即上品實報無障礙土並皆圓教究竟果位之相故是通含別圓法門他受用身亦依自土謂平等性智大慈悲力由昔所修利他無漏純淨佛土因緣成熟隨住十地菩薩所宜變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限純淨佛土因緣謂直心是道場等具如維摩經中所明或小或大者謂初地見百界二地見千界等成劣或勝者謂界外鈍根次第而見不能稱性名之為劣即實報無障礙穢土若界外利根不次第見頓同法性名之為勝即實報無障礙淨土能依身量亦無定限者身必稱土土小則身亦小土大則身亦大也若變化身依變化土謂成事智大慈悲力由昔所修利他無漏淨穢佛土因緣成熟隨未登地有情所宜化為佛土或淨或穢或小或大前後改轉佛變化身依之而住能依身量亦無定限此有二種一方便有餘土二凡聖同居土也方便有餘土者如藏教二乘極果通教七地皆斷煩惱不復受三界生而所知障未斷又不能入他受用土故彼雖作滅度之想入於涅槃而出三界外有此淨土仍於其中受變易身又別教七住以上圓教七信以上通惑已斷無明未破亦生此中故云隨未登地有情所宜化為佛土也就此方便土中亦有大小亦分淨穢如藏教二乘法執重故則土小而穢通教七地法執輕故則土大而淨別七住以上勝於通教所見十行又勝十向倍勝若圓十信所見尤為勝妙然此方便若淨若穢自同居土視之則總名淨以非分段生故凡聖同居土者有三惡道則名為穢如娑婆等無三惡道則名為淨如極樂等或一向淨或一向穢或淨兼穢或穢兼淨或淨轉穢或穢轉淨淨亦有無量差別穢亦有無量差別佛身大小亦復無量差別不等具如諸輕所明此中淨穢佛土因緣者應折應攝等機為緣二十五王三昧為因具如法華玄義所明二明所依之土竟三身土合簡二初簡所變同別二簡能變同別今初自性身土一切如來同所證故體無差別自受用身及所依土雖一切佛各變不同而皆無邊又復不相障礙餘二身土隨諸如來所化有情有共不同若所化共者同處同時諸佛各變為身為土形狀相似不相障礙展轉相雜為增上緣令所化之衆生于自識上變現佛化身土彼但謂於一土有一佛身為現神通說法饒益而不知其實是諸佛所共變也若復於不共者縱使彼謂見十方佛實唯一佛所變良由諸有情類無始時來種性法爾更相繫屬或多有情唯屬一佛所化或一有情須屬多佛所化故所化衆生法爾有共不共若不爾者則多佛久住世間各事劬勞實為無益以一佛即能益一切生故餘二身土謂他受用身他受用土及變化身變化土也一切衆生由有我法二執故使自他不二而二諸佛已斷此執故於自他二而不二但因衆生所屬之機有同有別故佛化用隨而應之是故若論佛德無量則決能度盡衆生若論衆生無緣則不能受諸佛化如日光雖無所不照而覆盆之下便無日光然衆生未破法執以前唯受有緣佛化若破法執登於圓住別地則為一切諸佛同體所護念矣二簡能變同別二初正簡漏無漏別二約三性結成五觀今初此諸三身四土若淨若穢若從諸佛無漏識上所變現者同能變識俱善無漏以從純善無漏因緣所生是道諦攝非苦集故然能變之識雖是無漏而所變之蘊等識相不必皆同以從諸佛心內衆生之蘊處界三法因緣雜引生故純善無漏因緣者無垢識中本具十界性相為因悲智行願及一切衆生機感為緣也蘊等識相不必皆同者謂若衆生入二空觀則其意識法之三界便與諸佛同其無漏若復未入二空觀智則其蘊處界三一向皆是有漏所攝而諸佛託此衆生有漏無漏本質自皆變為無漏相分也夫佛變淨土純善無漏固無論已佛變穢土乃從衆生三法因緣引生所以識相不必皆同然在如來分中雖現九法界影而九法界影亦皆純善無漏所攝所謂三千果成咸稱常樂豈不信哉即此身土若淨若穢若從九界有漏識上所變現者同能變識皆是有漏純從有漏因緣所生是苦集攝非滅道故然能變識雖唯無記而所變善等三性之識相不必皆同以從衆生心內諸佛示現隨順善惡無記三性因緣雜引生故所變衆生心內諸佛之蘊等有同有異類此應知若不爾者則化現之佛應無五蘊十二處等有漏因緣者異熟識中本具十界性相為因與二障俱之聞思修慧及諸福行為緣也蘊等同異類此應知者謂若衆生心內諸佛則蘊處界皆善無漏若復衆生心內三乘聖衆則意識法三屬於無漏前十五界仍屬有漏而衆生託此四聖無漏有漏本質自皆變為有漏相分也夫生見穢土純屬有漏固無論已生見淨穢兩土及諸佛身乃從諸佛示現三性三法因緣引生所以識相不必皆同然在衆生分中雖覩佛身土影而佛身土影皆是有漏所攝所謂三千在理同名無明豈不信哉初正簡漏無漏別竟二約三性結成五觀五初示遣虗存實觀二示捨濫留純觀三示攝末歸本觀四示遣相證性觀五示隱劣顯勝觀問曰何故隱劣顯勝反在遣相證性後耶答曰既達真如即識實性方知真如亦即心所實性既達識性之外無別真如方知心所性外亦復無別真如故遣相者遣其迷性妄見差別之相證性者證其即相無非平等之性也今初然相分等依識變現非如識性為依他中實有之妙俗諦若不爾者則唯識理應不得成以其許識內境俱實有故此遣虗存實觀中有兩家解今初即安慧師義謂相見二分是虗自證體性是實也相分等等於見分識性即自證分或識中相見二分等皆從緣所生俱是依他起性其虗與實猶如識之自體須知唯之為言但遣識外我法不遮識內相分境也若不爾者則根本智所緣真如內實相境亦應非實此即護法正義謂遮計所執是虗四分皆依他起是實也言虗實如識者依真勝義則識體既如幻夢所變相見二分亦虗約理世俗則依他識體不無所變相見二分亦實蓋所言唯識者但以唯字遮彼遍計所執識外我法非并遮此識內相見也且如根本實智緣真如時雖非變帶相狀許是挾帶體相若謂相見二分是虗則本智真如亦應非實矣豈可乎哉大佛頂經云見與見緣并所想相如虗空華本無所有此約真諦遣相而安慧師依此立於初義又云此見及緣元是菩提妙淨明體云何於中有是非是此約即俗恆真而護法師依此立於次義故奘師並存其說亦以可互發明故也然執初義者必失次義而知次義者必達初義故仍以次義為正二示捨濫留純觀問內境與識既並非虗如何但言唯識非言唯見唯境答識唯內有境亦通外恐濫遍計所執外故但言唯識又或諸愚夫迷執於境起煩惱業生死沉淪不解觀心勤求出離哀愍彼故說唯識言令自觀心解脫生死非謂內境如外都無境從心變心外無境而愚夫不達唯識妄生執著起見起愛抂受輪回故但言唯識令彼觀心言觀心者秪是強觀諸法無實皆從識變則能伏滅遍計執情三示攝末歸本觀或相分等皆以識為體性由熏習力似多分生一秪識性由熏習力似有四分生起不同尅實論之相見之末何嘗離於識體故大佛頂經云本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月四示遣相證性觀真如亦是識之實性故除識性之外無別有法欲知如外無識先觀識外無如若知識外無如方悟如外無識識外無如者圓成實性不離依他也如外無識者依他無性即圓成實也故前頌云圓成實於彼常遠離前性故此與依他非異非不異又云此諸法勝義亦即是真如常如其性故即唯識實性而後之講者妄謂法相宗中立凝然不變以為真如不亦冤乎五示隱劣顯勝觀此中識言亦攝心所心與心所定相應故但以勝攝劣故云唯識耳非謂離心無別心所也一一心所皆具四分依他起性一一依他皆與真如非異不異故得介爾有心三千具足若不然者不墮饒伺則墮支離豈大乘中道法義也哉統論唯識修證法門總不離此五觀以對南嶽大乘止觀如出一轍初遣虗存實二捨濫留純即分別性中止觀也三攝末歸本即依他性中止觀也四遣相證性即真實性中止觀也五隱劣顯勝即密顯染分三性淨分三性皆可具前四觀何以言之若但論心王則不顯染淨差別唯兼論相應心所方知三性各各不同既於心王得論四觀亦於心所得論四觀且如貪瞋癡等隨舉一法若遣虗存實則知所貪外境非有若捨濫留純則知內相分境亦虗若攝末歸本則知能貪所貪本無二體若遣相證性則知貪之實性即真如性瞋癡慢等例此可知惡法尚爾無記與善益復可知有漏尚爾無漏諸法益復可知故能遍於五位百法通達三性及三無性成就真俗不二觀門此佛祖傳心要訣法性法相真源願有智者慎思明辨而篤行之勿蹈尋章摘句窠臼勿招算沙數寶譏嫌勿殉世諦流布陳言勿犯鬪諍堅固記莂庶不負天親護法等諸大菩薩慈力亦不負戒賢玄奘等師資授受苦心已上第二大科依教廣成分竟三釋結施願分二初釋結二施願今初此論三分成立唯識是故說為成唯識論亦說此論名淨唯識顯唯識理極明淨故此先釋結末釋論也三分謂宗因喻三支比量又略廣位三分境行果三分相性位三分故開蒙曰有三種三科一略廣位三科者初一頌半略答外難略標識相次二十三行頌半廣明識相顯前頌意後有五頌明修行之位次二境行果三科者前二十五頌明唯識境次四頌明唯識行後一頌明唯識果三相性位三科者前二十四頌明唯識相第二十五頌明唯識性後五頌明唯識位當知三科即三分也此本論名唯識三十由天親大士造三十頌顯于唯識之理乃得圓滿非有增減於本頌故此更釋結本宗論也非略不足以提綱非廣不足以盡義非位不足顯修證故三十頌不容增減又非境不足以導行非行不足以尅果非果不足以證境故三十頌不容增減又非相不足辨邪正非性不足以融空有非位不足以證性相故三十頌不容增減今依此三十頌而釋成之先廣破我法二執略明能變唯三次廣明三能變相申明所變唯識既於依他起之心及心所破其我法二種遍計即知二空所顯真如與依他起非異不異故得真俗理明性相交徹依之起行便可歷五位而證二種轉依雖十家殊釋廣有百卷細繹精搜揉成十冊亦於三十本頌義無增減可謂入大乘之初門破邪執之利斧接權小之巧便顯性具之前茅矣初釋結竟二施願已依聖教及正理分別唯識性相義所護功德施羣生願共速登無上覺聖教指能詮之文正理指所詮之義文隨於義義隨於文教之與理何嘗有二但恐依文解義則為三世佛冤故既依聖教仍須正理以為司南又恐離經一字則便同於魔說故既依正理仍須聖教以為定量也分別性相義者若不了性亦不了相其相即妄若不識相亦不識性其性即孤故須性相俱通方得自他兼利又性相秪是事理不達事而理非圓不了理而事奚立故今分別此義令於真俗二諦了了分明以為起行歷位證果之本只此一念弘法功德能報十方諸佛深恩又復施羣生以順大悲願登大覺以順大智悲智雙運即是四弘誓鎧大乘唯識之正印也跋語宗鏡録云應須以智慧合其多聞終不執詮而認指以多聞度其智慧免成孤陋而面牆設有一微塵處未了此猶有無明在以不了處為障翳故何況自身根門之內日用之中有無量應急法門全未明一若欲為人憑何剖析只成自誑反墮無知自眼未明焉開他目故須三量定其是非真修匪濫四分成其體用正理無虧然後十因四緣辨染淨之生處三報五果鑒真俗之所歸若不達三量真妄何分若不知四分體用俱失又云一心實相悉是諸法諸法所生皆從現行善惡熏習第八識含藏種子為因發起染淨差別報應為果若不微細剖析問答決疑何由到一心總別之源徹八識性相之際古德謂提綱意在張網不可去網存綱舉領意在著衣不可棄衣取領故知理事雙明方通圓旨教觀齊運始達一乘又云若不因教所指何由得識自心設不因教發明亦須憑教印可若不然者皆成自然外道暗證禪師直饒生而知之亦是多生聞經熏種或乃諸聖本願冥加嗚呼永明大師以法眼嫡孫悟齊諸祖而苦心苦口勸誡若此誰謂成唯識論非佛祖傳心之要訣耶豫自恨障深惑重不能折伏現行煩惱深負出家初心而性相源頭頗窺一線誠或佛祖本願冥加故亦不敢自私自祕聊竭隙明和盤拈出舉筆于丁亥年三月二十五日脫稿於本年五月二十五日凡閲兩月述成觀心法要十卷伏願見聞隨喜不退菩提若信若疑咸成妙種同生極樂淨先覲阿彌陀佛還入龍華初會影響彌勒世尊盡未來時廣度含識衆生皆悉度盡方證無上涅槃蕅益沙門智旭閣筆故跋時年四十有九二白居士蔡屏周捐資刻此唯識心要第十卷伏願祿壽增崇福慧昌盛破執顯理轉識成智普與法界有情同證唯識妙性頓悟三身圓淨四土覲彌陀于樂國輔慈氏于龍華丁亥仲秋日識于祖堂
