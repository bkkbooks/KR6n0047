body:
  text: 蕅益沙門智旭述三釋相應門三初問答總明二別釋體用三結成相應今初此識與幾心所相應常與觸作意受想思相應阿賴耶識無始時來乃至未轉於一切聖凡升沉定散等位恆與此五心所相應以此五種是遍行心所所攝一切心中皆可得故此識下設問常與下舉頌以答阿賴下總明也未轉謂金剛道前餘如下釋二別釋體用五初釋觸二釋作意三釋受四釋想五釋思今初觸謂于根境識三和時分別其變異令心心所觸對于境以為體性受想思等所依以為業用分別即領似之義是觸作用變異是三和功能謂根境識三和之時令諸心所次第轉生名為變異此觸心所能領似之也此先正釋下更轉釋謂根境識更相隨順故名三和觸依彼三和而生令彼三得和合故說此觸心所為彼三和合位根可為依境可為取識依于根而取于境此三皆有順玉一切心所之功能作用所以說名變異今觸心所似彼順生一切心所變異功能而起故名之為分別然三和中獨有根變異力引觸心所起時勝彼識之與境故集論等但說分別根之變異此轉釋三和分別變異也根變異下釋疑謂有疑云觸既分別三和變異何故集論等但說分別根之變異釋云根變異力引觸起時勝識境故按宗鏡解根四義獨勝一由主故二由近生心心所故三由遍故不惟心所亦能生心四由常相續故識雖為主近生心所不自生心故不遍有間斷故不續境非主故亦非近故雖遍能生心及心所亦不相續以識生則境生識滅則境滅故和合一切心及心所令同觸境是觸自性此轉釋令心心所觸境為性色謂八箇心王各有相應心所此觸心所能各使和合而觸境也此觸心所既有似三和順起心所之功能故以受等所依為業起盡經說受想行蘊一切皆以觸為緣故由斯故說識觸受等因二三四和合而生瑜伽但說與受想思為所依者思於行蘊為主勝故舉此以攝其餘四十七心所也集論等但說為受依者以觸生受近而勝故謂觸所取可意等相與受所取順益等相極相鄰近又引發受起比餘勝故此轉釋受想思等所依為業也等之一字即總攝行蘊諸餘心所不但指一思心所瑜伽但說受想思者乃是以主攝伴集論但說受者乃是以近攝遠又皆以勝攝劣耳言識觸受等因二三四和合生者識因根境二和合生觸因根境識三和合生受想思等皆因根境識觸四和合生也觸所取可意相與受所取順益相極相鄰近故引發獨勝觸所取不可意相與受所取違損相觸所取非可意非不可意相與受所取非順益非違損相亦復如是然觸自性是實非假以是六六法中心所性故又是四食之所攝故又能為十二支中緣故應如受等有實自性非即三和此結判也或計三和生觸觸即三和無別自體故今以三因成立有體之宗而喻之以受等一是六六法中心所性故六六法者六識六觸六受六想六思六愛也二是四食攝故四食謂段食觸食思食識食也三是能為緣故謂六入緣觸觸緣受也初釋觸竟二釋作意作意謂能警心為性於所緣境引心為業謂此作意能警覺應起之心種令起亦能引已起之心令趣於境故名作意雖此亦能引起心所心是主故但說引心有說此作意者令正緣此境之心回趣異境故說此作意者乃於一境持心令住故名作意彼二說俱非理若令心回趣異境應非遍行若于一境持心令住不異定故初正釋體用有說下出異解彼俱下破斥皆可知三釋受受謂領納順違俱非境相為性起愛為業能起合離非二欲故此正釋體用也於順境則希合於違境則希離於非順非違境雖不希合亦不希離希即是欲欲名為愛有作是說受有二種一境界受謂領所緣順等三境二自性受謂領俱生之觸而為所緣此中唯自性受是受自相以境界受共餘相故此出異解也言共餘相者謂通於王所共緣相故彼說非理受定不緣俱生觸故若謂此受似觸而生名領觸者則一切似因之果應皆有領因之義應皆名為受性又觸既是受因則受領此因應名因受觸非受之自性何名自性此下皆破斥也今先正破受定不緣俱生觸者觸生於受受不緣觸如父生子子不納父也餘可知若謂如王食諸國邑受能領觸所生受體故名自性受者理亦不然違自所執領俱生觸為自性故又受不應自證受故若謂受雖領觸不捨受之自性名自性受者則應一切法皆是受自性以一切法皆不捨自性故故彼所說但誘嬰兒次破轉計也彼轉計云觸如國邑受如王觸能生受譬如由有國邑方名為王受能領觸譬如王能食諸國邑而又避上應名因受之過故云受能領觸所生受體猶言王能領國所生王體也然既云領觸所生受體則非領俱生觸與前所執相違又觸所生即是受體如何又以受而領之若更轉計不捨自性名自性受則一切法皆悉不捨自性皆可名為受乎故彼下結斥然境界受非共餘相受領順等三相之定屬己者名之為境界受不共餘心心所之行相故由彼妄計境界受為共餘相故別立自性受今先破自性受竟方申明境界受非共餘相也受以領納境界為相識以了別境界為相想以於境取像為相欲以希望境界為相乃至慧以簡擇所觀境界為相故皆不共三釋受竟四釋想想謂於境取像為性施設種種名言為業謂先要安立境之分齊高下美惡等相方能隨起種種名言五釋思思謂令心造作為性於善品等役心為業謂能取境正因等相驅役自心令造善等取正因境相令心造善品取邪因境相令心造不善品取非正非邪境相令心造無記品皆思心所之力也二別釋體用竟三結成相應此五既是遍行所攝故與藏識決定相應其遍行相後當廣釋此觸等五與異熟識行相雖異而所起時同所依根同所緣境等自體事等故名相應後當廣釋指第五卷言也行相異者識以了別為行相觸以觸對為行相作意以警心為行相受以領納為行相想以取像為行相思以造作為行相也宗鏡録云由四等故說名相應謂一事等二處等三時等四所依等等者相似之義體各惟一故名事等境相相似故所緣等三釋相應門竟四釋受俱門二初正明相應捨受二簡非餘所相應今初此識行相極不明了不能分別違順境相微細一類相續而轉是故唯與捨受相應又此識相應之受唯是真異熟以但隨先引業而轉不待現緣唯任善惡業之勢力轉故所以唯是捨受若夫苦樂二受是異熟生屬前六識非真異熟要待現緣方轉故非與此第八識相應又由此識常無轉變有情恆執為自內我若與苦樂二受相應便有轉變寧執為我故此但與捨受相應問曰若爾如何此識亦可是惡業所招異熟果耶答曰既許善業能招捨受則此惡業亦復應然以捨受不違苦樂品故喻如無記之法亦能善惡俱招若苦樂受則必明了今第八識行相極不明了此一義也若是餘受則必取于違順境相今第八識不能分別違順境相此二義也若苦樂受行相必粗今第八識行相微細此三義也若是餘受必有易脫今第八識唯是一類無覆無記此四義也若是餘受必有間斷今第八識相續而轉此五義也具此五義故唯得與捨受相應餘皆可知二簡非餘所相應問曰如何此識非別境等心所相應答曰互相違故謂欲希望所樂事轉此識任業無所希望勝解印持決定事轉此識瞢昧無所印持念唯明記曾習事轉此識昧劣不能明記定能令心專注一境此識任運剎那別緣慧唯簡擇得等事轉此識微昧不能簡擇故此不與別境相應此識唯是異熟性故十一善心所及根隨染汙等心所亦不相應惡作等四雖有通于無記性者然以有間斷故定非與異熟識相應先詳簡非別境次略簡非善染不定並如文可知四釋受俱門竟五釋三性門問曰法有四種謂善不善有覆無記無覆無記阿賴耶識何法攝耶答曰此識唯是無覆無記以是異熟性故異熟若是善染汙者流轉還滅應不得成又此識是善染依故若自體是善染者則便互相違故應不能與善染二法俱作所依又此識是所熏性故若善染者如極香臭應不受熏若使無熏習故則染淨因果俱不成立故此唯是無覆無記覆謂染法障聖道故又能蔽心令不淨故此識非染故名無覆記謂善惡有愛非愛之果及殊勝自體之因可記別故此非善惡故名無記一是異熟性故二是善染依故三是所熏性故所以唯是無覆無記餘皆可知六釋心所例王門二初正釋二斥異今初觸等亦如是者謂如阿賴耶識唯是無覆無記性攝觸作意受想思亦爾諸相應法必同性故又觸等五如阿賴耶亦是異熟所緣行相俱不可知緣種子根身器界三種性境五法相應無覆無記故說觸等亦如是言五法相應謂一心王及餘四心所也餘可知二斥異有義觸等如阿賴耶亦是異熟及一切種廣說乃至無覆無記以頌中亦如是之為言無簡別故彼說非理所以者何觸等依識不自在故如貪信等依於心王不能受熏如何同識能持種子又若觸等亦能受熏應一有情有六種子之體若爾果起從何種生理不應言從六種起未見多種生一芽故若說果生唯從一種則餘五種便為無用亦不可說次第生果以熏習既在同時則勢力亦必等故又不可說六果頓生勿一有情一剎那頃六箇眼識等俱時生故有義下先敘計彼說下次破斥也觸等五心所法斷斷不得名一切種以一切種必由受熏而得名故故立量云觸等五心所是有法不能受熏宗因云依識不自在故喻如貪信等又若下破其轉計觸等亦得受熏設許受熏則一心王五心所各各受諸法熏應成六箇諸法種子而果生時或從六起或從一起或次第起或復頓起皆違理矣救曰誰言觸等亦能受熏持諸種子詰曰不爾如何觸等如識名一切種彼妄解曰謂觸等五各有似種子之相分名一切種以觸等與識所緣必相等故以無色界天之觸等五心所必有所緣似種子之相分故以觸等五心所各各親所緣緣定應有故但此觸等五心所上似種子之相不分為因緣生現識等喻如觸等上所現似眼根等非眼等識所依亦如所變似火無能燒用破曰彼救非理觸等所緣似種等相須待後執受處句中方應與識而相例同故由此頌中前說一切種之為言定目受熏能持種義不指所緣有漏種子不爾則本頌有重言之失此破轉計相分為一切種而妄救也相分有漏種子是第五所緣門攝故觸等可以例王今一切種乃第三因相門豈觸等所可例同若即指一切種為所緣則執受處中復有所緣種子不幾為重言乎又彼所說亦如是言無簡別故咸相例者定不成證勿觸等五亦如識之能了別觸等亦如識之與觸等相應由此故知亦如是者乃隨所應而說非謂一切觸等不以了別為行相觸不與觸相應乃至思不與思相應一剎那中無二觸故乃至無二思故六釋心所例王門竟七釋因果法喻門二初明正義二斥異說初中二初正釋頌文二通妨顯理今初問曰阿賴耶識為斷為常答曰非斷非常以恆轉故恆謂此識無始時來一類相續常無間斷以是三界六趣四生施設之根本故體性堅住持諸種子令不失故轉謂此識無始時來念念生滅前後變異因滅果生非常一故可為前七轉識所熏令成種故恆言遮斷轉表非常猶如暴流因果法爾如暴流水非斷非常相續長時有所漂溺此識亦爾從無始來生滅相續非常非斷漂溺有情令不出離又如暴流雖風等擊起諸波浪而流不斷此識亦爾雖遇衆緣起眼識等而恆相續又如暴流漂水上下魚草等物隨流不捨此識亦爾與內習氣外觸等法恆相隨轉如是法喻意顯此識無始因果非斷常義謂此識性無始時來剎那剎那果生因滅果生故非斷因滅故非常非斷非常是緣起理故說此識恆轉如流因果簡我執生滅簡常執生滅故非常因果故非一譬如暴流前後相續流流之中望前名果望後名因故非斷常可喻此識又有三義相似一者能漂溺故二者轉識間斷此不斷故如波濤有起滅而流不斷三者習氣及心所法恆隨轉故識所執受之內習氣喻如水內之魚識所相應之觸等五法喻如水面之草也餘可知二通妨顯理有兩番問答難曰過去未來既非實有非常可爾非斷如何斷豈得成緣起正理答曰過去未來若是實有可許非斷如何非常常亦不成緣起正理雖然豈但斥他之過己所立義便得成就若不摧破邪宗難以顯明正理前因滅位後果即生如稱兩頭低昂時等如是因果相續如流何假去來實有方成非斷稱之兩頭以喻因果稱之低昂以喻生滅低昂時等以喻生滅同一剎那無有前後也又難因現有位後果尚自未生則因是誰之因果現有時前因既已滅謝則果是誰之果既無因果誰離斷常答曰若謂有因之時即已有後果者果既本來是有何須更待前因因義既無果義寧有無因無果豈離斷常今大乘因果之義所由成立正唯依現在有法作用顯示所以遠離斷當成緣起理故汝之所詰難非有預於我大乘正宗若使果體既是本有則果用亦復應然以所待因緣亦本有故則體用皆本來有何須更待前因既無因義亦無果義由斯汝所執義因果定無應信大乘緣起正理謂此正理即諸法自相深妙離言假智及詮所不能到今之因果等言皆依增益相似而假施設觀現在法有引後用假立當果對說現因觀現在法有酬前相假立曾因對說現果假謂于現在識上似彼當果曾因之相而現如是因果總不離現前一剎那法理趣顯然遠離斷常二邊契會中道諸有智者應順修學秖是現前一剎那法望前即名為果望後即名為因約現在果談過去因則塵點劫前猶若今日乃于現識變似過去因相而非實緣過去事也以過去已滅無可緣故約現在因記未來果則無量劫後猶如指掌乃於現識變似未來果相而非實緣未來事也以未來未生無可緣故故曰十世古今始終不離於當念又宗鏡云過去未來無體剎那熏習唯屬現在現在正起妄念之時妄念違真名為初識非是過去有識創起名為初識也故知橫該一切處豎通無量時皆是即今現在一心更無別理初明正義竟二斥異說二初正斥二結勸初中二初斥餘部二斥經部初又二初敘計二破斥今初有餘部說雖無去來而有因果恆相續義謂現在法極迅速者猶有初後生滅二時生時酬因即名果相滅時引果即名因相時雖有二而體是一前因正滅後果正生體相雖殊而俱是有如是因果非假施設然離斷常又無前來因是誰因果是誰果之難誰有智者捨此信餘二破斥彼有虗言都無實義何容一念而有二時生滅相違寧同現在滅若現在生應未來有故名生既是現在無故名滅寧非過去滅若非無生應非有生既現有滅應現無又二相違如何體一非苦樂等見有是事生滅若一時應無初後之二生滅若是異時寧說其體是同故所執生滅時俱現在有而同依一體者理必不成何容下先破一念二時又二下次破生滅體一也非苦樂等見有是事者生滅二法喻如苦樂二受決定相違安有體是一者量云生與滅是有法體定非一宗因云相違故喻如苦與樂初破餘部竟二破經部經部師等所計因果相續理亦不成彼不許有阿賴耶識能持種故前六轉識展轉相望雖亦得有因果之義而多間斷不能相續若無本識受熏持種則何理能成因果相續之緣起哉初正斥竟二結勸由此應信大乘所說因果相續緣起正理七釋因果法喻門竟八釋伏斷位次門二初正釋捨賴耶義二通明第八異名初中二初正明能捨之位二簡示所捨唯名初又二初明正義二斥異解初又二初正釋二通妨今初此識無始恆轉如流乃至何位當究竟捨阿羅漢位方究竟捨謂諸聖者斷煩惱障究竟盡時皆悉名阿羅漢爾時此識煩惱粗重永遠離故說之為捨此中所說阿羅漢者通攝三乘無學果位皆已永害煩惱賊故是殺賊義應受世間妙供養故是應供義永不復受分段生故是無生義云何知然決擇分說諸阿羅漢獨覺如來皆不成就阿賴耶故集論復說若諸菩薩得菩提時頓斷煩惱及所知障成阿羅漢及如來故粗重即種子之別名阿羅漢是小乘無學果位獨覺是中乘無學果位如來是大乘無學果位次引集論顯如來亦名為阿羅漢以斷煩惱障故成阿羅漢以斷所知障故成如來也二通妨又二初問二答今初若爾菩薩於入地後現行煩惱雖復漸伏煩惱種子未永斷盡非阿羅漢應皆成就阿賴耶識何故即彼決擇分說一切不退菩薩亦不成就阿賴耶識若據前義則菩薩至成佛時方得名阿羅漢方捨此識今云不退菩薩亦不成就故問之也蓋菩薩初地已上即名為不退故二答又二初約二乘回心名不退二約八地已上名不退今初彼說二乘無學果位回心趣向大菩提者縱未登地必不退起煩惱障故趣菩提故即復轉名不退菩薩彼不成就阿賴耶識雖名菩薩即攝在此阿羅漢中故彼論文不違此義不起煩惱故名不退趣大菩提故名菩薩彼論乃指此人為不退菩薩不指直修大乘登初地者故不相違二約八地已上名不退又不動地以上菩薩一切煩惱永不行故法駛流中任運轉故能於諸行之中起諸行故剎那剎那轉增進故此位方名真正不退菩薩然此菩薩雖未斷盡異熟識中煩惱種子而緣此識之我見愛等四種煩惱不復執藏為自內我由斯永捨阿賴耶名故說不成阿賴耶識故此頌中亦說彼不動地以上名阿羅漢此明直修大乘者須至八地以上方得煩惱永伏亦可名阿羅漢也所知法執漂溺有情受不思議變易生死名法駛流已得自在名任運轉心心流入薩婆若海故剎那剎那轉增進也初明正義竟二斥異解二初正破二破救初中二初敘計二破斥今初有義初地以上菩薩已證我法二空所顯真如理故已得根本後得二種殊勝智故已斷分別煩惱所知二重障故能一行中起諸行故雖為利益衆生起諸現行煩惱而彼不作煩惱過失故此亦名不退菩薩然此菩薩雖未斷盡俱生煩惱而緣此識之所有分別我見愛等不復執藏為自內我由斯亦捨阿賴耶名故說不成阿賴耶識此頌之中亦說彼初地以上名阿羅漢故集論中作如是說十地菩薩雖未永斷一切煩惱然此煩惱猶如呪藥所伏諸毒不起一切煩惱過失一切地中如阿羅漢已斷煩惱故亦說彼名阿羅漢二破斥彼說非理以七地已前猶有俱生我見愛等執藏此識為自內我如何已捨阿賴耶名若彼分別我見愛等不復執藏說名為捨則預流等諸有學位亦應已捨阿賴耶名許便違害諸論所說二破救又二初敘救二破斥今初地上菩薩所起煩惱皆由正知不為過失非預流等得有斯事寧可以彼預流果等例此地上菩薩二破斥彼六識中所起煩惱雖由正知不為過失而第七識有漏心位任運現行執藏此識寧不與彼預流等同由此故知彼說非理初正明能捨之位竟二簡示所捨唯名然阿羅漢斷此識中煩惱粗重究竟盡故不復執藏阿賴耶識為自內我由斯永失阿賴耶名說之為捨非捨一切第八識體勿阿羅漢無識持種爾時便入無餘涅槃阿羅漢斷盡煩惱名證有餘涅槃由其異熟識體仍在能持舊有漏種令有根身壽命不斷直俟餘殘果報既盡方入無餘涅槃設無此識持種則身命便應盡滅而入無餘涅槃矣云何現有證阿羅漢仍住世間者耶初正釋捨賴耶義竟二通明第八異名二初正釋諸名二結歸二位今初然第八識雖諸有情皆悉成就而隨義別立種種名謂或名心由種種法熏習種子所積集故或名阿陀那執持種子及諸色根令不壞故或名所知依能與染淨所知諸法為依止故或名種子識能遍任持世出世間諸種子故此等諸名通一切位或名阿賴耶攝藏一切雜染品法令不失故我見愛等執藏以為自內我故此名唯在異生有學非可謂無學位及不退菩薩亦有雜染法執藏義故或名異熟識能引生死善不善業異熟果故此名唯在異生二乘諸菩薩位非可謂如來地猶有異熟無記法故或名無垢識最極清淨諸無漏法所依止故此名唯在如來地有若在菩薩二乘及異生位持有漏種可受熏習未得善淨第八識故如契經說如來無垢識是淨無漏界解脫一切障圓鏡智相應契經如來功德莊嚴經也無垢識標名也淨無漏界示義也解脫一切障明離障解脫至究竟也圓鏡智相應明相應之慧心所名為大圓鏡智也阿賴耶名過失重故最初捨故故此頌中偏先說之若異熟識體菩薩將得菩提時捨聲聞緣覺入無餘依涅槃時亦捨至於無垢識體無有捨時利樂有情無盡時故心等四名通一切位故隨染淨義如應說之衆生分中名染心佛果位中名淨心衆生分中執持有漏種子及有漏色根佛果位中執持無漏種子及無漏色根衆生分中名染所知依佛果位中名淨所知依衆生分中名世間種子識佛果位中名出世種子識故云隨義應說也然此中謂二乘入無餘依涅槃捨者仍帶通教方便說之若據大乘實義出三界外有淨土聲聞緣覺出生其中受法性身則仍未捨異熟識體故法華云是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度更無餘乘二結歸二位然第八識總有二位一有漏位無記性攝唯與觸等五法相應但緣前文所說執受處境二無漏位唯善性攝與二十一心所相應謂遍行別境各五善十一以遍行五心所與一切心恆相應故所以亦與無漏第八相應常樂證知所觀境故得與善欲相應於所觀境恆印持故與善勝解相應於曾受境恆明記故得與善念相應世尊無有不定心故得與善定相應於一切法常決擇故得與善慧相應極淨信等常相應故與十一善心所相應無染汙故不與根隨煩惱相應無散動故不與四不定相應此亦唯與捨受相應任運恆時平等轉故以一切法而為所緣境鏡智遍緣一切法故亦惟捨受謂無漏位中同於有漏之唯捨受也以一切法為所緣境謂不同有漏之唯緣三類性境也初正釋頌文竟二證有本識三初徵答總標二別顯教理三總結勸信今初問曰云何應知此第八識離眼等識有別自體答曰聖教正理為定量故二別顯教理二初引聖教二顯正理初中二初引大乘二引餘部宗鏡云引七本經即大三小四也初又二初正引經證有第八二顯大乘是聖言量今初正引三經四頌謂有大乘阿毗達磨契經中說無始時來界一切法等依由此有諸趣及涅槃證得阿毗達磨此云無比法此即所引第一頌也下文共作三番釋義此第八識自性微細故以作用而顯示之頌中初半顯第八識為因緣用後半顯與流轉還滅作依持用此第一番釋義先分科也界是因義即種子識此種子識無始時來展轉相續能持一切漏無漏色心等諸法種子親生諸法故名為因依是緣義即執持識此執持識無始時來與一切現行漏無漏法平等而為依止故名為緣謂種子識能執持一切諸種子故執持識與現行法為所依故由種子故即變為彼現行由執持故及為彼現行所依變為彼者謂由種子變為器界及有根身為彼依者謂與轉識作所依止以執持識能執受五色根故令眼等五識依之而轉又與末那為依止故第六意識依之而轉以末那及意識皆轉識所攝故如眼等識必須依俱有根第八理應是識性故亦以第七為俱有依是謂此識為因緣用此釋初半頌義也由此有者謂由有此第八識也有諸趣者謂有善惡等六趣也謂由有此第八識故執持一切順流轉法令諸有情流轉生死雖惑業生皆是流轉而趣是果勝故偏說又或諸趣之言通指能趣所趣以諸趣之資具亦得趣名諸惑業生皆依此識是與流轉作依持用此釋後半頌之第三句也一切順流轉法即惑業生等有漏種子惑謂見思二惑業謂善惡不動三業生謂胎卵濕化四生所趣即六道果報能趣即惑業亦名諸趣資具及涅槃證得者由有此識故有涅槃證得謂由有此第八識故執持一切順還滅法令修行者證得涅槃此中但說能證得道以涅槃不依此識有故或此但說所證涅槃是修行者正所求故或此雙說涅槃與道俱定還滅品類攝故謂頌中涅槃之言顯所證滅頌後證得之言顯能得道由能斷之道斷彼所斷之惑至于究竟盡位證得涅槃能所斷證皆依此識是與還滅作依持用此釋後半頌之第四句也一切順還滅法即本有新熏二種無漏種子還者歸趣之義即能證之道滅者寂止之義即所證涅槃又能還能滅皆是道諦所還所滅皆是滅諦涅槃也第一番釋頌義竟又此頌中初句顯示此第八識自性無始恆有後三句顯與雜染清淨二法總別為所依止雜染法者謂苦集諦即所趣能趣之生及惑業清淨法者謂滅道諦即所證能證之涅槃及道彼二皆依此識而有依轉識等理不成故此第二番釋頌義也第二一切法等依句是總顯染淨依止第三由此有諸趣句是別顯染依止第四及涅槃證得句是別顯淨依止所趣之生是苦諦能趣之惑業是集諦所證之涅槃是滅諦能證之道是道諦轉識不能受熏持種故非染淨二法所依或復初句顯此第八識體無始相續後三句顯與三種自性為所依止謂依他起遍計所執圓成實性如次應知此第三番釋頌義也一切法等依句顯依他性不離此識由此有諸趣句顯遍計所執性不離此識及涅槃證得句顯圓成實性不離此識今此頌中諸所說義離第八識皆不得有總結上來三番釋義皆須約第八識也第一頌竟即彼經中復作是說由攝藏諸法一切種子識故名阿賴耶勝者我開示此即所引第二頌也下文解釋由此本識具諸種子故能攝藏諸雜染法依斯建立阿賴耶名非如數論勝性轉為大等今種子與果體非一故能依所依俱生滅故此先釋種子識攝藏諸法不同數論冥初自性義也冥性亦名勝性彼計因果雖殊而體是一今明種子與果體非一故一不同也彼計果雖生滅而因是常今明能依所依俱生滅故二不同也與雜染法互相攝藏亦為有情執藏為我故說此識名阿賴耶此正釋第三故名阿賴耶句義也第八攝藏雜染種子以起現行即能藏義雜染現行熏成第八識中種子即所藏義有情執藏為自內我即執藏義具此三義故名藏識已入見道諸菩薩衆得真現觀名為勝者彼能證解阿賴耶識故我世尊正為開示或復通諸地前菩薩皆名勝者雖見道前未能證解阿賴耶識而能信解唯識道理求彼轉依之果故亦為說非諸轉識有如是義此釋第四勝者我開示句兼結成也第二頌竟解深密經亦作是說阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我此即所引第三頌也下文解釋以能執持諸法種子及能執受五淨色根與根依處亦能執取結縛受生諸趣相續故說此識名阿陀那無性有情不能窮底故說甚深趣寂種性不能通達故名甚細是一切法真實種子緣擊便生轉識波浪而此種子識性念念生滅恆無間斷猶如暴流凡即無性愚即趣寂恐彼於此甚深細理不能證解更起分別妄執為我墮諸惡趣障生聖道故我世尊不為開演唯第八識有如是相無性有情謂一闡提為此第八識之所漂蕩令不出離故云不能窮底趣寂種性謂定性二乘為此第八識之所淪溺而不覺知故云不能通達以其親生現行故名真實種子闡提不起妄執猶得暫遊人天若起分別必墮惡趣二乘不起妄執猶得證出世果若起分別必障聖道故佛不為此等凡愚說第八識也第三頌竟入楞伽經亦作是說如海遇風濤起種種波浪現前作用轉無有間斷時藏識海亦然境等風所擊恆起諸識浪現前作用轉此即所引第四頌也前四句單約喻說後四句法喻合明並可知下文結示眼等諸識無如大海恆相續轉起諸識浪之義故知別有第八識性已上正引三經四頌竟已下結略指廣此等無量大乘經中皆別說有此第八識初正引經證有第八竟二顯大乘是聖言量諸大乘經皆順無我違數取趣棄背流轉趣向還滅讚佛法僧毀諸外道表蘊等法遮勝性等故一切樂大乘者皆許此等大乘諸經實能顯示無顛倒理以是契經攝故喻如增一阿含等同為至教量攝此因小乘不信有第八識遂乃誹撥上所引證三經四頌妄謂非佛所說至教故今立量以顯是至教也量云諸大乘經是有法能顯示無顛倒理至教量所攝宗因云皆順無我違數取趣乃至遮勝性等契經攝故喻如增一阿含等又聖慈氏以七種因證大乘經真是佛說一先不記故若使諸大乘經或是佛滅度後有餘惡人為壞正法故假造說何故世尊于經律中非亦如彼當起諸可怖事而先預記別之二本俱行故自佛滅後大小乘教本來俱行寧知大乘獨非佛說三非餘境故大乘所說廣大甚深非外道等思量境界彼外道經論中曾所未說設為彼外道說此大乘法亦不信受故大乘經非是非佛所說四應極成故若謂大乘是或過去或他方餘佛所說非今釋迦佛語則佛佛道同正顯大乘教是佛所說其理極成五有無有故若汝許有大乘法者即應信此諸大乘教是佛所說離此諸經之外大乘妙法更不可得故若汝謂無大乘法則聲聞乘教亦應非有以離大乘決定無有得成佛義誰出於世說聲聞乘故聲聞乘法汝既許是佛之所說而獨非毀大乘教典不肯信受不應正理六能對治故依大乘經勤修行者皆能引得無分別智能正對治一切煩惱故應信此是佛所說七義異文故大乘所說意趣甚深不可隨文而取其義便生誹謗謂非佛語是故大乘真是佛說如莊嚴論頌此義言先不記俱行非餘所行境極成有無有對治異文故初引大乘竟二引餘部凡有四經餘部經中亦密意說阿賴耶識有別自性密意說者恐彼愚法聲聞妄起分別執之為我故未敢顯了開示也謂大衆部阿笈摩中密意說此第八識名根本識是眼等識所依止故譬如樹根是莖等本非眼識等有如是義此即所引第一經也阿笈摩此云契經上座部經及彼分別論者俱密意說此第八識名有分識有謂三有分是因義唯此第八識是恆是遍得為三有之因此即所引第二經也化地部中亦密說此第八識名為窮生死蘊離第八識無別蘊法能窮生死邊際而恆無間斷時謂無色界則諸色間斷無想天等則餘心等滅若夫不相應行則離色心等無別自體前文破法執中已極成故唯此第八識可名窮生死蘊此即所引第三經也蘊謂五蘊於五蘊中色受想行及前六識俱不能窮生死邊際或有間斷故或無別體故說一切有部增一經中亦密意說此第八識名阿賴耶謂愛阿賴耶樂阿賴耶欣阿賴耶喜阿賴耶謂阿賴耶識是貪總別三世境故立此四名有情執為真自內我乃至此執未斷之時恆生愛著故阿賴耶識是真愛著處不應執餘五取蘊等為真愛著處也謂生一向苦受處者於餘取蘊不生愛著彼恆厭逆餘五取蘊念我何時當捨此命此衆同分此苦身心令我自在受快樂故五欲亦非真愛著處謂離欲者於五妙欲雖不貪著而愛我故樂受亦非真愛著處謂離第三靜慮染者雖厭樂受而愛我故身見亦非真愛著處謂非無學而信無我理者雖於身見不生貪著而於內我猶生愛故轉識等亦非真愛著處謂非無學而求滅心者雖厭轉識等而愛我故色身亦非真愛著處離色染者雖厭色身而愛我故不相應行離色心等無別自體是故亦非真愛著處可見一切異生及諸有學起我愛時雖於餘蘊有愛非愛而於此第八識我愛定生故唯此第八識是真愛著處由是知彼增一經中所說阿賴耶名定唯顯此第八阿賴耶識此即所引第四經也愛字總約三世樂字別約現在欣字別約過去喜字別約未來故云是貪總別三世境也一向苦受處謂無間獄及一分畜生餓鬼餘取蘊謂除第八識外所有五蘊諸法離欲者謂初禪以上離第三靜慮染者謂第四禪以上身見謂依身執我之見求滅心者謂修第九滅盡定人離色染者謂空無邊定以上餘可知初引聖教竟二顯正理三初結前生後二引經顯理三結略指廣今初已引聖教當顯正理二引經顯理十初持種心二異熟心三界趣生體四有執受五壽暖識六生死時心七緣起依八識食體九滅定有識十染淨心初中三初引經證釋二斥異解三總結成今初謂契經說雜染清淨諸法種子之所集聚生起故名為心若無此第八識則彼經所說持種心不應有故謂諸轉識在滅定等五無心位有間斷故即在有心位而根境作意等緣善等三性類別亦復易脫起故猶如電光等其性不堅住故既不堅住所以非可熏習既有間斷所以不能持種故諸轉識非染淨種所集起心唯此第八識者一類無記恆無間斷如苣藤等堅住可熏乃正契當彼經所說持種心義若不許有能持種心非但違經亦違正理謂諸所起染淨品法雖是能熏若無第八識為所熏故便不得熏成種子則應所起染淨等法皆無後果唐捐其功又染淨起時既無因種應同外道執自然生色法及不相應行非心性故如聲光等性不堅住理非染淨內法所熏豈能持種又彼色行二法唯識所變離識無實自性寧可執為內種依止轉識相應諸心所法如彼轉識之有間斷易脫起故且既名為心所則依心王不自在故非心性故故決不能持種亦不受熏故第八持種之心理應別有此持種心是約因相而言之也文皆易知二斥異解五初破識類受熏持種二破六識俱轉受熏持種三破色心自類為種四破過未實有五破執遣相空初中二初敘執二斥破今初有說六識無始時來依根境等前後分位故有三性種種差別然事雖轉變而其類無別即此六識之類是所熏習能持種子由斯染淨因果皆成何要執有第八識性二斥破彼言無義所以者何若執識類是實則同勝論外道若許識類是假便無勝用應不能持內法實種此先約假實破也如眼識與眼識為類耳識與耳識為類等若執是實則同勝論執同異句為實矣若許是假豈能受熏持種哉又汝所執識類為復何性所攝若識類是善是惡應不受熏許有記故猶如擇滅無為若識類是無記性則正起善惡心時必無有無記之心此類應斷如何受熏非可謂事有善惡而類可惟無記以別類必同別事性故此次約三性破也類若善惡是有法應不受熏宗因云許有記故喻如擇滅類若無記是有法應有間斷不受熏宗因云善惡心時無無記故如苦樂受時無捨受又事既善惡不應說類惟無記此遮其轉計也又無心位中既無六識則此識類定亦是無既有間斷性非堅住如何可執為能持種能受熏耶又阿羅漢或異生心設使其六識類同是無記性故羅漢應為諸染法熏異生應為無漏法熏許便有失此更約六識類有間斷破又約凡聖受熏破也又眼等根或所餘法與眼等識其根之類法之類與識之類皆悉同是無記應各互得相熏然汝不許根類法類受熏故不應執識類受熏此更約根類法類例破也若謂識類受熏則根類法類何獨不許受熏若既不許根類法類受熏則識類何得獨受熏哉又六識身若事若類前後二念既不俱有如隔念者非互相熏以能熏所熏必要俱在時故此更約前後不能熏習破也蓋若但一念不名為類又無同時並起二念之理必須前後相望方名為類且如當念眼識或望前念眼識或望後念眼識故名為類若望當念耳鼻識等則不名類其餘五識一一皆然是則識類既在前後二時則非一處喻如自他相隔如何可互熏哉初破識類受熏持種竟二破六識俱轉受熏持種執唯六識俱時轉者由前理趣既非所熏故彼亦無能持種義有說六識俱時而轉前五是能熏第六是所熏由同時故熏習義成能持種子今破云由前理趣者謂第六識有間斷故通三性故三破色心自類為種二初敘執二斥破今初有執色心自類無間前為後種因果義立故先所說集起名心為染淨種指第八識為證不成謂前剎那色能為種子引生無間後剎那色前色名因後色名果心等亦然故不須第八持種識也二斥破彼執非理無熏習故謂彼自類一前一後既無熏習如何可執前為後種又彼自類有間斷者應不更生二乘證無學時既斷色心種子應無有餘後蘊以彼但執死位色心為後世種不許有持種之本識故亦不應執色心展轉互為種生轉識及色法等非所熏習前已說故先約無熏習不能成種破可知次約有間斷破言有間斷應不更生者彼既妄執色心前為後種則如生無色天者于多劫中前色已斷不應還生色界又如生無想天者于多劫中前心已斷不應還生想心又二乘證無學時了知五蘊無我則色心種子已斷設無第八異熟識體持彼舊時色心殘種則應便無果後餘殘五蘊何故現見證阿羅漢而未入無餘涅槃者尚有果縛未盡亡耶亦不應下恐彼轉計無色還生下界則以心為色種無想還生想心則以色為心種故云轉識色等非所熏習前已說故既非所熏豈能為種也哉三破色心自類為種竟四破過未實有二初敘執二斥破今初有說三世諸法皆有因果感赴無不皆成何勞執有能持種之第八識然經說心為種子者能起染淨現法心之勢用強故謂過去為因現在為果現在為因未來為果故因果感赴無不皆成也然經下通妨謂既三世諸法各自為種何故經中獨說心為種子耶答曰心勢用強故偏說之二斥破彼說非理過去未來非常非現如空華等非實有故又無作用不可執為因緣性故若無能持染淨種之第八識則一切因果皆不得成過去未來是有法非實有宗因云非常非現故喻如空華等又過未是有法不可執為因緣性宗因云無作用故喻如空華等餘可知四破過未實有竟五破執遣相空有執大乘遣相空理為究竟者不能如理正解但依于相似比量撥無此第八識及撥無一切法彼特違害前所引經遂于起智斷惑證滅修道及染淨因果一切諸法皆執非實則便成大邪見即彼外道毀謗染淨因果亦不謂全無但執非實故若一切法果然皆非實有則諸菩薩不應為捨不實之生死精勤修集不實之菩提資糧誰有智者為除幻敵而求石女兒用為軍旅耶外道亦不謂全無但執非實者謂染因未必招惡果淨因未必感善果耳今此一類大乘既執智斷證修染淨因果悉皆非實則與外道邪見何異良由依文解義不達如來語脉其禍至此可不懼哉幻敵喻不實生死石女兒軍旅喻不實菩提資糧也問曰般若云諸法皆如幻如化乃至涅槃亦如幻如化得不墮邪見耶答曰毫𨤲有差天地懸隔般若深明一切法空悉皆無性由無性故得成緣起於緣起中智斷證修染淨因果纖毫不濫雖復不濫一一無性故非實我實法也今既撥無俗諦又豈得成真諦哉旦此論前文有云諸心心所依他起故亦如幻事非真實有為遣妄執心心所外實有境故說唯有識若執唯識真實有者如執外境亦是法執又後文云如前所說識差別相依理世俗非真勝義真勝義中心言絶故則與般若有何差別當知執為實有成增益謗執為非實成損減謗謗雖是同善惡仍異起有見者不撥因果猶在人天但不能出二種生死起空見者撥無因果墮大險難決定永沉三惡道苦故曰得則龍女頓成佛失則善星生陷墜鼠即鳥空名為謗真般若故似比量名為毒智也然宗鏡云清辨為成有故破于有護法為成空故破于空菩薩造論如用藥本為除病而衆生執藥成病菩薩亦奈之何故此空有二門不執則分而愈合合則雙美苟執則會而愈離離則兩傷學者不可不慎思而明辨也二斥異解竟三總結成故應信有能持種心依之建立染淨因果彼心即是此第八識初持種心竟二異熟心是約果相而言之也又契經說有異熟心是善惡業所感之果若無此第八識後經所謂異熟心不應有故謂眼等識有間斷故非一切時是業果故如電光等非異熟心此先立二量以顯轉識非異熟心也一云眼等識是有法非異熟心宗因云有間斷故喻如電光等二云眼等識是有法非異熟心宗因云非一切時是業果故喻如電光等蓋一分無記眼等識是滿業所感之果名異熟生若起善惡之眼等識即非業果故也異熟不應斷已更續彼命根等無斯事故此重釋有間斷故之因所以不得為異熟也謂若計轉識為異熟者既是異熟則不應斷已更續彼壽與暖從來無斷已更續之事故命根即壽等即等取于暖蓋暖是識之相分命根依識假立同是異熟所攝異熟壽暖尚不可斷已更續異熟心體豈可斷已更續耶轉識定非彼經所說異熟心也明矣眼等六識之中雖有一分無記報法是善惡滿業之所感者然而猶如聲等非恆續故但是從異熟生非真異熟此重釋非一切時是業果故之因所以不名真異熟也謂有問曰善惡六識非異熟心可矣業所感之無記六識何不得為異熟心耶今立量云業所感無記六識是有法非真異熟宗因云非恆續故喻如聲等言是異熟生者依真異熟總報藏識得有滿業所感別報皆名為異熟無記也定應許有真異熟心是酬彼牽引業因之果遍而無斷能變為根身器界作有情依以身器離此真異熟心理非有故不相應法無實體故諸轉識等非恆有故若無此第八真異熟心誰變身器復依何法恆立有情此承上二量極成轉識非異熟心而申明真異熟心必指第八識也不相應法本無實體故不應說命根為異熟心餘可知又在定中或不在定不在定則有別思慮在定中則無思慮時理有衆多身受生起此等身受生起若是無者不應後時因無思慮則身有怡適或復因別思慮則身有勞損若不恆有真異熟心執受此身則彼後時之位如何有此或怡適或勞損之身受故知除非是佛則已若非佛之九界起餘善心等位必應與彼善惡同時現起真異熟心問曰佛何獨無異熟心耶答曰如許起彼異熟心時即非是佛但是九界有情故由是九界有情恆有真異熟心彼心即是此第八識此又約先時心行差別能令後時身受不同以驗真異熟心之功能也且如有人入定無別思慮則其身怡適然正入定時已忘其身并不知身之怡適若無真異熟心與彼定心同時現起執受此身則於出定之後定法已謝身不應仍有怡適由有真異熟心與定同轉受定所熏故使出定之後身仍怡適耳又如有人不定多別思慮則其身勞損然正思慮時亦忘其身并不知身之勞損若無真異熟心與彼思慮同時現起執受此身則於思慮歇後既不思慮身不應仍有勞損由有真異熟心與彼思慮同轉受彼思慮所熏故使思慮歇後身尚勞損耳餘皆可知二異熟心竟三界趣生體謂三界五趣四生之體也前明因果相酬此言趣生之體以有因果必有體故又契經說有情流轉五趣四生若無此第八識彼五趣四生之體不應有故謂要須實有恆遍無雜彼具四義之法方可立為正實五趣四生之體五趣謂天人獄鬼畜不言阿修羅者或是四趣所攝或攝入鬼神趣中四生謂胎卵濕化諸天化生人具四生多分從胎地獄唯化鬼畜各具四生也實有者不是假立簡不相應行恆者無間而轉簡異熟生無記遍者遍於三界簡色及前五識無雜者惟無記性簡善惡六識非異熟法趣生雜亂住此起餘趣生法故此先簡善惡六識非趣生體也正在人趣或起天趣善法或起三種惡法在餘趣中亦復如是若立為趣生體豈不雜亂諸異熟色及五識中一分業所感者雖不雜亂不遍趣生以無色界中全無彼二種故諸生得善及意識中一分業所感者雖遍趣生起無雜亂而不恆有不相應行無實自體已上皆不可立為正實趣生之體此簡餘無記法及不相應行非趣生體也諸異熟色謂五根及香味觸三塵并色塵中一分五識業所感者是異熟生無記鼻舌二識唯局欲界眼耳身識局至初禪異熟色法局在欲色二界故皆不遍生得善即報得善意識業所感者亦異熟生無記餘可知唯第八真異熟心及彼相應五箇心所實恆遍無雜是正實趣生此真異熟心若無則生無色界中既無色及五識惟第六識或時起善等位已無執藏應非趣生所攝設許趣生攝諸有漏故無色界是趣生者然諸那含聖人生無色界起無漏心應非趣生所攝便違正理以那含雖在無色理應仍是天趣化生攝故必欲勿有前文善等應非趣生之過及勿有此那含應非趣生之失故唯應立真異熟法是正實趣生之體由是惟有如來乃非五趣四生所攝以佛更無異熟無記法故亦非三界所攝以非有三漏故世尊已捨苦集諦故諸戲論種已永斷故正實趣生既唯異熟心及心所彼心心所離第八識理不得成故知別有此第八識此正明趣生之體唯是第八識也苦諦是三界果集諦是三界因戲論種者種即因義因即界義餘可知三界趣生體竟四有執受謂趣生無雜由有執受執受即體家之用也又契經說有色根身是有執受若無此第八識彼經所說能執受者不應有故謂五色根及彼依處過去已滅未來未生唯現在世是有執受彼定由有能執受之心以執受之然唯此第八真異熟心是先業所引不由現緣非善染等一類無記能遍依止諸根相續執受有色根身眼等轉識無如是義此正明異熟識能執受根身也文並易知此言意顯眼等轉識皆無一類能遍相續執受自內有色根身非顯能執受唯異熟心勿諸佛色身無執受故然能執受有漏色身唯異熟心故作是說此釋伏難也難曰若唯異熟識能執受根身則佛無異熟識色身便無執受耶故今釋曰此惟異熟能執受之言但顯眼等轉識不能執受耳非顯能執受唯異熟心也以無垢淨識亦能執受無漏色身故然有漏色身則唯異熟能執受矣謂諸轉識現緣起故如聲風等彼善染等非業引故如非擇滅異熟生者非真異熟故非遍依故不相續故如電光等不能執受有漏色身此中凡立三量一云諸轉識是有法不能執受有漏色身宗因云現緣起故喻如聲風等二云彼善染等是有法不能執受有漏色身宗因云非業引故喻如非擇滅三云異熟生者是有法不能執受有漏色身宗因云非真異熟故又非遍依故又不相續故喻如電光等諸心識言亦攝心所定相應故如唯識言亦攝心所此明轉識既不能執受則彼相應心所亦決不能執受也非諸色根不相應行可能執受有色根身無所緣故如虗空等量云色根及不相應行是有法不能執受有色根身宗因云無所緣故喻如虗空等故應別有能執受心彼心即是此第八識上既立量遮餘心心所法色不相應不能執受今結成唯第八識能執受也四有執受竟五壽暖識此識既持根身亦持壽暖也又契經說壽暖識三更互依持得相續住若無此第八識則彼經所說能持壽暖令久住之識不應有故謂諸轉識有間有轉如聲風等無恆持用不可立為持壽暖識唯異熟識無間無轉猶如壽暖有恆持用故可立為持壽暖識經說三法更互依持而壽與暖一類相續若使唯識不然豈符正理此正明能持壽暖必第八識非餘轉識也難曰雖說三法更互依持而許唯暖不遍三界何不許識獨有間轉此以暖可不遍例明識可間轉意謂持壽暖者不須第八識也言暖不遍三界者無色界無暖故答曰此於前理非為過難謂若是處具有三法無間轉者可恆相持不爾便無恆相持用前正以此理顯三法中所說識之為言定非詮於轉識今即舉暖不遍豈壞前理以捨暖時壽識不捨若捨壽識必兼捨暖故前所說其理極成又三法中壽暖二種既唯有漏故知彼持壽暖之識如壽與暖定非無漏若不以異熟為持壽暖之識而但指六識者則阿那含生無色界起無漏心爾時何識能持彼壽不應無漏識持有漏壽也由此故知有異熟識一類恆遍能持壽暖彼識即是此第八識釋前所難如文可知五壽暖識竟六生死時心既明現持根身壽暖之能次明去後來先之主文分為四初引經證釋二斥異解三通餘部四別明將死時心今初又契經說諸有情類于受生及命終時必住散心有心非無心亦非定心若無此第八識則彼經說生死時之散心不應有故謂生死時身心昧如睡無夢極悶絶時明了轉識必不現起又此生死位中六種轉識行相所緣不可知故如無心位必不現行六種轉識行相所緣有必可知倘許生死時有六識便如餘時非生死時故唯此真異熟識極微細故行相所緣俱不可了是引業所招之果從生至死一期相續恆無轉變即此是散有心非無心定名為生死時心不違正理第一量云生死時是有法明了轉識必不現起宗因云身心惛昧故喻如睡無夢極悶絶時第二量云生死位中六轉識是有法必不現行宗因云行相所緣不可知故喻如無心位第三量云六種轉識是有法非生死時心宗因云行相所緣有必可知故喻如餘時唯有真異熟心微細不可了知而是散有乃可名為生死時心也二斥異解又二初敘執二斥破今初有說前之五識此受生位固是定無即彼意識取境乃或因于五識或因他人言教或以定力為因然後生起今受生位如此諸因既不可得故受生位連此意識亦無直名為無心位非是住散有心此不以第八識中種子為意識因而別以五識等三為因也受生位并無意識原同正說而妄謂意識之無由於諸因之不可得則無色天既無諸因豈意識永不生乎二斥破若爾則諸有情生無色界後時與無色定相應之意識應永不生以定心必由散意識為加行方得引起汝謂散意必由五識或由他教方得引起今五識他教彼無色界中必無則引定之散心無由起故既無散心亦無定心既無或定為因何有六識凡生天者不論欲色無色初生之一剎那決無意識既生之後必先起散意識一知所生處二知所來處三知受生因然後隨其所生或受諸樂或入諸定乃至生於無想天者亦必半劫之後方得想全不行故云定心必由散意識引也餘可知若謂彼無色界之定由串習力後時率爾能現在前則彼初生時寧不現起而必待後時耶又欲界色界初受生時串習意識亦應現起而胡以亦不即現前耶若由昧所以初生未即現前此即前文所說身心惛昧轉識不現之因即此惛昧便是散有之心至于由慣習力後時能現乃從本識中之種子而現何勞別說三因三因即彼所計一五識二他教三定也二斥異解竟三通餘部有餘部執生死等位別有一類微細意識行相所緣俱不可了應知即是此第八識極成意識不如是之一類微細不可了故四別明將死時心又將死時由善惡業下上身分冷觸漸起若無此第八識彼冷觸漸起之事不成以前七轉識不能執受身故謂眼等五識各別依於眼等五根故又或時緣闕不現行故第六意識不依住于色身故所緣之境不定故遍寄身中諸根隨逐諸塵無有暫捨恆相續故不應冷觸由彼第六意識漸生唯異熟心由先業力恆遍相續執受身分捨執受處冷觸便生以壽暖識三不相離故冷觸起處便同外器一般即是非情所攝雖亦此識所變亦仍緣之為境而不執受但與器界相同故知定有此第八識由善業力識神飛舉生諸人天故冷觸漸從下起由惡業力識神沉墜生諸惡道故冷觸漸從上起餘可知六生死時心竟七緣起依既約生時死時更約中有入胎時相也又契經說識緣名色名色緣識如是二法展轉相依譬如蘆束俱時而轉若無此第八識則彼經所說緣名色之識自體不應有故謂彼經中自作是釋名謂非色之受想行識四蘊色謂羯羅藍等此二與識相依而住識為一名色共為一如二蘆束更互為緣恆時俱轉不相捨離眼等轉識攝在名中此第八識若無說誰為識亦不可說名中之識蘊謂但是五識身而以緣名色之識謂是第六以羯羅藍時無五識故又諸轉識有間轉故無力恆時執持名色寧說恆與名色為緣故彼經中識之為言正唯顯第八識羯羅藍此云雜穢亦云薄酪即初受生位攬父母精血以為體也等者等餘四位二七日名頞部曇此云胞三七日名閉尸此云軟肉四七日名健南此云堅肉五七日名鉢羅奢位此云肢節齊此是名色位攝第六七後漸成六根即六入位攝矣餘可知
