body:
  text: 蕅益沙門智旭述二轉釋無性即識性二初設難舉頌二以論釋成今初若有三性如何世尊説一切法皆無自性頌曰即依此三性立彼三無性故佛密意説一切法無性初即相無性次無自然性後由遠離前所執我法性此諸法勝義亦即是真如常如其性故即唯識實性二以論釋成二初正釋頌文二結示勸信初中二初釋三無性二釋識實性初釋三無性即前兩頌論曰即依此前所説三性立彼後説三種無性謂即是一相無性二生無性三勝義無性故佛密意説一切法皆無自性者非謂性全無也頌中説密意之言顯非究竟了義謂後依圓二性雖體非無而有愚夫於彼增益妄執實有我法自性此托依圓所起我法二執即名為遍計所執為除此執故佛世尊於依圓之有及遍計之無總説無性不過為遣執耳問曰云何依此三性而立彼三無性答曰謂依此初遍計所執立相無性由此遍計所執體相畢竟非有如空華故依次依他立生無性此依他起但如幻事託衆緣生無如妄執自然性故所以假説無性非依他起體性全無依後圓成實立勝義無性謂即勝義由遠離前遍計所執我法性故假説無性非謂勝義體性全無如虗太空雖遍衆色而是衆色無性所顯雖依他起性但是世俗非勝義故亦得説為勝義無性而恐第三濫同第二故此不説如太虗空喻勝義也衆色喻依他也有衆色處未嘗無空可喻真如遍一切法無所不在衆色無處太虗乃顯可喻真如遠離遍計所執我法然勝義無性之名亦可以名第二依他起性以依他起但世俗有非勝義故然若説此義則恐第三反濫第二是故第二但名為生無性第三乃名勝義無性顯此圓成實性但是遠離遍計所執我法二性假説勝義無性其實真如遍在依他起處而依他無性性即真如譬如衆色無性性即太空非色滅空空非色外故般若心經云色不異空空不異色乃圓成與依他非異非不異之義只為衆生一向執異故但言不異以遮情計亦非更執定不異也此借虗空以喻勝義借衆色以喻依他故作此説若約法直説者則對色顯空對空顯色色空皆屬依他起攝色空無性妄則俱妄真則俱真是則非色非空而空而色名圓成實亦名勝義無性故云色不異空空不異色色即是空空即是色又云性色真空性空真色等也學者須以大乘止觀三性三無性義參之必有恍然得悟者矣二釋識實性即後一頌此性即是諸法勝義是一切法勝義諦故然勝義諦略有四種一世間勝義謂蘊處界等不同外道所執我法二道理勝義謂苦等四諦世出世因果真實不虗謬三證得勝義謂二空真如約能證之智言四勝義勝義謂一真法界約所證之理言此頌中所言勝義乃依最後勝義勝義而説以是最勝道品所行證之義故為簡前三勝義故作是説此諸法勝義亦即是真如真謂真實顯非虗妄如謂如常表無變易謂此真實於一切位常如其性故曰真如即是湛然不虗妄義頌中亦之一言顯此勝義復有多名謂名法界及實際等如餘論中隨義廣釋一切位者聖凡因果世出世間諸分位也由真如不變隨緣故云於一切位由真如隨緣不變故一切位常如其性湛然即如字之義不虗妄即真字之義所謂在凡不減在聖不增處生死而不染證涅槃而非淨如水與冰同一濕性豈凝然死定之謂哉此性即是唯識實性謂唯識性略有二種一者虗妄謂依他起上遍計所執二者真實謂依他所顯圓成實性為簡虗妄説實性言復有二性一者世俗謂依他起二者勝義謂圓成實為簡世俗故説實性初一番即約依他辨二性如繩上無蛇但有麻也次一番即約真俗辨二性如氷水雖殊濕性無異也故佛性論云二性不可滅一性可得滅何以故分別性本來是無故不可滅真實性本來是真故不可滅依他性雖有不真實是故可滅即是此中遣相證性之義初正釋頌文竟二結示勸信三頌總顯諸契經中説無性言非極了義諸有智者不應依之而總撥諸法都無自性也已上大科第二廣明識相顯前頌意竟三明修行位次二初略標五位二廣釋頌文初中二初問二答今初如是前來所成唯識相性誰等之人於幾位次如何悟入謂前有二十四頌成立唯識之相第二十五一頌成立唯識之性相成則遣虗存實捨濫留純攝末歸本隱劣顯勝之義俱立性成則遣相證性之義亦立此領前也一問誰人悟入二問有幾位次三問如何悟入此啓後也二答謂具大乘二種性者略於五位漸次悟入此標答也大乘二種性者答上誰人之問略於五位答上幾位之問漸次悟入答上如何悟入之問何謂大乘二種種性一者本性中法爾成就住此菩薩種子性類差別不由今有謂無始來依附本識法爾所得無漏法因二者熏習所成種性謂聞法界等流法已聞所成等熏習所成要具大乘此二種性方能漸次悟入唯識此下皆釋答也法界等流法謂如來證法界已從後得智流出語言文字能詮法界妙理之法也聞而思思而修熏成種子名為習所成性若但有本性大乘種子而無熏習所成大乘種子則不能令其展轉增盛以至成熟若元無本性大乘種子縱令熏習亦不成種現見有人未聞教時渾若不知既聞教已便速開悟者是有本性種子亦有熏習種子故也復見有人未聞教時茫然不知既聞教已雖不頓悟深生渴仰者但有本性種子未有熏習種子故也復見有人未聞教時茫然不知既聞教已與不聞同絶不餐採都無信樂者原無熏習種子又無本性種子故也然依瑜伽師地論等則一切衆生定有五性差別若依法王經如來藏經等則一切衆生定無五性差別當知皆是悉檀益物隨機異説若依圓覺了義楞伽心宗則五性差別歷然不亂而仍一一無性若遇如來根無大小皆得成佛今謂五性若是定無則如來不應為實施權説三乘教五性若是定別則如來不應開權顯實説唯一乘若於法華三草二木一地一雨之喻深思細繹則經論異説互相影略妙旨冷然蓋蠢動含靈皆有佛性凡有心者皆得作佛此唯識性也五性差別種現不同此唯識相也相之與性不一不異是故以相局性則性隨相局以性融相則相隨性融性隨相局不可即與之言其融所以如來有隨情巧説亦名隨他意語亦名為權相隨性融不可終使之執其局所以如來有隨智妙説亦名隨自意語亦名為實儒云中人以上可以語上中人以下不可語上應病與藥權實並設病去藥忘權實俱泯此可意知不可言盡今成唯識教以別接通以通含別亦兼含圓唯其帶通方便故須立五性差別唯其正詮別理故云斷十重障證十真如唯其兼含圓理故云真如與一切法非異非不異又云若執唯識真實有者亦是法執又云俗故相有別真故相無別乃至舉一煩惱心所亦能遍緣有漏無漏事境名境等也何謂悟入唯識之五位一資糧位謂修大乘順解脫分二加行位謂修大乘順決擇分三通達位謂諸菩薩所住見道四修習位謂諸菩薩所住修道五究竟位謂住無上正等菩提三乘皆有五位而二乘但悟我空不達法空故唯大乘五位乃能悟入唯識相性也資糧順解脫等下文自釋云何漸次悟入唯識謂諸菩薩於識相性資糧位中能深信解在加行位能漸伏除所取能取引發真見在通達位如實通達修習位中如所見理數數修習伏斷餘障至究竟位出障圓明能盡未來化有情類復令悟入唯識相性由聞唯識相性而生信解乃發無上大菩提心發此大心即名菩薩從此熾然修集菩提資糧資糧漸積信解益深即是觀行相似二位也以定慧力加行決擇伏除二取而引真見即相似後心也信解之時先信解相隨信解性通達位中先通達性隨通達相既通達已即以所見真俗妙理數數修習淨除習氣皆即分證位也習氣盡時出障圓明即究竟位也約性則始終平等約修則五位不同然此五位義兼通別亦復含圓若三藏菩薩因位無斷惑義非此所攝若乾慧名資糧性地名加行見地名通達薄地已上名修習佛地名究竟者通教位也若十信十住十行十向名資糧十向後心名加行初歡喜地名通達十地等覺名修習妙覺名究竟者別教位也若五品十信名資糧十信後心名加行初發心住名通達住行向地等覺皆名修習妙覺名究竟者圓教位也今資糧位中不立住行向名故非純約別教修習位中具列歡喜地等十名故非純約通教又歡喜地頓斷分別我法二執若惟別教不應到此方斷我執若唯通教不應能破法執無明故知是通含別別接通也然設非圓教妙覺胡能究盡明了唯識相性盡未來時化度含識故云亦復含圓初略標五位竟二廣釋頌文五初釋資糧位至五釋究竟位初中二初舉頌二論釋今初初資糧位其相云何頌曰乃至未起順決擇識求住唯識真勝義性然於二取隨眠猶未能永伏滅二論釋三初正釋頌文二明地所攝三明修行相初中二初釋前二句明位二釋後二句明惑今初論曰從發深固大菩提心乃至未起加行位中順決擇識然已專志求住唯識真勝義性齊此皆是資糧位攝為趣無上正等菩提修習種種勝資糧故名資糧位又復以其為有情故勤求解脫由此亦名順解脫分此明發心以後加行以前皆名為資糧位即住行向三賢位也緣於唯識真勝義性觀察法空故稱為深能以三事練磨其心誓無退轉故稱為固遍欲度脫法界有情不單自利故稱為大菩提此翻為覺一切衆生長夜在迷返迷歸悟皆可名覺故有發聲聞菩提心者有發緣覺菩提心者皆名發心今云深固大菩提心大簡聲聞緣覺固簡藏教事度深簡通教界內無生也順決擇識解在下文勝資糧者即是福智二事亦如下釋解脫者無上涅槃分者因義亦支義也二釋後二句明惑二初略釋二廣釋今初此位菩薩依因善友作意資糧四勝力故於唯識義雖深信解而猶未能了知能取所取其性本空多住外門修菩薩行故於二取所引之隨眠猶未有能伏滅功力令彼隨眠不起二取之現行四勝力者一因力謂發大心二緣力謂親近善友三作意力謂勤求無上菩提四資糧力謂修習福智也多住外門者理觀名內事相名外雖亦修習理觀而理觀力微未能稱理修行六度故多依事相也二廣釋二初釋二取隨眠二釋未能伏滅初中二初正釋頌義二轉釋二障今初此頌中二取之言乃顯執彼二取之取謂執取有能取之見分所取之相分性而不達無性故此二取之習氣名彼隨眠以其隨逐有情眠伏于藏識故又或隨增過失故名隨眠當知即是所知煩惱二障種子心王心所由現緣力變似能取所取相現本是依他起性非有實我實法愚者不達遂執取之執為實我成煩惱障執為實法成所知障由執取彼二取現行復熏成彼二取種子隨逐有情眠伏藏識展轉增過無由出離故名此煩惱所知二障種子為二取隨眠也二轉釋二障二初正釋二結判初中二初釋煩惱障二釋所知障今初煩惱障者謂執取彼遍計所執實我薩迦耶見而為上首百二十八根本煩惱及彼等流諸隨煩惱此皆擾亂惱害有情身心能障涅槃名煩惱障薩迦耶此云積聚實我薩迦耶見謂執積聚為實我也妄認四大為自身相妄認六塵緣影為自心相皆此我見所攝由此我見為本方起根隨煩惱故名上首言百二十八者迷於欲界四諦各具十惑共有四十色無色界但各除瞋各三十六通前一百十二根本煩惱唯見所斷欲界任運貪瞋癡慢身見邊見為六色無色界除瞋各五共有十六根本煩惱是修所斷二斷合論故有一百二十八也諸隨煩惱或彼等流或彼分位頭緒多端故不列數二釋所知障六初正釋所知二分對諸識三對三性心四二障辨異五對四無記六問答釋妨今初所知障者謂執取彼遍計所執實法薩迦耶見而為上首見疑無明愛恚慢等覆于所知有為無為境之無顛倒性能障四智菩提名為所知之障實法薩迦耶見謂執積聚為實法也妄執色不相應及無為法離心心所別有自性皆此法見所攝由此法見復起疑癡貪恚慢等及諸隨惑不達所知真如無顛倒理名所知障當知前煩惱障謂煩惱即障乃持業釋今所知障謂所知之障乃依主釋也二分對諸識此所知障決定不與異熟識俱彼異熟識極微細劣弱故又不與無明慧相應故又所知障要須法空智品與俱起故當知七轉識內隨其所應或少或多如煩惱説眼等五識無隨念計度二種分別故法見法疑及法慢等定不相應餘法貪法瞋法癡由意識力皆容引起法空智品與俱起者由有所治乃有能治唯六七二識能起法空智品故唯六七二識實有所知障也第七但有四障謂法癡法見法慢法愛故名或少第六具有六障謂加法恚法疑故名或多眼等五識雖容有法貪法恚法癡但是第六之所引生非能自起故必第六入法空觀乃能治滅亦非能自治也三對三性心此所知障但與不善無記二心相應論説無明唯通不善無記性故癡與無癡等善心不相應故四二障辨異煩惱障中此所知障必有彼煩惱障定用此所知障為所依故體雖同是見疑無明等無異而執我執法作用有別故二隨眠隨聖道之用有勝有劣而斷惑有前有後由迷法故方起我執如迷杌方謂是鬼迷繩方謂是蛇故煩惱障必以所知障為依也法空觀道用勝能斷二障生空觀道用劣但斷煩惱五對四無記此所知障於四種無覆無記性中唯是異熟無記中之異熟生攝非餘三種彼威儀等勢用薄弱非能覆于所知之理而障菩提智故然此名之為無覆者但是望二乘説若望菩薩亦是有覆威儀工巧變化皆不覆障菩提此既覆障菩提應名有覆無記但不覆障二乘所證生空涅槃故名無覆耳六問答釋妨問曰若所知障有見疑等如何此種契經但説名為無明住地答曰無明力增盛故所以總名無明非無見等例如于煩惱障種立見一處及欲愛色愛有愛共成四住地名豈彼煩惱但是見愛二種更無慢無明等初正釋竟二結判如是二障若從分別起者見所斷攝若是任運起者修所斷攝二乘但能斷煩惱障菩薩則二障俱斷然欲永斷二障種子唯地上聖道能之若伏二障現行亦通地前有漏道也初釋二取隨眠竟二釋未能伏滅菩薩住此資糧位中二粗現行雖有伏者而於細者及二隨眠止觀力微未能伏滅粗現行指分別所起細現行指任運所起二隨眠指分別俱生二障種子也初正釋頌文竟二明地所攝此位未證唯識真如依勝解力修諸勝行應知亦是解行地攝唯識實性亦即真如登歡喜地乃能分證然依深信發起勝解決定了知萬法唯識以此勝解導諸勝行故與後加行位同名為解行地即別三賢及圓十信而不立信住行向之名亦不明先斷見思之義故是帶通明別也三明修行相二初正釋行相二明退不退今初所修勝行其相云何略有二種謂福及智諸勝行中慧為性者皆名為智餘名為福且依六種波羅蜜多通相皆二別相前五説為福德第六智慧或復前三唯福德攝後一唯智餘通二種復有二種勝行謂利自他所修勝行隨意樂力一切皆通自他利行依別相説六到彼岸菩提分等自利行攝四種攝事四無量等一切皆是利他行攝如是等行差別無邊皆是此中所修勝行六波羅蜜即六到彼岸所謂布施持戒忍辱精進禪定智慧也菩提分即三十七品所謂四念處四正勤四如意足五根五力七覺支八正道也四種攝事即布施愛語利行同事四攝法也四無量心即慈悲喜捨四三昧也二明退不退此位二障雖未伏除修勝行時有三退屈而能三事練磨其心於所證修勇猛不退一聞無上正等菩提廣大深遠心便退屈引他已證大菩提者練磨自心勇猛不退二聞施等波羅蜜多甚難可修心便退屈省己意樂能修施等練磨自心勇猛不退三聞諸佛圓滿轉依極難可證心便退屈引他粗善況己妙因練磨自心勇猛不退由斯三事練磨其心堅固熾然修諸勝行一菩提廣大屈引他況己練二萬行難修屈省己增修練三轉依難證屈引粗況妙練也更或懼此娑婆不常值佛魔境粗強恐墮險難者以此深固大菩提心回向西方極樂世界則千穩百當萬無一失矣願我同志皆痛勉之初釋資糧位竟二釋加行位二初舉頌二論釋今初次加行位其相云何頌曰現前立少物謂是唯識性以有所得故非實住唯識二論釋二初正釋頌文二別申餘義初中三初結前標列二出體釋名三結屬頌文今初論曰菩薩先於初無數劫善備福德智慧資糧順解脫分既圓滿已為入見道住唯識性復修加行伏除二取謂暖頂忍世第一法此四總名順決擇分以能順趣真實決擇分故以其近見道故所以立加行名非謂前資糧位總無加行之義真實決擇指真見道出世慧也今能順趣此慧故名順決擇分然資糧加行名別義通以前位中亦有加行之義今此位中亦具資糧之義但加行約近立名資糧約遠立名耳二出體釋名三初出所依體二別釋四名三總結行相今初暖等四法依四尋思四如實智之初位後位而立四尋思者謂尋思能詮之名尋思所詮之義尋思名義自性尋尋名義差別皆是假有實無若能如實遍知此四離識非有及知能取之識亦復非有即轉名如實智名義相異故別尋求名義二種之自性差別二相同故合思察二別釋四名四初釋暖二釋頂三釋忍四釋世第一今初依明得定發下尋思觀無所取立為暖位謂此位中創觀所取名等四法皆自心變假施設有實不可得初獲慧日前行相故所以立明得定之名即此所獲道火前相故亦名暖明得定者止也下尋思者觀也尋思初位故名為下名無得物之功故名但是假有物無當名之實故義但是假有名義自性既非實有則名義差別亦豈實有皆是隨心變現施設而已以此尋思歷觀蘊處界等若名若義若自性若差別皆不可得即是慧日道火前相能破衆生長夜迷暗執著二釋頂依明增定發上尋思觀無所取立為頂位謂此位中重觀所取名等四法皆自心變假施設有實不可得明相轉盛故名明增尋思位極故復名頂尋思後位故名為上數數修習所取實不可得之觀令其增盛如登山頂周觀無礙也三釋忍依印順定發下如實智於無所取決定印持無能取中亦順樂忍既無實境離能取識寧有實識離所取境所取能取但是相待立故印順忍時總立為忍印前所取空順後能取空立印順名忍印取境之識亦空故亦名忍印前所取空順後能取空名印順定亦即止也下如實智亦即觀也如實智之初位故名為下此忍自有三位差別印前即下忍順後即中忍忍識亦空即上忍大乘止觀云強觀諸法唯是心相虗狀無實復當觀此能觀之心亦無實念正同此中四加行觀四釋世第一依無間定發上如實智雙印能所二取皆空立世第一法謂前上忍唯印能取空今世第一法二空雙印從此無間必入見道故立無間名異生法中此最勝故名世第一法如實智之後位故名為上前忍位中下忍印所取空中忍順能取空上忍印能取空今乃二空雙印必入真見道也二別釋四名竟三總結行相如是暖頂依于能取之識觀所取之境本空下忍起時印境空相中忍轉位於能取識亦如境之是空順樂忍可上忍起位印能取空世第一法雙印空相此唯識觀之行相入真見道之司南也千經萬論從無二轍不向此處聞思修證終無通達之期矣二出體釋名竟三結屬頌文二初屬頌二引證今初皆帶相故未能證實故説菩薩此四位中猶於現前安立少物謂是唯識真勝義性以彼空有二相未除帶相觀心有所得故非實安住真唯識理彼空有二相悉皆滅已方實安住空有二相未除者暖位頂位依識觀所取空則境空識有下忍印成境空上忍印成識空世第一位雙印二空則亦皆帶空相故未得全除也問曰上根之人直達空有皆不可得當下安住唯識真勝義性何須如此次第修習答曰汝今空有皆不可得六字便是所取之名妄謂我能直達便是能取之識暖位止觀尚未夢見而言安住唯識勝義夢語刀刀此之謂也汝若實證唯識性者必應頓了唯識之相如六祖雖不識字然於性相宗旨無不通達觀彼轉識成智八句偈義何等透徹乃至法華涅槃諸經一入耳根便達奧義豈似今人妄稱悟道仍於教法粗疏鹵莽者哉二引證依如是義故有頌言菩薩於定位觀似法似義之影像唯是心變義想既已滅除審觀唯是自想如是住內心了知所取之義非有次知能取之心亦無後觸無所得初二句頌暖位次二句頌頂位又二句頌下忍中忍位第七句頌上忍位合此三句即頌世第一位第八句頌見道位也如是住內心者謂能攝內心住於無義也觸者證也無所得者真如也初正釋頌文竟二別申餘義三初伏惑義別二所觀二諦三所依界地今初此加行位未遣空有二相之縛於粗重縛亦未能斷唯能伏除分別二障之現行二取以分別二障正違于見道故其於俱生二障之現起者及二隨眠有漏觀心有所得故有分別故未全伏除全未能滅粗重縛者分別二障種子也分別二取正違見道故伏除之以入見道既見道已彼種即斷現起俱生二障但少分除故云未全伏除俱生二障種子全然未斷故云全未能滅此中分別煩惱障種未斷即約通教性地八人地言分別所知障種未斷即約別教十回向言故是以通含別二所觀二諦此位菩薩於安立諦非安立諦俱學觀察為引當來二種見故及伏分別二障種故非安立諦是正所觀非如二乘唯觀安立安立諦者於苦等諸法中安立苦等四諦理也非安立諦者三無性所顯二空真如此諦通一切法無有差別故名為非安立離顛倒無變易故名為諦學觀非安立諦引真見道學觀安立諦引相見道學觀非安立諦伏分別所知障種學觀安立諦伏分別煩惱障種但觀安立諦者通性地也俱觀二諦者通含別也正觀非安立諦者別十向也別向或亦觀安立諦須約界外四諦言之變易生死為苦諦根本無明及無漏有為名集諦性淨涅槃無依無住名滅諦中道正智無作道品名道諦也三所依界地菩薩起此暖等善根雖方便時通諸初二三靜慮而依第四靜慮方得成滿託最勝依入見道故唯依欲界善趣身起以餘界趣中慧心及厭離心非殊勝故此位亦是解行地攝未證唯識真勝義故欲界善趣指天人阿修羅也然修羅方瞋諸天正樂唯人道為尤能耳以善趣身得根本第四禪定於四禪中雙印二空乃能引真見道觸證非安立諦若在惡趣則有厭而無勝慧若在色天則有慧而無勝厭若在無色天中則慧厭俱無故皆不能成此善根二釋加行位竟三釋通達位二初舉頌二論釋今初次通達位其相云何頌曰若時於所緣智都無所得爾時住唯識離二取相故二論釋二初略釋二廣釋初中二初總釋頌文二別解本智今初論曰若時菩薩於所緣境無分別智都無所得不取種種戲論相故爾時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故以能所取相俱是分別有所得心戲論現故無智外之如為智所證無如外之智能證於如故曰平等平等俱離能所二取之相不同有所得心分別戲論所現相也二別解本智有三家解初二義非第三義正有義此智相見二分俱無説無所取能取相故有義此智相見二分俱有帶彼真如相起方名為緣彼故若無彼真如相而可名緣彼真如者應緣色等智雖無聲等相亦可名聲等智若無見分應不能緣寧可説為緣真如智勿真如性不是見分亦名能緣故應許此智定有見分此智即無所得之根本智也初謂相見俱無次謂相見俱有並如文可知有義此智見分是有相分是無説真如無相可取正智不取於相故雖有見分而無隨念計度分別故頌中説非能取非謂見分之取全無也雖無相分而可説此根本實智挾帶真如體相俱起以此智不離于真如故喻如自證分緣見分時乃是親證不是變相而緣此真如智決亦應爾以變相而緣者便非親證如後得智應有分別故應許此根本實智有見無相此第三正義也雖有見分下釋難謂有難曰既有見分何故頌中説非能取答釋可知雖無相分下釋疑謂有疑曰若無相分則應無所緣緣若無所緣何得獨有能緣釋曰此是挾帶不是變帶挾帶體相是所緣緣不變相狀故非相分如自證分亦以見分為所緣緣而非變帶不名相分若變真如相分而緣即是後得有分別智非此根本無分別智矣初略釋竟二廣釋二初釋位名二釋見道今初加行無間此無分別智生時體達會合真如理性名通達位以此位最初照真理故所以亦名見道二釋見道三初總標二別釋三結益今初然此見道略説有二二別釋二初釋二見道二攝六現觀初中二初釋二道義二簡二道別初又二初釋真見道二釋相見道今初一真見道謂即所説無分別智實證二空所顯真理實斷二障分別隨眠雖多剎那事方究竟而相等故總説一心有義此中二空二障漸證漸斷以有淺深粗細異故有義此中二空二障頓證頓斷由意樂力有堪能故相等故者謂始終唯觀非安立諦不同二乘所觀上下八諦諸行相也漸頓二義頓義為正初言漸者生空理淺故先證法空理深故後證煩惱障粗故先斷所知障細故後斷次言頓者由大菩提意樂有堪能力故也二釋相見道二初正釋相見道二結示唯假立初中二初標二釋今初二相見道此復有二二釋為二初釋觀非安立諦三品心二釋緣安立諦十六心今初一觀非安立諦有下中上三品心一者緣內身為境而遣有情假緣之智能除軟品分別隨眠二者緣內法為境而遣諸法假緣之智能除中品分別隨眠三者遍遣一切有情諸法假緣之智能除一切分別隨眠前二名法智各別緣故第三名類智總合緣故此乃效法真見道中二空見分自所斷障無間解脫別總建立名相見道非安立諦即真如也假緣謂無體假説之緣也軟品即下品乃單約我執言之中品則單約法執一切則雙約二執也類智者即前二智流類蓋效無間道別斷二障建立前二效解脫道總斷二障建立第三即是後得有分別智故名相見道也有義此三是真見道以相見道緣四諦故有義此三是相見道以真見道不別緣故判此三智自有二義後義為正也二釋緣安立諦十六心又三初復標二種二別釋二種三結為九心今初二緣安立諦有十六心此復有二二別釋二種又二初依所取能取立二依下上諦境立今初一者依觀所取能取別立法類十六種心謂於苦諦有四種心一苦法智忍謂觀三界苦諦真如正斷三界見苦諦時所斷二十八種分別隨眠所取即真如能取即正智也四諦法忍四諦法智四諦類忍四諦類智故名法類十六種心且約苦諦言之苦者諦也法者真如也智者加行有漏智也忍者無間無漏忍也二十八種者欲界十惑色無色界除瞋各九惑也二苦法智謂忍無間觀前真如證前所斷煩惱解脫法者亦指真如智者無漏解脫也三苦類智忍謂前法智無間無漏慧生於法忍法智各別內證言此法忍法智二心之後乃至無學一切聖法皆是此類四苦類智謂此類忍無間無漏智生審定印可苦類智忍如於苦諦有四種心集滅道諦應知亦爾此四四十六心法忍法智八種觀于真如類忍類智八種觀於正智此乃效法真見道中無間解脫見分自證分差別建立名相見道謂四法忍皆效真無間道之見分立四法智皆效真解脫道之見分立四類忍皆效真無間道之自證分立四類智皆效真解脫道之自證分立也二依下上諦境立二者依觀下上諦境別立法類十六種心謂觀現前不現前界苦等四諦各有二心一現觀忍二現觀智如其所應效法真見道中無間解脫見分觀諦斷見所斷百一十二分別隨眠名相見道下即欲界名現前界依此四諦立四法忍及四法智上即色無色界名為不現前界依彼四諦立四類忍及四類智現觀忍即無間道依於下上各有四諦故有八忍現觀智即解脫道依於下上各有四諦故有八智百一十二分別隨眠即三界根本見惑種子也二別釋二種竟三結為九心若依廣布聖教道理説相見道有九種心此即依前緣安立諦二番十六種止觀別立謂以法類品之忍智合説為一而于下上界中各有四諦之四觀即為八心八觀相應之止總説為一止觀合説故有九種雖見道中止觀決定雙運而於見義觀順非止故此觀止開合不同由此九心名相見道初正釋相見道竟二結示唯假立諸相見道俱是依真見道假説其為從世第一法無間而生及假説其能斷隨眠然非實如是也以必真見道後方得生起此相見道故以觀非安立諦之後方乃起安立諦觀故以彼分別隨眠真見道中先已斷故初釋二道義竟二簡二道別前真見道證唯識性後相見道證唯識相二中初勝故頌偏説智都無所得也前真見道根本智攝後相見道後得智攝問曰諸後得智有見相二分耶此正判簡也次問二分有無下答有三第三義正有義二分俱無離二取故有義此後得智見分是有相分是無説此智品有分別故聖智皆能親照境故但以不執著故説離二取有義此後得智見相二分俱有説此智但思惟似真如相不見真實真如性故又説此智分別諸法自共相等觀諸有情根性差別而為説故又説此智現身土等為諸有情説正法故若不變現似色聲等寧有現身説法等事設使轉色蘊依不現色者轉四蘊依應無受等又若此智不變似境離自體法應非所緣又或緣色等時應緣聲等又緣無法等應無所緣緣彼過未法體非實有無緣用故由斯後智二分俱有第三義中以五種義證後得智具有二分一者變相觀真故二者分別自共相隨根説法故三者能現身土故轉有漏五蘊應有無漏五蘊故四者設不變境無所緣故設非自境而可緣者緣色亦可緣聲等故五者過未等法現在無體設不變相無所緣故初釋二見道竟二攝六現觀此二見道與六現觀相攝云何六現觀者一思現觀謂最上品喜受相應之思所成慧此思慧能觀察諸法無常苦等共相引生暖等修慧善根故在加行道中觀察諸法唯此思用最猛所以偏立現觀之名暖等不能廣分別法又未證理故非現觀二信現觀謂緣三寶世出世間決定淨信此助現觀令不退轉所以亦立現觀之名三戒現觀謂無漏戒除破戒垢令觀增明所以亦名現觀四現觀智諦現觀謂一切種緣非安立諦根本後得無分別智五現觀邊智諦現觀謂於現觀智諦現觀之後諸緣安立諦世出世之智六究竟現觀謂盡智等究竟位之智此先設問徵起次出六現觀之名相也二信現觀即四不壞信一者決定信佛二者決定信法三者決定信僧四者決定信諦所謂世出世間因果各二名為苦集滅道也三戒現觀即道共戒既發無漏則所得無作戒體永無破犯由戒淨故令慧淨也一切種者不論何位但緣非安立諦之本後二智皆此第四現觀所攝也緣安立者緣苦集諦即是世智緣滅道諦即出世智也盡智無生智唯究竟位有之故名究竟現觀此真見道攝彼第四現觀之少分此相見道攝彼第四第五之少分彼第二信現觀第三戒現觀雖與此見道俱起而但相助非即現觀自性故不相攝真見道即第四現觀之根本智故云少分也相見道有二若觀非安立諦三品心即第四現觀之後得智攝故云少分若緣安立諦十六心即第五現觀攝然第五現觀通於見道修道此唯見道故亦云少分也二別釋竟三結益菩薩得此二見道時生如來家住極喜地善達法界得諸平等常生諸佛大集會中於多百門已得自在自知不久證大菩提能盡未來利樂一切得諸平等謂一切衆生平等一切菩薩平等一切如來平等即是凡聖平等因果平等自他平等亦所謂心佛衆生三無差別也多百門者遍於五位百法通達二種無我一一法中二空真如悉皆平等則一各具百故名多百設非真俗五融不名已得自在是故教道雖別證道同圓三釋通達位竟四釋修習位二初舉頌二論釋今初次修習位其相云何頌曰無得不思議是出世間智捨二粗重故便證得轉依二論釋二初略釋頌文二廣釋頌義今初論曰菩薩從前見道起已為斷餘俱生二障證得轉依復數修習無分別智此智遠離所取能取故説無得及不思議或離戲論説為無得妙用難測名不思議是出世間無分別智斷世間故名出世間二取之隨眠是世間之本唯此無得不思議智乃能斷之故獨得出世之名或出世名依二義立謂其體是無漏及能證會真如此智具斯二種義故獨名出世餘智不然即十地中無分別智數修習此無分別智故乃能捨二障之粗重二障種子立粗重名以其性無堪任違于精細輕安之無漏法故今能令彼永滅故説為捨此十地智由能捨彼二粗重故便能證得廣大轉依見道起者初心斷惑為無間道中心證理為解脫道後心起修為勝進道今正約後心言也依謂所依即第八識依他起性與染淨法為所依故染謂虗妄遍計所執淨謂真實圓成實性轉謂于依他起中染淨二分轉捨染分轉得淨分由數修習無分別智斷本識中二障粗重故能轉捨依他起上遍計所執及能轉得依他起中圓成實性由轉煩惱得大涅槃轉所知障證無上覺今以此論成立唯識意為有情證得如斯二轉依果此先約轉持種依釋也煩惱所知二障種子皆第八識之所執持菩提涅槃二轉依果亦第八識之所本具由煩惱種障大涅槃由智障種障無上覺今二障分分轉捨則二果分分轉證可謂無始流轉安樂妙常唯此八識更非他物矣問曰性宗謂轉煩惱成菩提轉生死成涅槃與此若何會通答曰此中所言煩惱障即見思通惑此中所言所知障即無明別惑通別二惑性宗通稱煩惱故彼所言轉煩惱成菩提與此所言轉所知障證無上覺同也由通惑故招感分段生死妄果障無餘依涅槃由別惑故招感變易生死妄果障於性淨涅槃亦障無住涅槃故彼所言轉生死成涅槃是約果言此所言轉煩惱得涅槃是約因言亦復不相違也又煩惱招生義顯智障覆覺義強故此偏説又斷煩惱亦得二乘菩提以非一切種智故但名為涅槃斷所知障亦得無住涅槃以不住涅槃相故但名無上覺或依即是唯識真如生死涅槃之所依故愚夫顛倒迷此真如故無始來受生死苦聖者離倒悟此真如便得涅槃畢竟安樂由數修習無分別智斷本識中二障粗重故能轉滅依如之二種生死及能轉證依如之無住涅槃此即真如離雜染性如雖性淨而相雜染故離染時假説新淨即此新淨説為轉依修習位中斷障證得雖於此十地位亦能分得菩提而非此中頌意所顯頌意但顯轉唯識性以唯識性即是涅槃然在二乘滿位但名為解脫身唯在大乘牟尼極果乃得名法身故此更約轉迷悟依釋也唯識真如即識之體性生死如冰涅槃如水真如則如濕性生死如轉涅槃如不轉真如則如本屋生死如迷涅槃如悟真如則如本方生死如狂走涅槃如狂歇真如則如本頭迷之枉受生死悟之便得涅槃此不變常隨緣體即用也處生死而非染在涅槃而非淨此隨緣常不變用即體也二乘但悟我空仍迷法空故出分段生死但證無餘涅槃名解脫身大乘了悟我法俱空故出二種生死深證無住涅槃名為法身當知所悟者即真如法身能悟者即無上菩提能所不二故頌意但顯轉唯識性不必更言菩提也牟尼此云寂默善寂空有二邊默契中道理故初略釋頌文竟二廣釋頌義二初總徵二正釋今初云何證得二種轉依謂十地中修十勝行斷十重障證十真如二種轉依由斯證得二正釋二初明十地因二明轉依果初中四初釋十地名二釋十勝行三釋十重障四釋十真如今初言十地者一極喜地初獲聖性具證二空能益自他生大喜故二離垢地具淨尸羅遠離能起微細毀犯煩惱垢故三發光地成就勝定大法總持能發無邊妙慧光故四𦦨慧地安住最勝菩提分法燒煩惱薪慧𦦨增故五極難勝地真俗兩智行相互違合令相應極難勝故六現前地住有分別妙達緣起之智引無分別最勝般若令現前故七遠行地至無相住功用後邊出過世間道及二乘出世道故八不動地無分別智任運相續相用煩惱不能動故九善慧地成就微妙四無礙解能遍十方善説法故十法雲地大法智雲含衆德水蔭蔽一切如空粗重令不為障礙又以此大智充滿所證所依法身故如是十地總攝有為無為功德以為自性與所修行為勝依持令得生長故名為地聖者正也永離邪倒入正定聚名獲聖性微細毀犯謂誤犯也無分別智即無相觀任運相續即是無功用義大法智雲謂總緣一切諸法之智含衆德水謂陀羅尼門三昧門等如空粗重謂所知障之一分及煩惱障種廣大如空也有為功德即妙觀察智平等性智無為功德即地地中所證真如餘並可知二釋十勝行有十三門初明數門至十三結要簡修今初十勝行者即是十種波羅蜜多施有三種謂財施無畏施法施戒有三種謂律儀戒攝善法戒饒益有情戒忍有三種謂耐怨害忍安受苦忍諦察法忍精進有三種謂被甲精進攝善精進利樂精進靜慮有三種安住靜慮引發靜慮辦事靜慮般若有三種謂生空無分別慧法空無分別慧俱空無分別慧方便善巧有二種謂回向方便善巧拔濟方便善巧願有二種謂求菩提願利樂他願力有二種謂思擇力修習力智有二種謂受用法樂智成熟有情智財施亦名資生施即是以無染心捨諸資生具也無畏施者不損惱他濟拔驚怖即戒忍二度也法施者以無染心宣示正法言行相應令他得益即進禪慧三度也律儀戒者止惡防非即在家出家諸戒品也攝善法戒者由持戒力攝取一切成佛功德自利行也饒益有情戒者由持戒力出生一切度衆生事利他行也耐怨害忍亦名生忍成熟有情不瞋恚故安受苦忍亦名法忍捍勞忍苦求佛法故諦察法忍亦名第一義忍觀生法空不動轉故被甲精進即最初發菩提心被弘誓鎧深自勵故攝善精進樂集佛功德故利樂精進樂度諸衆生故安住靜慮謂得現法樂住也引發靜慮謂引發六通等也辦事靜慮謂辦饒益有情等事也三般若如文可知回向方便謂不住生死拔濟方便謂不住涅槃又回向方便令他不住涅槃拔濟方便令他不住生死又回向方便正趨無上菩提拔濟方便同離二種生死也求菩提願即法門無量誓願學佛道無上誓願成利樂他願即衆生無邊誓願度煩惱無盡誓願斷也思擇即慧行力修習即定行力受用法樂智即後得智覺一切法自相共相不迷不謬成熟有情智即後得智觀一切機利鈍生熟應病與藥二出體門此十性者施以無貪彼所起行施時身口意三業為性戒以受學菩薩戒時三業為性忍以無瞋精進明審善慧及彼所起忍時三業為性精進以勤及彼所起進時三業為性靜慮但以等持為性後五皆以七覺支中擇法覺支為性論中説般若是根本智方便等四是後得智故有義第八願度以善欲善勝解及信為性以凡弘誓願必以此三為自性故此上皆説自性若并眷屬一一皆以一切俱行之功德為性受菩薩戒時三業謂心希無上菩提緣三寶境秉受羯磨由此思業所熏成種發得任運止惡行善功能名為無作假色盡未來時斷一切惡修一切善度一切生是謂三聚淨戒之體性也等持即三麼地別境中之善定也擇法即別境中善慧本後二智皆慧心所之所攝故若約眷屬則一一波羅蜜多必有信慚愧三善根等及善別境善遍行與之相應皆可準思三明相門此十相者要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性二依止最勝謂要依止大菩提心三意樂最勝謂要悲愍一切有情四事業最勝謂要具行一切事勝五巧便最勝謂要無相智所攝受六回向最勝謂要回向無上菩提七清淨最勝謂要不為二障間雜若非此七所攝受者所行施等非到彼岸由斯施等十對波羅蜜多一一皆應四句分別二乘及世間善人亦有布施持戒等行故云要七最勝之所攝受方名波羅蜜多一安住菩薩種性即前所説二種種性也若非菩薩種性則所行施戒等善但感人天二乘等果不成無上大菩提故二依止大菩提心者謂必上求佛道修行施戒等善方不墮有漏故三意樂悲愍有情者謂必下化衆生修行施戒等善方不偏自利故四具行一切善事者謂以無分劑無厭足心修行施戒等善方能增長滿足勝資糧故五要巧便無相智者謂達三輪體空修行施戒等善方令福與虗空等故六要回向無上道者謂隨一一所修皆令正趨極果方不傍感異熟果故七要清淨無間雜者謂隨一一所修皆能三時無悔不被煩惱智障之所間雜方能速疾到彼岸故言四句分別者共有三種四句且初單約施言一是施非波羅蜜不與七勝相應而行施故二是波羅蜜非施隨喜他施具七勝故三亦施亦波羅蜜七勝相應而行施故四非施非波羅蜜雖亦隨喜他施不與七勝相應故戒等九度例此各作四句可知二約次第修者以明四句初施度中但有二句一是施非度二是施是度次戒度中對施得明四句一是戒非度不與七勝相應故二是度非戒即前布施具七勝故三亦戒亦度具七勝而持戒故四非戒非度謂前布施不具七勝故忍望戒等例此可知三不約次第者諸度互望各作四句如常可知唯第六般若止有三句未有是波羅蜜而非般若者故四無增減門此但有十不增減者謂十地中對治十障證十證如無增減故復次前六不增減者為除六種相違障故漸次修行諸佛法故漸次成熟諸有情故此如餘論廣説應知又施等三名為人天趣中增上生道施感大財戒感大體及忍感大眷屬故精進等三名為決定勝道精進能伏煩惱依定發通成熟有情及以慧成熟佛法故諸菩薩道唯有此增上生及決定勝之二種耳又前三種饒益有情施彼資財戒不損惱彼忍堪忍彼惱而饒益故精進等三對治煩惱雖未伏滅而能精勤修對治彼諸善加行禪能永伏煩惱慧能永滅諸煩惱故又由施等三度是大悲饒益有情不住涅槃及由進等後三是大智伏滅諸惑不住生死為無住處涅槃資糧由此前六不增不減後唯四者為助前六令修滿足不增減故方便善巧助施等三願助精進力助靜慮智助般若令修滿故如解深密廣説應知先明十無增減次明六無增減後明以四助六故無增減義並可知五次第門十次第者謂由前前引發後後及由後後持淨前前又前前粗後後細故易難修習次第如是釋總名波羅蜜別名施戒等如餘處説前前引發後後者由施引戒由戒引忍乃至由力引智也後後持淨前前者由智持故力淨由力持故願淨乃至由戒持故施淨也前前粗者施粗於戒戒粗於忍乃至力粗於智也後後細者智細於力力細於願乃至戒細於施也修施易修戒難修戒易修忍難乃至修願易修力難修力易修智難是故依此諸義而立次第六五修門此十修者有五種修一依止任持修二依止作意修三依止意樂修四依止方便修五依止自在修依此五修修習十種波羅蜜多皆得圓滿如集論等廣説其相一依止任持修者復有四種一依止因謂種性力二依止報謂勝自體力三依止願謂本願力四依止簡擇謂慧力也二依止作意修者亦有四種一勝解作意於十度相應經教起增上勝解故二愛味作意於得十度見勝功德起深愛味故三隨喜作意於一切所行十度深生隨喜故四喜樂作意於自他當來勝品十度深生願樂故三依止意樂修者復有六種一無厭意樂修行施等無厭足故二廣大意樂無退無斷至究竟故三歡喜意樂於所攝有情生大歡喜故四恩德意樂觀諸有情有大恩德能資助我無上大菩提故五無染意樂不希報恩異熟果故六善好意樂以施等福共諸有情回向無上大菩提故四依止方便修者謂無分別智觀察三輪皆清淨故五依止自在修者謂身自在行自在説自在身自在者謂自性受用二身行自在者謂變化身説自在者謂能宣説十度一切差別無有滯礙七自類相攝門此十攝者謂若總論相攝則十種行一一皆攝一切波羅蜜多互相順故若別論相攝復有二義一者依修前行而引後者前攝於後以後必待前所引故後不攝前以前不待後引生故二者依修後行持淨前者後攝於前以能持淨前故前不攝後能非持淨後故若依純雜而修習者展轉相望應作四句一是純非雜二是雜非純三亦純亦雜四非純非雜也又或即前三種四句八六十互攝門此實有十而説六者應知後四皆屬第六所攝開為十者第六唯攝無分別智後四皆是後得智攝以方便等智皆緣世俗而生起故九感果門此十行所感果者有漏十行所感有四謂等流果異熟果增上果士用果但除離繫果無漏十行所感有四謂等流果增上果士用果離繫果但除異熟果而有處説具五果者或依互相資説或有漏無漏二行合説能永斷除自所對治是諸度離繫果於現法中由此施等攝受自他是士用果於當來世後後增勝展轉生起是等流果成大菩提是增上果感大財富往生善趣無怨無壞多諸喜樂有情中尊身無損害廣大宗族是施等異熟果此即有漏無漏合説也十三學相攝門又二初明三學相二明相攝義今初十與三學互相攝者戒學有三一律儀戒謂正遠離所應離法二攝善法戒謂正修證應修證法三饒益有情戒謂正利樂一切有情此與二乘有共不共此戒甚深廣大如餘處説言有共不共者唯律儀與二乘共而開遮亦復有異餘二皆不共二乘也隨一一戒豎窮三諦之底故甚深橫該十界之法故廣大定學有四一大乘光明定謂此定能發照了大乘理教行果智光明故二集福王定謂此定自在集無邊福如王勢力無等雙故三賢守定謂此定能守世出世間賢善法故四健行定謂佛菩薩大健有情之所行故此四所緣對治堪能引發作業如餘處説一大乘光明定者般若德也大乘理謂二空真如大乘教謂十二部經大乘行謂十度五行大乘果謂無上菩提唯此定能發智光以照了之故名為光明定二集福王定者解脫德也集無邊福謂具修萬行資糧無分劑故三賢守定者法身德也世出世間諸賢善法皆依法身生長皆為法身所任持故健行定者首楞嚴三昧也一心三止三觀非大健有情不能行故此四所緣者謂大乘法為所緣故對治者謂一切法總相緣智以楔出楔道理遣本識中一切障種故以細智除粗惑堪能者謂住靜慮樂隨其所欲而受生故雖得禪定不隨禪生雖示受生不失定意引發者謂能引發一切世界無礙神通故作業者謂能振動一切世界熾然威德遍滿光明顯示諸餘佛土轉變淨穢往來彼此卷舒塵剎一切色像皆入身中所往諸處示同其類或顯現或隱藏所作自在伏他神通施辨施念施樂放大光明引發如是大神通故又能引發攝諸難行十難行故一自誓難行誓受無上菩提願故二不退難行生死衆苦不能退故三不背難行一切有情雖行邪行而不棄故四現前難行怨有情所現作一切饒益事故五不染難行生在世間不為世法所染汙故六勝解難行於大乘中雖未能了然於一切廣大甚深生信解故七通達難行具能通達生法二空故八隨覺難行於諸如來所説甚深祕密言詞能隨覺故九不離不染難行不捨生死而不染故十加行難行能修諸佛安住解脫一切障礙窮生死際不作功用常起一切有情一切義利行故又能引發修到彼岸成熟有情淨佛國土諸佛法故應知亦是菩薩等持作業差別慧學有三一加行無分別慧二根本無分別慧三後得無分別慧此三自性所依因緣所緣行相等如餘處説加行無分別慧者是尋思慧亦名為希求慧即根本無分別慧之因由此能生無分別慧是故亦得無分別名也根本無分別慧者是正證慧亦名為內證慧即無所得智觸證真如不思議出世慧也後得無分別慧者是起用慧亦名為攝持慧即根本無分別慧之果是故亦得無分別名也此三自性者離五種相一離無作意若謂無作意即無分別慧則睡悶醉絶等應成無分別慧二離過尋伺若謂過尋伺即無分別慧則二禪已上應成此慧三離想受滅若謂心心所不轉是無分別慧則無想滅定等應成此慧而實不然四離色自性若謂如色自性是無分別慧則墻壁瓦礫應是此慧而實不然五離於真義異計度若計度言此是真如無分別義以此計度名無分別慧者則應此慧仍有分別而實不然故以五相反顯無分別慧不墮此失令人自悟離此五相是名無分別慧自性譬如眼識緣色現量證見不帶名言不計為外即是真智緣真如義此三所依者非心非思義故非非心心種類故此三因緣者聞熏習及如理作意此三所緣者二空所顯真如此三行相者無分別無取相等者等於任持乃至甚深也此三任持者一切諸行依之進趣增長此三助伴者一資糧道即施戒忍精二依止道即禪波羅蜜此三異熟者乃至未成佛果以前恆於佛二會中受生若得加行無分別慧于變化身會中受生若得根本無分別慧于受用身會中受生此三等流者後後生中無分別慧展勝增勝此三出離者離異生性于十地道成辦相應此三究竟者得清淨三身及最上自在此三勝利者加行勝利由信解力種種重惡所不能染根本勝利成辦相應解脫一切二障種子後得勝利常行世間非諸世法之所能染此三差別者加行無差別慧求證真如而未能證寂無言説譬如啞人求受境界而未能受亦不能説根本無分別慧正證真如離諸戲論譬如啞人正受境界無所言説後得無分別慧返照真如現證境界能起言教譬如不啞之人受諸境界起諸言説又加行如五識求受境界根本如五識正受境界後得如意識受諸境界等此根本後得譬喻者根本如閉目後得如開目根本如虗空後得現色像此無分別慧所作事者如摩尼任運雨寶如天樂任運出聲此無分別慧甚深者非緣依他境亦非緣餘境非可説是智亦不是非智智外無真如真如外無智又雖一切法本性無分別有情不知故不名無分別證此無分別性乃名菩薩妙慧也如是三慧初資糧位二加行位中種子具有三現行唯加行於通達位中現唯根本後得之二種子具三以見道位中無現加行故於修習位七地已前若種若現俱通三種八地以去現唯根本後得之二種仍具三以無功用道違于現加行故其所有進趣皆用後得無漏觀中任運趣故非加行攝究竟位中現種俱二以加行之現種俱已捨故此更約五位判三種慧學也初明三學相竟二明相攝義若但以自性相攝則戒唯攝戒定攝靜慮慧攝後五若并取助伴則皆具相攝若隨作用相攝則戒攝前三施是戒之資糧戒是戒之自體忍是戒之眷屬性故定攝靜慮慧攝後五精進三攝遍䇿三故若隨顯了相攝則戒攝前四前三如前説及精進守護戒故定攝靜慮慧攝後五十三學相攝門竟十一五位具修門此十行若約位者五位皆具唯于修習位中其相最顯然初資糧二加行位之頓悟菩薩十度種子雖通有漏無漏二種而現行則唯有漏若初二位之漸悟菩薩則若種若現俱通二種以其已得生空無漏觀故通達位中種通二種現唯無漏正斷分別二障種子未出觀故於修習位若七地已前則種現俱通有漏無漏生空法空或出或入所修勝行應通二故若八地以去則種通二種現唯無漏至于究竟位中則若種若現俱唯無漏十二因位名異門此十因位有三種名一但名波羅蜜多謂初無數劫爾時施等勢力尚微被煩惱伏未能伏彼煩惱由斯煩惱不覺現行二名近波羅蜜多謂第二無數劫爾時施等勢力漸增非被煩惱所伏而能伏彼煩惱由斯煩惱除是為衆生故故意方行三名大波羅蜜多謂第三無數劫爾時施等勢力轉增能畢竟伏一切煩惱由斯煩惱永不現行但以猶有所知微細現行種子及煩惱之種子未斷故未究竟初無數劫謂資糧加行二位第二無數劫謂通達位至第七地第三無數劫謂從八地至十地也十三結要簡修此十義類差別無邊恐厭繁文略示綱要十於十地雖實皆修而隨相增地地修一雖十地行有無量門而皆攝在十到彼岸隨相增者所謂初地施度增上二地戒度增上乃至十地智度最為增上餘非不修但隨力隨分具如華嚴十地品中廣明二釋十勝行竟三釋十重障三初標起二正釋三結屬今初十重障者二正釋十初釋異生性障至十釋諸法中未得自在障今初一異生性障謂煩惱所知二障中之分別起者依彼分別二障種子建立異生性故二乘見道現在前時唯斷分別煩惱一種名得聖性菩薩見道現在前時具斷二種名得聖性以二真見道現在前時彼分別二障之種子必不成就猶明與暗定不俱生如稱兩頭低昂時等諸相違法理必應然是故智惑二性無有俱成之失先辨大小乘斷惑有廣有狹次釋伏難也難曰見道位中為與惑俱為不與惑俱若不與惑俱者即惑先斷後方見道云何得名見道斷惑若與惑俱者即先見道後方斷惑是敵對斷智惑同時應有凡聖二性俱成之失今釋之曰亦非先斷惑後見道亦非先見道後斷惑然二真見道正現前時則二障種子必不成就如暗時無明明時無暗又如稱之兩頭彼低此昂曾無先後故非惑智相見敵對論斷又非先斷惑已後方見道但正見道時惑即不生非斷非不斷而論斷耳問曰無間道時若已無惑種者何用復起解脫道為答曰無間期于斷惑解脫期于證滅期心別故又為捨彼惑品之粗重性故無間道時雖無惑種而未捨彼無堪任性為捨此無堪任性故起解脫道及為證此品擇滅無為故也小乘妄計無間道中猶有惑種至解脫道方永斷之則犯二性俱成之失今因大乘破之故致此問難也答釋可知粗重性即無堪任性乃惑品之餘氣耳雖于見道生起之位亦斷惡趣諸業果等種子而今且説能起業果之煩惱以是業果之根本故由斯初地説斷二愚及彼粗重一執著我法愚即是此中異生性障二惡趣雜染愚即是惡趣諸業果等問曰執著我法即是無明心所故得名愚業果何亦名愚答曰應知業果是愚品類故亦總説為愚後之九地誤犯三業等愚皆準此釋或彼初地説斷二愚者唯説利使五見鈍使貪等障品相應俱起之二愚若云斷異生性障即但説根本也若云斷二愚即兼説業果也又若説愚品為愚則第二愚指業果也若説利鈍障品為二愚則執著我法愚指利使言惡趣雜染愚指鈍使言也彼粗重之為言顯彼二愚種子或但即二愚所起之無堪任性名為粗重如入第二禪定説斷苦根然其所斷苦根雖非現行現行已先伏故亦非種子種子未永斷故而亦名為粗重此初地所斷二愚粗重亦復應然已後九地中粗重之言亦皆例此應釋以十地中所知障種分分漸斷煩惱障種但伏未斷故粗重義須作此種子及無堪任之二釋也雖初地中見道所斷之惑實通煩惱所知二障而今所云異生性障意但取所知障説以經説十地所斷十種無明非是煩惱染汙性故無明即是十障品愚以二乘亦能斷煩惱障彼煩惱是與二乘所共斷故非此所説又十無明不染汙者唯依十地修所斷説若見所斷分別法執亦是染汙雖此初地位中亦伏一分俱生煩惱及斷彼俱生煩惱粗重無堪任性而非正意正意唯在斷所知障又不斷彼俱生煩惱之隨眠故此不説理實初地修道位中亦斷俱生所知之一分然今且説最初見道之所斷者故但言斷異生性障後九地斷準此應知住滿地中時既淹久理應進斷所應斷障不爾則初中後三時無間解脫勝進三道應無差別十地各有三時三道初時名無間道正斷障本地之惑種中時名解脫道正證本地所顯真理後時名勝進道復起加行斷後地惑是故初地後心即屬修道位攝亦斷俱生所知一分也故説菩薩得現觀已復於十地修道位中唯修永滅所知障道留俱生煩惱障之種子助菩提願而來受三界生非如二乘速趣圓寂故修道位不斷煩惱種子將成佛時方頓斷故此結顯初地後心即名修道兼顯但斷俱生所知障種不斷俱生煩惱障種之意也現觀即前文第四第五二種現觀餘可知問曰留煩惱障助願受生屬何教義答曰此意深密不可粗浮輒判何以言之是藏教事度三祇伏惑總未先斷異生性障若通教見地菩薩所斷異生性障與二乘同曾無斷所知障之義至菩薩地正使斷盡扶習潤生復無留惑種義若別教登地但斷所知障種更無留煩惱義圓教尤不必言今約語言則是通含於別別入於通若推意旨則是密顯圓宗請試辨之論云我執必依法執而起如夜迷杌等方謂人等故我執即煩惱障法執即所知障也豈有所知障種已斷煩惱障種猶得實存今云留障助願明是巧用性惡法門耳問曰何不直言初地分得一身無量身所謂中道應本猶如月印千江乃云留煩惱障助願受生耶答曰若是則為別含於圓圓於入別非復別入於通通含別圓之義矣問曰直説別圓二教有何不可何必帶通方便耶答曰衆生未堪徑聞別圓安得不帶藏通方便是故化法四教並是如來權實妙智應機施設何容偏廢何容偏執此論與瑜伽論味同方等正破小乘法執傍破凡外我執若廢通教方便則小機絶分曷由引入別圓也哉初釋異生性障竟二釋邪行障二邪行障謂所知障中俱生一分及彼所起誤犯之身口意三業彼障二地極淨尸羅入二地時便能永斷由斯二地説斷二愚及彼粗重一微細誤犯愚即是此中俱生一分二種種業趣愚即彼所起誤犯三業或唯起業不了業愚問曰所起誤犯三業何亦名愚釋曰起業而不了知業性故名為愚由所知一分愚故起誤犯業由不了業趣愚故不能當下即復清淨問曰聲聞初果鋤地即得蟲離四寸今菩薩二地方得極淨尸羅不幾與初果齊耶答曰蟲離四寸是道共戒力於諸性罪不復誤犯若遮罪中微細誤犯雖阿羅漢亦未全免故知二地境界甚深三釋暗鈍障三暗鈍障謂所知障中俱生一分令所聞思修法忘失彼障三地勝定總持及彼所發殊勝三慧入三地時便能永斷由斯三地説斷二愚及彼粗重一欲貪愚即是此中能障勝定及修慧者彼所知障中俱生一分能障勝定及修慧者昔來多與欲貪俱故名欲貪愚今得勝定及修所成慧彼所知障之一分既已永斷則與俱之欲貪隨伏此欲貪從無始來依彼所知一分轉故二圓滿聞持陀羅尼愚即是此中能障總持聞思慧者非不障修慧近故偏説四釋微細煩惱現行障四微細煩惱現行障謂所知障中俱生一分與第六識俱之身見等攝是最下品故不作意緣故遠隨現行故以此三義説名微細彼障四地菩提分法入四地時便能永斷彼所知障從昔多與第六識中任運而生之執我見等煩惱同體起故所以説煩惱名今四地中既得無漏菩提分法彼所知障便得永滅此我見等亦永不行初二三地行施戒修相同世間四地修得菩提分法方名出世故能永害此身見等最下品謂唯無記不作意緣謂任運生遠隨現行謂無始來相隨逐也由身見故不能修身念處等觀故障菩提分法由得菩提分法彼障隨斷如明與暗如稱低昂等也初地行施二地行戒三地行於修慧若約別教則久已出世若借通教則相同世間謂歡喜地寄乾慧離垢地寄性地發光地寄八人𦦨慧地寄見地瓔珞經中名為須陀洹地故然通教見地名須陀洹但害分別身見此害微細俱生身見故仍不同若約實義則斷第六識中微細法我見耳寄通明別復何疑哉問曰寧知此身見等但與第六識俱答曰第七識俱之執我見等與無漏道性相違故八地以去方永不行七地已來猶得現起以彼第七識中身見與餘我愛等三煩惱為依持故此第六俱者粗彼第七俱者細伏之自有前後故此地中所斷但與第六相應然身見等之為言亦攝無始所知障攝之定愛法愛彼定愛法愛三地尚增入四地時方能永斷菩提分法特違彼故由斯四地説斷二愚及彼粗重一等至愛愚即是此中定愛俱者二法愛愚即是此中法愛俱者所知障攝之二愚斷故煩惱障攝之定法二愛亦永不行耽玩諸禪三昧名為定愛耽玩聞思修法名為法愛等至者梵云三摩鉢底即八勝處十遍處四無色無想定滅盡定等五釋於下乘般涅槃障五於下乘般涅槃障謂所知障中俱生一分令厭生死樂趣涅槃同下二乘厭苦欣滅彼障五地無差別道入五地時便能永斷由斯五地説斷二愚及彼粗重一純作意背生死愚即是此中厭生死者二純作意向涅槃愚即是此中樂涅槃者凡夫樂生死而不知涅槃固愚也二乘樂涅槃而純厭生死亦愚也總不知生死涅槃並依他起無實法故若無實法同一依他起性則無差別若了達元無差別則既不同凡夫亦豈肯同二乘是故了知生死過患而不純作意背欲於其中求得一切種智故了知涅槃安樂而不純作意向欲令衆生同得無上涅槃故六釋粗相現行障六粗相現行障謂所知障中俱生一分執有染淨粗相現行彼障六地無染淨道入六地時便能永斷由斯六地説斷二愚及彼粗重一現觀察行流轉愚即是此中執有染者以諸行流轉皆是染分攝故二相多現行愚即是此中執有淨者以取還滅門之淨相故相觀多行未能多時住無相觀但能少時入無相觀耳六地最勝般若現前於緣生還滅都無所得即證無染淨真如故能證之道亦名無染淨道也七釋細相現行障七細相現行障謂所知障中俱生一分執有生滅細相現行彼障七地妙無相道入七地時便能永斷由斯七地説斷二愚及彼粗重一細相現行愚即是此中執有生者猶取流轉細生相故二純作意求無相愚即是此中執有滅者尚取還滅細滅相故純於無相作意勤求未能于無相空中善巧起于有為勝行八釋無相中作加行障八無相中作加行障謂所知障中俱生一分令無相觀不任運起前之五地有相觀多無相觀少於第六地有相觀少無相觀多第七地中純無相觀雖恆相續而有加行由無相中有加行故未能任運現相及土如是加行障八地中無功用道故若得入第八地時便能永斷彼永斷故得二自在由斯八地説斷二愚及彼粗重一於無相作功用愚二於相中不自在愚令於相中不自在故此相不惟身相亦攝土相一分故八地以上純無漏道方得任運起故三界煩惱爾時永不現行唯有第七識中細所知障猶可現起以生空智果不違彼細所知障故二自在者任運現相及現土也餘可知九釋利他中不欲行障九利他中不欲行障謂所知障中俱生一分令於利樂有情事中不欲勤行樂修己利彼障九地四無礙解入九地時便能永斷由斯九地説斷二愚及彼粗重一於無量所説法無量名句字後後慧辨陀羅尼自在愚於無量所説法陀羅自在者謂義無礙解即於所詮總持自在於一義中現一切義故於無量名句字陀羅尼自在者謂法無礙解即於能詮總持自在於一名句字中現一切名句字故於後後慧辨陀羅尼自在者謂詞無礙解即於言音展轉訓釋總持自在於一音聲中現一切音聲故二辨才自在愚辨才自在者謂辨無礙解善達機宜巧為説故此愚之用能障此四種自在皆是此中第九障攝由第七識中細所知障以為體性令四無礙解不得自在故名二愚能障九地今登九地此障永斷如明與暗定不俱生也四無礙解者一義無礙解謂了達所詮無礙二法無礙解謂了達能詮無礙三詞無礙解謂了達言音無礙四樂説無礙解即此中所云辨無礙解謂隨機巧説無礙今以障前三種者合名一愚障後樂説者名第二愚十釋於諸法未得自在障又二初正釋此障二兼釋餘障今初十於諸法中未得自在障謂所知障中俱生一分令於諸法不得自在彼障十地大法智雲及所含藏所起事業入十地時便能永斷由斯十地説斷二愚及彼粗重一大神通愚即是此中障所起化他神通事業者二悟入微細祕密愚即是此中障大法智雲及所含藏者大法智雲即能含之智所含藏者即力無畏等諸功德也二兼釋餘障此地於法雖得自在而有餘障未名最極謂有俱生微所知障及有任運煩惱障種直俟金剛喻定現在前時彼皆頓斷入如來地由斯佛地説斷二愚及彼粗重一於一切所知境極微細著愚即是此中微所知障二極微細礙愚即是此中一切任運煩惱障種故集論説得菩提時頓斷煩惱及所知障成阿羅漢及成如來證大涅槃大菩提故由斷煩惱障故證大涅槃名為阿羅漢此借通教義也由斷所知障故證大菩提名為如來此顯別圓義也然通教佛亦斷界內所知障證一切智菩提別圓佛亦斷界外煩惱障證無住涅槃
