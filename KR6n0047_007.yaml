body:
  text: 蕅益沙門智旭述五釋不定心所二初舉頌二論釋今初已說二十隨煩惱相不定有四其相云何頌曰不定謂悔眠尋伺二各二二論釋二初正釋頌文二諸門分別初中三初釋通名二釋別名三釋二各二今初論曰悔眠尋伺於善染等皆不定故非如觸等定遍心故非如欲等定遍地故立不定名善即善性染即不善及有覆無記性等者等取無覆無記性也遍行觸等雖通三性以定遍心故不名為不定別境欲等雖通三性又不遍心以定遍地故亦不名為不定今不遍心亦不遍地但遍三性故立不定之名二釋別名二初釋悔眠二釋尋伺今初悔謂惡作先時惡所作業後乃追悔為性障止為業此即于追悔果假立惡作因名謂先惡所作業後方追悔故悔先不作亦惡作攝如追悔言我先不作如是事業是我惡作此先釋悔也百法論中名為惡作乃是約因立名今則依果故名為悔此通三性者先已作惡今方追悔或先不作善今方追悔皆名為善若先已作善今方追悔或先不作惡今反追悔皆名不善若先作無記事今乃追悔或先不作無記事今乃追悔仍屬無記然悔先作惡悔不作善雖皆名善而苟失方便則被憂箭所傷名為悔蓋故能障止也是故行人修行五悔正貴永斷相續勤䇿衆善非但追思懊惱而已眠謂睡眠令身不自在心極暗昧略緣境界為性障觀為業謂睡眠位身不自在心極暗劣一門轉故昧簡在定之惺惺略別寤時之周悉合顯睡眠非無體用雖有于五無心位中亦假立此極重睡眠之名似無別體然而如餘蓋纏與心相應故故亦定有體用也此次釋眠也心極暗劣故名昧唯一門轉故名略蓋同時意識遍向內外六根門轉今獨頭意識唯向內一門轉略無外五門也此通三性者由眠心所與第六識相應作種種夢若于夢中修行十善六度等事即名為善若於夢中造作殺盜貪瞋等事即名不善非善不善之夢即名無記然衆生無始以來不善無記習氣偏熟善習偏生故睡眠時能障正觀又復夢中作惡是任運惡習故不實損惱衆生故雖名不善不因此而招苦報若于夢中作善是善根成熟故復能熏長善根故雖不實益衆生亦因此而獲功德良以惡雖從性所起由違性故其力則弱善亦從性所起由順性故其力則強也如餘蓋纏者蓋謂五蓋一貪欲二瞋恚三睡眠四掉悔五疑覆障定慧故名為蓋今眠既是蓋即應如貪等亦自有體用纏謂十纏一無慚二無愧三睡眠四沉五掉舉六惡作七嫉妬八慳吝九忿十覆束縛有情令不解脫故名為纏今眠既是纏即如無慚等亦自有體用有義此二唯癡為體瑜伽說是隨煩惱及癡分所攝故有義不然亦通善故應說此二若是染者以癡為體若是淨者即以無癡為體論依染分說是隨煩惱及癡分攝有義此說亦不應理此二亦通無記而無記非癡亦非無癡性故應說惡作以思與慧各一分為體由慧明了由思思擇所作業故睡眠合用思與想各一分為體思想種種夢境相故論俱說為世俗有故彼悔眠之有染汙者乃是癡之等流如不信等說為癡分此下總辨悔眠體相也凡有四義今前三義皆謂別無自體者非有義彼說理亦不然非思慧想為體以悔與眠數數增盛纏繞身心是彼性故應說此二各別有體與餘心所行相別故但以隨癡相說故名為世俗有其實非無自體此第四義為正也初釋悔眠竟二釋尋伺尋謂尋求令心匆務急遽於意言境粗轉為性伺謂伺察令心匆務急遽於意言境細轉為性此二俱以安不安住身心分位所依為業並用思與慧之各一分為體於意言境不深推度名尋及深推度名伺義類別故若離思慧則尋伺二種體類差別不可得故此二等者謂身心有安不安皆依尋伺而起也不深推度則思正而慧助深推度者則慧正而思助餘皆可知二釋別名竟三釋二各二有三義初二義非第三義正二各二者有義尋伺各有染淨二類差別有義此釋不應正理心眠亦有染淨二故應說尋伺是一悔眠是一如前諸染心所有是根本煩惱有是隨煩惱性今此二類之中各有不善及無記之二類或復各有現行纏繞及有隨眠種子之二類也初義妄以二各二句單屬尋伺次義雖知二各二句通於四法而妄謂或是不善無記之二或是現行種子之二故皆不當理也有義彼釋亦不應理以不定四之後乃有此二各二之言故應言頌中初一箇二字者顯二種二一謂悔眠二謂尋伺此二箇二種其種類各別悔與眠別尋與伺別故頌中只是上頭一箇二之為言便即顯此二箇二種此二種二又各有二謂染及不染非如十一善心所及二十六染心所各唯一故或唯簡染惟是煩惱此通不染亦可善攝故說此二各二之言良由諸論有處亦說此四為隨煩惱故今特為顯不定之義說此二各二言故置此二各二之言深為有用第三正義如文可知初正釋頌文竟二諸門分別十三初假實門至十三例結餘門今初四中尋伺定是假有思慧合成聖所說故悔眠有義亦是假有瑜伽說為世俗有故有義此二是實物有唯後二種說假有故然瑜伽中世俗有之為言不過隨他相說非顯前二定是假有又如內種體雖是實而論亦說世俗有故二自類相應門四中尋伺定不相應體類是同粗細異故依於尋伺之有染離染而立三地差別不依彼尋伺之種子現起有無故無濫同雜亂之失此尋伺二法俱與前悔眠二容互相應前悔二眠亦自有互相應義三地別者一有尋有伺地二無尋有伺地三無尋無伺地也恐有難曰尋伺二法既不俱起若在欲界或在初禪本是有尋有伺地中設正起伺之時尋則不起何異無尋有伺地耶故今釋曰依於尋伺有染不染立三地別謂若尋伺俱未離染名有尋有伺地若尋離染伺未離染名無尋有伺地若尋與伺二俱離染名無尋無伺地不依彼種現起有無故無雜亂之失也悔時眠時得有尋伺正睡眠中亦得有悔故皆相應三諸識相應門四皆不與第七第八兩識俱義如前說悔眠唯與第六識俱非前五識相應法故義如前說指初能變二能變中第七相應門所簡示也前五任運緣現在境故不與悔相應眠時五識不行故不與眠相應有義尋伺亦五識俱論說五識有尋伺故又說尋伺即七分別謂有相等雜集復言任運分別謂五識故釋尋伺相應有二義第二為正今初妄謂五識亦與尋伺相應也七分別者一有相分別二無相分別三任運分別四尋求分別五伺察分別六染汙分別七不染汙分別復引雜集意明尋伺即是七種分別今五識既有任運分別應亦有尋伺也有義尋伺唯意識俱論說尋求伺察等法皆是意識不共法故又說尋伺憂喜相應曾不說與苦樂俱故設有難曰尋伺亦有苦樂受俱但是彼論文略例如捨受定俱而亦不說今通之曰捨受遍故可不待說何緣不說與苦樂俱豈非尋伺不與五識相應之一證耶又有難曰前許意地得有苦樂今胡不說尋伺與苦樂俱故又通曰雖初靜慮有意地樂而不離有喜地總說喜名雖純苦處有意地苦而似憂故總說為憂尤見尋伺唯與意識俱矣又說尋伺以名身句身等所詮之義為所緣境非可謂五識身亦得以名身等義為境故當知五識決不與尋伺相應也此第二正義明五識定不與尋伺相應也然瑜伽說五識有尋伺者顯此尋伺多分由彼率爾五識引起非說與彼五識相應雜集所言任運分別謂五識者彼與瑜伽所說分別義各有異彼雜集論所說任運即是五識以五識身亦有自性分別義故瑜伽說此七種分別是與五識俱起分別意識相應之尋伺故彼初家所引為證不成由此五識定無尋伺此更通彼初家所引論文也五識俱分別意識即所謂同時意識餘皆可知三諸識相應門竟四諸受相應門有義惡作與憂捨二受相應唯戚行轉故憂相應通無記故故捨相應睡眠與喜憂捨三受俱起行相通于歡戚中庸轉故歡即喜感即憂中庸即捨尋伺與憂喜捨樂四受相應憂喜捨可知亦得有樂者初靜慮中有意地之樂俱故有義此四亦苦受俱純苦趣中有意地之苦俱故初義缺苦受俱第二義中補出餘並同也五別境相應門四皆容與五別境俱行相所緣不相違故六善所相應門悔眠但與十善容俱此悔眠唯在欲界無輕安故尋伺容與十一善俱初靜慮中輕安俱故七煩惱相應門悔但容與無明相應此行相粗貪等細故睡眠尋伺得與十煩惱俱此彼展轉不相違故八隨惑相應門悔與中二大八隨惑容俱非與忿等十俱以忿等十各為主故睡眠尋伺二十皆容俱起眠等位中皆容起彼二十隨煩惱故九三性相攝門此四皆通善等三性於無記業亦可有追悔故有義初悔眠二唯是生得善攝以悔則行相粗鄙及眠則略故非加行善後二亦通行善攝以聞所成等善法有尋伺故有義初二亦通加行善攝以聞思位中有悔眠故後三皆通有覆染無覆淨二種無記惡作非染解粗猛故若于四無記中悔唯中間威儀路及工巧處二種無記以其行相粗猛非定變化亦非果異熟故眠除第四變化非定所引生故然異熟生之無記第六識心亦得眠故尋伺除初異熟無記彼異熟之解微劣不能尋察名等義故先正明通三性次料簡生得加行二善後料簡有覆無覆二無記及料簡四無記也四無記者一異熟二威儀路三工巧四變化也解即行相也十界繫現緣門又三初明界繫二明現起三明互緣今初惡作睡眠唯欲界有尋伺在欲界及初靜慮餘界地法皆妙靜故無此四法餘界地指色界二禪地三禪地四禪地及無色界四地也二明現起悔眠二法生上地者必不現起尋伺二法生上地及生下地者亦容互起下上三明互緣下地上地之尋伺能互緣于上地境下地境有義悔眠不能緣上悔則行相粗近眠則極昧略故有義此二亦緣上境有邪見者悔修定故夢能普緣所更歷之上界事故尋伺通於欲界初禪故云下上互緣上下悔眠唯局欲界故但明緣上不緣上義初義不緣者非次義亦緣者正也十界繫現緣門竟十一學等三攝門悔非無學離欲界不還之位即捨此悔故睡眠尋伺皆通三種以求解脫者所有有為善法亦皆名學故學究竟者所有有為善法亦皆名無學故一切凡夫及初二果皆得有悔三果以上即更無悔故非無學也凡夫之睡眠尋伺即非學非無學攝初二三果之睡眠尋伺即是學攝四果及八地以上菩薩之睡眠尋伺即無學攝以其雖是有為皆唯善故十二三斷相攝門悔眠唯通見修所斷非非所斷亦邪見等勢力起故所以悔眠皆見可所斷攝非無漏道親所引生故所以眠屬修所斷攝亦非如憂之深求解脫故所以悔屬修所斷攝若於見修已斷悔眠之後仍有眠故即名為非所斷則無學位中之眠乃是非所斷攝無漏道乃非所斷今眠既非無漏親所引生故非非所斷攝無學回心向大深求無上解脫得有憂根名非所斷悔不同憂故非非所斷攝若羅漢有眠佛亦有眠則是非所斷攝然羅漢及佛皆永無夢八地以上菩薩雖稱無學仍有好夢尋伺雖非真無漏道而能引生彼無漏道又從彼無漏道引生故通見修非所斷攝引生無漏之尋伺即修所斷無漏引生之尋伺即非所斷分別煩惱相應之尋伺即見所斷也有義尋伺之非所斷者於五法中唯屬第三分別所攝瑜伽說彼尋伺是分別故有義此尋伺二亦是第四正智所攝以八正道之中說正思惟是無漏故彼思能令心起尋求等故又說彼思是言說之因故未至如來究竟之位於法門藥衆生心行病等未能遍知所以後得智中為他說法必假尋伺非如佛地無功用說故此尋伺二種亦通無漏瑜伽雖說尋伺必是分別而不定說唯屬第三分別性所攝以後得正智中亦有分別故此更約五法判尋伺也五法者一名二相三分別楞伽名為妄想四正智五如如也有漏尋伺見修所斷可屬第三分別無漏尋伺即非所斷宜屬第四正智以是後得智故若至佛果位中則并此無漏尋伺亦斷以如來所有後得妙智任運照機不假尋伺故也十二三斷相攝門竟十三例結餘門餘門准上如理應思謂緣有事無事緣有漏無漏緣事境名境等也第三能變廣釋六位心所別相中正釋別相竟二會示二諦二初略問答二廣問答今初問曰如是六位諸心所法為離心體有別自性為即是心分位差別答曰設爾何失二廣問答二初難即離二答妙理今初二俱有過若離心體有別自性如何聖教說唯有識又如何說唯心遠行獨行又如何說染淨由心又如何說士夫六界又莊嚴論說復云何通如彼頌言許心似善染二法而現如是似貪等或似於信等無別染善法二俱有過是先總難若離心下別難說離之過也士夫即有情六界即地水火風空識不別言心所也餘可知若即是心分位差別如何聖教說心相應以必他性乃名相應非自性故又如何說心與心所俱時而起如日與光瑜伽論說復云何通彼說心所非即心故如彼頌言五種性不成分位差過失因緣無別故與聖教相違此別難說即之過也心王如日心所如光日若即光則光外無日云何空中復見圓日光若即日則日外無光十方世界應同為日心所若即是心其過亦爾又瑜伽頌言若謂心所即是心王則五種取蘊之性不得成就以無受想行三蘊故又若謂但由分位差別而立五蘊者亦有過失以一剎那中其因緣必無差別可得故則與聖教相違蓋聖教說五蘊法同在一剎那中橫具不依前後假立故也二答妙理應說離心有別自性以心勝故所以聖教但說為唯識等又此心所依于心王勢力生故所以莊嚴論中說似彼現非謂彼善染法即是心王又凡識心之言決定亦攝心所以其恆相應故所以諸聖教中唯識等言及現似彼皆無有失然此且依世俗說別有體若依勝義則心所與心非離非即乃至諸識相望應知亦然是謂大乘真俗妙理心王心所種現各別者俗諦也心王心所一一皆非即離者真諦也設非真諦則俗諦無所依體設非俗諦則真諦無可表彰真諦如水俗諦如流與波若知水外別無波流則知波流之外亦別無水真是俗家之真俗是真家之俗實際理地原自不捨一法今事門頭原自不立一塵豈至分河飲水哉故宗鏡云若不了性亦不了相其相即妄若不識相亦不識性其性即孤應須性相俱通方得自他兼利又云楞伽經說諸識有三種相謂轉相業相真相此三種相通於八識謂起心名轉八俱起故皆有生滅故名轉相動則是業如三細中初業相故八識皆動盡名業相八之真性盡名真相智旭曰既八識皆有三相則五十一心所法何不例亦有三相哉故慈恩云識性識相皆不離心心所心王以識為主歸心泯相總言唯識唯遮境有執有者喪其真識簡心空滯空者乖其實此之謂也初明差別等前六門竟二明共依等後三門二初舉頌二論釋今初已說六識心所相應云何應知現起分位頌曰依止根本識七共依門五識隨緣現或俱或不俱如濤波依水八俱轉門意識常現起除生無想天及無心二定睡眠與悶絶九起滅分位門二論釋三初釋共依門二釋俱轉門三釋分位門今初論曰根本識者阿陀那識染淨諸識生起之根本故依止者謂前六轉識以根本識為共依親依阿陀那名通至佛果故偏舉之共依指現行本識乃六識所同依故親依指本識中所藏種子乃六識之各別種故二釋轉俱門五識者謂前五轉識種類相似故總說之隨緣現之為言顯其非能常起緣謂作意根境等緣謂五識身內依本識外隨作意五根五境等衆緣和合方得現前由此或俱或不俱起以外緣合者有頓漸故如水所起濤波隨緣而有多少此等法喻廣說如經五識種類相似者一俱依色根二同緣塵境三俱緣現在四俱有間斷故相似也作意根境等緣者謂眼識藉九緣生一空二明三根四境五作意心所六根本依即第八識七染淨依即第七識八分別依即同時意識九種子依即第八識中所藏轉識種子也耳識藉八緣生不須明緣以暗中亦聞聲故鼻識舌識身識皆藉七緣而生不須空明以合時方知故餘可知三釋分位門二初釋意識常起二釋五位不行初中二初對諸識通明起不起二對前五別明常現起今初由五轉識行相粗動所藉衆緣時多不具故起時少不起時多第六意識雖亦粗動而所藉緣無時不具由違緣故有時不起第七八識行相微細所藉衆緣一切時有故無緣礙令總不行第六意識所藉五緣一意根二法境三作意四根本依五種子依此五種緣一切時中定皆可得唯除生無想天等五位名為違緣也第七識但藉三緣一本識二作意三種子第八識但藉四緣一第七識二作意三境界四種子二對前五別明常現起又五識身不能思慮唯外門轉起藉多緣故斷時多現行時少第六意識自能思慮內外門轉不藉多緣唯除五位常能現起故斷時少現起時多由斯頌中不說此第六識為隨緣現初釋意識常起竟二釋五位不行三初正明五位二釋及與言三判通凡聖初中三初標徵二別釋三總結今初五位者何生無想等二別釋三初釋無想天報二釋二無心定三釋睡眠悶絶今初無想天者謂于因中修彼無想定時有厭患粗想之力所以生彼天中違礙不恆行之心及心所但以想滅為首名之為無想天故六轉識於彼天中皆斷有義彼天從初生乃至命終常無六識聖教說彼天無轉識故說彼天唯有十二有支中之色支而無名支故又說彼為無心地故有義彼天將命終位要起轉識然後命終彼必起下地之潤生愛故瑜伽論說後想生已是諸有情乃從彼天沒故然說彼無轉識等者依長時說非謂全無有義初生彼天時亦有轉識以將生彼天之中有亦必起潤生煩惱故例如餘禪天之本有初生時必有轉識故瑜伽論說若生於彼天唯入定而不起定其想若生即從彼天沒故設使彼天之本有于初生時若無轉識如何可名入定以先有後無乃可以名入故又決擇分言彼天于所有生得心心所滅名無想故此言之意正顯彼天之本有于初生時必有異熟生之轉識暫時現起但由宿習此定之因緣力後乃違此轉識令不復生由斯無想定力引起異熟無記分位差別所以說名為無想天例如加行善根所引生之無想滅盡二定以加行善故所以二定亦得名善今無想定所引生之異熟所以名為無想天也設不爾者則轉識一切不行如何決擇分中可言唯生得之心心所滅故知彼天初生之位轉識亦必暫起初正釋無想天之名義次有義下凡三解第三為正大佛頂經亦云初半劫滅後半劫生也本有指一期現在之身生得心心所指初生時即得現起之心及心所所謂異熟生無記餘可知彼無想天唯在第四靜慮之中以下三禪中其想粗動難可斷故上四空中無此無想異熟處故即能引發無想定之思業能感彼天異熟果故此更釋無想果處及無想果之因種也三禪已下想粗難斷四空滅色存心無想滅心存色故四空天無此無想異熟之處當知無想異熟必寄第四禪天處也思業即思心所令心造作無想定業所熏成種以為其因乃招感於彼天之果初釋無想天報竟二釋二無心定二初略明二廣釋今初及無心二定者謂無想定及滅盡定俱無前六轉識故名無心二廣釋二初無想定二滅盡定今初無想定者謂有異生伏第三禪遍淨天之俱生貪未伏上界之染由永出離想之作意而為先導令不恆行之心及心所得滅想滅為首立無想名令身安和故雖不與定心所相應而亦名定此正釋無想定之名義也遍淨貪及上染皆指六識相應之思惑出離想謂誤認彼處以為涅槃不恆行心心所即前六轉識及彼相應之心所餘可知修習此定品別有三下品修者現法必退不能速疾還引現前後生彼天不甚光淨形色廣大定當中夭中品修者現不必退設退亦能速疾還引現前後生彼天雖甚光淨形色廣大而不最極雖有中夭而不決定上品修者現必不退後生彼天最極光淨形色廣大必無中夭窮滿彼天五百大劫壽量後方殞沒此約三品修因以判三種所招果也現法即現生此定唯屬第四靜慮所攝又唯是善以是彼加行善心等法所引生故下三禪地及上四空地中無有此定由前所說想粗動等之理故此更約界地判及約三性判也四業通三除順現受此更約四業判也四業者一順現受業謂決定猛利心所作善惡能令現世即招苦樂二報二順生受業謂上品心所作善惡能令轉身即決受報三順後受業謂中品心所作善惡能令二生三生乃至百千生後方受其報四不定受業謂下品心所作善惡雜業或受不受以微弱無大力故今無想定下品修者或不定受或順後受或順生受中品修者或順後受或順生受上品修者則順生受決無此世即受彼天果報之理故除順現受也有義此定唯欲界起由諸外道說力起故人中慧解極猛利故有義欲界先修習已後生色界能引現前但除無想天乃至色究竟天不起此定故此更申明起定之處也有兩家解第二周悉無想天不起者由成此定乃感生無想天非于彼天方起此定又彼天壽盡決當退生欲界不更起此定也五不還天皆是聖者故亦不起此定初禪二禪三禪四禪天中皆得引起可知此由厭想欣彼果入故惟有漏非聖所起此更約有漏無漏判也謂修此定者本由厭患粗想欣慕彼無想果然後得入則是非滅計滅故唯有漏而有學無學二種聖人不起此定唯是非學無學攝也初無想定竟二滅盡定滅盡定者謂有三乘無學聖人或復有學聖人已伏或離無所有處之俱生貪于上非非想處之貪則無學已伏或離而有學不定由暫止息想之作意為先令不恆行之心心所及恆行中之一分染汙心心所皆滅故立滅盡之名令身安和故雖不與定心所相應而亦名定又由加行之時偏厭受想故亦名為滅彼受想之定此正釋滅盡定之名義也已伏指有學及頓悟菩薩或離指無學二乘及彼回心者止息想謂厭患勞慮暫取寂靜不計為涅槃也此定亦名滅受想定故更釋彼得名之由修習此定品別有三下品修者現法必退不能速疾還引現前中品修者現不必退設退亦能速疾還引現前上品修者畢竟不退此但判三品不云招果者是無漏道不感異熟也此定初修必依有頂遊歷觀察真無漏理以為加行乃得證入以九次第定之中此滅盡定最居後故雖此定亦仍屬有頂而是無漏所攝若修此定已得淳熟出入自在則于餘地心後亦得現前此判修定之所依也有頂謂三有極頂即非想非非想定是也凡佛弟子欲修滅盡定者必依次第而修謂先以覺觀淨除欲染離生喜樂而入初禪次以內淨捨離覺觀定生喜樂而入二禪次更捨棄喜動離喜妙樂而入三禪次更雙亡苦樂捨念清淨而入四禪次更滅色緣空入無邊空處定次更滅空緣識入無邊識處定次更滅識緣無所有入無所有處定次更滅無所有緣於非想非非想處入非想非非想定次後了知此種極微細想仍是有漏有為即依此定遊觀寂滅真無我理伏滅第六心王心所并伏第七識中俱生我執令不現行乃入此滅盡定是故九次第定此居最後不依有頂不能加行證入也雖依有頂而非有漏以必遊觀無漏方能入故若修至淳熟則隨意出入無不自在或於無所有地心後得入或于識處地心之後得入乃至或於離生喜樂地心之後得入或於欲界散地心後亦得徑入也此定雖屬道諦而是非學非無學攝以其似涅槃故此更約學等三攝判也既屬道諦宜是學無學攝然似涅槃故非學非真涅槃故非無學此定初起唯在人中必由佛及弟子說力乃得起故人中慧解極猛利故若于人中先修得已則于後時生上二界亦得現前塢陀夷經是此誠證以無色天但無業果粗色亦名為意成天元有定果色故所以得依無色定果而入此定也然於大乘詮顯藏識之教未信受者若生無色界中不起此定以恐既無色身又復無心成斷滅故若已信有藏識者生彼無色四天此定亦得現前以其知有藏識不斷滅故此更判起定處也初必人中後通四禪及無色界要斷三界見所斷惑方起此定以諸異生不能伏滅有頂心心所故又復此定微妙要先證于二空隨應後得智之所引發故此更判起定人也異生未斷分別我法二執未證我法二空妙理縱令以欣厭力伏滅無所有處心及心所而於非非想處心及心所決定不能伏滅以彼所修世間有漏道力本劣弱故唯有三乘聖者或於初果位中以根本智先證我空或于初歡喜地以根本智先證我法二空然後隨彼二空之後得智漸次伏滅三界思惑至都盡位乃入此微妙定是中二乘以我空後得智引發此定但伏第七識中微細我執故雖身心度百千劫如彈指頃不能現諸威儀以未達法空故菩薩以二空後得智引發此定兼伏第七識中微細法執故能不起滅定現諸威儀以得法自在故有義于下八地修所斷惑之中要全斷欲界九品思惑餘之七地但伏其惑或亦除斷然後方能初起此定以欲界之惑種不善有覆二性繁雜障定之力強故經論唯說不還果人三乘無學及諸菩薩乃能得此定故彼等隨其所應生上八地皆得後起此定此下更復細判定前所斷惑也有兩家解第二為正今初家謂人中但斷欲界思惑即能起滅盡定後生四禪四空亦皆得起以阿那含果即可得此定故有義要須盡斷下之四地修所斷惑餘之五地但伏其惑或亦除斷然後方能初起此定以下四地中變異受俱之煩惱種子其障定之力亦強故彼等隨其所應生上五地皆得後起此定此第二正解謂人中須斷下四地惑方起此定後生上五地中乃得後起也下四地謂一者欲界五趣雜居地二者初禪離生喜樂地三者二禪定生喜樂地四者三禪離喜妙樂地也變異受謂憂喜苦樂四種受也上五地謂一者四禪捨念清淨地二者空處地三者識處地四者無所有處地五者非非想處地也若伏下惑能起此定後不斷退生上地者豈生上已却斷下惑此下問答釋妨也今先問曰若于第四禪及四空惑但伏不斷即能起此定者假使不還果人後于所伏之惑不斷不退而生無色上地然彼下地惑種尚猶未斷豈既生上地已却乃斷下地惑耶斷亦無失如生上者斷下末那俱生惑故此先縱答也謂假使生上却斷下惑亦無有失如生上地證無學者一時頓斷下九地之末那相應俱生惑故蓋六識中俱生煩惱其相粗顯故三界九地種子次第漸斷第七識中俱生煩惱其相細微故三界九地種子須待金剛喻定方能頓斷也然不還者對治力強正潤生位不起煩惱但由惑種潤上地生又復雖所伏惑有退起有不退起而無伏下生上地義故無生上却斷下失此釋伏難兼正答前問也釋伏難者難曰若得滅定後不斷退而生上地則正生時豈無潤生煩惱今釋之曰然不還果聖人對治力強故潤生位不必起於現行煩惱但由惑種潤上地生耳正答前問者雖滅盡定所伏之惑有退不退而六識中修所斷種必須斷下方得生上本無伏下生上地義故亦無生上却斷下惑之失也且如有人于此已斷初禪二禪三禪思惑又伏第四禪及四空思惑而得此定已後或起第四禪等思惑或不起第四禪等思惑皆不可知但必斷盡第四禪思惑種子方生空處斷盡空處思惑種子方生識處乃至斷盡無所有處思惑種子方生非非想處倘一生中滅定不退雖已永伏非非相想而第四禪惑種未斷命終仍必生于五不還天萬無徑生四空之理也問曰凡夫外道但伏下地思惑亦未曾斷何故展轉得生上地那含聖人何故伏惑不斷反不生上地耶答曰凡夫外道邪見取著故但伏下地思惑即能生于上地報盡之後仍復下墜譬如仰空射箭力盡則墮也那含聖人已破見惑於三界中不復取著但其任運煩惱未能頓斷故下地煩惱漸漸盡時轉轉寄生上地以次斷盡上地煩惱便出塵界譬如火不添薪漸從熄滅也若諸菩薩先于二乘位中已得此滅盡定後方回心向大乘者則于一切三賢十聖位中皆悉能起此定若不爾者或有乃至七地滿心方能永伏一切煩惱雖七地中猶未永斷欲界修所斷惑種子而能如彼不還果人已斷惑者一般亦復能起此定論說已入遠地菩薩方能現起滅盡定故復有一類利根菩薩始從初地即能永伏一切煩惱如阿羅漢彼于初地乃至第十地中皆起此定經說菩薩前六地中亦能現起滅盡定故此更就菩薩以判滅定起位也若不爾者指未得滅定先回心之二乘一切煩惱指三界現行思惑餘皆可知二釋二無心定竟三釋睡眠悶絶無心睡眠與悶絶者謂有極重睡眠悶絶令前六識皆不現行故亦得無心之名蓋由疲勞極重等緣所引身位身勞頓故六情暗閉違前六識令不現行故名極重睡眠此極重睡眠時雖無彼四不定中眠心所之體而由彼引起相似于彼故假說彼睡眠之名復有感冒風熱等緣所引身位亦違六識令不現行故名極重悶絶或此疲極風熱等緣俱是觸處少分所攝二別釋竟三總結除斯五位意識恆起初正明五位竟二釋及與言問曰正死生時亦無意識何故但說五位不行有義正死生位即以頌中及與之言而顯破曰彼說非理所以者何聖教但說六時名無心故謂前五位及入無餘依涅槃界者今但應說死生即悶絶攝彼死生是最極悶絶位故然頌說及與之言為顯五位無雜故耳又頌但言五位不說六時無心者此中欲顯六識斷已後時依本識中各自種子還起由此不說入無餘依以入無餘依後則不起故釋此為二初義非次義正並可知三判通凡聖此五位中異生有四除在滅定聖唯後三於中如來及八地以上自在菩薩唯得存一無極重睡眠及悶絶故凡夫外道皆名異生以未證聖法故不能入滅盡定三乘聖人不入無想定不生無想天八地已上得法自在故無極重睡悶但有時入滅定耳已上從第二卷中間至此初分釋三能變相竟二會三能變俱轉以示二諦三初總明俱轉二料簡俱轉義三結示二諦今初是故八識一切有情心與末那二恆俱轉若起第六則三俱轉餘隨緣合起一至五則四俱轉乃至八俱是謂略說識俱轉義一切有情通指十界聖凡而言之也餘可知二料簡俱轉義共有六番問答今初番問曰若一有情而有多識俱轉如何說彼是一有情答曰若立有情而是依識多少則汝于無心位應非有情又他分心現在前位如何可說自分有情然立有情或依命根數或依異熟識俱不違理彼命根及異熟識俱是恆時唯有一故他分自分乃以六道相望而互論也且如只今為人則以人為自分其餘五道皆名他分然正為人時或忽起天道心或忽起地獄心等若但依識多少而立有情則正起天道識時便應名為天道有情何故仍名為人道有情耶餘可例知命根即依色心連持不斷功能假立異熟識即第八果報無記識也第二番問答問曰一身唯一等無間緣如何俱時有多識轉答曰既許此一等無間緣引多後念相應心所寧不許此亦能引多心王又誰定言此緣唯一說多識俱者許此緣亦多故又如欲于一時取多境者多境現前寧不頓取以諸根境等和合之力既是齊平若謂識必前後次第而生不應理故又如諸心所之體性雖無差別而著等類別者許多俱生寧不許心異類俱起又如水之浪鏡之像依一起多故依一心多識俱轉又若不許意識與五識俱則意識取彼五識所緣之境應不明了喻如獨散意識亦但緣久滅故小乘所執七十五法心法唯一由前滅心引生後心故云一身唯一等無間緣也答中先順答次逆答順答者假使只一等無間緣引生多識亦復無過以彼亦許一等無間引生多心所故次逆答者既許有情各有八識亦許八識各有等無間緣也又汝若不許多識俱轉則色聲香味觸等多境現前一剎那中寧不頓取若謂根境雖齊識有前後則不合理又既許一時有多心所俱生何獨不許一時有多心王俱轉又如水鏡唯一浪像可多則知藏識唯一轉識可多又若不許同時意識與五識俱則意識起時前五已滅便同獨頭意識緣已滅境如何得明了耶第三番問答問曰如何與五識俱唯一意識於色等境乃能取一或多答曰如眼等識各於自境亦能取一或多此意識于五塵境取一或多亦復何失以六識之相見二分俱有種種相故復有小乘妄計有五意識故難唯一意識不應頓取多境答釋可知應立量云同時一意識是有法能取多境宗因云相見俱有種種相故喻如一眼識能取多色等第四番問答問曰何故諸識同類不俱答曰於自所緣若不可了多亦無用若可了者一已能了餘無用故同類不俱謂一剎那中無二眼識並生乃至無二藏識並生也答意可知第五番問答問曰若爾則五識已能各了自境何用俱起意識了為答曰五俱之意識能助五識令起非專為了五識所緣而已又意識於彼五識所緣能明了取異於眼等五識故非無用由此聖教說彼意識名有分別五識不爾五識不爾者但有自性分別不同意識更有隨念計度二種分別也第六番問答問曰多識俱轉何不如心王心所之互相應答曰非同境故設同境者彼此所依體數異故喻如五根之與五識雖亦同境互不相應非同境者眼識以色為境乃至身識以觸為境也難曰同時意識與五識既是同境何不相應釋曰彼此所依體數異故彼五識依五色根此意識依於意根是一異也各有自證分體從自種生是二異也此第六識與五十一心所皆得相應彼前五識唯與遍行五別境五善十一根本三中二大八相應是三異也喻如五根之與五識雖亦同境而根是色法識是心法根為所依識為能依根為能發識為所發根但照境不能了別識能了別而無形像識屬現量根屬比量故不可說如心心所之和順似一而名相應二料簡俱轉義竟三結示二諦八識自性不可言定一以見分行相及所依根所緣境相應之心所四義皆異故又一識滅時餘識不滅故又七是能熏八是所熏如此等相亦各異故然而亦非定異經說八識如水波等無差別故設使定異應非互為因果性故當知如幻事等無定性故此結示俗諦也先明不定一義次明不定異義第八識如水前七識如波波之與水不即不離不一不異因之與果亦復如是故總以如幻結成無性當知無性之俗俗不違真也量云八識是有法非定一異宗因云無定性故喻如幻事如前所說三能變識六位心所差別之相且依四俗諦中第二道理世俗說有此事非謂四真諦中第四真勝義諦亦有此差別也以真勝義中心言絶故此結示真諦也心路絶故不可思言路絶故不可議以心言皆悉無性故名為絶非是離於心言之外別有一箇非心非言境界以為真諦當知無相之真真不違俗是故第八識如水前七識如波真勝義則如濕性非波非水亦不異波水也四俗諦者一假名無實諦謂軍林瓶車等二隨事差別諦謂三科五蘊等三方便安立諦謂苦集滅道等四法假名非安立諦謂二空真理四真諦者一體用顯現諦即第二俗二因果差別諦即第三俗三依真顯實諦即第四俗四廢詮談旨諦即一實真如前一俗唯俗非真後一真唯真非俗中間三位望後名俗望前為真雖云八諦秖云五位今所明八識六位心所即約隨事差別諦說亦名為體用顯現諦以不同外道餘乘所執我法故名為理以不約平等一實真如法性故名世俗如伽他說心意識八種俗故相有別真故相無別相所相無故此結示真俗不二也不變隨緣如舉真金而作衆器故相有別隨緣不變如彼衆器全體即金故相無別以能相所相本無性故謂能即非能所即非所故名為無非離能所之外更立一箇無能無所為真諦也若向此結示中薦取分明則知性相二宗同條共貫更無兩轍故宗鏡録曰智者大師淨名疏中問云今依龍樹之學何意用天親之義答龍樹天親豈不同入不二法門乎今何取捨定執也若分別界外結惑生死及諸行名義當細尋天親所作若觀門遣蕩安心入道何過龍樹故知菩薩製作一一關於聖典故非出自胸臆廣引證明令生聞慧若不先明識論天親護法等剖析根塵微細生死又焉得依龍樹觀門遣蕩如無差別無可圓融若不先診候察其病源何以依方施其妙藥今時多不就己仔細推尋及廣披聖典教觀俱昧理行全虧唯尚隨語依通一時遣蕩拂迹而亦不泯歸空而空不亡以不出法塵全為影事殊不識心王心所種現根隨微細根塵生滅起處心心流注念念現前如醉如癡懵無知者智燈既暗定水全枯未審何門能得清淨噫智者永明皆於性相融通若此而今之學者猶復膠柱鼓瑟不知會歸自心不亦哀哉已上廣明能變三相竟二廣明所變唯識二初正明所變二廣釋外難初中二初結前舉頌二以論釋成今初已廣分別三能變相為自所變相見二分所依云何應知依識所變假說我法非別實有由斯一切唯有識耶頌曰是諸識轉變分別所分別由此彼皆無故一切唯識二以論釋成二初正釋頌文二釋小乘難初中二初約見相二分釋二約轉似外境釋今初論曰是諸識者謂前所說三能變識及彼心所以其皆能變似見相二分立轉變名所變見分說名分別以其能取于相分故所變相分名所分別以是見分之所取故由此正理故知彼實我法離識所變皆定非有以離能取所取之外無別物故非有實物離于能所之二相故是故一切有為無為若實若假皆不離識然此唯之為言但為遮遣離識實物非并遮遣不離識之心所法等有為者心王心所色法及不相應行也無為者虗空擇滅等六無為也實者心王心所色法從緣生也假者不相應行依於色心分位立也以要言之即是五位百法言皆不離識者所謂心王即識自相故心所即識相應故色法即二所現故不相應行即三分位故無為即四實性故然唯遮離識實物非有非遮相應心所為無故唯識言亦攝心所也是中唯遮外境非有識表心及心所非無即遣虗存實觀不云唯相唯見而云唯識即捨濫留純觀不云唯二分而云唯識即攝末歸本觀不云唯心心所而云唯識即隱劣顯勝觀無為即識實性亦不離識乃至如前文云俗故相有別真故相無別等即遣相證性觀也二約轉似外境釋或轉變者謂諸內識轉似我法外境相現此能轉變即名分別虗妄分別為自性故謂即三界心及心所此所執境名所分別即所妄執實我法性由此分別變似外境假我法相彼所分別實我法性決定皆無前引教理已廣破故是故一切皆唯有識但由虗妄分別而有已極成故唯既不遮不離識法故真空等亦是有性由斯遠離增減二邊唯識義成契會中道前引教理指第一卷及第二卷初廣破我法二執之文真空即圓成實性等即依他起性也實我實法名遍計所執性心及心所名依他起性二空真理名圓成實性遍計非有故無增益之過依圓不無故無損減之過不減不增是名中道初正釋頌文竟二釋小乘難九初釋唯識所因難二釋世事乖宗難三釋聖教相違難四釋唯識成空難五釋色相非心難六釋現量違宗難七釋夢覺相違難八釋外取他心難九釋異境非識難初中二初略問答二廣問答今初問曰由何教理而唯識之義可以證成答曰前文豈不已說二廣問答二初問二答今初雖說猶未顯了以前所引教理但為破于他義然非是但破他義而己義便可成立應更確陳以成此唯識教理二答為三初引教二顯理三總證今初如契經說三界唯心又說所緣唯識所現又說諸法皆不離心又說有情隨心垢淨又說成就四智菩薩能隨悟入唯識無境一者了達相違識相之智謂於一處鬼人天等隨業差別所見各異境若實有此所見差別云何得成二者無所緣境而識現可得之智謂緣過未夢境像等非實有境識現可得彼境既無則凡餘現在境亦復應爾三者自應無倒之智謂愚夫智若得實境彼應自然成無顛倒不由功用應得解脫今既不爾則知所執實境但是顛倒妄計四者隨三種妙智境即隨轉之智何等為三一知一切境界隨八地已上心自在者妙智而轉之智謂已證得心自在者隨欲轉變地等皆成假使境若實有如何可變二知一切境界隨觀察者妙智而轉之智謂得勝定修法觀者隨觀一境衆相現前假使境若是真寧隨心轉三知一切境界隨無分別妙智而轉之智謂起證實無分別智則一切境相皆不現前假使境若是實何容不現菩薩成就此四智者於唯識理決定悟入又伽他說心意識所緣皆非離自性故我說一切唯有識無餘此等聖教誠證非一所引諸教並皆可知自性者即心意識之自體也二顯理極成眼等識五隨一故如餘不親緣離自色等宗鏡云第一比量成立五塵相分色皆是五識親所緣緣成其唯識義也量曰極成眼識是有法決不親緣離自識色宗因云極成五識中隨一攝故喻如餘極成四識乃至量曰極成身識是有法決不親緣離自識觸宗因云極成五識中隨一攝故喻如餘極成眼識等餘識識故如眼識等亦不親緣離自諸法宗鏡云第二比量成立第六識并暗成立七八二識皆緣自之親相分不離於識是唯識義也量云極成餘識是有法亦不親緣離自識諸法宗因云是識性故喻如極成眼識等此中但言餘識者以小乘不許七八二識故若言七八二識恐彼不許便犯所別不極成過若只言六識又不能暗立大乘第七第八兩識故也此識所緣定非離此二隨一故如彼能緣宗鏡云第三比量總成立一切親相分不離心體得成唯識也量曰六識親所緣緣是有法定不離六識體宗因云見相二分隨一攝故喻如彼能緣見分所緣法故如相應法決定不離心及心所宗鏡云第四比量成立一切疏所緣緣境皆不離心得成唯識也量曰一切隨自識所緣是有法決定不離我之能緣心及心所宗因云以是所緣法故喻如相應法言相應法者即指前來已成立之親相分也此正成立第八識之相分不離本識望前六識名為疏所緣緣由彼小乘不許第八故但云疏所緣緣即是六識所托之本質境乃第八識親所緣緣此等正理誠證非一結前四量也二顯理竟三總證故於唯識應深信受我法非有空識非無離有離無故契中道我法非有者以是遍計所執性故空謂二空真如即圓成實性識謂心王心所即依他起性空識非無者以其非所執故若執空識亦是遍計遍計本自非有故離有依圓本自非無故離無既離有無理絶情謂故即契中道矣慈尊依此說二頌言虗妄分別故有見相二分於此二分之上實我實法之二決定都無即此依他性中唯有無我無法真空之理於彼真空理中亦有此依他起性故說有為無為一切諸法有依圓故非空無遍計故非不空有無及有故是則契中道此引二頌以證三性圓離有無契會中道即是不思議三諦也虗妄分別有句明染分依他是有即俗諦也於此二都無句明遍計我法本空即真諦也此中唯有空句明依他中有圓成實於彼亦有此句明圓成實不離依他蓋是真俗不二即顯中道第一義諦體也故說一切法非空非不空則一切法無非中道明矣有字即牒第一句無字即牒第二句及有故即牒第三第四兩句一切法有即假也一切法無即空也一切法及有故即中也故中論云因緣所生法即空即假即中為令易解說空假中尅實而言唯一中道以為正體中道離一切相非遍計之所執即為如實空義中道即一切法具依他之緣起即如實不空義雖有空與不空二義而體元非空與不空今既云一切法非空非不空則八識一一非空非不空即是中道法爾具足三諦五十一心所一一非空非不空即是中道法爾具足三諦十一色法一一非空非不空即是中道法爾具足三諦二十四種不相應行亦一一非空非不空即是中道法爾具足三諦六種無為亦復非空非不空即是中道法爾具足三諦此性相兩宗血脉關通最顯著處人都忽而不察奈之何哉此頌且依染分依他而說理實亦有淨分依他染分依他因緣所生六凡法也淨分依他因緣所生四聖法也六凡諸法既已一一即空假中四聖諸法何獨不然故曰十界無非即空假中明文在茲奈何不信初唯識所因難竟二釋世事乖宗難難曰若唯內識似外境起寧見世間情非情物處時身用定不定轉答曰如夢境等應釋此疑此中自有四難一者處定二者時定三者身不定四者依用不定一處定者如南山在南不可以識令其在北故非唯識二時定者如緣山之識生時固自有山然緣山之識滅時山不隨滅故非唯識三身不定者如多人同看燈光其有翳者別見五色重疊則是虗妄可名唯識其無翳者皆見清光則是實境故非唯識四作用不定者復有三難一云如翳眼所見髮蠅等物即無作用好眼所見髮蠅等物即有作用無作用者可名唯識有作用者則是實物何名唯識二云如夢中所得飲食衣服刀仗毒藥即無實用可名唯識覺時所得便有實用何名唯識三云如乾闥婆城則無實用甎土城等則有實用虗實各殊何名唯識答云如夢境等者應引二十頌云處時定如夢身不定如鬼同見濃河等如夢損有用初句答第一處定第二時定難第二第三兩句答第三身不定難第四句答第四作用不定難也一釋處定難者且如夢見有山在南夢中之心更緣北時夢中之山依舊在南豈果有山在於夢心之外耶云釋時定難者且如夢見有山夢中之心緣此山時山固宛然夢中之心不緣山時山亦仍在豈果離於夢心實有山耶三釋身不定難者且如一類餓鬼於恆河處同見膿河雖彼多鬼之所同見豈實有膿河耶若知餓鬼所見膿河唯是自業所招自識妄見則知今人所見燈火清光乃至日月星辰山河國土窮盡十方有漏國土種種依正皆是同分妄見而已豈有識外實境可得四釋作用不定難者且如夢得飲食刀仗等即無實用夢見男女交遘遺失不淨等即有實用既有實無實皆同一夢境則汝所云作用不定何一非唯識耶三釋聖教相違難難曰何緣世尊不但說意法二處而說有十二處答曰彼五根五塵十處亦依本識所變非別實有世尊不過為令衆生入我空觀所以說此六二之法令觀無我喻如為遮斷見故假說相續有情今大乘教為令衆生入法空觀所以復說唯識令知外法亦非有故說十二處為破我執元非實法譬如說續有情但為破斷見耳豈可更計常哉四釋唯識成空難難曰此唯識性豈不亦空設若不爾其義如何答曰識性非所執故謂依識變妄執實法以理推徹了不可得說為法空非謂并無離言正智所證唯識性故而說為法空也此識若無便無俗諦俗諦無故真諦亦無真俗相依而建立故撥無二諦是惡取空諸佛說為不可治者應知諸法有空不空由此慈尊說前二頌此中難意謂由破我故說十二處法法既即空則今由破法執故說唯識識豈不亦空耶答意可知恐又難曰設無此識亦何不可故今答曰此識若無便無俗諦蓋八識及與心所皆名俗諦俗依真立真依俗顯譬如色依空住空依色顯又如波水依濕性立濕性依波水顯真俗不二之旨復見於此誰云性相不同轍哉五釋色相非心難難曰若諸色處亦即以識為體何緣乃似色相顯現又復一類堅住相續而轉答曰無始以來虗妄名言熏習妄作心外堅住相續等想依斯勢力起故非有實物可得然似外色現者與染淨法為依處故謂此相分若無則便應無顛倒妄執便無雜染亦無淨法是故諸識亦似色現如有頌言亂相及亂體應許為色識及與非色識若無餘亦無無妄執則無雜染無雜染亦無淨法蓋染淨是對待法皆依俗諦建立故也是故十界染淨皆名俗諦染淨無性則十界皆空真俗不二則十界皆中明矣亂相者指所變之色相亂體者指能變之心體色識者指所變之亂相非色識者指能變之亂體若無餘亦無者謂若無能變即無所變若無所變亦無能變也宗鏡曰天親唯識論唯是一識復有分別識無分別識分別識者是識識無分別識者似塵識一切法界所有瓶衣車乘等皆是無分別識例得云復有分別色無分別色分別色者如言光明即是智慧無分別色即四大所成色智旭曰分別識者即頌所謂非色識也無分別識者即頌所謂色識也色與非色皆名為識識外更無他法故稱唯識此成唯識論之正旨也例得以下則以亂體名有分別色以亂相名無分別色有分別無分別皆名為色色外更無他法故稱唯色此天台唯色唯香等義所由立也良由諸法無性名字亦空故得作此妙說非尋言逐句者所能思議也又臨濟大師依此義而立四句有時奪人不奪境即一切唯色有時奪境不奪人即一切唯識有時人境俱奪則色識兩亡有時人境俱不奪則色識宛爾又智者大師依此義而立四照一者智照境即有分別識照無分別色也二者境照智即有分別色照無分別識也三者智照智即有分別識照無分別識也四者境照境即有分別色照無分別色也問曰智照智者應是以心緣心則能緣所緣皆有分別何謂有分別識照無別識耶答曰能緣是見分故得有分別用所緣是相分但托彼心以為本質變似心相譬如鏡中之火無能燒用故設使真帶質境亦名無分別識耳六釋現量違宗難難曰色等外境分明見證現量所得寧撥為無答曰五識及同時意識現量證五塵時不執為外後念意識分別計度妄生外想故現量境本是識自相分以即識所變故大乘亦說為有惟彼意識所執外實色等乃是妄計有故大乘說彼為無又色等境皆是非色似色非外似外如夢所緣不可執為實是外色七釋夢覺相違難難曰若覺時色皆如夢境不離識者譬如有人從夢而覺即知彼夢所見色等皆唯心現何故今于覺時於自所緣色境不知皆是唯識答曰如夢未覺之時不能自知所見唯心要至覺時力能追覺其無心外實境只今覺時境色應知亦爾與夢相似未到真覺之位不能自知其非實有至真覺時亦能追覺今既未得真覺則是恆處夢中故佛說為生死長夜由斯未了色境唯識追覺真覺皆是入聲其餘覺字皆是去聲真覺有二一分真覺即初地以上二究竟覺即妙覺極果推而廣之亦有相似覺觀行覺名字覺唯理即覺則是熟睡長夢人也八釋外取他心難難曰外色實無可非內識境他心實有寧非自所緣答曰誰說他心非自識境但不說彼是親所緣謂緣他心者於自心中有似他識之相分生時此所現之似他識相無實作用非如手等之能親執外物非如日等舒光之能親照外境但如鏡等似外境現名了他心非親能了親所了者謂自所變故契經言無有少法能取餘法但識生時似彼相現名取彼物如緣他心既必不能親緣應知緣于色等五塵亦爾不能親緣本質也若達此義則知諸佛心內衆生之心名為無漏相分衆生心內諸佛之心名為有漏相分然諸佛不能令彼衆生之心即證無漏衆生亦不能令彼諸佛之心還成有漏何有少法能取餘法不過還取自相分耳既不能親緣他心但緣自所變相則知亦決不能親緣五塵本質但緣自所變相而已既無外境可緣而妄於中起貪瞋癡起諸見慢大佛頂經所謂自心取自心非幻成幻法也哀哉九釋異境非識難難曰既有異境何名唯識答曰奇哉固執觸處生疑豈唯識教但說只一箇識問曰若不爾者其義如何答曰汝應諦聽若唯一識寧有十方凡聖尊卑因果等別誰為誰說何法何求此先破執唯一識之過也六道為凡三乘及佛為聖佛為聖中之尊三乘為聖中之卑菩薩為因佛地為果或凡聖各論尊卑凡聖尊卑各論因果設無諸佛則誰為能說設無衆生則誰聽所說設無佛說則以何為法設無衆生則何人求法既無凡聖尊卑因果亦無能說所說能求所求便成畢竟斷滅并此一識亦復烏有豈非大邪見哉故唯識言有深意趣須知識之為言乃是總顯一切有情各有八識六位心所所變相見分位差別及彼空理所顯真如識自相故識相應故心心所二之所變故前三種法之分位故前四種法之實性故如是諸法皆不離識所以總立識名若夫唯之為言乃是但遮愚夫所執定離諸識實有色等此正釋唯識二字之旨趣也只此識字收盡五位百法一者心法即是八識二者心所有法即是六位心所共五十一三者色法即是見分所緣相分共有十一四者不相應行法即是心心所色分位差別有二十四五者無為法即是我法二空所顯真如約義說有六也八識是識自相故名為識心所是識相應故亦名識相見是二所變故亦名識不相應行是三分位故亦名識無為是四實性故亦名識心所名識即隱劣顯勝義相見名識即捨濫留純義及攝末歸本義不相應行名識即遣虗存實義無為名識即遣相證性義唯遮愚執離識實有色等等取一切我法二執如前所明也若如是知唯識教意便能無倒善備資糧速入法空證無上覺救拔含識生死輪回非全撥無惡取空者違背教理能成是自利利他大事故定應信一切唯識此結顯唯識教理有大利益也不執遍計為實不撥依圓為無故能無倒無倒之智如目萬行資糧如足目足並運安隱入於法空大清涼地乃至證無上覺盡未來際救度衆生豈惡取空所能成辦也哉初正明所變竟二廣釋外難三初釋分別由何難二釋生死由何難三釋違經三性難初中二初申難舉頌二以論釋成今初若唯有識都無外緣由何而生種種分別頌曰由一切種識如是如是變以展轉力故彼彼分別生二以論釋成二初略解頌文二廣釋頌義初中二初約染種現生染分別二例淨種現生淨分別初中五初釋第一句二釋第二句三釋第三句四釋第四句五總顯頌意今初論曰一切種識謂第八本識中能生諸法自果之功能差別此差別功能能生等流異熟士用增上四類果故名之為一切種此中除離繫果而不言者以離繫果非種生故彼離繫果雖可克證而非種子之果要須現行起于真無漏道斷彼惑結方始得故此現起道雖從無漏種生望於彼離繫果有展轉義然非此頌中正意所說以此頌但說能生分別之種子故此分別種是本識之相分即以本識為體故立識名種離本識無別性故種識二字合言之者簡于非種非識有現識可名為識而非是種有外種可名為種而非是識故又種識之為言顯本識中所持之種非指能持種子之識此差別義後當說故二釋第二句此識中種由現識等餘緣助故即便如是轉變謂從生位轉至熟時顯變種多重言如是謂一切種攝三熏習共不共等識種盡故三熏習者一名言熏習二我執熏習三有支熏習具如下文所明也共相識種能感依報不共識種能感正報復有共中不共不共中共故名為等具如大乘止觀廣說三釋第三句展轉力者謂八現識及彼相應心所相見分等彼於種子亦皆互有相助力故等者等取不相應行雖依色心分位假立自無實體亦有相助力也四釋第四句即從種生之現識等總名分別皆以虗妄分別為自性故分別類多故言彼彼等者等取諸心所法皆能分別故也此等分別復有性受界地現比非量差別不同故云類多五總顯頌意此頌意說雖無外緣由本識中有一切種轉變差別及以現行八種識等展轉力故彼彼分別而亦得生何假外緣方起分別初約染種現生染分別竟二例淨種現生淨分別諸淨法起應知亦然依附本識一切淨種轉變差別及以現行淨法為緣助令生故諸淨法謂三乘智果也初略解頌文竟二廣釋頌義二初徵二釋今初所說種現緣生分別云何應知此緣生相二釋二初正釋緣生二結斥指廣初中三初且明四緣二傍論十因三正示緣生初又二初標二釋今初緣且有四宗鏡云因緣則於有為之門親辦自果無間則為開導之義萬有咸生所緣則具慮託而方成約親疏而俱立增上則有勝勢力不障他緣二釋為四初釋因緣二釋等無間緣三釋所緣緣四釋增上緣今初一因緣謂有為法親辦自果此體有二一種子二現行感果名因助生名緣有為法者簡非無為指色心等親辦自果為因兼有助生之義因即是緣故名因緣種子現行次文自釋種子者謂本識中善染無記諸界地等功能差別能引次後自類功能及起同時自類現果此功能差別唯望彼次後自類及同時現果是因緣性此先釋種子為因緣體也能引次後自類功能即種生種義及起同時自類現果即種生現義此二皆名因緣性現行者謂七轉識及彼相應心所所變相分見分三性三界九地等但除佛果極善與三性中極劣無記之外餘一切法皆熏本識生自類種此轉識等唯望彼自類種是因緣性問曰第八何不能熏答曰第八心品體是所熏若以之為能熏則便無所熏故問曰性界地等何亦能熏答曰非簡所依之自證分獨能熏故問曰何除佛果及劣無記答曰無記極微佛果極圓故所以此二不熏成種此次釋現行為種子之因緣體也宗鏡云前五轉識能熏阿賴耶相分種子第六意識能熏第八相見二分種子第七末那唯熏第八見分種子又云前七識見相二分能熏種以此二分有作用故又云見分與力令相分熏種又見分是自證分與力又云前五識與第八識熏相分種者但熏內身及外器實五塵相分種餘即不熏以不能緣故若第六緣第八見分時熏得見質二種皆是心種即與第八熏得見分種又自熏得第六見分種中間相分即不熏若第六緣第八相分時或熏三種子謂自熏得能緣見分種若現量時亦自熏得相分五塵種又與第八熏得五根塵本質種然多分只熏見質二種第六緣第八三境相分時只熏根身器界種緣種子境即不熏種恐犯無窮過故又云第六能緣第八四分唯熏見相分種者以內二分與見分同是心種故於見分中攝又云第六若緣無為并不相應行及心所中一分假者皆不熏本質種實者即熏以緣假法時但是獨影境故亦不熏相分種其能緣見分種即熏若第七緣第八見分熏種者但熏見質二種定不熏相分種其中間相分但從兩頭合起仍通二性一半從本質上起者是無覆性一半從能緣見分上生者是有覆性現行同類展轉相望皆非因緣以彼各從自種生故一切異類展轉相望亦非因緣不親生故有說異類同類現行展轉相望為因緣者應知假說或隨轉門有唯說種是因緣性彼依顯勝非盡理說聖說轉識與阿賴耶展轉相望為因緣故此簡示結成因緣義也先簡同類現行相引是等無間非是因緣設無種子則現行不能自引現行譬如炷若盡時前𦦨不能引生後𦦨故也次簡異類現行相助是增上緣亦非因緣以其不親生故次示或說現行展轉得為因緣或說唯種是因緣性一是隨轉假說一是但依顯勝次聖說下結成種子現行決定互為因緣初釋因緣竟二釋等無間緣二等無間緣謂八現識及彼心所前聚於後自類無間等而開導令彼後聚自類決定得生等者自類也無間者中無間隔也緣者助生也八現識及彼心所正出緣體為簡色不相應及無為法無有等無間緣義也心王必有心所與之相應和合似一名之為聚前後者顯非同時自類者顯非他類如前眼識望後眼識乃名自類若望耳鼻識等即名他類也多同類種俱時轉故如不相應非此緣攝由斯八識非互為緣此簡種子非等無間緣并簡異類現識亦非等無間緣也且如八識及諸心所各有種子與彼現行俱時而轉就種生現得為因緣現非種引非等無間譬如炷能生𦦨不能引𦦨以引後𦦨者必由前𦦨故也故種與現如不相應非此等無間緣所攝既種與現雖是同類由其種現異故便非此緣則八識現行各各異類尤不相應豈容互作等無間緣哉心與心所雖恆俱轉而相應故和合似一不可施設離別殊異故得互作等無間緣此釋伏難也難曰種子與現行以同時故不為等無間緣八識現行以異類故亦不為等無間緣則心與心所亦是同時異類俱轉如何得作等無間緣耶今釋之曰雖恆俱轉而所依不異所緣相似又必同性是故相應和合似一得為等無間緣也然但約為緣則心與心所便得互作若約為依則又獨指心王如第四卷中所明入無餘心最極微劣無開導用又無當起等無間法故非此緣云何知然論有誠說若此前識等無間彼後識等決定生即說此前識是彼後識等無間緣故此更簡去入無餘涅槃之最後心不名為等無間緣也以更無當起之法則無所用其開導故引證可知問曰若依法華則無有一人入於二乘涅槃而滅度者此云何通答曰彼是顯實此且施權不應為難即依此義應作是說阿陀那識三界九地皆容互作等無間緣下上死生相開等故有漏無間有無漏生無漏定無生有漏者鏡智起已必無斷故無垢善識與無記異熟相望亦然此下別約八識以判等無間緣今先判第八識也鏡智約相應心所相應心所有二十一獨言鏡智者智為勝故善與無記約第八心王相望亦然謂異熟無間有無垢生無垢定無生異熟者問曰此第八識在何界後引生無漏答曰或從色界或欲界後謂諸異生直發大心求佛果者定於色界後身引生無漏第八淨識以因行既滿之後必生在淨居天上大自在宮得菩提故若夫二乘極果回趣大菩提者定於欲界後身引生無漏第八識以回趣所留生身唯在於欲界故彼雖必往大自在宮方得成佛而本願力所留生身是欲界故有義色界亦有聲聞回趣大乘願留身者既與教理俱不相違是故聲聞之第八無漏色界心後亦得現前然五淨居天中無回趣者經不說生彼天者發大心故此兼論第八引生無漏之界地也色界亦有聲聞回趣大乘謂阿那含生色界已證阿羅漢身未入滅即留色界之身以俟功德成滿也然生五淨居天則無回趣之義以彼多屬定性聲聞故耳問曰大佛頂經云從是有頂色邊際中若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢何故此云經不說彼發大心耶答曰大佛頂經雖屬方等然是純明圓理故得出塵而為菩薩成唯識論雖亦大乘然是帶通明別故入無餘則無心智即今所謂大自在宮得菩提者亦是帶劣勝應身相以劣唯閻浮勝須華藏今寄淨居乃是梵網千釋迦之一耳起信論中亦同此意理雖圓別事猶帶通權實相須其旨非淺聖意難測但應仰信第七轉識三界九地亦容互作等無間緣隨第八識生處繫故有漏無漏容互相生十地位中得相引故善與無記相望亦然於無記中染與不染亦相開導以生空智果前後位中得相引故此欲色界有漏得與無漏相生非無色界以地上菩薩不生彼無色界故此判第七識之等無間緣也平等性智相應名為無漏我法二執相應名為有漏十地位中入法空觀則名無漏出法空觀則名有漏故互相生無漏即是善性有漏即無記性故云相望亦然又我法二執相應名為有覆亦名為染伏斷我執但與法執相應名為無覆亦名不染初二三果聖人入生空觀位中則名不染未入之前已出之後則名為染故亦互相引也鈍根二乘得生無色以厭色故地上菩薩不生無色以無益故然菩薩若證二十五王三昧亦必應現無色今亦依權說耳第六轉識三界九地有漏無漏善不善等各容互作等無間緣潤生位等更相引故初起無漏唯在色界後心以決擇分善唯在色界有故此判第六識之等無間緣也二空觀智皆名無漏無漏唯善我執相應名為有漏有漏則有善惡有覆無覆不同然皆互相引生決擇分善即暖等四加行位所修善根要依四禪方發無漏故云唯色界後所謂因定發慧也然人中若能成就四禪即名四禪後心非謂必生四禪天上眼耳身識于欲色二界雜居離生二地鼻舌兩識唯于一欲界一雜居地各以自類互作等無間緣善等相望應知亦爾有義五識有漏無漏自類互作等無間緣未成佛時容互起故有義無漏五識在於有漏五識後起非無漏五識之後容起有漏五識以無漏五識非佛無故彼因位中之五色根定有漏故以根是異熟識之相分攝故若謂有漏不共必俱同境之五根而能發無漏五識理不相應故此二於境明昧異故此判前五識之等無間緣也互作謂六道相望善等即三性差別次釋有漏無漏有兩家解初義非次義正明昧異者無漏根發成所作智相應五識則於境明有漏根發有漏五識不論善惡無記皆於境昧也二釋等無間緣竟三釋所緣緣三所緣緣謂若有法是帶己相心或相應所慮所托此體有二一親二疏帶彼相起故名所緣助生於識故復名緣謂若有法者即能為生緣義簡遍計所執其體是無縱是所緣而無緣義也是帶己相者即顯是所緣義簡根及種子識無其相雖得為緣而非所緣也具此有法帶相二義名所緣緣而心王與心所之或相應者以此為所慮處即以此為所托處所慮故名為所緣所托故復名為緣宗鏡云一有所慮非所托即遍計妄執我法等是以無體故二有所托非所慮即鏡水所照物等是以鏡水非能慮故三俱句即一切所緣緣實相分是四俱非即除鏡水等所照外餘不緣者是若此相分與能緣之見分同一所依體不相離是見分等內所慮託應知彼是親所緣緣此先釋親所緣緣也體不相離謂四分唯是一體宗鏡云一有親所緣緣從質及心變起即五識緣五塵相分是二有親所緣緣但從心變不仗質起即第八緣三境相分是三有親所緣緣不由心變亦不由質起即根本智所證真如是四有親所緣緣而非相分即內二分互相緣是若此本質與能緣之見分體雖相離然借為質能起內所慮託應知彼是疏所緣緣此次釋疏所緣緣也親所緣緣但是能緣之心決定皆有以離內所慮託必不生於能緣心故疏所緣緣能緣之心或有不定以離外所慮託亦得生於能緣心故此即第二卷所謂自心內法一切皆有自心外法或有或無也宗鏡云一有本質相分是實性境即前五識及明了意識初念并少分獨頭意識是二有本質相分是假即有質獨影及帶質境是三無質相分是假即無質獨影是四無質相分是實性境即第八心王緣三境及本智緣真如是真如即是實相故名為相而根本智非有相分也又云帶有二義一者挾帶二者變帶相亦二義一者體相二者相狀若根本智緣真如是挾帶體相而緣是所緣緣乃至內二分相緣及自證分緣見分亦是挾帶體相名所緣緣若有漏心心所及無漏後得智見分緣境之時變相而緣不論有質無質皆是變帶相狀名所緣緣又云但是相分皆名變帶若不變相分直附境體即名挾帶第八心品有義唯有親所緣緣隨業因力任運變故有義亦定有疏所緣緣要仗他變質自方變故有義二說俱不應理自他身土可互受用他所變者為自質故則初家惟有親所緣緣不應理也自種於他無受用理他變為此不應理故則次家定有疏所緣緣亦非理也且一切有情法爾有五性差別非諸有情種皆等故應說此第八心品其疏所緣緣于未轉已轉等凡一切位中有無不定此下別約八識判所緣緣親疏有無之義今先判第八識也有三家解第三為正未轉位中根身種子定無疏所緣緣器界及他人浮塵根身得有疏所緣緣已轉位中鏡智緣真定無疏所緣緣鏡智緣俗得有疏所緣緣又緣現在則有本質若緣過未則無本質故云有無不定第七心品未轉依位是俱生我法二執故必仗第八識之見分以為外質故亦定有疏所緣緣已轉依位此非定有若緣淨識為無我境仍有疏所緣緣若緣真如及過未等則便無外質故第六心品行相猛利於一切聖凡位中皆能自在而轉故其所仗外質或有或無當知疏所緣緣有無不定前五心品未轉依位粗鈍劣故必仗外質五塵性境故亦定有疏所緣緣已轉依位此非定有成所作智通緣過未等法無外質故此判前七轉識所緣緣親疏有無之義也或有外質指同時意識或無外質指獨頭意識餘可知三釋所緣緣竟四釋增上緣四增上緣謂若有法有勝勢用能於餘法或順或違俱能為緣是故名增上緣雖前三緣亦是增上而今第四除彼前三收取其餘為顯諸緣差別相故此順違之勝勢用於四處轉謂生住成得四事別故有法亦指有體之法也或自有體或依色心分位假立即以色心等法為體均是依他起性非同遍計所執故名有法由此法故未生諸法或順令生或復違令不生已生諸法或順令住或復違令不住未成諸法或順令成或復違令不成未得諸法或順令得或復違令不得故名為增上緣然增上用隨事雖多而勝顯者唯二十二應知即是二十二根一眼根二耳根三鼻根四舌根五身根此五名五色根六男根七女根八命根九意根十苦根十一樂根十二憂根十三喜根十四捨根此五名五受根十五信根十六進根十七念根十八定根十九慧根此五名五善根二十未知當知根二十一已知根二十二具知根此三名三無漏根前五色根以本識等所變眼等淨色為性識等等取自種子眼等等取耳鼻舌身淨色謂清淨四大即第八識上色之功能非外所造非同粗顯色香味觸可得見嗅嘗觸但是比量所知而已男女二根身根所攝故即以彼身根之少分為性命根但依本識親種分位假立非別有性等無間意根總以八識為性若八識自類心心所聚前望於後即是等無間緣所攝今不論自類他類總於後念諸心心所生住成得有順違用故總立為增上緣之意根五受根如應各以自受為性信等五根即以善心所中信等及別境中之善念等而為自性苦樂憂喜捨五受即五受根體性善中信勤別境中善念善定善慧即五根體性此五善根且指有漏善言之也未知當知根位有三種一根本位謂在見道十五心中唯除最後第十六心之一剎那以第十六剎那無所未知可當知故即屬已知根攝二加行位謂暖頂忍世第一法近能引發根本位故三資糧位謂從為欲得諦而修現觀故發起決定勝善法欲乃至未得順決擇分已前所有善根名資糧位能遠資生根本位故於此三位信等五根及意根喜根樂根捨根合為此未知當知根性然在加行等位於後勝法求證愁戚亦有憂根但以非正善根故多不說見道一十五心之中所有信進念定慧意喜樂捨正屬無漏以是出世無間道故未證解脫故名未知無間必證故名當知故以此為未知當知根本位也加行近能引發此位資糧遠能資生此位雖所修者猶是有漏五善根等而有漏善為增上緣助熏本有無漏信等種子指彼無漏法爾種子在於資糧加行位中得有漏善所資熏故漸漸增長成熟將來必得發真無漏現行是故名為未知當知無漏善根前三無色有此根者有勝見道傍修得故或二乘位回趣大者為證法空地前亦起九地所攝生空無漏彼皆菩薩此根攝故菩薩見道亦有此根但說地前以時促故若論未知當知根正於四禪中有以初果見道必依第四禪故然除非非想天前三無色界天亦得有此根者謂有一類勝見道人雖依四禪而發無漏亦能傍修得上三定故於空處識處無所有處亦有未知當知根也又二乘所證三界九地生空無漏雖分未知已知具知三根差別而以菩薩視之則皆屬未知根攝以未證法空故是故二乘回趣大者雖已具證三界九地所證生空無漏而法執未伏猶屬資糧位攝今為證法空故地前亦起此未知當知根也菩薩見道下釋疑謂有疑曰聲聞見道一十五心猶名為未知當知根之根本位直俟十六心滿方名為已知根何故菩薩之未知當知根但說在地前耶今釋之曰菩薩在於無間道中理應亦有此根而但說地前者以菩薩見道之時促故蓋聲聞見道須觀苦集滅道四安立諦歷下上界便有八諦故有八忍八智一十六心名為十六剎那其時則長菩薩見道惟觀真如非安立諦雖多剎那事方究竟而相等故總說一心其時則促也始從見道最後剎那乃至金剛喻定所有信等無漏九根皆是已知根性未離欲者於上解脫求證愁戚亦有憂根非正善根故多不說二乘第十六心證預流果菩薩無分別智登歡喜地皆名見道最後剎那那含最後心等覺最後心皆名金剛喻定二乘已證我空真如菩薩已證法空真如故皆名已知根不說憂根之義如文可知諸無學位無漏九根一切皆是具知根性羅漢支佛圓證生空諸佛如來圓證法空故皆名具知根也八地已上亦名無學望於二乘則名具知望於如來猶名已知有頂雖有遊觀無漏而不明利非後三根此釋疑也疑曰若但前三無色得有三無漏根則有頂非非想天亦可遊觀無漏而入滅定何無二十二根之後三根耶故今釋曰雖依有頂遊觀無漏得入滅定然此滅定由止息想作意為先但使勞慮不行而不明利蓋欲斷惑證真必須無漏現觀今入滅盡定者前六轉識一總不行非可依之斷惑證理以其無勝勢用故非無漏三根也大佛頂經云現前雖成九次第定不得漏盡成阿羅漢正是此意是故若欲盡漏須修勝生空觀二十二根自性如是諸餘門義如論應知謂業用假實乃至界繫等餘門分別並如瑜伽地論五十七卷中廣明也初且明四緣竟
