body:
  text: 蕅益沙門智旭述夫萬法唯識雖驅鳥亦能言之逮深究其旨歸則耆宿尚多貿貿此無他依文解義有教無觀故也然觀心之法實不在於教外試觀十卷論文何處不明心外無法即心之法是所觀境了法唯心非即能觀智乎能觀智起則二執空而真性現所以若境若教若理若行若果皆名唯識而五位五觀一以貫之紛而不雜賾而不亂者也慨自古疏失傳人師異解文義尚訛理觀奚賴鈍者既望洋而退利者復蔑裂而求四分之旨未諳一心之宗徒設三性之理未究二諦之致安歸賴有開蒙問答梗概僅存大鈔宗鏡援引可據而溯流窮源則瑜伽顯揚諸論尤似黃河之有宿海於是紹覺法師為之音義一雨法師為之集解宇泰居士為之證義無不殫精竭思極深研幾然教道已明觀道未顯嗣有新伊法師為之合響力陳五觀冠諸家以其尚未刊行流布故僅獲染指不克飽餐適二三同志擬從能變所變差別之途以開性具性遍圓融之鑰漫爾饒舌兼命管城不敢更衍繁文秪圖直明心觀隨講隨録用質大方將釋論文先申凡例諸家著述貴在引證以明可據未免文義雜糅不便初機今領會諸家之旨自抒淺顯之文不令句讀艱澀觀者恕之西域外道實繁有徒故破之不得不詳今彼黨既無何勞細究不過借彼我法二執以為言端破之以顯二空真理而已若欲窮其出處自當廣閲大鈔諸書科含大意不可不立然子科太繁亦能割裂論文令人眩目今從簡略以便時機性之與相如水與波不一不異故曰性是相家之性相是性家之相今約不一義邊須辨明差別不可一概儱侗又約不異義邊須會歸圓融不可終滯名相文字為觀照之門若不句句消歸自己則説食數寶究竟何益故標題曰觀心法要以此論成立唯識道理即是觀心法門不同法華別立觀心釋也法華廣明本迹佛法故須更約觀心此論直詮衆生心法但可開粗顯妙而已衆生妄識本妙由我法二執所以成粗但破二執便顯妙理然設句句開顯恐或反成儱侗故仍隨文釋義但於提綱挈領之處略指點之大文為二初題目二入文初中四初正釋題二明頌主三明論主四明譯師今初成唯識論梵語毗若底此云識梵語摩怛喇多此云唯梵語悉底此云成梵語奢薩怛羅此云論應云識唯成論今言成唯識論者蓋梵文先所後能此方先能後所也今依梵文次第釋之識者了別義謂心王心所皆能了別自所緣故心王有八一眼識二耳識三鼻識四舌識五身識六意識七末那識八根本識眼識了別自相分色耳識了別自相分聲乃至意識了別自相分法末那任運了別妄執內自我相本識任運了別根身器界及諸種子心所有五十一具如文中廣明必與心王相應故唯識之名亦攝心所也唯者獨義除此心王心所之外決無實我實法可得故也成者成立義以三支八支成立唯識道理三支者一宗二因三喻八支者一立宗二辨因三引喻四同類五異類六比量七現量八正教量也論者研窮決擇辨析闡揚教誡學侶垂範後昆也復次大乘具明五位百法今但名唯識者以心法有八即自性唯識心所法有五十一即相應唯識色法十一即唯識所變不相應有二十四即唯識分位無為法有六即唯識實性故也又古釋明五義一境唯識二教唯識三理唯識四行唯識五果唯識又復言唯識者具五種觀一遣虗存實觀唯遮外境非有即遣遍計之虗識表內心不無是存依圓之實也二捨濫留純觀若論自證分轉成見相二分則相分內境本是依他起性不同外境之無應云唯見唯相今恐相分濫同所計外境故但云唯識即是捨濫留純也三攝末歸本觀相見二分皆依自證分起今攝相見之末歸於自證之本故直云唯識即唯是自證體也四隱劣顯勝觀若論心王心所各有四分應云唯心心所但心所劣心王勝心所不能為主心王有自在義舉王則能攝所如舉帝王必有臣佐故隱心所之劣但顯心王之勝直名為唯識也五遣相證性觀相者依他起性如幻事等性者圓成實性即二空所顯真如是故論云諸心心所依他起故亦如幻事非真實有為遣妄執心心所外實有境故説唯有識若執唯識真實有者如執外境亦是法執又云如前所説識差別相依理世俗非真勝義真勝義中心言絶故如伽陀説心意識八種俗故相有別真故相無別相所相無故又云此諸法勝義亦即是真如常如其性故即唯識實性當知唯識二字即是遣相證性故宗前敬敘即云稽首唯識性也論有宗論釋論今天親三十頌即是宗論亦名本論護法等十菩薩所造百卷論文即是釋論亦名末論也五重玄義者單法為名唯識實性為體即是二空所顯真如五唯識觀斷障證果為宗攝之秪是二空妙觀初之二觀具遣凡外我法二執令達二空後之三觀為遣微細法執令其深達法空二空既達二障隨斷斷煩惱障證真解脫斷所知障證大菩提也遮執生解為用大乘生酥以為教相二明頌主天親菩薩造頌梵語婆藪槃豆此云天親弟兄三人長名無著先修禪定即得離欲思惟空義不能得入欲自殺身賓頭盧尊者為説小乘空觀如教觀之即便得入意猶未安謂理不應止爾因乘神通往兜率天咨問彌勒菩薩為説大乘空觀還閻浮提如説思惟地六種動尋便得悟因此名阿僧伽譯為無著爾後數上兜率咨問大乘經義隨有所得還為人説聞者多不生信因自發願欲令衆生信解大乘惟願大師下閻浮提解説大乘彌勒即如其願每于夜時下閻浮提放大光明集有緣衆於説法堂誦出十七地經凡四月夜方竟即今瑜伽師地論也因此衆人皆信大乘第二子名天親博學多聞遍通諸部神才俊朗戒行清高執小乘解不信大乘無著恐其造論破壞大乘遣使報云我今疾篤汝可急來天親隨使與兄相見咨問病源兄曰我今心病由汝而生汝不信大乘恆生毀謗以此惡業必永沉淪我今愁苦命將不全天親驚懼即請兄解説大乘隨得解悟於是就兄廣學悉得通達咎昔毀謗欲割舌以謝其罪兄云汝舌善巧毀謗大乘欲滅此罪亦當善巧解説大乘遂製十地論攝大乘論此二論是創歸大乘之作既又採撮玄機提控精邃著唯識三十頌以暢大乘妙趣三明論主護法等菩薩造梵語達磨波羅唐云護法達羅毗茶國大臣之子少而爽慧王愛其才欲妻以公主菩薩久修離欲無心愛染將成之夕特起憂煩於佛像前懇祈加護願脫茲難感大神王携負送置一山寺佛堂中僧謂為盜菩薩自陳由委聞者驚嗟因即出家專精正法究通諸部等者等於親勝火辨德慧安慧難陀淨月勝友陳那智月九大論師也十師各造釋十卷故卷有百慈恩基師以其旨殊見異稟者無依固請奘師糅成十卷然而文多影略以護法為司南故首標護法也四明譯師唐三藏法師玄奘譯唐者李氏有天下之國號三藏者經律論也法師者正法自軌弘辨導人玄奘者法師之諱親遊西域傳法相宗具如慈恩傳中廣明譯者翻梵成華以此易彼也入文為三初宗前敬敘分二依教廣成分三釋結施願分初中二初歸敬述意二造論因緣今初稽首唯識性滿分清淨者我今釋彼説利樂諸有情初二句是歸敬後二句是述意也稽首二字是能歸唯識性等是所歸能歸須具三業今口稱稽首以表敬意則三業具足所歸秪是三寶今唯識性即法寶滿清淨者即佛寶分清淨者即僧寶然唯識有五位百法此獨稱性以是所依故復是所證故究竟位中轉八識成四智轉依如之生死成依如之涅槃出障圓明名滿清淨通達位後先轉六七二識成妙觀察平等性智斷十重障證十真如名分清淨此之三寶有情本具無始迷背不自覺知天親菩薩造三十頌本為利益安樂有情故先歸命三寶求于加被釋彼三十頌中所説之義令諸有情得生解起行之利臻斷障證果之樂乃護法等造論之深意也二造論因緣二初通為利生二別為破執今初今造此論為於二空有迷謬者生正解故生解為斷二重障故由我法執二障具生若證二空彼障隨斷斷障為得二勝果故由斷續生煩惱障故證真解脫由斷礙解所知障故得大菩提迷謂迷理不達我法二空也謬謂謬執妄執實我實法也由今論中以真比量真能破執真能立理故使迷謬之人得生正解解二空故不起我法二執則斷煩惱所知二障斷煩惱障則不隨其生死相續證大涅槃名真解脫斷所知障則于所知事理無復障礙得無礙解名大菩提二別為破執又二初破凡外二破四師今初又為開示謬執我法迷唯識者令達二空於唯識理如實知故謬執我法具如下文所列所破今既令達我法二空便如實知唯識相性此遣虗存實觀之力也二破四師復有迷謬唯識理者或執外境如識非無或執內識如境非有或執諸識用別體同或執離心無別心所為遮此等種種異執令於唯識深妙理中得如實解故作斯論四師所執雖各不同而於唯識深妙之理皆悉迷謬故作論以遮遣之初云或執外境亦如識之非無此即有宗依於阿含教中説十二處遂妄計為心境俱有不知阿含但是立十二處以明無我非謂五根六塵果是心外實法也今明六塵俱是識之相分五根俱是色之功能非外四大所造亦是遣虗存實觀之所治次云或執內識亦如境之非有此即清辨依于大乘教中所説一切無性遂妄計為心境皆無不知大乘但明諸法無實意令遣相證性非是撥無俗諦成惡取空也今明識是依他起性四分皆有但相分非在於心外見分不離於識體雖無實我實法仍有緣起差別乃捨濫留純觀攝末歸本觀之所治三云或執諸識用別體同此即一類菩薩依于大乘教中所説心性是一能生一切諸法如一水鏡多波像生遂妄計為識體定一不知大乘但明理體無二亦令遣相證性非謂八識種現當體行相總無差別也今明八識各從種生各有現行所依不同所緣亦別此識滅時餘識不滅又復各具四分見相二分是用用固各別自證證自證之二分是體體亦非同良由如來藏心不思議故舉體而為眼識之四分復舉體而為耳鼻等識之四分非分一如來藏而為八識亦非八識只共一如來藏又非八識便成八如來藏此與泥團微塵之喻自不相侔是故約真諦則相無別體用俱泯不得但云體同約俗諦則相有別體用俱分不得但云用別又若約所依理體則一尚叵得如何復説用別若約八識當體則相各有異又如何可説體同當知水鏡波像之喻自有二義一者遣相證性義則如來藏性如水如鏡八識體用俱如波像固不得云諸識用別體同二者攝末歸本義則八識之各各內二分一一如水如鏡其各各相見二分一一如波如像亦不得云諸識用別體同今此一類大乘依於遣相證性義中而起妄執故為攝末歸本觀之所治四云或執離心無別心所此即經部依于經中所言士夫六界復言染淨由心遂計心所但是依於識之分位假立無別實有不知經中乃約心王勝故所以但説由心及説地水火風空識名為六界然既説心王必有心所與之相應故唯識言亦攝心所此從隱劣顯勝義中起執仍為此觀所治蓋但隱心所之劣非竟無心所也斯論所明實無外境唯有內心體用條然王所宛爾能令四執渙然冰釋于唯識理如實而解不乖異故名之為如真比量也非影響故名之為實真現量也二依教廣成分三初略答外難略標識相二廣明識相顯前頌意三明修行位次初中二初托問舉頌二以論釋成今初若唯有識云何世間及諸聖教説有我法頌曰由假説我法有種種相轉彼依識所變此能變唯三謂異熟思量及了別境識問意在説有二字謂説有則非無答釋在假説二字謂假説則非實有也餘如論文自釋二以論釋成二初釋前三句二釋後二句初中二初略釋二廣釋初中二初正釋二結判初又三初釋第一句次釋第二句後釋第三句今初論曰世間聖教説有我法但由假立非實有性我謂主宰法謂軌持世間説有我法是無體隨情假隨自執情妄名為我法故如有情命者等實德業等是也聖教説有我法是有體強設假隨位隨緣假施設故如預流一來等蘊處界等是也主有自在力宰有割斷力又主是體宰是用約主宰義故名為我軌範可生物解任持不捨自相約軌持義故名為法世間妄計為實聖教知由假立也次釋第二句彼二俱有種種相轉我種種相謂有情命者等預流一來等法種種相謂實德業等蘊處界等轉謂隨緣施設有異有情命者等謂十六知見世間所妄執之我也預流一來等謂三乘名位聖教所假説之我也實德業等謂勝論六句及餘種種世間所妄執之法也蘊處界等謂三科開合及四諦十二因緣六度十力一切法相聖教所假説之法也隨緣施設有異者且如五蘊和合妄計有我施設有情之名妄計色心連持不斷別有實體施設命者之名斷分別惑施設預流果名斷欲界思惑六品施設一來果名乃至斷盡我法二執施設羅漢如來果名又為迷心重者施設五蘊之名為迷色重者施設十二處名乃至為治六蔽施設六度名等後釋第三句又二初徵起總釋二約義別釋今初徵曰如是諸相若由假説依何得成釋曰彼相皆依識所轉變而假施設二約義別釋二初釋聖教假説所依二釋世間假説所依今初識謂了別此中識言亦攝心所定相應故變謂識體轉似二分相見俱依自證起故依斯二分施設我法彼二離此無所依故先釋八識皆是了別之義謂眼識了別色耳識了別聲乃至第八識了別根身器界種子也識之為言亦攝心所以心王決定與諸心所恆相應故自證是識體相見二分皆依體起依此相見二分施設種種我法故彼我法二名離此相見二分更無所依夫我法但依相見施設則我法非有相見不無即遣虗存實觀也相見俱依自證而起則用不離體體外無用即攝末歸本觀及捨濫留純觀也識言亦攝心所即隱劣顯勝觀也二釋世間假説所依或復內識轉似外境謂由我法分別熏習力故諸識生時遂即變似我法此似我法之相雖復仍在內識而由虗妄分別故似外境幻現諸有情類無始時來遂妄緣此似我法之相分執為實我實法譬如病患及睡夢者由于患夢力故心似種種外境相現雖無外境而患夢人緣此種種似相執為實有外境前文聖教假説所依通于八識及諸心所此中世間假説所依局在第六意識前是依他起性由依他故得起遍計此是遍計執性由遍計故亦熏依他也故宗鏡云護法正義一切心心所四分皆依他起於中妄執為決定實者方名遍計執性乃至於圓成性及五塵性境若堅執為實者亦名遍計所執然本來無體龜毛兔角等不對執心即非遍計性今亦多有妄認龜毛等為遍計性者非也初正釋竟二結判又二初判假實二判有無今初愚夫所計實我實法都無所有但隨妄情而施設故説之為假內識所變似我似法雖有而非實我法性然似彼我法而現故説為假初即無體隨情假次即有體強設假也二判有無外境隨情而施設故非有如識內識必依因緣生故非無如境由此便遮增減二執非有如識謂非如識之有非無如境謂非如境之無也執境為有是增益謗執識亦無是減損謗今成立唯識遣虗存實故能遮止二執境依內識而假立故唯世俗有識是假境所依事故亦勝義有識外我法固如龜毛兔角決定非有識內相分之境亦如水月鏡華但約世俗假名為有非實有也若夫識體則是假境所依事體義通真俗故約勝義亦得名有也勝義即四真諦中第一體用顯現諦此更約二諦以判有無即捨濫留純義初略釋前三句竟二廣釋三初徵答總標二徵答別釋三總結無實今初云何應知實無外境唯有內識似外境生答實我實法不可得故二徵答別釋二初破我執二破法執初中三初假問徵起二正破我相三問答釋妨今初如何實我不可得耶二正破我相三初敘破外小所執二立量以顯唯識三結判俱生分別初中三初別破六師三計二別破小乘三計三總約識根塵破初又二初敘計二破斥今初諸所執我略有三種一者執我體常周遍量同虗空隨處造業受苦樂故二者執我其體雖常而量不定隨身大小有卷舒故三者執我體常至細如一極微潛轉身中作事業故第一執即勝論計作者名我數論計受者名我第二執即無慚及尼犍子所計第三執即獸主及遍出所計故名六師三計二破斥為三初破常遍次破不定後破至細今初初且非理所以者何執我常遍量同虗空應不隨身受苦樂等又常遍故應無動轉如何隨身能造諸業此先約受者作者以破非常遍也動乃有業故無動轉則不能造業又所執我一切有情為同為異若言一切有情同一我者則一有情作業時一切有情亦應作業一有情受果時一切有情亦應受果一有情得解脫時一切有情亦應解脫此則世間不成差別安立便成大過若言一切有情之我體各異者諸有情之我更相遍故其體便應相雜又處處皆有一切有情之我所遍則一有情作業一有情受果時與一切有情之我其處所更無別故亦即應名為一切有情之所作所受此更約我體同異以破常遍義皆不成也若謂作受各有所屬無斯過者理亦不然業果及身與諸我合屬此非彼不應理故恐彼救云我體雖復各遍而作受各有所屬故無一作一受應名一切所作所受之過今牒破云理亦不然蓋我體既遍則業果及身必與諸有情之我體合若仍屬此而非屬彼既有偏屬便不名遍與我體周遍之理不相應故又一有情解脫時一切有情皆應解脫以所修證之法亦與一切有情之我體合故既一作一切作一受一切受亦應一解脫一切解脫既作受解脫各有所屬則常遍之義不成矣次破不定中亦非理所以者何我體設使常住不應隨身而有舒卷既有舒卷則便如𬃖籥風應非常住又我既隨身大小應即如身之可分析如何可執我體一耶故彼所言如童豎戲文義並顯不必更解後破至細後亦非理所以者何既云我量至小如一極微如何能令大身遍動若謂我體雖小而速巡身如旋火輪似遍動者則所執我非一非常諸有往來非常一故先破小我不能令大身動次破往來則非常一以或往或來故非常往者不是來者故非一也初別破六師三計竟二別破小乘三計二初敘計二破斥今初又所執我復有三種一者即蘊二者離蘊三者與蘊非即非離此三皆即附佛法之外道也二破斥三初破即蘊二破離蘊三破非即非離今初初即蘊我理且不然我應如蘊非常一故先總破也蘊生滅故非常蘊有五故非一又內諸色定非實我如外諸色有質礙故此下別破先破色蘊非我內諸色謂五根身外諸色謂五塵境此身假借四大所成與外四大五塵毫無差別既有質礙便可分析豈可執為我哉量云色身是有法定非實我宗因云有質礙故喻如外色心心所法亦非實我不恆相續待衆緣故此破受想行識四蘊非我心即八識心王即識蘊也心所即五十一心所即受想行三蘊也前六識及相應心所悉皆不恆相續眼識待九緣生耳識待八緣生鼻舌身識待七緣生意識待五緣生故非實我第七第八兩識雖恆相續亦待三緣四緣而生亦非實我然餘乘本不知有第七第八兩識故不復論今但破彼妄計六識心王受想行之心所為我而已量云心心所是有法定非實我宗因云不恆相續待衆緣故喻如聲等餘行餘色亦非實我如虗空等非覺性故此更破不相應行及法處所攝色非我以此不相應行及法處色雖無形質非覺性故量云餘行餘色是有法定非實我宗因云非覺性故喻如虗空初破即蘊竟次破離蘊中離蘊我理亦不然應如虗空無作受故所執之我既離五蘊則非色非心應如虗空不能作業亦不受報又豈可喚虗空為我耶三破非即非離後俱非我理亦不然既許依蘊立我又非即蘊離蘊則所執我應如瓶等依泥團立非即泥非離泥但是假法非實我故又既不可説有為無為亦應不可説是我非我故彼所執實我不成先立量云彼所執非即離蘊之我是有法定非實我宗因云許依蘊立故喻如瓶等次更以有為無為例破蓋若即五蘊則是有為若離五蘊則是無為今非即蘊則不可説有為又非離蘊則不可説無為既不可説有為無為又豈可説是我非我而執有實我不亦謬乎二別破小乘三計竟三總約識根塵破三初約思慮有無破即約識破二約作用有無破即約根破三約所緣是否破即約塵破今初又諸所執實有我體為有思慮為無思慮若有思慮應是無常非一切時有思慮故若無思慮應如虗空不能作業亦不受果故所執我理俱不成先雙徵次別破後總結並可知二約作用有無破即約根破又諸所執實有我體為有作用為無作用若有作用如手足等應是無常若無作用如兔角等應非實我故所執我二俱不成亦雙徵別破總結可知三約所緣是否破即約塵破又諸所執實有我體為是我見所緣境不若非我見所緣境者汝等云何知實有我若是我見所緣境者則應有我見者非顛倒攝以其如實知故若爾果然如實不倒如何執有我者所信阿含等至教仍皆毀斥我見稱讚無我而言無我見者能證涅槃執著我見沉淪生死豈有邪見能證涅槃正見翻令沉淪生死亦先以是不總徵次別破也先破若非我見所緣則既非所緣云何知有此易可解次破若是我見所緣則應我見果見實我便非顛倒既我見非是顛倒則應反成正見而無我反為邪見矣如何無我之邪見至教中反稱讚為能證涅槃如何有我之正見至教中翻訶毀為沉淪生死耶初敘破外小所執竟二立量以顯唯識又諸我見不緣實我有所緣故如緣餘心此先以真比量而破能緣也量云諸執我之見是有法必不能緣于實我宗因云以其有所緣故喻如緣餘法之心蓋凡餘心所緣但能緣自所變相分決定不能緣心外法則今諸執我見亦但能緣自所變之相分妄計為我而已豈心外果有實我而我見果能緣之也哉我見所緣定非實我是所緣故如所餘法此更以真比量而破所緣也量云我見之所緣者是有法決定非實我宗因云以是我見之所緣故喻如所餘色等五塵之法蓋色等五塵但是五識所變相分非心外有實境也今所執實我既是我見所緣亦但即是我見所變相分而已豈真有實我哉問假使外人不許有相分色則同喻應犯無俱不成之過答縱使外人不許有相分色而所緣五塵外境變壞無常亦得與無實我無同喻也是故我見不緣實我但緣內識變現諸蘊隨自妄情種種計度初一量破能緣則顯我見是倒顛見而非正見次一量破所緣則顯實我是非量境而非性境故今結成唯識所變識外決無實我也二立量以顯唯識竟三結判俱生分別二初結屬二種二判其有無初結屬二種然諸我執略有二種一者俱生二者分別俱生我執無始時來虗妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識之見分以為本質隨即變起第七識自心中之影子以為相分遂妄執為內自實我二有間斷在第六識緣第八識所變五取蘊相之或總或別托此為質隨即變起第六識自心中之影子以為相分遂妄執為實我此二我執細故難斷直待見道之後修道位中數數修習勝生空觀方能除滅分別我執雖有無始內熏之因亦必由於現在外緣力故非與身俱要待邪教為緣及稟邪教而內起邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所説即離俱非等蘊相托為本質隨即變起第六識自心中之影子以為相分分別計度執為緣我二緣邪教所説大小不定等我相托為本質隨即變起第六識自心中之影子以為相分分別計度執為實我此二我執粗故易斷初見道時觀一切法中衆生本空所顯真如之理即能除滅邪教所説蘊相即附佛法之外道所説邪教所説我相即外道六師所説也餘可知二判其有無又三初約相質判有無二約依遍判有無三引證今初如是所説一切我執自心外蘊或有或無自心內蘊一切皆有是故我執皆緣無常五取蘊相妄執為我自心外蘊謂本質自心內蘊謂相分也餘可知二約依遍判有無然諸蘊相從緣生故是如幻有妄所執我橫計度故決定非有從緣生謂依他起性橫計度謂遍計所執性也三引證故契經説苾芻當知世間沙門婆羅門等所有我見一切皆緣五取蘊起二正破我相竟三問答釋妨二初正釋妨難二結成唯識初中三初約憶識誦習釋二約造業受果釋三約生死涅槃釋今初實我若無云何得有憶識誦習恩怨等事答所執實我既常無變後應如前是事非有前應如後是事非無以後與前體無別故若謂我用前後變易非我體者理亦不然用不離體應常有故體不離用應非常故先問難次答破也答中先約前後有無破謂我既常恆無變則前必如後後必如前後若如前則前本無憶識誦習恩怨等事後不應有前若如後則後既有憶識誦習恩怨等事前不應無以後與前體無別故次若謂下約體用常無常以破轉計恐轉計云我用不妨前後變易我體則常無變故破之云理亦不然以體用決不相離用不離體則體常用亦應常體不離用則用既無常體亦應非常故然諸有情各有本識一類相續任持種子與一切法更互為因熏習力故得有如是憶識等事故所設難於汝有失非於我宗此既約前後體用以破我執乃申明得有憶識等事之理也本識謂第八識一類謂唯是無覆無記相續謂無間而轉任持種子謂能持世出世種一切法謂前七轉識及心所法并色法等更互為因謂諸法現行熏于本識即以諸法為本識之因本識所藏種子生起現行即以本識為諸法之因由此熏習力故得有憶識等事何須有實我哉故所設難於汝有失者結前兩番破斥非於我宗者結後申明正理也二約造業受果釋若無實我誰能造業誰受果耶答所執實我既無變易猶如虗空如何可能造業受果若有變易應是無常此亦先問難次答破也若無變易則無造無受猶如虗空虗空豈是實我若有造有受則有變易應是無常無常又豈實我哉然諸有情心心所法因緣力故相續無斷造業受果於理無違此亦既約無變易有變易以破我執乃申明得有造業受果之理也八識心心所法現行種子互為因緣相續生起恆無間斷造業受果理皆得成又何須別執實我哉三約生死涅槃釋我若實無誰於生死輪回諸趣誰復厭苦求趣涅槃答所執實我既無生滅如何可説生死輪回常如虗空非苦所惱何為厭捨求趣涅槃故彼所言常為自害此亦先難問次答破也文義並顯然有情類身心相續於相續中起諸煩惱造作諸業以此惑業之力所以輪回諸趣受苦復由厭患諸趣苦故所以求趣涅槃此亦既破彼執復申正理也初正釋妨難竟二結成唯識由此故知定無實我但有諸識無始時來前滅後生因果相續由妄熏習似我相現愚者於中妄執為我初破我執竟然此虗妄我執乃分段生死之根本無餘涅槃之大障毫忽未盡仍名有漏故大佛頂經云現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實正謂此也此且約俱生我執言之若夫大小不定之戲論即離俱非之謬談則是分別所起名為見惑此惑不除終成凡外是故欲為佛弟子者先須向此論文隨義觀察必使我執蕩然不萌方於佛法有造修分其或不然縱令持戒坐禪廣學博聞我見未伏秖成附佛法之外道而已可不畏哉二破法執二初總問徵起二正破諸執今初如何識外實有諸法不可得耶外道餘乘所執外法理非有故二正破諸執三初敘破外小所執二立量以顯唯識三結判俱生分別初中二初破外道二破餘乘初又三初假問徵起二別破十三家三總破四句今初外道所執云何非有二別破十三家五初破數論二破勝論三破自在天等八論四破二種聲論五破順世師論初又二初敘執二破斥今初且數論者執神我之性是思受用薩埵剌闍答摩所成大等二十三法然此大等二十三法以薩埵等三事合成是實非假現量所得薩埵此翻有情亦翻勇亦翻貪剌闍此翻塵坌亦翻微亦翻瞋答摩此翻暗亦翻黑亦翻癡彼計冥初自性即薩埵剌闍答摩三事能成一切諸法自性初生大亦名覺慧覺生我慢慢生五微亦名五唯一聲二觸三色四香五味也五唯生五大一空二風三火四水五地也五大生十一根一耳二身三眼四鼻五舌名五知根六語具七手八足九小便道十大便道名五作業根十一肉團心名平等根此二十三法皆第二十五神我之所受用二破斥二初正破二結非初中七初破所成不實二以能所互破三以體用互破四破三合成一五約合不合破六破各有三相七破所成無別今初彼執非理所以者何大等諸法多事成故如軍林等應假非實如何可説現量得耶量云後執所生大等二十三法是有法應假非實宗因云薩埵等多事成故喻如軍林二以能所互破又大等二十三法若是實有應如本薩埵等三事非待三事合成又薩埵等三即大等故應如大等亦待三事合成轉變非常為例亦爾由彼妄計能成三事即所成大等二十三法故以能所互相破奪之也言轉變非常為例亦爾者三事是能成故彼許能轉變大等是所成故彼許為非常然彼謂能成即是所成則本事既能轉變大等亦應能轉變矣大等既屬非常本事亦應非常矣三以體用互破又三本事各多功能體亦應多能體一故三體既遍一處變時餘亦應爾體無別故三本事各多功能者謂能造二十三法故也故以體從能則體亦應多以功能與體性是一而不相離故若謂三事之體遍於二十三法故非多者則三體既遍三能亦遍一處變為二十三法之時餘處亦復應爾各頓變起二十三法以體既遍則彼處此處更無別故四破三合成一許此三事體相各別如何和合共成大等一相不應未合是三合時變為一相以合時之體與未合時體無別故若謂三事體異相同便違己宗體相是一三事之體應如大等之相則亦冥然是一大等大相應如三事之體則亦顯然有三此則應云一合成一或云三合成三故不應言三事和合共成大等一相又本事之三是別大等俱三所成是總汝執總別皆是實法是一類故應非一三先正破次若謂下破轉計言違己宗者彼計薩埵相即薩埵體乃至答摩相即答摩體故又三是別下更約總別破言應非一三者總應如別是三非一別應如總是一非三也五約合不合破此三變時若不和合成色等一相者則應如未變時一般如何現見是一色等若三事和合成一相者應失本未變時三事別相相失則體亦應隨失先破不合次若三下破合也不可説三各有二相一總二別總即別故總亦應三如何見一此破轉計也恐轉計曰薩埵等三各有二相一總二別因別相故未合是三因總相故合時見一今破之曰不可説三各有總別二相假令三法各有二相而薩埵上之總相非剌闍答摩上之總相乃至答摩上之總相非薩埵剌闍上之總相是則總即別故總亦應三如何現見是一色等耶六破各有三相若謂三事之體各有薩埵等三相但以和合雜沓而難了知故唯見是一者既有三相寧見為一又三事既平等各有三相復如何知三事有異又若彼一一事皆具三相應一一事即能成于色等何所闕少而更待三和合方成色等法耶又三事皆具三相則三事之體亦應各各有三以彼計體即相故七破所成無別又大等二十三法既皆以三事合成則展轉相望應無差別是則所計三事之因二十三法之果及唯量諸大諸根差別一一皆不得成若爾則一根應得一切境或應一境而為一切根所得世間現見情與非情淨穢等物現比量等皆應無異便為大失唯量即五唯諸大即五大諸根即十一根也一根應得一切境者以根根皆三事所成無差別故或應一境一切根所得者以境境亦三事所成無差別故初正破竟問後文如來五根一一皆於五塵境轉不幾為數論解難耶答如來由達諸法無性永斷俱生法執種子故一一法皆稱真性任運圓融彼方妄計心外實法情執熾然觸途成礙豈能藉口于諸根互用哉二結非故彼數論所執實法不成但是妄情計度為有二破勝論二初敘執二破斥今初勝論所執實等句義多分是實及有自性是現量所得之境彼執六句勝義一實二德三業四大有五同異六和合也一實句者執有九種一地二水三火四風五空六時七方八我九意二德句者執有二十四種一色二香三味四觸五數六量七別性八合九離十彼性十一此性十二覺十三樂十四苦十五欲十六瞋十七勤勇十八重性即堅十九液性即暖二十潤即濕二十一行去聲即動二十二法二十三非法二十四聲三業句者執有五種一取二捨三屈四伸五行平聲四大有句者彼執離實德業之外別有一法為體由此大有乃有實德業故五同異句者如地望地有其同義望於水等即有異義地之同異是地非水水等同異其義亦然彼亦執為離實德業有別自體六和合句者謂法和集由和合句如鳥飛空忽至樹枝住而不去由和合句故令有住等二破斥二初正破二結非初中二初明諸句體非實有二明諸句非現量得初中八初破諸句中常無常二以實德二句對破三破實句有礙常四破諸句無礙法五約實有二句互破諸句六破大有性七破同異性八破和合句今初彼執非理所以者何諸句義中且常住者若能生果應是無常有作用故如所生果若不生果應非離識實有自性如兔角等諸無常者若有質礙便有方分應可分析如軍林等非實有性若無質礙如心心所應非離此有實自性此先總立四量破彼所執諸句義中常無常法一一非實有也彼執六句義中或有是常或是無常然皆妄計實有今故不必細辨但以四量而總破之先立二量破彼所計常住實法由彼所計常住實法有能生果者有不生果者初破能生果者量云汝所執能生果之常住實法是有法應是無常宗因云有作用故喻如所生果二破不生果者量云汝所執不生果之常住實法是有法應非離識實有自性宗因云無作用故喻如兔角次立二量破彼所計無常實法由彼所計無常實法有有質礙者有無質礙者初破有質礙者量云汝所執有質礙無常之心外實法是有法非實有性宗因云有方分故可分析故喻如軍林二破無質礙者量云汝所執無質礙無常之心外實法是有法應非離識有實自性宗因云無質礙故喻如心心所二以實德二句對破又彼所執地水火風有法應非有礙實句義攝宗身根所觸故因如堅濕暖動喻即彼所執堅濕暖等有法應非無礙德句義攝宗身根所觸故因如地水火風喻地水火三對青色等俱眼所見準此應責故知無實地水火風與堅濕等各別有性亦非眼見實地水火風彼計地水火風是實句攝以有質礙故堅濕暖動是德句攝以無質礙故今先以德句無質礙為同喻破彼所執實句有質礙之非次以實句有質礙為同喻破彼所執德句無質礙之非以其同一身根所觸之因無別因故既無別因如何妄計實有質礙德無質礙定各實有耶地水火三等者量云又彼所執地水火有法應非有礙實句義攝宗眼根所見故因如青等色喻即彼所執青赤等色有法應非無礙德句義攝宗眼根所見故因如地水火喻故知下結顯無性謂彼所執實德句義既皆不成則知地水火風與堅濕暖動皆無實法而人妄謂眼見地水火風亦豈實有識外之地水火風哉蓋地水火風秪是第八識所變相分與堅濕暖動其性無二皆非心外實法而眼見時又托彼第八識之相分以為本質自於眼識變起相分以為所緣并不實見本質境也眼若果見實火何以不熱果見實水何以不濕乎三破實句中有礙常又彼所執實句義中有礙常者有法皆有礙故因如粗地等喻應是無常宗四破諸句中無礙法諸句義中色根所取無質礙法有法應皆有礙宗許色根取故因如地水火風喻五約實有二句互破諸句又彼所執非實句攝之德等五句是有法應非離識有別自性宗非實攝故因如石女兒喻非大有句攝之實等五句是有法應非離識有別自性宗非有攝故因如空華等喻六破大有性彼所執大有性是有法應離實等無別自性宗彼許大有性非無故因如實德等喻若大有性離於實等有法應非是大有性宗彼許異實等故因如畢竟無等喻如有非無無別有性如何實等有別有性若離有法有別有性應離無法有別無性彼既不然此云何爾故彼有性唯妄計度先立二量以破大有若許為有則不應離實德業若許其離實德業則應是無此易可知如有非無下更以理徵破也彼謂因此大有乃能有實德業大有是能有實德業是所有能不是所故必各別今難之曰若實德業必須有別大有句以有之則此大有句更當有一有性以有之矣如大有非無而無別有性以有之如何實德業非無乃須別有此大有性以有之耶又若離實等有法可許別有一箇大有性則應離非實等無法亦可許別有一箇無性矣彼無法之外既無別無性則此有法之外云何乃有別有性耶故彼所執離實德業之大有性唯妄計度而已七破同異性又彼所執實德業之同異性異實德業之體而別有者理定不然此先總斥下立量破勿此同異性亦并非實德業上之同異性既異於實等之體別有同異性故喻如德業之體非實體等彼計實句非德句德句非業句同異句非實德業句而仍就實德業上展轉論同異性故今破云彼所執同異性是有法應非實德業之同異性宗因云異實德業故喻如德業句非實句又應實等法即非實等攝以異實等同異性故喻如德業實等各無同異也前一量破同異性與實德業不相干此一量破實德業與同異性不相干也量云實德業是有法即非實德業攝宗因云異于實德業同異性故喻如德業實等蓋同異性不過依于諸法假立彼既妄執別有自體不即諸法則諸法亦不即同異矣若同異不即諸法則將以何為同以何為異若諸法不即同異則實望實不得名同實望德業不得名異既無同異則不應或名為實或名為德或名為業矣地等諸同異性對地等體更相徵詰準此應知同異性是有法非地等上之同異性宗異地等別有同異性故因喻如水火風等又應地等是有法即非地等宗因云異地等同異性故喻如水火風地等蓋同異性既離地水火風則地水火風亦必離同異性同異若離于地則如水火及風地若離于同異則望地不得名同望水火風不得名異展轉皆無同異又豈可喚作地水火風哉如實性等無別實等性實等亦應無別實性等若離實等有實等性應離非實等有非實等性彼既不爾此云何然故同異性唯假施設此亦更以理徵破也彼計由同異性令實德業成同成異能同異者非所同異故是別有若然則應更有一同異性令此同異得成同異便有無窮之過今既如實德業之同異性等無別實德業之同異性而使其成同異性則實德業之外亦應無別實德業之同異性等而使實德業成同異矣又若許離實德業別有實德業之同異性應離非實德業亦別有非實德業之非同異性彼非實德業之外既別無非同異性則此實德業外云何別有同異性耶故同異性唯假施設不可妄執為實有也八破和合句又彼所執和合句義有法定非實有宗非有實等諸法攝故因如畢竟無喻彼許實等現量所得今以理推徵尚非實有況彼自許和合句義非現量得而豈可實有耶設彼更執和合是現量境由前理故亦非實有初明諸句體非實有竟二顯諸句非現量得然彼所執實等諸句是有法非緣離識實有自體現量所得宗彼自許是所知故因即是意識非量所緣喻如龜毛等此先明諸句非現量境也又彼緣此實句之智是有法非是果能緣於離識實句自體現量之智所攝宗但與假法和合而生起故因如緣德句智等喻廣説乃至彼緣和合句之智是有法非緣離識和合自體現量之智所攝宗假合生故因如實智等喻此更明能緣非現量智也蓋所緣六句之境既無實體則能緣六句之智同為非量矣初正破竟二結非故勝論者實等句義亦是隨情妄所施設亦者承上數論而言明其同皆妄執無優劣也三破自在天等八論二初破大自在二例破餘七初中二初敘二破今初有執有一大自在天體實遍常能生諸法彼計此天有四德一體實二遍三常四能生諸法二破彼執非理所以者何若法能生則有作用必非常故諸非常者必不遍故諸不遍者非真實故若使體既常遍具諸功能應一切處一切時頓生一切法若謂必待衆生樂欲或待種種助緣方能生者即涉三因違自己唯一大自在天為因之論又或欲及緣亦應頓起以大自在天之因是常有故先以能生破常遍真實次以常遍具諸功能而破能生遍則一切處應生常則一切時應生具諸功能則一切法應頓生若待欲及緣則非一因若許一因則欲及緣亦應頓起以欲及緣亦大自在天而為因故二例破餘七餘執有一大梵時方本際自然虗空我等常住實有具諸功能生一切法皆同此破一計大梵常住實有具諸功能生一切法二計時三計方四計本際即是渾沌五計自然六計虗空七計神我皆云當住實有具諸功能生一切法皆同大自在天破也三破自在天等八論竟四破二種聲論二初敘二破今初有餘偏執五明論中聲論是常以其能為決定不易之量以表詮諸法故有執一切聲性皆是常住不從緣生但是待緣顯發方有詮表二破彼俱非理所以者何且明論之聲是有法既許能詮表故因應非常住宗如所餘聲喻以餘聲亦能詮表故餘一切聲是有法亦應非實有常聲體宗如瓶衣等喻待衆緣故因四破二種聲論竟五破順世師論二初敘二破今初有外道執地水火風之極微是實是常是能生於粗色所生粗色不越因量所以雖是無常而體實有於極微有三計一計實二計常三計能生粗色於所生粗色但計實有也粗色亦名子微即所生之果因量亦名父母微即是極微乃能生之因謂所生粗色全以極微為體故不越于因量既不越因量故雖無常而體實有二破二初破能生極微二破所生粗色今初彼亦非理所以者何所執極微是有法若有方分因如蟻行等喻體應非實宗此先破實也極微若有方分則聚而成物應如蟻行謂必有來去相故若無方分因如心心所喻應不共聚生粗果色宗此次破能生也如心心所既無形質不可聚作粗色故既能生果因如彼所生喻如何可説極微常住宗父必與子相似子既無常父安得常二破所生粗色二初破不越因量二破因果同處初又二初正破二破救今初又所生果既不越於因量便應仍如極微不名粗色則此果色同於極微應非眼等色根所取便違自執所生果是有法不名粗色應非眼等色根所取宗因云不越因量故喻如極微言便違自執者彼執能生極微不可見聞嗅覺所生之果定可見聞嗅覺故也二破救又三初破量德合二破遍自因三破多分合今初若謂果色乃因量與粗德合故非粗似粗由斯故是色根之所能取先敘救辭也不越因量故非粗與粗德合故似粗所執果色有法既同因量因應如極微喻無粗德合宗或應極微有法亦粗德合宗如粗果色喻處無別故因果色既同因量果同因則應非粗因同果則亦應粗矣二破遍自因若謂果色遍在能成自體之極微因上由其因非一故果亦可名粗者則此果色體應非一如所在因處各別故既爾此果還不成粗由此亦非色根所取先敘計云果色遍在自因者謂所生果遍在能生極微因上由能生有多極微故使果色成粗也次破又二先申量云彼執所生果色是有法體應非一宗因云處各別故喻如所在因謂一一極微各住自位也既爾下又以各住自位還不成粗非眼所能見等破之三破分多合若果多分合故成粗多因極微合應非細足成根境何用果為既多分成應非實有則汝所執前後相違彼轉救云粗色不由極微因量但以所生之果是多分合故成粗色而為色根所取破曰若是則但將多多因量極微合時亦應非細足成五根所取之境更何用所生之果色耶又果色既是多分合成便可分析應非實有汝前何云不越因量而體實有豈不前後自語相違初破不越因量竟二破因果同處二初正破因果同處二破救果體是一今初又果與因既皆實有則俱有質礙應不同處如二極微汝所執果色因量是有法應不同處宗因云俱有質礙故喻如二極微若謂果因體相受入如沙受水藥入鎔銅此敘轉計也謂因入果色果則受因果入因微因則受果異體同居故同沙之受水藥之入銅寧不同處誰許沙銅體受水藥或應離變非一非常先奪破曰沙銅雖與水藥同處而沙自沙水自水銅自銅藥自藥誰許體受水藥次縱破曰或應受則可離不妨傾水存沙入則須變便見銅改其體可離則非一體變則非常非一則何名不越因量非常則何云體是實有二破救果體是一又粗色果體若是一得一分時應得一切以彼分此分體是一故彼分應如此分若汝不許得一切者便違體一之理若汝許得一切便違世間之事故彼所執進退不成但是隨情虗妄計度恐彼救云因相雖多果體是一故破之也進即是許退即不許餘可知二別破十三家竟三總破四句二初總標二別破今初然諸外道品類雖多所執有法不過四種二別破為四初破法與性一二破法與性異三破亦一亦異四破非一非異今初一執有法與有等性其體定一如數論等彼執非理所以者何勿一切法即有性故皆如有性體無差別便違所執薩埵等三德與所生我等二十三法體相各異亦違世間現見諸法差別又若色等即色等性色等應無青黃等異有法謂所生大等二十三法有性謂能生冥性即薩埵剌闍答摩三德也量云所執二十三法是有法體應無別宗因云即有性故喻如有性餘可知二破法與性異二執有法與有等性其體定異如勝論等彼執非理所以者何勿一切法非有性故如己滅無體不可得便違所執實等自體非無亦違世間現見有物又若色等非色等性應如聲等非眼等境有法謂實德業有性謂大有性也量云彼所執實德業是有法體不可得宗因云非有性故喻如己滅無又彼所執色是有法應非眼境宗因云非色性故喻如聲等彼所執聲是有法應非耳境宗因云非聲性故喻如色等三破亦一亦異三執有法與有等性亦一亦異如無慚等彼執非理所以者何一異同前一異過故一之與異二相相違其體必應別故若執一異體同決定但不成故勿一切法皆同一體一異同前一異過者謂一則過同數論異則過同勝論也設使一異相反而可同體勿一切法皆可同一體故或應一異是假非實而執為實理定不成若達一異是假非實如水火影同現鏡中縱説亦一亦異有何不可而彼妄執為實則定無此理矣四破非一非異四執有法與有等性非一非異如邪命等彼執非理所以者何非一異執同異一故謂非一便同於異非異便同於一也非一異言為遮為表若唯是表應不雙非若但是遮應無所執亦遮亦表應互相違非表非遮應成戲論謂汝非一非異之言為但是遮遣耶為唯是表顯耶若唯是表則或以非一表異或以非異表一可矣應不雙非若但是遮則應更無所執何得仍執有法與有等性兩皆是實若云亦遮亦表則應展轉相違若云非表非遮畢竟了無實義而成戲論又非一異則違世間共知有一異物亦違自宗色等有法決定實有是故彼言唯是矯強避過諸有智者勿謬許之佛法每言真俗二諦非即非離法與法性非一非異蓋由但是遮詮元無所執了一切法緣生無性如幻不實故得正顯中道遠離斷常空有等戲論也彼既妄執諸法法性決定實有為避詰難謾云非有非無既非無執之但遮祇是四謗之所攝豈可以其言語濫同而謬許為正法哉然外道妄執心外實法故四句皆名為謗若能了知心外無法無所執著則四句便為四門謂法與法性一亦可如波即水故謂法與法性異亦可如水非波故謂法與法性亦一亦異亦可真故相無別俗故相有別故謂法與法性非一非異亦可不變恆隨緣隨緣恆不變故初破外道竟二破餘乘二初假問總破二隨執別破今初餘乘所執離識實有色等諸法如何非有答彼所執色不相應行及諸無為理非有故不秉大乘實教惟執方便權説故名餘乘彼計五位七十五法心法唯一心所法有四十六色法十一不相應行十四無為法三妄謂色不相應及無為法離心心所別有實性故今就彼所執破之二隨執別破三初破色法二破不相應行三破無為法初中二初破對無對二破表無表初又二初標列二別破今初且所執色總有二種一者有對極微所成二者無對非極微成有對色謂五根五塵無對色謂法處所攝色也大乘則明皆是識之相分餘乘妄執有對是極微成無對非極微成然皆謂是心外實色二別破二初破有對二破無對初中二初明有對非實二明唯是識變初又二初略明二廣顯今初彼有對色定非實有能成極微非實有故二廣顯二初明能成極微不實二結所成有對不實初又二初約質礙有無破二約方分有無破今初謂諸極微若有質礙應如瓶等是假非實若無質礙應如非色如何可集成瓶衣等汝所執極微是有法是假非實宗因云有質礙故喻如瓶等又極微是有法不可集成有對色宗因云無質礙故喻如非色二約方分有無破又諸極微若有方分必可分析便非實有若無方分則如非色云何和合而能承光發影試觀日輪才舉照柱等時東西兩邊光影各現東邊承光西邊發影處既不同所執極微定有方分又若眼見身觸壁等物時唯得此邊不得彼分既和合物即諸極微故此極微必有方分又諸極微隨所住處必有上下四方差別若不爾者即如非色無所質礙便無共和集成粗色義或許極微互相涉入既無質礙應亦成粗不色今既許和集成粗由此極微定有方分又彼既執所成有對果色即諸極微若極微無方分者則應有對色亦無障隔若許爾者便非障礙有對是故汝等所執極微必有方分有方分故便可分析定非實有先破有方分云極微是有法定非實有宗因云有方分可分析故喻如瓶衣等次破無方分云極微是有法不能和合承光發影宗因云無方分故喻如非色次更種種推窮明其必有方分如文可知初明能成極微不實竟二結所成有對不實故有對色實有不成既非實有則唯識所變明矣初明有對非實竟二明唯識所變三初總徵釋二依緣各釋三總結成今初五識豈無所依緣色此總徵也所依色謂五根所緣色謂五塵雖非無色而是識變謂識生時內因緣力變似眼等色等相現即以此相為所依緣此總釋也雖非無所依所緣之十種色而即是識之所變現謂五識生時由內第八識執持相分種子因緣熏習之力變似眼等五根色等五塵之相而現由是五識即以此第八識所現根塵之相而為親所依疏所緣非是識外別有極微所成二依緣各釋二初明所依二明所緣今初然眼等根非現量得以能發識比知是有此但功能非外所造外有對色理既不成故應但是內識變現發眼等識名眼等根此為所依生眼等識謂眼等五根非如五塵之現量可得特以能發五識故比量而知是有此五根雖屬色法然但是第八識上功能非識外別有極微所造以彼所執外有對色如上推破理既不成故應但是內識之所變現以其能發眼等五識是故名為眼等五根以此為增上所依而生眼等五識也二明所緣二初總標有無二別明有無今初此眼等識外所緣緣理非有故決定應許自識所變為所緣緣二別明有無二初明外所緣緣非有二顯內所緣非無初中二初破執二結況初又四初破計能生為所緣緣二破計和合為所緣緣三破轉計和合時極微為所緣緣四破轉計極微和集位為所緣緣今初謂能引生似自識者汝執彼是此所緣緣非但能生勿因緣等亦名此識所緣緣故此所破執與觀所緣緣論不同彼論首破極微非所緣緣故云極微於五識設緣非所緣彼相識無故猶如眼根等今此乃計五根為所緣緣故云謂能引生似自識者汝執彼是此所緣緣謂眼根引生眼識眼識似眼之能見耳根引生耳識耳識似耳之能聞等執彼五根是此五識所緣也然所緣緣要具能生帶相二義非但能生之一義也若但能生即可名所緣緣則因緣及等無間緣皆有能生一義勿亦可名所緣緣乎二破計和合為所緣緣或計眼等五識了色等時但緣和合似彼相故彼亦非理非和合相異諸極微有實自體以分析彼和合物時似彼和合物相之識定不生故彼和合相既非實有故不可説是五識緣勿第二月等能生五識故此與觀所緣緣論所破是同能破稍異彼論縱許所緣奪其為緣故云和合於五識設所緣非緣彼體實無故猶如第二月此無縱辭但立量云和合是有法非五識緣宗因云非實有故喻如第二月三破轉計和合時極微為所緣緣非諸極微共和合位可與五識各作所緣以此識上無有極微相故非諸極微各別有一和合之相可與五識各作所緣以不和合時無此和合相故非可謂和合之位與不合時此諸極微體相有異故知和合之位如不合時一般色等極微決非五識所緣之境若謂於和合位仍緣各各極微則五識不帶極微之相固不可也若謂一一極微各別有和合相則與不和合時體相應異又不可也若極微體相不異則和合時極微仍自極微豈得為五識境哉四破轉計極微和集位為所緣緣有執色等一一極微不和集時非五識境共和集位展轉相資有粗相生為此識境彼相實有為此所緣此敘轉計也粗相為此識境是具帶相之義彼相不離極微體是實有是具能生之義二支無闕故為此識之所緣緣彼執不然以極微共和集位與未集時體相一故若謂五識緣彼極微和集則如瓶甌等物大小既同能成之極微亦相等者緣彼瓶甌等相之識應無別故若瓶甌有別者則於共和集位一一極微各各應捨微圓相故若不捨者非緣瓶甌等粗相之識能緣極微細相之境若許粗相識緣細相境者勿餘境識亦應互緣餘境故則一識應可緣一切境故假如一瓶集萬極微所成復有一甌亦萬極微所成則等是一萬極微有何差別汝執五識緣彼極微和集便不應見瓶甌差別若見差別便應極微已捨本相若極微不捨本相斷非五識之所能緣若許五粗相識得緣極微細相境亦應許眼識得緣聲香味觸等矣豈可乎哉初破執竟二結況許有極微尚致此失況無識外真實極微前來種種破斥猶是縱許極微是實尚招如此過失況識外何嘗別有真實極微寧得執有外所緣緣也哉初明外所緣緣非有竟二顯內所緣緣不無由此定知自識所變似色等相以為五識真所緣緣以見分託彼似色而生即變帶彼相狀而為所緣慮故帶彼相故是所緣二字之義見託彼生是下一緣字之義此正釋所緣緣唯是自識所變相分非心外法也然識變時隨彼本質量之大小頓現一相非別變作衆多極微而合成一物也阿含及餘經中不過為執粗色有實體者佛説極微令其除析以知無實非謂諸色實有極微又諸修瑜伽觀之師以假想慧於粗色相漸次除析至不可析假説極微雖此極微猶有方分而不可析若更析之便似空現不名為色故説極微是色邊際此申明識所變相猶如鏡中隨量頓變非先變極微後合成物也次更釋疑謂教中所説極微不過欲顯粗色是假非謂別許極微是實又觀中所見極微不過依假想慧假説為色邊際亦豈有心外實極微哉瑜伽此云相應依大乘理修於假想事定事理相應名瑜伽師二依緣各釋竟三總結成由此應知諸有對色皆識變現非極微成初破有對竟二破無對餘無對色是此有對之流類故亦非實有或無對故便如心心所一般定非實色諸有對色現有色相以理推究離識尚無況無對色現無色相而豈可説為真實色法五塵落謝影子名無對色即法塵也初破對無對竟二破表無表三初總徵釋二別破執三結唯識今初表無表色豈非實有答此非實有所以者何二別破執二初別破表無表二總明三業道初又三初破身表二破語表三破無表今初且身表色若是實有以何為性若言是形量便非實有可分析故長短等形析至極微即便不可得故若言是動作亦非實有才生即滅不至餘方無有動轉義故有為法滅不待因故滅若待因便成果法應非滅故若言別有一種色法非青黃等顯色非長短等形色乃心之力用所引生者由此能動手等名身表業理亦不然此一種色若言是動義如前破若是動因應即風界風則無體無可表示不應名表又風是觸微觸唯無記不應通善惡性非顯香味亦惟無記類觸應知故身表業定非實有於五塵中色有二種一者顯色即青黃赤白等亦名實色二者形色即長短方圓等亦名假色其聲香味觸雖名實色皆非顯色亦非形色但是有對而已又五塵唯色聲二種通于善惡無記三性香味觸三唯屬無記今身表通三性業故不應以觸香味為身表也餘可知然心為因令本識所變手等色相生滅相續轉趣餘方雖非實動似有動作表示心故假名身表前破身表非實此明不壞假名而假名唯依識變還表於心究竟心外更無實法也二破語表語表亦非實有聲性一剎那聲縱許是實無詮表故多念相續雖能詮表便非實故外有對色前已破故不可仍執為實有也然因第六心故于本識上變似音聲生滅相續似有表示假名語表於理無違亦先破執實次立假名如文可知三破無表表既實無無表寧實然依思願善惡分劑定限假立無表理亦無違謂此無表或依於能發勝身語之善思惡思所熏種子增長位而假立或依定中能止身語二惡之現行思而假立故此二種無表皆依思立但是假有無表色即無作假色也此復有二一律儀戒二定共戒律儀有善有惡定共則唯是善不言道共者道亦能發無作但既由道力所發決不計為心外實法故不辨之發勝身語惡思謂期心作爾許時惡律儀業此心熏於本識遂發爾許時無作惡律儀也發勝身語善思謂期心受何等善戒此心熏於本識隨發何等無作戒也定中止惡行思即定共戒亦發無作但是不作惡故故名無表初別破表無表竟二總明三業道世尊經中説有三業今但言心思而撥無身語二業豈不違經答不撥身語二業為無但言非汝等所執實色能動身之思與身相應説名身業能發語之思與語相應説名語業其審慮決定二思與意相應故能作動於意故説名意業發起身語之思有所造作説名為業此之身語是審決二思所遊履故又作善惡二因通生或苦或樂二種異熟果故亦名為道是故前身口七支業道亦以思為自性或身語二表體雖非思而由中思所發動故假説為業又是思所履故説名業道思有三種一動發勝思二審慮思三決定思道者路也通也餘可知二別破執竟三結唯識由此應知實無外色唯有內識變似色生初破色法竟二破不相應行三初總明無實體用二別破得非得等三傍破執隨眠今初不相應行亦非實有所以者何得非得等非如色心及諸心所體相可得非異色心及諸心所作用可得由此故知定非實有但依色等分位假立此有法定非異色心心所有實體用宗如色心等喻許行蘊攝故因或心心所及色無為所不攝故因如畢竟無喻定非實有宗或餘實法所不攝故因如餘假法喻非實有體宗相應者和順義謂得等非能緣故不與心心所法相應非質礙故不與色法相應有生滅故不與無為法相應簡非四位法故名為不相應行大乘假立二十四種皆非識外實有小乘立十四種皆執實有故今破之凡申三量總以此字為前陳有法即指彼所執十四種也一云定非異色心心所有實體用宗因云許行蘊攝故喻如色心等二云定非實有宗因云或心心所及色無為所不攝故喻如畢竟無三云非實有體宗因云餘實法所不攝故喻如餘假法餘實法指色及心心所餘假法指鏡花水月等也二別破得非得等為六初破得非得二破衆同分三破命根四破無心定等五破諸有為相六破名句文身初中二初徵答破斥二結申正義今初且彼如何知得非得異色心等有實體用契經説故如説如是補特伽羅成就善惡聖者成就十無學法又説異生不成就聖法諸阿羅漢不成就煩惱成不成之為言正顯得與非得且彼下大乘徵契經下餘乘答也十無學法謂正語正業正命正念正定正見正思惟正精進正解脫正智也經不説此異色心等有實體用為證不成亦説輪王成就七寶豈即實自成就女臣象馬之他身及珠輪之非情耶若謂於寶有自在力假説成就非別實有得之一法則一切有情於善惡法何不許然亦是假説成就而必執為實有一得法耶若謂七寶在現在故可假説成寧知所成善惡等法獨離現在有耶若離現在則諸善惡實法理非有故現在必有善種等故此下皆大乘破斥也等者指惡種及無漏種已前先明得無體已後更明得無用又得於法有何勝用若言此得於一切法是能起因則一切有情皆應以此得而起無為聖法又一切草木等非情不具此得應永不起何故現有非情生起又未得善法者及雖得善法而已失者亦無此得應永不生善法何故現有未得善法而今得亦有已失善法而後得者若謂未得已失雖無現得由有俱生之得為因所以能復起者則汝所執生與生生此之二種生緣便為無用又具善惡無記三性之因為俱生得者則於一時之中善惡無記亦應頓現在前若謂更待餘因故不頓現則此得便為無用若更計云得之於法是不失因一切有情由此得因乃能成就彼善惡等法故然而諸可成法總不離於有情若離有情實不可得故得於法俱為無用得實無故非得亦無初徵答破斥竟二結申正義然依有情可成諸法分位假立三種成就一種子成就二自在成就三現行成就翻此假立不成就名此類雖多而於三界見道所斷邪惑種子未永害位假立非得名異生性於諸聖法未成就故種子成就謂無漏善種不壞自在成就謂加行善根引發無礙現行成就謂已入見道現證無漏聖法也因此成就翻立不成就名此不成就雖非一類且約未見道前未得聖法名異生性然豈於有情心外別有得非得之實法哉二破衆同分二初徵答破斥二結申正義今初復如何知異色心等有實同分契經説故如契經説此天同分此人同分乃至廣説復如下大乘徵契經下餘乘答也此經不説異色心等有實同分為證不成若謂同智同言乃因斯同分而起故知此同分是實有者則草木等亦有同類之境可發同智同言亦應有同分矣豈不違經又若於同分起同智言則此同分復應有別同分以起之彼既不爾此云何然若謂以此同分為因故起同事同欲證知同分是實有者理亦不然宿習為因起同事欲何要別執有實同分此大乘破斥也智謂解了言謂詮表事謂所為欲謂所願餘皆可知徵答破斥竟二結申正義然依有情身心相似分位差別假立同分三破命根二初徵答破斥二結申正義今初復如何知異色心等有實命根契經説故如契經説壽暖識三應知命根説名為壽亦大乘徵餘乘答也此經不説異色心等有實壽體為證不成又先已成色不異識暖是色法既不離識應可比知離識無別命根又若命根異識實有應如受想等非實命根難曰若爾如何經説三法答曰義別説三如四正斷難曰住無心位壽暖應無以無識故答曰豈不經説識不離身難曰既爾如何名無心位答曰彼滅轉識非阿賴耶有此識因後當廣説此識足為三界六趣四生之體是遍恆續異熟果故無勞別執有實命根此大乘破斥也先正申量云命根是有法非別實有宗因云不離識故同喻如暖次更申量云彼執命根是有法非實命根宗因云異識實有故喻如受想等此下三難三答義皆可知言義別説三者秪一阿賴耶識約相分色法身根所得名暖約種子能持根身名壽約現行自體名識如四正斷秪一精進約修斷已生未生善惡義別説四耳徵答破斥竟二結申正義然依親生此第八識之種子由先世業所引持身功能各有差別令色心等住時決定假立命根四破無心定等二初徵答破斥二結申正義今初復如何知二無心定無想異熟異色心等有實自性若無實性應不能遮心心所法令不現起復如下大乘徵若無下餘乘答也二無心定謂外道無想定及聖者滅盡定無想異熟謂第四禪無想天果若無心位有別實法異色心等能遮於心名無心定應無色時有別實法異色心等能礙於色名無色定彼既不爾此云何然又遮礙心何須實法如堤塘等假亦能遮此大乘破斥也先約無色定以為並難次以堤塘而喻假亦能遮皆如文可知徵答破斥竟二結申正義謂修定時於定加行位中厭患粗動心心所故發勝期願遮心心所令心心所漸細漸微微微心時熏異熟識成極增上厭心等種由此損伏心等種故粗動心等暫不現行依此分位假立二定此種善故定亦名善無想定前求無想果故所熏成種招彼天之異熟識依之粗動想等不行於此分位假立無想依異熟識而立故得異熟之名故此三法亦非實有厭心等種謂與厭患相應之心心所種子也心等種謂前六轉識及諸相應心所之種子也粗動心心所暫不現行正顯第八第七細心心所仍現行也若但伏滅前六轉識及彼心所名無想定若兼伏滅第七識中俱生我執現行名滅盡定此二位中皆不與別境之定心所相應但是假立定名然其種是善法故定亦得名善由無想定招無想天異熟果報故名無想異熟故此三法皆非離識實有明矣
