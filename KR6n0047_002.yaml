body:
  text: 蕅益沙門智旭述五破諸有為相二初徵答破斥二結申正義今初復如何知諸有為相異色心等有實自性契經説故如契經説有三有為之有為相乃至廣説此亦大乘徵而餘乘答也三有為即下文所云定有法略有三種一現所知法如色心等二現受用法如瓶衣等如是二法世共知有三有作用法如眼耳等由彼彼用證知是有此三攝盡一切有為諸法也有為相者即生住異滅四相謂色心瓶衣及眼耳等無不各有生住異滅相故此經不説生住等相異色心等有實自性為證不成非八轉聲中第六屬聲便表異體以色心之體即色心生住異滅之相故非生滅等能相之體定異於色心等所相勿堅相等亦可異地等故又若使生滅等有為之相異色心等所相之體則無生無滅等無為相之體亦應異於真如虗空等所相乎又生等四相若其體俱是實有則應一切時中齊興作用即生即住即異即滅若以四相相違故而用不頓興者則四體亦復相違如何可俱有哉此下皆大乘破斥也八囀聲者一體二業三具四為五從六屬七於八呼今契經所云三有為之有為相此一之字乃是詮所屬義正即第六屬聲明其離有為法無有為相即於色心諸法體上而辨生住異滅非表能所各有異體也假使生住異滅定異於色心諸法則堅濕暖動亦可定異於地水火風乎又若生住異滅之相果異色心諸法之體則不生不滅等相亦可異於虗空真如等體乎又生住異滅若各有體則應一切時中各齊興用若用相違故不頓興則體亦相違安得俱有乎又體既不俱則住異滅三用亦不應俱為現在實有若謂生滅等能相與色心等所相體俱本有則用亦應然以用與體無別性故彼計生屬未來住異滅同屬現在故今破曰三體既不可俱則三用亦不宜俱屬現在設許體俱本有則四相亦應俱有不應獨許住異滅是現在別以生屬未來也若謂能所體雖本有彼之作用更待因緣然後起者則色心等所相既待因緣應非本有又復既待因緣則汝所執生住等能相便為無用先破色心等所相非有次破生住等能相無用也又若謂色心等所相恆有而與生滅等能相合則應無為法亦有生滅等合以彼無為之恆有與此有為之恆有求其異因不可得故不達生住異滅之外無色心諸法故妄計云所相恆有不達色心諸法之外無生住異滅故妄計云而生等合應先出餘乘量云所相是有法決定恆有宗因云生等合故喻如無為法次申違量云無為是有法亦生等合宗因云以恆有故喻如所相既無為恆有不與生滅等合則色心等與生滅合豈得為恆有哉既生滅等不能與無為合則離色心諸法之外豈別有生滅等實體哉又去來世非現非常應似空華非實有性生名為有寧在未來滅名為無應非現在滅若非無生應非有又滅違住寧執同時住不違生何容異世故彼所執進退非理此更破彼妄計生屬未來住異滅屬現在也初徵答破斥竟二結申正義然有為法因緣力故本無今有暫有還無表異無為假立四相本無今有有位名生生位暫停即説為住住別前後復立異名暫有還無無時名滅前三有故同在現在後一是無故在過去此正明假立四相非別有實體也前三謂生住異後一謂滅餘俱可知難曰如何滅是無法乃與有法為相答曰表此有法後必歸無為相何失生表有法先非有滅表有法後是無異表此法非凝然住表此法暫有用故此四相於有為法雖俱名表而表有異此依剎那假立四相若約一期果報之分位亦得假立四相初有名生後無名滅生已相似相續名住即此相續轉變名異是故四相皆是假立五破諸有為相竟六破名句文身二初徵答破斥二結申正義今初復如何知異色心等有實詮表名句文身契經説故如契經説佛得希有名句文身亦大乘徵餘乘答也解現下文此經不説異色心等有實名等為證不成若名句文有法異聲實有因應如色等喻非實能詮宗若謂聲能生名句文者此聲必有音韻屈曲此足能詮何用名等若謂聲上音韻屈曲即名句文而是異聲實有則所見色上形量屈曲亦應異色處別有實體耶若謂聲上音韻屈曲如絃管聲非能詮者此言語聲亦應如彼絃管之聲不別能生名句文等且又誰説彼絃管之聲定不能詮餘乘難曰聲若能詮風鈴聲等應有詮用大乘答曰此語聲亦應如彼風鈴等聲不別生實名句文身若許唯有語聲能生名等如何不許唯此語聲即能詮理既唯語聲即能詮理何須別生名句文身小乘又難曰何理定知能詮即語大乘答曰寧知異語別有能詮語不異能詮人天共了執能詮異語天愛非餘此大乘破斥也文義並顯不須別釋言天愛非餘者有謂光音天以上不用語言為詮表故二結申正義然依語聲分位差別而假建立名句文身名詮法之自性句詮法之差別文即是字為名句二者所依此名句文三離聲雖無別體而假實異亦不即聲由此法詞二無礙解境有差別聲與名等蘊處界攝亦各有異名別文是假立聲是實有名句文是法無礙解境聲是辭無礙解境約五蘊則聲是色蘊攝名句文是行蘊攝約十二處則聲是聲處攝名句文是法處攝約十八界則聲是聲塵界攝名句文是法塵界攝也且依此土説名句文依聲假立非謂一切諸餘佛土亦依光明妙香味等假立名句文三故此又統論十方佛土六塵皆得假立名句文也蓋此土唯耳根利故且依聲立三餘土六根各有利鈍眼根利者則依光明立名句文鼻根利者則依妙香立名句文舌根利者則依妙味立名句文等者指觸法二塵亦得依之立名句文故法華玄義云六塵體是法界一一無非教經亦無非行經亦無非理經也二別破得非得等竟三傍破執隨眠有執隨眠異心心所是不相應行蘊所攝先敘計也隨眠謂煩惱種子隨逐有情眠伏藏識故名隨眠本是第八識所執持即彼相分而餘乘以為不與前六現識相應遂妄執為別有自體是行蘊攝也彼亦非理既名為貪等隨眠惑故如現貪等非不相應量云所執隨眠是有法非不相應行宗因云名貪等故喻如現貪等執別有餘不相應行準前理趣皆應遮止小乘止執十四不相應行故且隨其所執破之大乘所明二十四法本非實有但是假立設有更執為實法者即以如前理趣遮破可知二破不相應行竟三破無為法二初以理破斥二結申正義今初諸無為法離色心等決定實有理不可得且定有法略有三種一現所知法如色心等二現受用法如瓶衣等如是二法世共知有不待宗因比量而成三有作用法如眼耳等由彼彼用證知是有無為非世共知定有又無作用如眼耳等設許其是有用則應反是無常故不可執無為定有諸無為指餘乘所執三無為一虗空無為二擇滅無為三非擇滅無為也色等五塵是五識現量所知心及心所是他心智現量所知故名現所知法餘可知然諸無為所知性故或色心等所顯性故如色心等不應執為離色心等實有無為之性下結申正義中云諸無為法略有二種一依識變假施設有二依法性假施設有今約依識變義立量云諸無為是有法不應執為離色心等實無為性宗因云所知性故喻如色心等又約依法性義立量云諸無為是有法不應執為離色心等實無為性宗因云色心等所顯性故喻如色心等又虗空等三無為法為一為多若體是一遍一切處虗空容受色等法故隨能合法體應成多一所合處餘不合故不爾諸法應互相遍若謂虗空不與法合則應虗空非能容受如餘擇滅等無為又色等中有虗空不有應相雜無應不遍若達三無為法不過是色心等所顯之性假施設有本非離識別有實性則何一何多亦不妨説一説多如後文斷十重障證十真如真如尚非是一云何有十乃約斷障所顯不妨非十而説十也今餘乘既妄執離識別有三無為性故以為一為多雙徵難之先破一後破多今破一中先破處空無為是一故云若虗空無為之體是一遍一切處以能容受色等法故然而隨能合法則體應成多是遍則不一也或應一所合處餘不合故是一則不遍也設既不許體應成多又不許餘皆不合則應諸法各互相遍方成一體遍一切處而豈可哉恐轉計云虗空不與法合奚至體應成多亦何論一合而餘不合故今破云若謂虗空不與法合則應非能容受如擇滅等無為何得名為虗空無為又色等中若有虗空則應相雜而非一或色等中便無虗空則應有缺而不遍寧得執虗空體一遍一切處為識外實法耶一部一品結法斷時應得餘部餘品擇滅此破擇滅無為定一之執也無為之性即是唯識實性但依智慧簡擇力故分分除滅見思煩惱分分顯出真如實性故名擇滅無為然而真如體絶言思既非定多又豈定一今若執為定一則如一部一品結法斷時便應頓得餘部餘品擇滅而四果差別分位皆不成矣又豈可哉言部品者見所斷惑分為四部一者見苦諦所斷部凡有十種隨眠若約三界共有二十八品二者見集諦所斷部三者見滅諦所斷部四者見道諦所斷部修所斷惑共為一部約三界九地分為八十一品一法緣闕得不生時應於一切得非擇滅執彼體一理應爾故此破非擇滅無為定一之執也無為法性本無生滅由緣生法覆令不顯故于緣缺之時法暫不生名非擇滅無為亦非定多定一也今若執為定一則一法緣缺不生時應一切法皆悉不生又豈可哉執彼下總結上文先破一竟若體是多便有品類應如色等非實無為虗空又應非遍容受此總破三無為體多也文義可知餘部所執離心心所實有無為準前應破設或更執不動無為想受滅無為等總以一多二義破之例皆別無實法也又諸無為許無因果故應如兔角非異心等有若有因果便是有為既稱無為決同許無因果故總立量破云諸無為是有法非異心等有宗因云許無因果故喻如兔角初以理破斥竟二結申正義然契經説有虗空等諸無為法略有二種一依識變假施設有謂曾聞説虗空等名隨分別有虗空等相數習力故功夫漸漸成熟致使心等生時似虗空等無為相現此所現相是獨頭意識所緣之獨影境但以前後相似無有變易假説為常二依法性假施設有謂空無我所顯真如有無俱非心言路絶與一切法非一異等是法真理故説名為法性離諸障礙故或名為虗空由簡擇力滅諸雜染究竟證會故又名為擇滅不由擇力本性清淨或緣闕所顯故又名為非擇滅苦樂受滅故又名為不動想受不行故又名想受滅此五種名皆依真如假立即此真如二字亦是假施設名遮撥為無故説為有遮執為有故説為空勿謂虗幻故説為實理非妄倒故名真如不同餘宗離色心等有實常法名曰真如故諸無為非定實有虗謂遍計所執幻謂依他所現非妄故名真無倒故名如餘皆可知初敘破外小所執竟二立量以顯唯識外道餘乘所執諸法是有法異心心所非實有性宗是所取故因如心心所喻能取彼諸法之覺是有法亦不緣彼心外實法宗是能取故因如緣此內相分之覺喻初一量破所遍計次一量破能遍計所遍計即心心所之相分名為所取能遍計即心心所之見分名為能取見相二分皆不離于自證設使異心心所便無能取所取矣諸心心所是有法依他起故因亦如幻事喻非真實有宗為遣妄執心心所外實有境故説唯有識若執唯識真實有者如執外境亦是法執此由前文既顯遍計本空今更申明依他非實也故大佛頂經云入圓成實遠離依他及遍計執得無生忍若不達依他如幻豈名具分唯識哉宗前敬敘即云稽首唯識性此中借依他以破遍計法執既竟遂徹底掀翻如此道破而昧者猶謂法相一宗但是建立嗚呼冤哉三結判俱生分別二初結屬二種二判其有無今初然諸法執略有二種一者俱生二者分別俱生法執無始時來虗妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識之見分變起第七識自心中之影相執為實法二有間斷在第六識緣第八識所變蘊處界相或總或別變起第六識自心中之影相執為實法此二法執細故難斷後十地中數數修習勝法空觀方能除滅分別法執雖有內熏之因亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別唯在第六意識中有此亦二種一緣邪教所説蘊處界相變起第六識自心中之影相分別計度執為實法二緣邪教所説自性等相變起第六識自心中之影相分別計度執為實法此二法執粗故易斷入初地時觀一切法中法性本空所顯真如之理即能除滅邪教所説蘊處界指小乘人稟受不了義説所造小乘諸論名邪教也餘可知二判其有無如是所説一切法執自心外法或有或無自心內法一切皆有是故法執皆緣自心所現似法執為實有然似法相從緣生故是如幻有所執實法妄計度故決定非有故世尊説慈氏當知諸識所緣唯識所現依他起性如幻事等自心外法非親所緣故或有或無自心內法是親所緣唯識所變不離識故故一切皆有餘可知廣釋初三句中二徵答別釋竟三總結無實二初正明二釋妨今初如是外道餘乘所執離識我法皆非實有故心心所決定不用外色等法為所緣緣緣用必依實有體故現在彼聚心心所法是有法非此聚識親所緣緣宗如非所緣喻他聚攝故因同聚心所是有法亦非親所緣宗自體異故因如餘非所取喻由此應知實無外境唯有內識似外境生是故契經伽他中説如愚所分別外境實皆無習氣擾濁心故似彼而轉八識互望互稱彼此心王必有心所相應故皆名聚且如第八識與五遍行心所自為一聚非第七識親所緣緣餘皆可知同聚心所謂與心王相應而俱起者且如遍行五心所雖與第八識相應然非第八識之所緣緣又第八識心王亦非五心所之所緣緣又五心所互望亦各不得相緣如觸心所雖與作意等俱起然決非作意等親所緣緣乃至思心所決非受想等親所緣緣餘皆可知二釋妨二初難二釋今初有作是難若無離識實我法者假亦應無謂假必依真事似事共法而立如有真火有似火人有猛烈赤色之法乃可假説此人為火假説牛等應知亦然我法若無依何假説無假説故似亦不成如何説心似外境轉真火喻真事似火人喻似事猛赤喻共法也餘可知二釋二初正釋外難二示假説意初中三初總破二別破三結斥今初彼難非理離識我法前已破故依類依實假説火等俱不成故二別破二初破喻二破法初中二初破依類二破依實今初依類假説理且不成猛性赤色人雖有之而猛亦等能燒之德非類同火之有故若無此能燒之共德而假説彼為假火人應亦於水等假説火等名以水亦有猛赤法故若謂猛等雖非類火能燒之德而猛與赤恆不相離故可假説此亦不然人類猛等現見亦有互相離故或性猛而色不赤或色赤而性不猛類既無能燒之德又猛與赤二互相離然有於人假説火等故知世間假説不必依類而成二破依實依實假説理亦不成以猛赤等德非共有故謂猛赤等在火則以色微觸微為體依火而住在人則以色心為體依人而住其體各別所依異故若無共德而可假説有過同前應亦於水等假説火等名若謂人有暖德與火德相似故可假説者理亦不然假説為似火人正在于人之猛赤相非在於暖德故由此世間假説不必依實而成大凡世間假説有依類者亦有不依類者有依實者亦有不依實者元非一概今彼妄執假説必須依類依實故即彼所説之喻奪其依類依實二俱不成也初破喻竟二破法二初正破假説依真二結申假説正義今初又假必依真事立者亦不應理真謂諸法自相假智及詮俱非能得其境故謂有分別之假智及名句文之假詮不得諸法自相唯於諸法共相而轉亦非離此共相之外有別方便更施設一箇自相以為假智及詮所依然假智及詮必依意言聲相而起聲不及處此假智詮即便不轉是以能詮所詮俱非法之自相故知假説不依真事依真説假下文亦自有之但謂假必依真事立則不應理以諸法自相離心緣離言説唯是現量所證知故一涉語言則能詮所詮皆非諸法自相唯於諸法共相而轉然離共相之外亦別無自相可得蓋現量所緣之境名為自相比量非量所緣之境名為共相不過皆是識所變之相分非以自相為真共相為依真之假也既知假智及詮不依諸法自相便可例知假説我法不必有真我真法以為依矣二結申假説正義由此但依似事而轉似謂增益非實有相言聲依此增益似相而轉故不可説假必依真增益者意識變現之影像也依此影像有所言説言説為能詮影像為所詮故並不依真也二別破竟三結斥是故彼難不應正理初正釋外難竟二示假説意然依內識變現而有似我似法對遣妄執真實我法故説假似之言由此契經伽他中説為對遣愚夫所執實我法故於識所變假説我法名初釋前三句竟二釋後三句二初結前標數二釋通別名今初識所變相雖無量種而能變八種識約類而言則唯有三二釋通別名二初釋三類別名二釋能變通名今初一謂異熟即第八識多異熟性故二謂思察度量即第七識審思恆量我無我故三謂了境即前六識了境相粗故頌中及之一言乃顯前六識合為了別境之一種類第八不同前六惟有一分是異熟生故名多異熟性前六不恆第八不審第七於未轉位恆審思量我相已轉依位恆審思量二無我理餘可知二釋能變通名二初總標二別釋今初此三皆名能變識者能變有二種二別釋二初釋因能變二釋果能變今初一因能變謂第八識中等流異熟二因習氣也等流習氣由前七識中善惡無記三性之現行熏於第八令第八中三性種子未生者生已生者長異熟習氣由前六識中有漏善惡二種現行熏於第八而令生長二釋果能變二果能變謂前二種習氣力故有八識自證分生現於相見二分之種種相此中由前等流習氣以為親因緣故八識體相差別而生名之為等流果以其果似因故由前異熟習氣以為增上助緣感第八識酬引業力恆相續故而立真異熟之名若夫感前六識酬滿業者乃從異熟而起但名為異熟生不名為真異熟以其有間斷故即前真異熟及異熟生之二種皆名為異熟果以其果性異于因性故然此頌中所言異熟且單説第七我愛所執及有執持舍藏能持雜染有漏善惡種因能變二種異熟果之第八本識名為異熟非謂一切果異因者因從善惡果惟無記也非謂一切者謂前六識一分酬滿業者亦可得異熟名而非此中所指也初略答外難略標識相竟二廣明識相顯前頌意二初廣明三能變相二廣明所變唯識初中二初分釋三能變相二會三能變俱轉以示二諦在第七卷中初中三初釋初能變二釋第二能變三釋第三能變初又二初設問舉頌二以論釋成今初雖已略説能變三名而未廣辨能變三相且初能變其相云何頌曰初阿賴耶識一自相門異熟二果相門一切種三因相門不可知四不可知門執受處五所緣門了六行相門常與觸作意受想思相應七相應門唯捨受八受俱門是無覆無記九三性門觸等亦如是十心所例王門恆轉如暴流十一因果法喻門阿羅漢位捨十二伏斷位次門二以論釋成二初正釋頌文二證有本識初中八初釋自相等三門二釋不可知等三門三釋相應門四釋受俱門五釋三性門六釋心所例王門七釋因果法喻門八釋伏斷位次門初中二初正釋三門二重明因相今初論曰初能變識大小乘教皆名為阿賴耶此識具有能藏所藏執藏義故謂與雜染互為緣故有情執為自內我故此阿賴耶之名即顯示初能變識所有自相以攝持因果而為本識之自相故此第八識自相分位雖多藏名最初先捨又其過失最重是故偏説藏一切轉識種子故有能藏之義受轉識所熏成種故有所藏之義被第七識執之為我故有執藏之義言與雜染互為緣者謂由本識與前七為緣故起前七現行復由前七與本識為緣故熏本識種子此句釋成能藏所藏義也有情執為自內我句釋成執藏義也言此識自相分位雖多者瑜伽論云第八識自相有八一依止執受相二最初生起相三有明了性相四有種子性相五業用差別相六身受差別相七處無心定相八命終時分相今取第一依止執受相説也此第八識乃是能引諸界諸趣諸生種種善不善業所引之異熟果故説名異熟離此第八識外命根衆同分等恆時相續之勝異熟果不可別得故此異熟識之名即顯示初能變識所有果相此第八識果相雖多位多種惟有真異熟果之義實不與前七識共故偏説之諸界即三界諸趣即六趣諸生即四生十二類生也言此識果相雖多位多種者宗鏡録云第八識於五果中除離繫果餘四皆有故云果相雖多如望自種子是等流果望作意等心所是士用果望前七識為增上果望善惡業即異熟果此第八識能執持諸法種子令不失故名一切種離此第八識外餘法能遍執持諸法種子不可得故此一切種識之名即顯示初能變識所有因相此第八識因相雖有多種惟此能持種義實不異前七識共是故偏説宗鏡録云第八因相于六因中有四能持種子義邊是種子因若因種子俱時而有即俱有因若望自類種子前後相引即同類因若望同時心所等即相應因惟無異熟因及遍行因故云因相多也異熟因謂增上善惡此第八識惟無記故是異熟果非異熟因遍行因謂見疑無明等遍于染法此第八識不與相應非遍行因也初能變識體相雖多略説惟有如是三相初正釋三門竟二重明因相三初標二釋三結今初一切種相應更分別二釋為四初明種子相二明本新義三明種子義四明熏習義初中二初正釋二結判初又二初正釋種相二明種實有今初此中何法名為種子謂本識中親生自果功能差別此種子因用與本識之體及所生之果不一不異體用因果理應爾故如眼識種子親生眼識自果等此種有生果之作用故名功能色心等種其類非一故名差別本識為體種子為用種子為因所生為果體是能藏用是所藏因是能生果是所生故不一離體無用離因無果故不異也二明種實有雖非一異而種子原是實有以一切假法猶如空無非可為諸法親因緣故難曰此種子與諸法既非一異應如瓶等是假非實答曰若爾則真如與諸法亦非一異豈亦應是假有耶設許真如是假則便無真勝義諦既許真如非假則知種子亦實然諸種子唯依世俗説為實有不同真如是勝義實有也先正明次答難後以二諦判並可知初正釋竟二結判又二初結屬相分二判屬三性今初種子雖依第八識體而是此識之相分非餘三分見分恆取此種子以為親所緣緣境故二判屬三性又二初正判二釋妨今初諸有漏種與異熟識體無別故無記性攝然彼能生之因與所生之果俱有善等三性故亦可名為善等諸無漏種非異熟識性所攝故因果俱是善性攝故唯名為善因謂前七現行熏種之因果謂種子所發七現行果餘可知二釋妨難曰若爾何故決擇分説二十二根一切皆有異熟種子皆異熟生釋曰三無漏根雖名異熟而非無記依異熟故名異熟種異性相依如眼等識或無漏種由熏習力轉變成熟立異熟名非無記性所攝異熟決擇分瑜伽師地論之第二分也二十二根者眼耳鼻舌身五淨色根男女二根命根意根憂喜苦樂捨五受根信進念定慧五善根及三無漏根也一未知當知根二已知根三具知根名為三無漏根初明種子相竟二明本新義三初淨月師等唯立本有二難陀師等唯立新熏三護法正義本新合論初中三初釋義二引證三結示今初此中有義一切染淨種子皆本性有不從熏生由熏習力但可令其增長二引證如契經説一切有情無始時來有種種界如惡又聚法爾而有以界即是種子之差別名故又契經説無始時來界一切法等依界是因義瑜伽亦説諸種子體無始時來性雖本有而由染淨新所熏發諸有情類無始時來若堪般涅槃法者一切有漏無漏種子皆悉具足若不堪般涅槃法者便闕三種菩提種子如是等文誠證非一又諸有情既説本有五種性別故應定有法爾種子不由熏生又瑜伽説地獄成就三無漏根決是種子非是現行又從無始展轉傳來法爾所得本性住之種子性般入也三種菩提謂聲聞菩提獨覺菩提無上菩提也五種性謂一闡提種性聲聞種性獨覺種性不定種性如來種性也三無漏根如前説三結示由此等證無漏種子法爾本有不從熏生有漏亦應法爾有種由熏增長不別熏生如是建立因果不亂初淨月師等唯立本有竟二難陀師等惟立新熏亦三初釋義二引證三會違今初有義種子皆熏故生但以所熏能熏俱無始有故言諸種子無始成就種子既是習氣異名習氣必由熏習而有如麻香氣華熏故生二引證如契經説諸有情心染淨諸法所熏習故乃有無量種子之所積集論説內種定有熏習外種熏習或有或無又名言等三種熏習總攝一切有漏法種彼三既由熏習而有故有漏種必藉熏生無漏種生亦由熏習故諸聖教説聞熏習謂聞淨法界等流正法而熏起故是即出世心之種子性故三種熏習者一名言習氣二我執習氣三有支習氣具如第八卷中廣明淨法界等流正法者謂諸佛菩薩以根本智證清淨法界妙理以後得智隨順衆生流出語言文字詮顯淨法界理令諸衆生尋名取悟此所流出正法與淨法界相應故名等流三會違有情本來種性差別不由無漏種子有無但依有障無障建立如瑜伽説於真如境若有畢竟二障種者立為不般涅槃法性若有畢竟所知障種非煩惱者一分立為聲聞種性一分立為獨覺種性若無畢竟二障種者即立彼為如來種性故知本來種性差別但依有障無障建立非依本有無漏種子所説地獄成就三無漏種之言乃依當來有可生義非謂已有其體不般涅槃法性即一闡提種性也餘可知二難陀師等唯立新熏竟三護法正義本新合論三初正釋二斥前三結成今初有義種子各有二類一者本有謂無始來異熟識中法爾而有四生五蘊十二處十八界功能差別世尊依此説諸有情無始時來有種種界如惡叉聚法爾而有餘所引證廣説如初此即名為本性住種二者始起謂無始來數數現行熏習而有世尊依此説有情心染淨諸法所熏習故無量種子之所積集諸論亦説染淨種子由染淨法熏習故生此即名為習所成種二斥前又二初斥唯本有二斥唯新熏今初若唯本有轉識不應與阿賴耶為因緣性如契經説諸法於識藏識於法亦爾更互為果性亦常為因性宗鏡釋云諸法於識藏能攝藏也謂與諸法作二緣性一為彼種子二為彼所依識於法亦爾所攝藏也謂諸轉識與阿賴耶亦為二緣一於現法長養彼種二於後法轉攝植彼種互相生故此頌意言阿賴耶識與諸轉識於一切時展轉相生互為因果攝大乘説阿賴耶識與雜染法互為因緣如炷與𦦨展轉生燒又如束蘆互相依住唯依此種現二法互相生義建立因緣所餘因緣不可得故若諸種子不由熏生如何轉識與阿賴耶有因緣義非熏令長即便可名因緣勿善惡業能招異熟亦可與異熟果為因緣故又諸聖教説有種子由熏習生皆違彼義故唯本有理教相違熏長但可名增上緣熏生乃名因緣也餘可知二斥唯新熏又三初正破二通教三結責初又二初斥非二顯正初又二初直約有為無漏因破二破轉計心性為無漏因今初若唯始起則有為無漏無本有因緣故應不得生若夫聞熏乃有漏善不應為無漏種勿無漏種亦可生有漏故許應諸佛有漏復生善等應為不善等種有為無漏指四智菩提也四智菩提理應先有本住種子未登地前所有聞思修慧俱屬有漏但可為增上緣助彼無漏種子令漸增長非可作因緣也設許有漏為無漏種亦應無漏為有漏種而諸佛已證無漏仍得生有漏矣豈理也哉又有漏無漏兩性相反設得互相為種則善惡二性相反亦得互相為種乎二破轉計心性為無漏因又三初出彼所憑二破彼謬解三申經正義今初分別論者雖作是説經云心性本淨客塵煩惱所染汙故名為雜染離煩惱時轉成無漏以此為證故無漏法非無因生二破彼謬解而心性之言汝謂彼經説何義耶若謂彼經説空理為本淨者空非四智心因又空理是常法定非諸法種子以空理之體前後無轉變故若謂彼經即説心為本淨應同數論所計相雖轉變而體常一且惡與無記之心又應即是善心汝若許此説者則應惡無記心亦與信等諸善心所相應汝若不許便應惡無記心仍非是善心體是則尚不名善況是無漏又彼有漏善心雖與惡及無記不同然既稱為雜染便亦如惡心等其性決非無漏故一切有漏善心皆不應與無漏而為正因若許有漏為無漏因勿善惡等亦可互為因故又若謂有漏之心其性是無漏者則應無漏之心其性却是有漏以同是心法差別因緣不可得故又異生心之性若是無漏則異生位無漏現行應名聖者若謂異生之心其性雖是無漏而相有染不名為無漏現行無斯應名為聖之過者則心現行既非無漏心之種子亦非無漏何故汝論説有異生唯得成就無漏種子以種子現行其性定相同故三申經正義然契經説心性淨者説心空理所顯真如真如是心真實性故或説心體非是煩惱法故具斯二義名性本淨非謂有漏之心其性即是無漏故名為本淨也初斥非竟二顯正由此應信是諸有情無始時來有無漏種不由熏習法爾成就後勝進位熏令增長無漏法之現起以此本有種字為因而無漏法現起之時復熏成種展轉增勝乃至圓滿菩提有漏法種亦有本有類此應知二斥唯新熏中初正破竟二通教三初通內種定有熏習二通無漏由聞熏習三通依障建立種性今初諸聖教中雖説內種定有熏習而不定説一切種子皆熏故生寧全撥無本有種子然本有種亦由熏習令其增盛方能得果故説內種定有熏習二通無漏由聞熏習其聞熏習非是唯熏新有漏種聞正法時亦熏本有無漏種子令漸增盛展轉乃至生出世心故亦説此名聞熏習其聞熏習中所熏新有漏善種性者是修道位所斷是能感於勝異熟果是能為出世法之勝增上緣若聞熏習中所熏本有無漏種性者乃是非所斷攝與出世法正為因緣但此正因緣相微隱難了故有教中且寄粗顯三慧勝增上緣方便假説以為出世心種三通依障建立種性又二初正性義意二傍破當生今初依障建立通種別者其意正要顯于無漏種子之或有或無謂若全無無漏種者則彼二障種子永不可害即立彼為非涅槃法若唯有二乘無漏種無大乘種者則彼所知障種永不可害一分立為聲聞種性一分立為獨覺種性若亦有佛無漏種者彼二障種俱可永害即立彼為如來種性故正由此無漏種子之或有或無所以障有可斷不可斷義然無漏種微隱難知故約彼障可斷不可斷以顯性之差別若不爾者則彼二障更有何等別因而乃有可害及不可害者耶若謂法爾有此二障可害不可害之差別則無漏法種寧不許然若本全無無漏法種則諸聖道永不得生誰當能害二障種子而説依障立種性別二傍破當生既彼聖道必無生義説三無漏根有當來可生之義亦定非理二通教竟三結責然諸聖教處處説有本有種子今汝皆違彼義故唯始起理教相違二斥前竟三結成由此應知諸法種子各有本有始起二類宗鏡云第八識聚及此所變異熟五根相分并異熟浮塵根等及異熟前六識等並無新種以其極劣非能熏故但從本有舊種所生其長養五根及此浮塵根及等流五塵等相分前六識所變者皆可各有新本二種已上二明本新義竟三明種子義四初明內種二明外種三明內外種具二因義四明內外種熏習有無今初然種子義略有六種一剎那滅謂體才生無間必滅有勝功力方成種子此遮常法常無轉變不可説有能生用故無轉變則非無間必滅不可説有能生用則非有勝功力故一切無為等常法及外道所計常我不可説為種子也二果俱有謂與所生現行果法俱現和合方成種子此遮前後及定相離以現行種子雖是異類互不相違一身俱時有能生用非如前種子望後種子自類相生前後相違必不俱有是故種生現行因果必俱種引種子因果不俱雖種子之因與果具有如是俱與不俱二義而今但取因果現在同時可有能生果之因用方名種子以未來未生過去已滅無自體故所以必依生現行果者而立種子之名不依引生種子自類者名為種子也故但應説與果俱有難曰若剎那滅得為種子則前後相望或自他相望皆有剎那滅義應得為種今以第二義揀之前後則不俱現定相離則不和合一身則和合定不相離俱時則現在定無前後方名種子故他身之法及自身前後之法不可説為種子也三恆隨轉謂要長時一類相續直至究竟位者方成種子此遮前七轉識轉易間斷與種子法不相應故此顯種子自類相生難曰現行熏種亦果俱有應得名種今以第三義揀之第七識或漏或無漏故有轉易前六識或行或不行故有間斷唯第八識一類無記長時相續直至金剛道後究竟位中方稱無漏此前恆隨有漏法轉得與漏種為所依持故彼諸法種子依之而得自類相引乃至成熟也四須三性決定謂隨因力生善惡等功能決定方成種子此遮餘部妄執異性之因生于異性之果亦計有因緣義難曰若恆隨轉即名種子應善等種生染等現今以第四義揀之也五待衆緣謂此要待辦自果之衆緣和合功能殊勝方成種子此遮外道執自然因不待衆緣恆頓生果或遮餘部緣恆非無今顯所待之緣非恆有性故種於果非恆頓生難曰若性決定即名種子則三性種既是恆有亦復俱有即應一切時中頓生三性現行今以第五義揀之雖有種子為因仍待衆緣和合方能生果如眼識九緣生等又心法更待三緣謂增上緣等無間緣所緣緣色法更待增上緣故須衆緣則遮外道之執自然須有待則遮餘部之執緣恆非無也六引自果謂於別別色心等果各各引生方成種子此遮外道執唯一因生一切果或遮餘部執色心等互為因緣難曰若性決定待衆緣即名種子則一善因與衆緣合即生一切善果惡及無記亦然又善心種子與衆緣合亦能生於善色善色種子與衆緣合亦能生於善心今以第六義揀之別別等果各各引生則非一因生一切果亦非色心互為因緣也唯第八本識中所有功能差別具斯六義故成種子非餘識之所有初明內種竟二明外種外穀麥等乃第八識所變現行相分攝故假立種名非實種子三明內外種具二因義此內外種之勢力能生切近正果名曰生因能引遠殘之果令不頓絶即名引因內種則識緣名色名色緣六入等名生因所生近正果喪後尸骸不滅名引因所引遠殘果外種則種生芽芽生莖等名近正果穀等枯後不滅名遠殘果然外種既云非實種子但可借之以喻內種而已四明內外種熏習有無內第八識中一切法之種子必由熏習而生起長養此種子親能生果是因緣性外種熏習或有或無不過皆為增上緣耳若欲辨所生果必以內種為彼諸物之親因緣以彼外穀麥等皆是本識中共相種子所生之現果故外種或有熏習者如苣蕂與華等或無熏習者如種生芽莖等言共相種所生果者外穀麥種等皆是器界所攝故也三明種子義竟四明熏習義三初總標二別釋三結判今初依何等義立熏習名所熏能熏各具四義令本識中種子生長故名熏習二別釋二初釋所熏二釋能熏今初何等名為所熏四義一堅住性若法始終一類相續能持習氣乃是所熏此遮轉識及聲風等性不堅住故非所熏一類即堅義相續即住義應立量云轉識是有法非所熏宗因云性不堅住故喻如聲風等二無記性若法平等無所違逆能容習氣乃是所熏此遮善染勢力強盛無所容納故非所熏由此如來第八淨識以極善故唯帶舊時因中所熏無漏善種非新受熏問云若堅住性即為所熏則如來淨識亦堅住性應是所熏今以第二義揀之可知三可熏性若法自在而又性非堅密能受習氣乃是所熏此遮本識相應之五心所及無為法以心所依他而不自在無為堅密而不受習故非所熏問云若堅住及無記性即為所熏則第八識相應之五心所亦是堅住無記又無為亦堅住性何非所熏今以第三義揀之四與能熏共和合性若與能熏同時同處不即不離乃是所熏此遮他身剎那前後無和合義故非所熏問云若堅住無記自在非堅密者即為所熏則他人第八可為所熏又自第八前後相望可為所熏今以第四義揀之他身則不同處剎那前後則不同時也唯異熟識具此四義可是所熏非心所等初釋所熏四義竟二釋能熏何等名為能熏四義一有生滅若法非常能有作用生長習氣乃是能熏此遮無為前後不變無生長用故非能熏二有勝用若有生滅更須勢力增盛能引習氣者乃是能熏此遮異熟心心所等勢力羸劣故非能熏初義可知次應問云若有生滅即能熏者異熟心心所等亦有生滅應是能熏今以第二義揀之謂須或善或惡或有覆無記勢力強盛乃名能熏三有增減若有勝用又須數習可令增益伏除可令損減攝藏培植習氣令不失壞乃是能熏此遮佛果圓滿善法無增無減故非能熏彼若能熏便非圓滿前後佛果應有勝劣問云若有生滅及有勝用即能熏者佛果位中之前七識應是能熏今以第三義揀之佛果位中修善滿足更無可增修惡斷盡更無可減假使受熏則前佛熏得無漏種多應勝後佛矣四與所熏和合而轉若與所熏同時同處不即不離乃是能熏此遮他身剎那前後無和合義故非能熏問云若有生滅有勝用有增減即能熏者則他人前七應是能熏又自前七前後相望應亦能熏今以第四義揀之他身則不同處剎那前後則不同時也唯七轉識及與彼相應之心所有勝勢用而增減者具此四義可是能熏二釋能熏四義竟二別釋竟三結判二初結二判今初如是能熏之前七識及心所法與所熏之第八識俱生俱滅熏習之義乃成令所熏第八識中之一切法種子生起長養如熏苣蕂故名熏習此結成熏習名也苣蕂即胡麻西土作塗身香油先以香華與苣蕂子一處搗爛然後壓油油即香美今以苣蕂喻第八識香華喻前七轉識現行能熏之現識等從種生時即能為因復熏成種三法展轉因果同時約相生則如炷生焰焰生燋炷約相依則亦如蘆束更互相依因果俱時理不傾動此結示熏習相也其理極成不可破壞故不傾動二判能熏之現行生種子從種子起現行如俱有因得士用果種子前後自類相生如同類因引等流果唯此二因於一切法之果是親因緣性除此二種因外餘所有法皆是增上緣等非親因緣設有處名為因緣應知但是假説俱有因謂果與因俱時而有也士用果謂士夫作用所成辦果也同類因謂因與果相似也等流果謂果與因相似也十因五果解現第八卷中二重明因相中初標二釋竟三結是謂略説一切種相初釋自相等三門竟二釋不可知等三門二初總標二別釋今初此識行相所緣云何謂不可知執受處了二別釋二初釋行相所緣門二釋不可知門初中二初略釋二廣釋初又二初明行相二明所緣今初了謂了別即是行相識以了別為現行之相狀故二明所緣處謂處所即器世間是諸有情所依處故執受有二謂諸種子及有根身諸種子者謂諸相名分別之習氣有根身者謂諸勝義五淨色根及根所依浮塵身處此二皆是識所執受攝為自體同安危故執受及處俱是第八識之所緣阿賴耶識以因緣力故自證分體得生之時便內變為種及有根身外變為器即以所變三類性境為自所緣見分行相仗之而得起故執有二義一攝為自體二持令不散受有二義一領以為境二令生覺受第八緣種子具持令不散領以為境二義緣根身具四義一攝為自體同無記性故二持令不散一期不壞故三領以為境是親相分故四令生覺受安危共同故若緣器界但有領以為境一義也初略釋竟二廣釋二初廣釋行相二廣釋所緣初中三初略指見分二通論諸分三結歸見分今初此中了者謂異熟識於自所緣有了別用此了別用見分所攝二通論諸分三初難陀立二分二陳那立三分三護法立四分初中三初正立二分二破安慧唯立自證分三結明引證今初然有漏識自體生時皆似所緣能緣相現彼相應之心所法應知亦爾似所緣相説名相分似能緣相説名見分二破安慧唯立自證分若使心心所無所緣之相分應不能緣自所緣境或應一一能緣一切自境如餘餘如自故眼識緣色耳識緣聲等名為自所緣境若眼識無相分色則應不能緣色耳識無相分聲則應不能緣聲又設眼識無相分色而能緣色則亦可無聲香等而能緣聲香等又餘識雖不以色為相分亦可以緣色矣自境如餘境自境無而可緣餘境無亦可緣餘識如自識自識可緣餘境餘識亦可緣自境故若使心心所無能緣見分之相應不能緣如虗空等或虗空等亦是能緣心無見分而能緣則虗空無見分亦應能緣也三結明引證故心心所必有二相如契經説一切唯有覺所覺義皆無能覺所覺之二分各自然從相見二分之種子而轉成現行契經即密嚴經所覺義皆無謂實無外境也能覺所覺分即見相二分也初難陀立二分竟二陳那立三分二初辨異小乘二正立三分初中二初出小乘偏義二申大乘正説今初執有離識所緣境者彼説外境是所緣相分即名行相見分名事是心心所自體相故心與心所同所依根同所緣境行相相似心王見分之事雖與心數相等而其相各異以心王是識心所是受想等相各別故事謂自體心數即心所也事雖數等謂心王體是見分心所亦體是見分故相等也二申大乘正説達無離識所緣境者則説相分是所緣見分名行相相見所依自體乃名為事即自證分此自證分若無者應不自憶心心所法喻如見分不曾更歷之境則必不能憶知故此則心與心所但同一所依之根而所緣不過相似行相便自各別以了別領納等作用各異故心王自證分之事雖亦與心數相等而其行相各異以識受等體有差別故憶知也相分若無見分以更歷之必不能知則可例知見分若無自證分以更歷之亦何能自知哉故古人以相分喻絹見分喻尺自證分喻智也言所緣相似者謂心王心所各以自所變相分而為所緣故言行相各別者識以了別為行相受以領納為行相乃至思以造作為行相故言事雖數等者謂心王之體是自證分心所之體亦是自證分也初辨異小乘竟二正立三分然心心所一一生時以理推徵各有三分所量能量量果別故相見必有所依體故如集量論伽他中説似境之相分是為所量能取相之見分及自證分即名為能量及量果彼三體無別各有三分謂一一心王一一心所皆有三分非共只三分也所量即相分能量即見分量果即自證分果即所依體義也言彼三體無別者同一識故可見離心別無境矣二陳那立三分竟三護法立四分二初正明四分二攝歸一心今初又心心所若細分別應有四分三分如前復有第四證自證分此若無者誰證第三心分既同應皆證故又若無證自證分則自證分應無有果諸能量者必有果故不應妄計見分便是第三自證分之果以見分或時非量攝故由此見分不證第三以證自體者必須現量故心分既同應皆證故者謂見分既須自證分以證之則自證分亦須證自證分以證之也諸能量者必有果故者謂見分是能量則以自證分為量果今自證分亦是能量亦必以證自證分為量果也故古人以相分喻絹見分喻尺自證分喻智證自證分喻人又以相分喻鏡影見分喻鏡光自證分喻鏡面證自證分喻鏡背或以自證分喻鏡證自證分喻銅也宗鏡録云相分有四一實相名相體即真如是真實相故二境相名相謂能與根心而為境故三相狀名相此唯有為法有相狀故通影及質唯是識之所變四義相名相即能詮下所詮義相分是於上四種相中唯取後三相而為相分又相分有二一識所頓變即是本質二識等緣境唯變影緣不得本質見分有五類一證見名見即三根本智見分是二照燭名見此通根心俱有照燭義故三能緣名見即通內三分俱能緣故四念解名見以念解所詮義故五推度名見即比量心推度一切境故於此五種見中除五色根及內二分餘皆見分所攝自證分者謂能親證自見分緣相分不謬能作證故證自證分者謂能親證第三自證分緣見分而不謬故從所證處得名若不達四分成心者斯皆但念名言罔知成心實義體用既失量果全無終被心境緣拘無由解脫此四分中前相見二分是外用後自證及證自證二分是內體初相分唯所緣後三分通能緣所緣之二謂第二見分但緣第一相分或量非量或現或比第三自證分能緣第二見分及第四證自證分第四證自證分唯緣第三自證分非緣第二見分者以無用故第三第四皆現量攝先明須有四分此更分別內體外用能緣所緣及現比非三量差別不同也無用猶言無益故心心所一一皆是四分合成具所能緣而無無窮之過非即非離唯識理成假使自證分與證自證分不互相緣則更須立證證自證分便有無窮之過今由互為能所譬如鏡面鏡背亦如人之與智故無無窮之過也四分差別故非即唯是一心故非離此先結成次後引證是故契經伽他中説衆生心二性內外一切分所取能取纏見種種差別衆生心二性者內二分為一外二分為一也內外一切分者內亦二分外亦二分也所取纏者所緣相縛也能取纏者能緣見縛也見種種差別者見分通于三量故也此頌意説衆生心性二分合成所謂若內若外也以一切衆生皆有所取能取纏縛故見有種種或量非量或現或此多分差別之不同此頌中所云見者是但指見分故先引頌此更釋也初正明四分竟二攝歸一心如是四分或攝為三第四攝入自證分故或攝為二後三俱是能緣性故皆見分攝此言見者不是單指見分即是能緣之義或攝為一體無別故如入楞伽伽他中説由自心執著心似外境轉彼所見非有是故説唯心如是處處説唯一心須知此一心之言亦必攝於心所定相應故上來欲顯俗諦差別故以二分破一又以三分破二又以四分破三今欲顯真理圓融故第四可攝入於第三而可但言三分又內三可攝入於見分而可但言二分又相見本無二體而可但言一心也入楞伽偈即證成一心之旨然所謂一心亦非撥無八箇心王五十一箇心所而別指一真如心以為大總相法門也但以四分體無別故名為一心則知八箇心王五十一箇心所隨拈一王一所皆具四分隨其所有四分體皆無別惟是一心是知一一王所無非法界又四分體既無別以體融用用亦無別故得説云一色一香無非中道及唯色唯香等也二通論諸分竟三結歸見分故識行相即是了別了別即是識之見分初廣釋行相竟二廣釋所緣二初正明所變二總結所緣初中二初明唯變處等二明不變心等初又二初正釋二結示初又二初明業力所變決定二明定力所變不定初又三初器界二種子三根身今初所言處者謂異熟識由共相種成熟力故變似色等器世間相即外四大種及所造器界之色雖諸有情所變各別而相相似處所無異如衆燈明各遍似一此先總釋器界由識所變也以不攝持令生覺受故名為外非謂實在識外不可不知問曰誰之異熟識變為此相耶有義一切所以者何如契經説一切有情業增上力所共起故有義若爾諸佛菩薩應實變為此雜穢土諸異生等應實變為他方此界諸淨妙土又諸那含聖者厭離有色生無色界將來必不下生變為此土復何所用是故現居及當生者彼異熟識變為此界經但依于少分而説一切之言惟是諸業同者皆共變故初義太泛次義業同共變則可然約現居則太狹約當生又不切故為第三家所破也有義若爾則器世間將壞時既無現居及當生者誰異熟識變為此將壞之界又諸異生厭離有色而生無色界者後雖當生然現在無有色身其劫數甚遠預變為欲色二下土此復何用又欲界色界衆生設有色身與異地之器界粗細不同上下懸隔不相依持此識變為彼異界土亦何所益此先破前第二義也然所變土本為色身依持受用故若於身可有持用便變為彼由是設生他方之各各自地彼識亦得變為此土之各各自地故器世界將壞及初成時雖無有情而亦現有器界此説一切共受用者若別受用準此應知鬼人天等所見異故此釋成正義也共受用即共中之共別受用即共中不共言鬼人天所見異者宗鏡云天見是寶莊嚴地魚見是窟宅人見是清冷水鬼見是膿河猛火乃彼四類有情自業識所變相分不同更無心外別四境舊云一境應四心者不正若言一境者未審定是何境若離四類有情所變相分外更別有一境者即是心外有法初器界竟二種子諸種子者謂異熟識所持一切有漏法種是此第八識無記性攝故是第八識見分之所緣若夫無漏法之種子雖亦依附此識而非此無記性攝故非所緣雖非所緣而亦與此本識不曾相離喻如真如即識實性故不違於唯識三根身有根身者謂異熟識不共相種成熟力故變似清淨勝義色根及根所依浮塵六處即內大種及所造色以執受故名之為內此先明不共中不共也有共相種成熟力故於他身處亦變似彼不爾應無受用他身之義此中有義不惟變他依處亦能變他五似色根以辨中邊論説似自他身五根現故有義唯能變他似根所依之處以他之似色根於己非所用故然論云似自他身五根現者乃説自識他識各自變之義耳故生他地或般涅槃彼餘尸骸猶見相續此明不共中共也初義非次義是並可知故生他地等者以識能變他依處故尸骸猶見相續以不變他人五根故尸骸無復見聞也然此尸骸相續一是彼自己引因之力二是他人共相所變故仍名為不共中共初明業力所變決定竟二明定力所變不定前來且説業力所變外器內身界地差別如此若佛菩薩及諸聖者以禪定神通等力所變器身其器之界地身之自他則不決定然所變身器多恆相續變聲光等多分暫時隨現緣力擊發起故器則示淨示穢身則示聖示凡故不決定也一期利物與他受用故身器多恆相續然亦有暫時者隨彼機緣現在擊起故聲光多分暫時然亦有相續者初正釋竟二結示略説此第八識所變境者謂有漏種十有色處及墮法處所現實色有漏種即執受中諸種子也十有色處即五根五塵也墮法處所現實色謂意識緣境有實有假今指定果色也初明唯變處等竟二明不變心等何故此第八識不能變似心心所等為所緣耶答曰有漏識變略有二種一者第八前五及第六之一分隨因緣勢力故變似境二者第七及第六之一分隨分別勢力故變似境初因緣變必有實用後分別變但為相分之境非有實用今異熟識之變境但隨因緣其所變之色等必有實用若使變為心等便無實用以所變相分中之心心所等不能有緣慮故須彼有實用法乃可別從此第八識變生設使變無為等亦無實用所以不變無為故異熟識不緣心及心所及無為等此約有漏位言若至佛果無漏位中既與大圓鏡智勝慧相應則雖無有分別而鏡體澄淨故設心心所等仍無實用亦現彼影不爾諸佛應非遍智宗鏡録云一因緣變非分別變即五識心心所及第八心王為所緣相分從自種生故二惟分別變非因緣變即有漏第七識及第八五心所是為所變相分唯從分別心生故三俱句即有漏第六及無漏八識以能通緣假實法故四俱非即不相應行是以無實體故不與能緣同種生故初正明所變竟二總結所緣故有漏位此異熟識但緣器界根身及有漏種共名三類性境在欲色界具三所緣無色界中則但緣有漏種以厭離色故無業果色不緣身器然仍有定果色即謂具三所緣亦於理無違以彼四空天之第八識亦緣此定果色以為境故初釋行相所緣二門竟二釋不可知門不可知者謂此第八識之能緣行相極微細故難可了知或此所緣內執受境亦微細故外器世間量難測故名不可知問曰云何是識取所緣境之行相為難知耶答曰如滅定中一切恆行心心所皆滅而此不離身之異熟識應信為有然必應許滅定有第八識以是有情攝故如有心時無想等位當知亦爾一能緣不可知以其行相極微細故二所緣不可知以三類性境內執受之五淨色根及諸種子亦微細故外器世間遍于十方難測量故次立量以顯第八識是有量云滅定是有法有第八識宗因云有情攝故喻如有心時無想定及無想天亦爾既滅定無想定仍有第八第八行相豈不難知也哉二釋不可知等三門竟
