body:
  text: 蕅益沙門智旭述八識食體前約生滅分位今約住位言之也文分為二初引經通明四食二別顯識食唯真異熟今初又契經說一切有情皆依食住若無此第八識彼經所說識食之體不應有故謂契經說食有四種一者段食變壞為相謂欲界繫香味觸三於變壞時能為長養諸根資益身命之食事由此色處非段食攝以變壞時色無用故段者形也分也亦作摶謂有形分可摶取也變壞為相者食於腹中變壞方成資養事相以初入口時未見損益故不名為食事也欲界繫者色無色界俱不用段食也二者觸食令心觸境為相謂有漏觸纔取境時攝受喜樂等境令諸根怡適能為食事此觸心所雖徧與諸識相應唯屬前六識者食義偏勝所以觸者是麤顯境攝受喜樂及順益身之捨受資養勝故觸即徧行五心所之一也有漏觸者簡非無漏識相應觸也今人觀戲聞樂等事雖忘食而不倦即是以觸為食三第六意識中思心所食此思以希望為相謂有漏思與別境中欲心所俱轉希可愛境資益身命能為食事此思心所雖亦徧與諸識相應唯有屬第六意識者食義偏勝以意識於境希望勝故思亦徧行五心所之一也有漏思亦簡非無漏識相應思也如昔有人避難兒幼不能隨行懸灰袋於梁間語彼兒言汝若饑者梁間袋中有食小兒視梁念食多日不死後一人至兒令取下既見是灰兒命即絕此即思食之相又望梅止渴亦是思食四者識食以能執持諸根令不散壞為相謂有漏識由段觸思勢力增長執持身命能為食事此識雖通諸識自體而第八識食義偏勝一類相續執持勝故有漏識亦簡非無漏淨識蓋無垢第八雖亦執持無漏色身亦得名為出世無漏之食而此且約一切眾生皆依食住則執持有漏身者必是有漏第八識也一類謂無記性相續謂無間轉由是集論說此四食三蘊五處十一界攝此四能持有情身命令不壞斷故名為食段食唯於欲界有用觸食及意思食是徧行心所所攝雖徧三界而依相應之六識轉故隨識而為有無三蘊者於五蘊中段食是色蘊攝觸食思食是行蘊攝識食是識蘊攝也五處者于十二處中段食是香味觸三處攝觸食思食是法處攝識食是意處攝也十一界者於十八界中段食是香味觸三界攝觸食思食是法界攝識食是意界及六識界攝也隨識有無者如初禪無鼻舌二識則無鼻識舌識相應之觸思二食但有眼識耳識身識意識相應之觸思二食二禪已上無前五識則無前五識相應之觸思二食但有意識相應之觸思二食若從勝說但名思食無想天中無第六識則無第六相應之觸思二食雖有第七第八相應之觸思二種心所而食義不勝但有識食也初引經通明四食竟二別顯識食唯真異熟眼等轉識有間有轉非徧恒時能持身命謂無心定熟眠悶絕無想天中有間斷故設于有心位中隨所依根隨所緣境而于三性三界九地等一切時中有轉易故於持身命非徧非恒諸有執無第八識者將依何等為識食而經乃作是言一切有情皆依食住非可謂無心位中現雖無識而以過去未來識等為食彼過未識非現非常如空華等無體用故設謂識于過未自有體用然既非現在攝如虗空等非食性故亦不可說入定心等能與無心位之有情為食以住無心之時彼加行之心及心所既已滅故過去非食已極成故又不可說無想定等不相應行即為彼食以段等四食所不攝故且不相應法離色心等非實有故此正簡示轉識無持身命之義不可立為識食體也若以轉識為食則無心位中便應無食若以過未之識為食則過未既非現常無體無用猶如空華云何可作食耶量云過未識是有法非識食宗因云彼非現常無體用故喻如空華恐有救曰識於過去未來各各皆有體用云何無體用耶今破之曰識於過未雖有體用而過去體用自屬過去非現在攝未來體用亦屬未來非現在攝譬如現前了無一物名為虗空虗空豈可為食耶量云過未識之體用是有法非食性宗因云非現在攝故喻如虗空言入定心等者謂定前加行之心及心所也餘可知有執滅定等猶有第六識於彼有情能為食事此敘轉計也等者等餘四無心位彼執非理後當廣破又彼若謂第六識能為食事則應說生上二界而起無漏第六心時以何為食以無漏識等破壞有故於彼身命不可為食亦不可執無漏第六識中有有漏種能為彼食以無漏識等猶如涅槃決定不能執持有漏種故復不可說上界有情身命相持即互為食以四食中不攝彼身命故且又無色界中無身則命無能持故若以無色界中眾同分而持命者眾同分等但是假立無實體故安能持命由此定知異諸轉識別有真異熟識一類恒遍執持身命令不壞斷世尊依此故作是言一切有情皆依食住此破轉計也後當廣破指下第九滅定有識章中無漏心謂生空觀智相應之心餘可知唯依取蘊建立有情佛無有漏五蘊非有情攝不依食住或時說佛為有情中無上亦依食而住者當知皆依權巧示現而說此釋伏難也難曰既一切眾生皆依食住佛轉第八識為大圓鏡智以何為食故今釋曰唯依取蘊建立有情佛非有情何須依食而住又難曰佛若非有情攝何故復有經云有情無上者佛是又佛在世時亦受段食此云何通故今釋曰皆依權巧示現而說也既異熟識是勝食性彼識即是此第八識此結成也八識食體竟九滅定有識前約流轉門顯今約還滅門顯也文分為二初破無第八識二破有第六識今初又契經說住滅定者身語心行無不皆滅而壽不滅亦不離煖根無變壞識不離身若無此第八識則經所云住滅定者不離身之識不應有故謂眼等識行相麤動於所緣境起必勞慮本為厭患彼轉識故暫求止息漸次伏除至都盡位依此位立住滅定者之人故此定中彼諸轉識皆滅若不許有微細一類恒徧執持壽等識在依何而說識不離身若謂後時彼六轉識還起如隔日瘧名不離身是則不應說心行滅以六識與想等起滅必同亦應說心行不離身故又復壽煖諸根應亦如六識之滅已還起便成大過故應許有第八識猶如壽煖等實不離身又此位中若全無識應如瓦礫非有情數豈得說為住滅定之聖者又異熟識此位若無誰能執持諸根壽煖無執持故皆應壞滅猶如死屍便無壽等既爾後識必不還生說不離身彼可所屬以諸異熟識捨此身已離託餘身無有重生者故又縱許後識還生然若此位無持種識則後識無種如何得生過去未來及不相應法皆非實有體前文已極成故諸色等法離識皆無受熏持種前文亦已遮故然滅定等無心位中如有心位定實有第八識以其具根壽煖有情攝故由斯理趣住滅定者決定有第八識實不離身非約後時轉識還起名不離身也滅定等無心位是有法定實有第八識宗因云具根壽煖有情攝故喻如有心位二破有第六識若謂此滅定位有第六識名不離身亦不應理此滅盡定亦名無心定故若轉計云無前五識名無心者則應一切定皆名無心以諸定皆無五識身故且意識本攝在六轉識中如五識身滅定非有或此位識行相所緣不可知故如壽煖等非第六識若此位有行相所緣可知識者應如餘有心位非此滅定位攝本為止息行相所緣可了知識而入此滅盡定故此正破滅定有第六識之執也立量云意識是有法滅定位中非有宗因云攝在六轉識中故喻如前五識次或立量云此滅定位識是有法非第六識宗因云行相所緣不可知故喻如壽煖等次反申量云若此位有行相所緣可知識者是有法非滅定位攝宗因云本為止息行相所緣可了知識而入滅盡定故喻如餘有心位又若此位有第六識彼第六識相應之心所法為有為無此下更約心所有無破也今雙徵下先破有心所若有心所經不應言住此定者心行皆滅又不應名滅受想定救曰此定加行但厭受想故此定中唯受想滅受想二法資助心強諸心所中獨名心行說心行滅何所相違破曰若如所說則無想定中應唯想滅以加行中但厭想故然汝不許但是想滅既唯受想資助心強此二滅時心亦應滅如何猶有第六識耶救意謂但滅受想不滅心王及餘心所破意先以無想例責次明受想既是資助心強則受想既滅心無資助安得不隨滅耶救曰如出入息之身行滅而身猶在寧要責心令同受想之心行滅破曰若爾則語行尋伺滅時語應不滅而汝亦非所許然加行之於法體有徧非徧徧行滅時法定隨滅非徧行滅法或猶在非徧行者謂出入息見息滅時身猶在故尋伺於語是徧行攝彼若滅時語定無故今受想於心亦徧行攝許如思等皆是大地法故是故受想滅時彼六識心定亦隨之俱滅如何可說彼受想滅而六識心猶在又既許思等是大地法則滅受想時彼思等亦應隨滅既爾則信等諸餘心所此滅定位亦無非可謂遍行心所已滅而餘心所反可在故如何可言有餘心所若既許思等此滅定位非無則受想亦復應然以同是大地法故又此定中若有思等亦應有觸以凡餘心所法無不皆依觸力生故若許有觸亦應有受觸緣受故既許有受想亦應生不相離故救意謂出入息滅而身不滅例知受想滅而心不滅破意謂尋伺滅則語必滅例知受想滅則心必滅以受想同尋伺之徧行不同出入息之非徧行故也言大地法者受想思觸欲慧念與作意勝解三摩地徧於一切心名十大地法此餘乘之所共許故得例而破之餘可知救曰如受緣愛非一切受皆能起愛故觸緣受非一切觸皆能起受由斯所難其理不成破曰彼救不然有差別故謂佛自簡唯無明觸所生諸受為緣生愛曾無有處簡觸生受故若有觸必有受生受與想俱其理決定或應如餘位受想亦不滅執此滅定位中有思等故許更違害心行滅言亦不得成滅受想定救意謂受既不必盡皆生愛例知觸亦不必盡皆生受破意謂受不生愛佛自簡示觸不生受佛曾不簡既有差別豈得為例或應下更立量破云彼所執此位是有法受想亦不滅宗因云有思等故喻如餘有心位已上破有心所竟若無心所則六識決亦應無不見餘眼識等心離相應心所而得獨存故餘五識相應之徧行心所若滅則心法決隨滅故若謂有心王而無受等則受等應非大地法攝以不能徧一切心故又此識應非有心所相應法故若許此識無相應法則既無觸心所根境與識三不和合便應無所依根亦無所緣境等便應如色等法亦非可名為心故此破轉計滅定位中但有第六識心王無心所也又契經說意法為緣生於意識三和合觸與觸俱起有受想思今若許此滅盡定中有第六意識者三和合故必應有觸觸既定與受想思俱如何有識而無心所若謂餘時三和有力成于觸對生觸心所能起受等由此滅盡定前厭患心所故在定位根境識之三事無能不成觸對不復生觸心所亦無受等若爾應名滅心所定如何但說滅受想耶若謂厭時唯厭受想此二滅故心所皆滅依前所厭以立定名既爾則此滅盡定中第六識心亦決應滅以第六心必與所厭之受想俱故如餘心所不爾如何此定亦復名無心定此亦更破有心王而無心所之執也意即是根法即是塵二緣生識三和生觸有觸則必有受想思如何但有心王而無心所若謂下轉救若爾下轉破次若謂下又轉救次既爾下又轉破既受想二滅則餘心所皆滅而謂心王獨存可乎又此滅盡定位設許有意識者為是何性不應是染或無記性以諸善定中無此染與無記事故餘染無記之第六識心必有心所與之相應故本為厭有漏善而修滅定不應厭善而反起染等故本為厭患勞慮而住寂定非求寂靜翻起散故若謂此滅定中意識是善則必以相應善故應與無貪等善根相應此更約三性破也若執定中有第六識為是何性若云是染則尚厭有漏善豈得反起於染若云無記則本求勝寂靜豈得反起于散若云是善必有諸善心所相應何得名為滅受想定以無受想等徧行心所不能引生諸善心所設有諸善心所亦必有徧行別境諸心所故此滅定中第六識心不應是自性善或勝義善違自宗故以第六識非信及無貪善根等之自性及非涅槃之勝義故此亦破轉計也恐彼救曰滅盡定中之第六識非相應善但是自性善或是勝義善耳然無貪等善根名自性善涅槃名勝義善今若謂第六識即無貪等或即涅槃非但大乘不許雖汝自宗亦所不許豈不相違若謂此滅定中第六識心是等流引起之善以是加行善根所引發故理亦不然違自宗故如餘位之善第六心非等起故以善第六心無間必滅後便隨緣起三性心如何善第六心可云由前等起故大凡第六識心若是善者必由相應心所之力既爾必與無貪等善根相應寧可說此滅定中第六善心獨無心所故若此定既無心所則第六識心亦必應無此破轉計等起善也然據後文有云無想定者又唯是善彼所引故況今滅定寧非加行善根所引寧非等起善耶須知謂滅定及無想定為等起善則可謂滅定及無想定尚有第六識心則斷不可以第六識必相應善非等起善即彼餘乘自宗亦所不許亦相違故如是推徵眼等六種轉識於滅定位非不離身故契經言不離身者彼識即是此第八識以入滅定時但為止息麤動勞慮不為止息此極寂靜執持識故無想等位類此應知結示可知九滅定有識竟十染淨心此總收上文染淨九法而言之也又契經說心雜染故有情雜染心清淨故有情清淨若無此第八識彼經所說之染淨心不應有故謂染淨法以心為本因心而生依心住故心受彼熏持彼種故此引經先總略釋也因心而生即是起義依心住故即是集義所謂集起名心故為染淨諸法本也心受彼熏即所藏義持彼種故即能藏義故亦名為阿賴耶也然雜染法略有三種煩惱業果種類別故此下先釋心雜染故有情雜染之義也煩惱謂見思二惑性是煩動惱亂有情故名煩惱業謂善惡不動三業體是造作有為之事故名為業果謂三界五趣四生升沉苦樂皆是酬答業因故名為果種謂煩惱業果現行所熏種子類謂各別差殊不同此中煩惱及業即是集諦果即苦諦也若無此第八識以持煩惱之種則三界九地離染而往報盡而還先在上界已無下地染心之後重來下界諸煩惱起皆應無因以餘法不能持彼下地煩惱種故過去未來非實有故若諸煩惱無因而生則無三乘學無學果何以故諸已斷者皆應起故此正釋煩惱種子非第八識不能持也若無此第八識以持業果之種則界地往還上下優劣異類法後諸業果起亦應無因餘種餘因前已遮故若諸業果無因而生入無餘依涅槃界已三界業果還復應生即彼招業果之煩惱亦應無因生故此復釋業果種子亦非第八識不能持也由煩惱故造善惡不動三業由此三業故感三界五趣果報約因果則煩惱與業屬因果屬于果約能所則煩惱為能招業果皆為所招故今業果合辨意指業所感果須知第八識中所藏業果種子是業果之親因緣現行煩惱是業果之勝增上緣也又行緣識應不得成轉識受熏前已遮故結生染識非行感故應說名色行為緣故時分懸隔無緣義故此不成故後亦不成此更約十二因緣中義非第八識不能成也謂設無此第八識持業果種則行緣識應不得成何以故若云行緣轉識則轉識不能受熏持種前文已遮破故若云行緣結生染識則結生染識非是行所感故既不可云行緣轉識又不可云行緣結生染識若無此第八識則應直云行緣名色然而行在先世名色在胎時分懸隔安有緣義此行緣識既不成故後諸有支亦不得成不許有第八識其過若此豈可乎哉結生染識者即投胎時妄于父母生憎愛之第六識也此是潤生煩惱所攝非業感異熟生所攝故云非行感故諸清淨法亦有三種世出世道斷果別故此下次釋心清淨故有情清淨之義也一者世間清淨道謂一切所修事戒事禪及有漏聞思修慧二者出世間清淨道謂聖位所修無漏根本後得二智三者所證斷果謂擇滅無為有餘無餘二種涅槃此中世出世二道即道諦斷果即滅諦也若無此第八識持世出世清淨道種則于世出世道異類心後更起彼世與出世異類淨法皆應無因所執餘因前已破故若二淨道無因而生則既入無餘依涅槃界已彼二淨道還復應生何以故所依身心亦應無因生故此正釋清淨道種必須第八識持也且如有人既修出世道若無第八識持世間道種則從無漏觀出何故復起世間淨道又如須陀洹等或時亦修世間淨道若無第八識持出世道種則於世間道後何故仍能起出世道又淨道若可無因而生則無學聖人入無餘涅槃之後亦可無因復生二淨道耶恐彼救云入涅槃後身心已滅依何修道今更破云既二淨道可無因生則所依身心亦可無因還復生故又出世道初不應生無法持彼法爾種故有漏類別非彼因故無因而生非識種故初不生故後亦不生是則應無三乘道果此展轉破救也恐彼救曰誰說諸法無因得生今破之曰又若無第八識持彼出世道種則出世道初不應生以更無別法可能持彼無始法爾無漏種故彼又救曰出世之道從聞熏生何須別有第八持無漏種今破之曰聞熏屬于有漏與出世無漏之道其類各別但是出世道之增上緣非彼出世道之正因故若許出世道從聞熏生即是無因而生以非從第八識中無漏種子生故然既無出世道種何由生出世道初出世道既不生故後出世道及諸果證亦不得生是則應無三乘道果矣又若無此第八識持煩惱種則轉依斷果亦不得成謂出世道一起之時現行煩惱及彼種子俱非有故以染淨二種第六識心不俱起故與出世道相應之第六識心決不持彼煩惱種子自性相違如涅槃與世相違故若夫去來識等及聖道得等決非實有亦不能持煩惱種故更計餘法持煩惱種理亦決不成故是則既無所斷之煩惱種子差別則能斷之出世道亦無依誰由誰而立斷果若謂由于道力後惑不生立斷果者則初道起之時便應成無學果後諸煩惱無第八識持彼種子皆已無因永不生故此正釋出世斷果必依第八識成也二種淨道是智德是所生得故有種子滅諦涅槃是斷德是所顯得故但約煩惱種子有無以立斷德差別不可謂斷德亦自有種子也金剛般若經云一切賢聖皆以無為法而有差別約所證則唯是無為約能證則三乘四果差別譬如虗空非丈尺丈尺顯虗空法喻泠然智者思之餘皆可知許有此第八能持種識則一切染淨因果皆成以唯此第八識能持染淨種故結成第十染淨心也二引經顯理竟三結略指廣證此識有理趣無邊恐厭繁文略述綱要二別顯教理竟三總結勸信別有此識教理顯然諸有智人應深信受初釋初能變竟二釋第二能變二初設問舉頌二以論釋成今初如是已說初能變相第二能變其相云何頌曰次第二能變是識名末那一釋名門依彼轉二所依門緣彼三所緣門思量為性相四體性門五行相門四煩惱常俱謂我癡我見并我慢我愛六染俱門及餘觸等俱七餘相應門有覆無記攝八三性門隨所生所繫九界繫門阿羅漢滅定出世道無有十伏斷門二以論釋成二初正釋頌文二證有第七初中九初釋釋名門二釋所依門三釋所緣門四釋性相兩門五釋染俱門六釋餘相應門七釋三性門八釋界繫門九釋伏斷門今初論曰次初異熟能變識後應辯思量能變識相是識聖教別名末那以其恒審思量勝餘識故末那此云意其義即恒審思量也勝餘識者第八恒而不審第六審而不恒前五不恒不審唯此第七於未轉位恒審思量妄執我法于既轉位恒審思量二空平等理也問曰此識既名為意何以異于第六意識答曰此第七是持業釋猶如藏識之名以識體即是意用故彼第六是依主釋猶如眼識等名以識體異于所依之意根故然諸聖教恐此第七濫彼第六故於第七但立意名不名意識又標意名為簡第八名心前六名識以此第七其積集了別二義劣于餘七種識故或欲顯此第七與彼第六意識為近所依故但名意此問答料簡立名之義也若此識名末那識即應翻為意識則與第六意識何別故曰若第七名為意識則識是體意是用體能持用用不離體意即是識猶如藏識持業釋也若第六名為意識則識是能依之識意是所依之根根不是識識依於根猶如眼耳等識依主釋也然諸聖教但名第七為意不名為意識者恐濫同第六故以上但對第六揀異又標下次對餘七揀異謂若約恒審思量則此第七獨勝若約積集名心則第七雖亦有積集義較第八識則劣若約了別名識則第七雖亦有了別義較前六識則劣故但名為意也或欲下復顯第六近所依故即是不共親依具如下釋二釋所依門三初正釋此識所依二傍論諸識所依三結歸本頌所依今初依彼轉者顯此第七識之所依彼謂即前初能變之第八識聖慈氏說此末那識依藏識故有義此意唯以彼第八識中之種子而為所依非依彼第八現識以此第七識恒無間斷不假現識為俱有依方得生故有義此意必以彼第八識中種子及彼現識俱為所依以第七識雖無間斷而有轉易亦名為轉識故亦必假托第八現識為俱有依方得生故轉謂流轉顯示此第七識恒依彼第八識之現及種子相續生起即取所依為所緣故釋所依中有二義後義為正言有轉易者聖道起時轉染為淨等也二空智果現前則第七便與平等性智相應法空智果不現前時則第七仍起俱生法執生空智果不現前時則第七仍起俱生我執故必須以第八現識為俱有依若夫識中種子則是因緣依也流謂相續轉謂生起餘可知二傍論諸識所依二初略釋二廣釋今初諸心心所皆有所依然彼所依總有三種一因緣依謂自相子諸有為法皆託此依離自因緣必不生故對果名因因即生緣簡非增上緣所緣緣及等無間緣故名因緣即諸心心所各別種子亦名種子依也二增上緣依謂內六處諸心心所皆託此依離俱有根必不轉故但云增上緣則所收甚寬今既稱依則但局取六根謂五淨色根及意根處以是妄情之所執受故名為內此亦名俱有依也三等無間緣依謂前念已滅之意諸心心所皆託此依以離此前開導根必不起於後念心心所故但云等無間緣則心心所皆得為緣故亦稍寬今既稱依則但取無間即滅之心王望於後心名為意根此能開導後念心心所法故亦名開導依唯心心所具三所依名有所依非所餘法謂色及不相應行無為法等皆不用三依也初略釋竟二廣釋三初釋種子依二釋俱有依三釋開導依今初初種子依有作是說要種滅已現果方生以須無種已然後生乃集論之所說故又如世間之物種與芽等不俱有故此先敘經部師異解也有義彼說為證不成彼集論中但依引生自類後種而說非依引生現果說故又種生芽等是依世俗假說非依世間勝義說故又現見麥等芽種俱有則種滅芽生非極成故須如𦦨炷同時方可互為因故然種自類因果不俱種現相生決定俱有此下大乘正釋也先破異解次明正義𦦨炷同時者如炷生𦦨𦦨生燋炷炷之生𦦨喻種生現行𦦨生燋炷喻現行熏種若前炷後炷相望即可喻種引種若前𦦨後𦦨相望即可喻現引現是故因緣自有三義一者種引種因果不俱以異念故喻如前炷後炷二者種生現三者現熏種決定俱有以同時故喻如炷生𦦨𦦨生燋炷若現引現但名等無間緣不名因緣喻如前𦦨後𦦨但能相引而後𦦨實非前𦦨所生以炷若盡則前𦦨不能更生于後𦦨故故瑜伽說無常法與他性為因亦與後念自性為因是因緣義其自性之言即顯種子自類前為後因其他性之言即顯種與現行互為因義攝大乘論亦作是說藏識與染法是互為因緣猶如束蘆俱時而有又說種子與果必俱故種子依定非前後設有處說種果前後應知皆是隨轉理門如是八識及諸心所定各別有種子所依此引二論以證種子依必俱時有也無常法通指諸心心所種子言之以諸種子雖復相似相續不壞不失體是生滅故名無常種子無常則現行亦無常矣以種子望種子假名自性以種子望現行假名他性猶言同類異類耳染法指有漏前七轉識隨轉理門謂非一定不易之理乃隨宜方便之權說也初釋種子依竟二釋俱有依共四家解第四為正今初次俱有依有作是說眼等五識以同時意識為俱有依此五識現起之時必有彼意識故無別眼根等為俱有依以眼等五根即五識之種子故如二十唯識伽他中言識從自種生似境相而轉為成內外處佛說彼為十彼頌意說世尊為成十二處故所以說五識之種子為眼等根成內五處又說五識所變相分為色等境成外五處故知眼等五根即是五識之種子耳觀所緣論亦作是說識上色功能名五根應理功能與境色無始互為因彼頌意言異熟識上能生眼等色識之種子以能生眼識等現行故名為色功能即此功能說為五根無別有眼等五色根也種與色識常互為因以能熏之現識現色常與種子遞為因故第七八識無別此俱有依恒相續轉自力勝故第六意識別有此俱有依要託末那而得起故色識即眼識依根名眼識依塵名色識餘四例知此中以意識為五識俱有依一謬也謂五識種子為五根二謬也謂第七八識無俱有依三謬也唯第六依末那一義不謬第二家解有義彼說理教相違若五色根即五識種則十八界種應成雜亂然十八界各別有種諸聖教中處處說故一違也此下先破初家識種為根之謬也十八界種應成雜亂者若以根為識種則識全無種又識種為根則根全無種故又五識種各有能生相見分異為執何等名眼等根若執五識之見分種子以為五根則見分屬心應識蘊攝若執五識之相分種子以為五根則相分屬境應外處攝便違聖教眼等五根皆是色蘊內處所攝二違也又若五根即五識種則五根應是五識之親因緣不應說為增上緣攝三違也又若鼻舌二根即鼻舌二識之種則應鼻舌二根亦如鼻舌二識之唯欲界繫或應鼻舌二識亦如鼻舌二根之通色界繫許此說者便俱與聖教相違又若眼耳身三根即眼耳身三識之種子則二地五地為難亦然四違也眼等三根通於五地謂五趣雜居地欲界離生喜樂地初禪定生喜樂地二禪離喜妙樂地三禪捨念清淨地四禪眼等三識唯通二地謂五趣雜居地離生喜樂地也今若執眼耳身根即是識種則或根應如識惟局二地或復識應如根亦通五地矣又五識種既通善惡應五色根非唯無記五違也又五識種無執受攝五根亦應非有執受六違也第八識緣一切種子但緣而不執受今謂五根但是五識種子則第八不應執受五根矣豈不理教相違又五色根若即是五識種應意識種即是末那彼末那以五根為同法故七違也同法者同為有間轉識所依之根法也又瑜伽論說眼等識皆具三依若五色根即五識種依但應二八違也識種子現行是種子依五根是俱有依前滅意是開導依若謂根即識種是合俱有依為種子依但有二矣又諸聖教說眼等五根皆通有現行有種子今執唯是識種而為五根便與一切聖教相違九違也正破初家識種名五根竟有避如前所說過難朋附彼執復轉救言異熟識中能感五識增上業種名五色根非作因緣生五識種妙符二頌善順瑜伽此敘救也謂五識所作善惡業習氣能感當來異熟果攝之無記五識即此業種名五色根作增上緣生眼等識既以增上業種為根則合二十唯識頌中從自種生之義亦契觀所緣緣論中功能名五根義此種但為增上不為因緣又順瑜伽具三依業也彼有虗言都無實義業種由善惡熏通善染性若執以為五根應五色根非無記故又彼五根應非唯有執受以業種非所執受故亦非唯色蘊攝以業種非色故亦非唯內處攝以業種通內外故鼻舌二根唯應欲界繫故以二識業種唯在欲界二根不應通色界故眼耳身三根不應五地繫故三識業種唯在二地三根亦應惟二地故感意識之業種應是末那以五根為同法故眼等五根又亦不應通現種故又業屬思若執為根則應眼等五根非色根故又眼等五識皆通三性若使五識皆業所感則應一向總唯無記性攝不通善染二性又無記五識是業所感可有眼等為俱有依則善等五識既非業感應無眼等為俱有依故彼所言業種為五根者非為善救又諸聖教處處皆說阿賴耶識變似五淨色根及根依處器世間等如何汝等撥無五淨色根既許眼等五識變似色等五塵外相分境乃獨不許眼等五根內相分是藏識之所變如斯迷謬深違教理此破救也此下通所引頌然二十唯識論及觀所緣緣論之伽他中說種子功能名五根者為破餘部妄執離識實有色根故於本識所變似眼根等以有發生五識用故假名種子及色功能非謂色根即是識種及業種也已上破初家者皆妙已下自立義未全妥又緣五境之明了意識應以五識為俱有依以彼明了意識必與五識俱時起故若使彼明了意識可以不依眼等五識者則彼同時意識亦應不與五識為依以彼此互相為依勢力等故又第七識雖無間斷而見道修道等位有漏無漏間起既有轉易應如六識有俱有依不爾彼應非轉識攝便違聖教轉識有七故應許彼第七末那亦必有俱有依此俱有依即是現行第八識攝如瑜伽說有藏識故得有末那末那為依意識得轉彼論意言現行藏識為依止故得有末那非由彼中種子若不爾者彼論應說有藏識故意識得轉以藏識中亦有意識之種子故由此彼說以種為根及說第七無俱有依理教相違此中所說明了意識以五識為依者非所說末那以現行第八為依者是是故應言前五轉識一一定有二俱有依此應有四今尚闕二謂五色根是同時意識是第六轉識決定恒有一俱有依此應有二今尚闕一謂第七識是若與五識俱時起者亦以五識為俱有依非第七轉識決定唯有一俱有依謂第八識是唯第八識恒無轉變自能立故無俱有依非第二家解竟第三家解有義此說猶未盡理第八類餘七識既同識性如何不許有俱有依第七八識既恒俱轉更互為依斯有何失此義全是又既許現起之識以種子為依則此識種亦應許依現行之識以能熏之前七識所熏之異熟識為一切種子生長住依謂識中種子離彼能熏則不生長離彼所熏則無可依住故此因緣義非俱有依義也又異然識有色界中能執持身依色根轉如契經說阿賴耶識業風所飄遍依諸根恒相續轉瑜伽亦說眼等六識各別依故不能執受有色根身若異熟識不徧依止有色諸根應如六識非能執受或所立因有不定失異熟識是有法非能執受宗因云不徧依止有色諸根故喻如六識或所立因有不定失者將異熟識同六識之不徧依止而不同六識之無執受是犯二宗共一因也然此但是能執受義亦非俱有依義以無色界無有根身而第八現轉故是故藏識若現起者定有一依謂第七識是在有色界亦依色根非若識種子定有一依謂異熟識依之而住故非初熏習位亦依能熏依之生長故非餘如前說第三家解竟第四家正解有義前說皆不應理未了所依與依別故依謂一切有生滅法仗因託緣而得生住諸所仗託皆說為依不簡親疎勝劣能所如王與臣互相依等若有法於此一者決定同時而轉二者有境可照三者自在為主不由他引四者能令心及心所取自所緣具此四義乃是所依即內六處餘非有境非決定非為主故故非所依此所依但如王非如臣等故諸聖教唯心心所名有所依非色等法以其無所緣故但說心所以心王為所依不說心所為心王心所依彼心所非主故然有處或說依為所依或說所依為依應知皆是隨宜假說由此五識俱有所依境者四種謂五色根第六識第七識第八識隨闕一種必不轉故五色根是同境所依第六識是分別所依第七識是染淨所依第八識是根本所依如此四差別故然諸聖教唯說五識依五根者以是五識所不共故又必同境近相順故第六意識俱有所依唯有二種謂第七識第八識隨闕一種必不轉故雖五識俱取境明了而不定有故非所依然諸聖教唯說第六依第七者染淨依故同轉識攝近相順故第七意識俱有所依但有一種謂第八識藏識若無定不轉故如伽他說阿賴耶為依故有末那轉依止心及意餘轉識得生心即第八意即第七餘轉識即前六也餘可知阿賴耶識俱有所依亦但一種謂第七識彼識若無定不轉故論說藏識恒與末那俱時轉故又說藏識恒依染汙此即末那而說三位無末那者依有覆說如言四位無阿賴耶非無第八此亦應爾三位無有覆末那謂一阿羅漢二滅盡定三出世道四位無阿賴耶謂三乘無學及佛雖有色界亦依五根而不定有非所依攝識種不能現取自境可有依義而無所依心所之所依隨其相應之識應說復各加自相應之心王若作是說妙符理教此破第三家以五色根為藏識所依及破現依種種依現之說而結成正義也二釋俱有依竟三釋開導依有三家解第三為正今初家解約相續義後開導依有義五識自他前後不相續故必第六識所引生故唯第六識為開導依第六意識自相續故亦由五識所引生故以前六識為開導依第七八識自相續故不假他識所引生故但以自類為開導依第二家解約有力義有義前說未有究理且前五識未自在位及遇非勝之境可如所說前後不相續若自在位如諸佛等於境自在諸根互用任運決定不假尋求彼五識身寧不相續此下先破初家五識不相續之義也瑜伽論云由眼識生三心可得如其次第謂率爾心尋求心決定心初是眼識二在意識此明餘位必尋求而後決定非謂自在位故又等流五識未自在位設遇勝境既為決定染淨意識及作意緣勢力之所引生正當專注所緣未能相捨之頃如何不許多念相續宗鏡錄云緣慮心有五種行相一率爾心謂過境便起二尋求心謂於境未達方有尋求三決定心謂審知境體而起決定四染淨心謂於境欣厭而起染淨五等流心謂念念緣境前後等故當知前五轉識得有四相但除尋求無隨念計度二種分別故第六具五相第七無率爾尋求二相有決定染淨等流三相謂第七常緣現在故并無率爾相也第八有三相率爾決定等流無染淨尋求有率爾者初受生時創緣三界三種性境故故瑜伽說決定心後方有染淨此後乃有等流眼識善不善轉而彼等流眼識不由自分別力全賴意識決定染淨引生乃至此意但緣色塵不趣餘聲香味等境時隨經爾所時候眼意二識或善或染相續而轉如眼識生乃至身識應知亦爾是彼論意定顯經爾所時眼意二識俱相續轉既眼識時非無意識故非二識互相續生又若未自在位遇增盛境相續現前逼奪身心不能暫捨時五識身理必相續如熱地獄戲忘天等熱地獄苦增盛境戲忘天樂增盛境也餘可知故瑜伽言若此前念六識為彼後念六識等無間緣即施設此名為意根若使五識前後定唯有意識彼論應言若此一識為彼六識等無間緣以五識前定唯有意識故或彼應言若此六識為彼一識等無間緣以五識後定惟有意識故論文既不如是故知五識各自有相續義又五識起時必有同時意識即能引後念意識令起何假五識為開導依此上破初家者皆是此後若破若立皆未當理無心睡眠悶絕等位意識斷已後復起時藏識末那既恒相續亦應與彼意識為開導依若謂彼意識但用前時自類開導則五識自類何不許然此五識既不許然彼意識云何獨爾藏識末那何得為意識開導依一謬也用前自類開導本是而及破之二謬也彼不許五識自類開導本非而反印之三謬也平等性智相應之末那初起之時必由第六意識入二空觀亦應用彼第六為開導依圓鏡智俱之第八淨識初必六七方便引生又異熟心依染汙意或依悲願相應善心既爾必應許第八識亦以六七為開導依由此彼初家言都未究理染汙意即第七識悲願相應善心即第六識謂菩薩由此悲願長劫利生不取涅槃故異熟心亦以此為開導依也此義全謬應說五識前六識內隨用何識為開導依第六意識用前念之自類或第七八為開導依第七末那用前念之自類或第六識為開導依阿陀那識用前念之自類及第六七為開導依皆不違理由前說故謬處偏多至下自明第二家解竟第三家正解是義此第二說亦不應理開導依者謂一者必有二者是緣慮法三者自在為主四者能作等無間緣具此四義能於後生心心所法開避引導名開導依此但屬心非心所等此正釋開導依之義也有者簡不相應行非實有故緣法者簡色及無為不能有緣慮故為主者簡心所依他不自在故等無間者簡異類得俱起故若此前念與彼後念無俱起義說此前念於彼後念有開導力一身八識既容俱起如何異類為開導依若許異類為開導依應八種識不俱時起便同小乘異部所執心不並生又一身中諸識俱起或二或三乃至七八多少不定若謂此依唯遮多少不揀異類皆容互作等無聞緣則色根等與心異類並生亦復應爾皆可互作等無間緣便違聖說等無間緣唯心心所然攝大乘說色亦容有等無間緣者乃是縱奪之言謂假縱小乘色心前後有等無間緣以奪其互為因緣之執故耳不爾等之一言應成無用若謂等言非遮力用多少但表同類故色同類亦有等無間緣者又便違汝先所執異類識作等無間緣矣此破前互為開導之謬也然攝大乘下轉釋伏難難曰若等無間緣唯心心所有之則攝大乘論何故說色容有等無間緣今釋之曰攝大乘論為破小乘妄執色心前後相續為因緣性故縱許云色心前後相生但應容有等無間緣無有因緣義也設不爾者等無間之等字便為無用以等乃齊等之義一遮多少二表同類一遮多少者謂心用多色用少故心但與心作等無間緣不與色作等無間緣色用既少故無等無間緣之義二表同類者如前眼識于後眼識名為同類若望耳鼻等識便非同類餘可知是故八識各唯自類為開導依深契教理自類必無俱起義故心所之此等無間依應隨相應之識而說雖心心所異類並生而互相應和合似一定俱生滅事業必同一開導時餘亦開導故展轉作等無間緣諸識相望則必不然不應為例然諸心所非開導依於所引生無主義故先承前破謬結成正理次辨心所之開導依應設難云若等之一言必表同類者諸心所法與相應心王異類並生何容隨識說耶今釋之曰而互相應等故事謂所依體業謂所作用如眼識相應諸心所法定與眼識同依眼根定與眼識同緣色塵餘可例知言一開導時餘亦開導者如眼識與觸俱生之時則受想思等乃至或善或染皆悉隨生也展轉作等無間緣者約諸心所互相引生也諸識相望並無相應和合定俱生滅事業必同之義故不應以心所為例妄許展轉為等無間緣也然諸心所下簡依緣義寬狹不同若云等無間緣則寬故心所可以互作若云聞導依則狹故心王名依心所非依以其不能為主故也若謂諸心相應之心所等無間緣亦但各唯自類不由心王及餘心所異類引生則第七八識初轉依時相應信等之此等無間緣便闕以七八二識未轉依時無信等故則違聖說諸心心所皆四緣生有因前文等表同類之語不許心所異類引生故此釋之無心睡眠悶絕等位意識雖斷而後起時彼開導依即前自類間斷五識應知亦然問曰既久間斷何名無間答曰但以無異類心於中為隔即名為無間故問曰前念滅時後念尚無何所開導今識生時前念非有何能開導答曰彼先滅時已於今識為開導故何煩異類為開導依然聖教中或說前六識互相引起或說第七八依六七生者皆依殊勝增上緣說非等無間故不相違瑜伽論說若此識無間諸識決定生說此為彼等無間緣又言若此六識為彼六識等無間緣即施設此名意根者言總意別故今所說亦不相違故自類依深契教理先申明無間之意次會通聖教所說並可知後簡示瑜伽言意蓋此彼之言似通自他然其意但以自類前後而名此彼故云言總意別也二傍論諸識所依竟三結歸本頌所依傍論已了應辯正論此第二能變識雖具三所依而頌中依彼轉之言但顯前二為顯此識所依所緣同是第八識故又前二依有勝用故頌偏說之或開導依易了知故頌故不說前二者初因緣依即種子識次俱有依即第八現識也二釋所依門竟三釋所緣門二初正釋二釋妨初中二初略釋二廣釋今初如是已說此識所依所緣云何謂即緣彼彼謂即前此所依識聖說此識緣藏識故二廣釋二初釋未轉依二釋已轉依初中有四家第四家為正今初家釋有義此末那意緣彼第八識體及相應之五心所法論說末那我我所執恒相應故謂緣彼體及相應法如次執為我及我所然諸心所不離識故如唯識言亦攝心所故頌但云緣彼無違教失第二家釋有義彼說理不應然曾無處言緣觸等故應言此意但緣彼識之見分及相分如次執為我及我所相見俱以識為體故不違聖說第三家釋有義此說亦不應理以相分中五色根境非識蘊故又相分中器界乃是外境若使末那緣之應同五識亦緣外故應如意識同前五識緣共境故既緣根塵生我所執應生無色者不執我所故厭色而生彼天不變為根塵之色故應說此意但緣藏識及彼種子如次執為我及我所以種即是彼第八識功能非實有物不違聖教第四家正釋有義前說皆不應理以色等種子非識蘊故論說種子是實有故若謂是假則應如無非可為諸法之親因緣故又此第七識俱之薩迦耶見任運一類恒相續生何容別執有我我所譬如第六意識無一心中有斷常等二境別執俱轉義故亦不應說第七識之我及我所二執前後別轉以此第七識從無始來一味恒轉無前後分位之差別故薩迦耶此翻積聚薩迦耶見即身見也正執我時不能別執我所正執我所之時亦不能別執于我故此二執喻如斷常二執決不俱起今此第七識相應之身見既是任運一類恒相續生所以但有我執更無我所執也應知此意但緣藏識見分非緣餘相分及種子心所等彼第八識之見分無始以來微細一類相續不斷似常似一故恒與諸法為所依故此第七識唯執彼第八見分為自內我論中但是乘語勢故說我所言或此第七執彼第八見分是我之我即以能執為我所執為我所故於一我見約義說我及我所之二言若作是說善順教理多處唯言第七識有我見故我及我所二執從來不俱起故相續故似常一類無記故似一也初釋未輪依竟二釋已轉依然第七識未轉依位則唯緣藏識見分若夫既轉依已亦緣真如及餘諸法以平等性智證得十種平等性故知諸有情勝解差別示現種種佛影像故今此頌中且說未轉依時故但說此緣彼藏識悟迷通局理應爾故無我我境徧不徧故十種平等性者一諸相增上喜愛平等二一切領受緣起平等三遠離異相非相平等四弘濟大慈平等五無待大悲平等六隨諸眾生所樂示現平等七一切眾生敬愛所說平等八世間寂靜皆同一味平等九世間諸法苦樂一味平等十修植無量功德究竟平等此中證得十平等性釋緣真如之義知諸有情勝解差別釋緣餘諸法之義也平等性智是悟故所緣則通染汙末那是迷故所緣則局平等性智緣無我境故其境周徧通攝真如及餘諸法染汙末那緣我法境故其境不徧但是第八見分非餘初正釋竟二釋妨問曰如何此第七識乃緣自所依之第八識耶答曰如有後念意識即緣前念已滅之意彼前意是等無間緣得與後識作所緣緣既已極成此所依藏識是增上緣亦可作所緣緣又復何咎三釋所緣門竟四釋性相兩門頌言思量為性相者雙顯此識自性行相意以思量為自性故即復用彼思量為行相故由斯兼釋所立末那之別名以能審思量乃名為末那故未轉依位能審思量所執我相已轉依位亦審思量無我相故五釋染俱門此意相應有幾心所且與四種煩惱常俱此中俱之為言是顯相應之義謂從無始至未轉依此意任運恒緣藏識與四根本煩惱相應其四者何謂我癡我見并我慢我愛是名四種且者未顯其餘先明此意之過失也我癡者謂無明愚於自心所變之我相迷于無我真如之理故名我癡我見者謂我執於第八識見分本非我法之上妄計為我故名我見我慢者謂倨傲恃所執我令心高舉故名我慢我愛者謂我貪於所執我深生耽著故名我愛頌言并者表慢愛有見得俱見慢亦得與愛俱遮餘部所執見愛慢三無相應義此四常起擾濁內心令外轉識所作施等恒成雜染有情由此生死輪迴不能出離故名煩惱此正釋四煩惱相并顯其過患也內心即指第七識外轉識指前六識由第七識妄起我癡我見我慢我愛遂使五度諸行不能忘相咸成有漏故名雜染若欲出離輪迴必先勤觀無我然此第七識之俱生我執細故難斷必先用第六識與相應之正慧心所依於大乘教理如實觀察俾無我正解種子漸熏漸著至成熟位方得無漏實智現前又即以此無漏實智數數勤修然後四煩惱種方得永斷今人輒談六度萬行而於破執法門曾不究心求出輪迴不亦難乎問曰既由第七令前六識恒成雜染理須直用第七修無我觀始為灸病得穴伐樹得根何故先用第六識耶答曰第七我執元由第六之所資熏故仍以第六為病之穴為樹之根況第七識從無始來至未轉位一味有覆無記性攝不與信等諸善心所相應又無欲解念定之力何能自修無我觀哉是故吾人發大乘心須於唯識相性深生信解然後修習菩提資糧可名順解脫分否則縱修諸行但是人天有漏之因而已問曰彼根本惑共有十種此識相應何唯有四答曰有我見故餘二取邊邪之四見不生以無一心之中而容有二慧故此下皆問答釋疑也諸見皆以慧為體故不俱起問曰如何此識要有我見而非餘見答曰二取邪見但從分別而生唯屬見道所斷此第七識所俱之煩惱唯是俱生必修道所斷故是以無有二取邪見我所見及斷常二種邊見皆依我見而生今此第七識相應之我見不依彼我所斷常見而起是故無有我所邊見恒內執有我故要有我見由我見審決則疑無容起由愛著我故則瞋不得生故此識俱之煩惱唯四問曰見慢愛三如何俱起答曰行相無違俱起何失又問瑜伽論說貪令心下慢令心舉寧不相違答曰分別俱生外境內境所陵所恃麤細有殊故彼此文義無乖反謂彼瑜伽論乃指第六識相應之分別惑貪于外境陵于外人行相麤故不容並起此唯識頌乃指第七識相應之俱生惑貪于內境恃於內己行相細故自不相違也五釋染俱門竟六釋餘相應門二初未轉依二已轉依初中二初正釋頌義二例論受義初又二初問答舉頌二別釋頌義今初問曰此意相應心所唯有四耶答曰不爾頌云及餘觸等俱故二別釋頌義二初一家無餘心所次四家有餘心所今初有義此意心所唯九前四及餘觸等五法即觸作意受想與思意與遍行定相應故前頌既說觸等與異熟識俱今恐謂同前亦是無覆顯此第七相應心所異彼第八相應心所故置餘之一言及之一字即是集義前四後五合與末那恒相應故問曰此意何故無餘心所答曰謂欲心所希望未遂合事此第七識任運緣遂合境無所希望故無有欲勝解心所印持曾未定境此第七識無始恒緣定事經所印持故無勝解念心所唯記憶曾所習事此第七識恒緣現所受境無所記憶故無有念定心所唯繫心專注一境此第七識任運剎那別緣既不專一故無有定謂此第七緣彼第八能緣所緣皆悉剎那生滅前不似後後不似前也慧心所即是我見故不別說善十一心所是淨故非此染汙識俱隨煩惱生必依根本煩惱前後分位差別建立此識恒與四煩惱俱前後一類分位無別故此識俱無隨煩惱惡作心所追悔先所造業此第七識任運恒緣現境非悔先業故無惡作睡眠心所必依身心重昧外眾緣力有時暫起此第七識無始一類內執不假外緣故彼睡眠此識非有尋伺二種心所俱依外門而轉淺深推度麤細發言此第七識唯依內門而轉一類執我故非與彼尋伺相俱緣六塵等諸境名為外門緣藏識之見分名為內門淺推度麤發言名之為尋深推度細發言名之為伺次四家有餘心所二初斥前總標二四家別解今初有義彼釋餘字之義非理頌中更別說此第七是有覆無記性攝故又闕意俱之隨煩惱故根本煩惱必與隨煩惱俱故此頌中餘之一言正是顯隨煩惱二四家別解第四家為正今初家解此中有義五隨煩惱徧與一切染心相應如集論說沉掉舉不信懈怠放逸於一切染汙品中恒共相應若離無堪任性等五法則染汙性成無是處故煩惱起時心既染汙故染心位必有彼五以煩惱若起必由無堪任囂動不信懈怠放逸故掉舉雖遍一切染心而于貪位增盛故瑜伽論中但說掉舉是貪分如眠與悔雖遍三性心而癡位增盛故但說為癡分無堪任即沉囂動即掉舉也餘可知雖瑜伽論中餘處復說有隨煩惱或六或十徧諸染心而彼俱依別義說徧非彼或六或十實徧一切染心謂依二十隨煩惱中其解通于分別之麤及通俱生之細通于有覆無記及通不善又能通障定慧此等相顯故說六隨徧諸染心又依二十二隨煩惱中其解通于分別之麤俱生之細又通不善及有覆之二性故說十隨徧諸染心故此所說唯五隨煩惱與彼六徧十徧之二說各依別義非互相違然此意俱心所十五謂前九法五隨煩惱并別境慧我見雖是別境慧攝而五十一心所法中義有差別故開為二二十隨煩惱即小十中二大八具如下文所明也解者行相也二十二者加邪欲邪勝解也義有差別者我見唯染慧通染淨也餘可知問曰何緣此意無餘心所答曰謂忿等十種小隨行相麤動此第七識審細故非與彼小隨得俱無慚無愧二種中隨唯是不善此第七識是無記故非彼中隨相應大隨中之散亂令心馳流外境此第七識恒內執第八識之見分一類境生不外馳流故彼散亂此識非有不正知者謂起外門身語意行違越軌則此第七識唯是內執故非與彼不正知俱無餘心所義如前說第二家解有義應說六隨煩惱徧與一切染心相應瑜伽論說不信懈怠放逸忘念散亂惡慧一切染心皆相應故忘念散亂惡慧若無心必不能起諸煩惱要緣曾受境界種類發起忘念及邪簡擇方起貪等諸煩惱故煩惱起時心必流蕩皆由於境起散亂故此加忘念散亂惡慧三心所也邪簡擇即惡慧沉掉舉行相互違非諸染心皆能徧起論說五法徧染心者乃約解通麤細違唯善法而言蓋以純隨煩惱通于不善有覆之二性故瑜伽又說十徧之言義如前說此泛明掉舉與沉相違也論說下通妨可知然此意俱心所十九謂前九法六隨煩惱并念定慧及如沉此別說念准前慧釋并有定者專注一類所執我境曾不捨故加惛沉者謂此識俱之無明尤重心沉故無掉舉者與此惛沉正相違故無餘心所如上應知此更加念與定簡去掉舉也此別說念准前慧釋者謂忘念雖即以念為體而義有差別故第三家解有義復說十隨煩惱徧與一切染心相應瑜伽論說放逸掉舉沉不信懈怠邪欲邪勝解邪念散亂不正知此十一切染汙心起通一切處三界繫故若無邪欲邪勝解時心必不能起諸煩惱於所受境要樂合離印持事相方起貪等諸煩惱故邪念即忘念不正知即惡慧於所受境等者謂可愛境邪欲于中樂合非可愛境邪欲於中樂離更以邪解決定印持可愛事相方起貪心印持非可愛相方起瞋心也諸疑理者於色等事必無猶豫故疑相應心亦有邪一勝解即使於所緣事亦有猶豫者非是煩惱中之疑如疑人杌不名煩惱餘處不說此邪欲邪勝解之二心所遍染心者謂緣非愛事中之邪欲疑相應心之邪勝解此之邪欲勝解微薄非麤煩故略不言之非全無也餘處說隨煩惱或五或六各互有無義如前說此釋邪勝解不遍染心之難也難曰勝解于決定境印持為性疑以猶豫為性此二相違云何邪解得遍染心答云諸疑理者於諸諦理雖懷疑惑於色等事必無猶豫故仍得與勝解相應設或於事有疑亦復不名煩惱故疑事時雖無勝解而邪勝解不妨與疑理之煩惱相應也餘可知此意心所有二十四謂前九法十隨煩惱加別境五皆准前文之理而釋無餘心所亦如上文應知第四家正解有義前說皆未盡理且疑他世為有為無於彼有何欲勝解相是故邪欲勝解非徧染心煩惱起時若無沉應不定有無堪任性掉舉若無應無囂動便如善等非染汙位若染心中無散亂者應非流蕩非染汙心若無失念不正知者如何能起煩惱現前故染汙心決定皆與八種大隨煩惱相應而生謂沉掉舉不信懈怠放逸忘念散亂不正知其忘念不正知二種若以念慧為性者則不徧染心何以故非諸染心皆緣曾受有簡擇故若忘念不正知以無明為自性者則必徧染心起由前說若無失念不正知如何能起煩惱故染心非皆緣曾受境故以念為性之忘念不遍染心非皆有簡擇故以慧為性之不正知不遍也餘可知然此意俱心所十八謂前九法八隨煩惱并別境慧無餘心所及論三文准前應釋若作是說不違理教論三文謂集論明五遍染心瑜伽明六遍染心十遍染心也准前應釋即解通麤細等文也第二能變釋相應門未轉依中初正釋頌義竟
