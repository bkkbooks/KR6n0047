body:
  text: 蕅益沙門智旭述二例論受義此染汙意何受相應既釋第二能變第六餘相應門故更例初能變以論受俱門也此先假問徵起下有三解第三為正有義此第七識所俱唯有喜受以恆內執第八識之見分為我生喜愛故有義不然若如所說則應許喜受乃至有頂違聖言故應說此意四受相應謂生惡趣憂受相應緣不善業所引之真異熟果故生人道及欲天并初靜慮第二靜慮喜受相應緣有喜地善業所引異熟果故第三靜慮樂受相應緣有樂地善業所引異熟果故第四靜慮乃至有頂捨受相應緣唯捨地善業所引異熟果故有頂謂三有之頂即非想非非想天餘可知有義彼說亦不應理此第七識從無始來任運一類緣內執我恆無轉易與變異受不相應故又此末那但是與前藏識義有別者頌中皆別說之若使有四受俱則頌亦應別說今頌既不別說決定與彼藏識相同故此第七相應亦但唯有捨受變異受謂憂喜苦樂改變不同之受也餘可知初未轉依竟二已轉依未轉依位與前所說十八心所相應已轉依位唯二十一心所俱起謂遍行別境各五善十一如第八識已轉依位唯捨受俱任運轉故恆於所緣平等轉故平等轉謂平等性智證得十平等性故亦唯捨受也六釋餘相應門竟七釋三性門問曰末那心所何性所攝答曰有覆無記所攝非餘善惡及無覆無記蓋以此意相應四煩惱等是染法故障礙聖道隱蔽自心說名有覆非善不善故名無記問曰既是煩惱何非不善答曰如上二界諸煩惱等種子由于定力攝藏不起現行是無記攝此意所俱現行染法由其所依之識極微細故無強計度任運轉故亦無記攝若已轉依唯是善性八釋界繫門問曰末那心所何地繫耶答曰隨彼藏識所生即為彼地所繫謂生欲界現行末那相應心所即欲界繫乃至有頂應知亦然任運恆緣自地藏識執為內我非緣于他地故若起彼地之異熟藏識現在前者名生彼地染汙末那即便緣彼藏識執為內我即繫屬于彼地藏識名彼所繫或為彼地諸煩惱等之所繫縛名彼所繫若已轉依即非所繫彼地謂三界九地之隨一地也或為彼地藏識所繫是約所緣義釋或為彼地煩惱所繫是約相應義釋九釋伏斷門二初正明無染末那二申明有淨末那今初問曰此染汙意無始相續何位永斷或暫斷耶答曰阿羅漢滅定出世道無有阿羅漢者總顯三乘無學果位此位染意種及現行俱永斷滅故說無有若夫有學位中入於滅定及出世道無漏觀中俱暫伏滅故亦可說無有謂染汙意無始時來微細一類任運而轉諸世間有漏道雖復是善不能伏滅此識相應之我執惟二乘無漏聖道有伏滅義以根本真無我解能違彼我執故後得智無漏現在前時是彼根本真無我解之等流亦違此染汙意蓋以真無我解及後所得此二智俱是無漏道故皆名為出世道又復滅定既是聖道之等流以其極寂靜故此染汙意亦暫非有然出世道及滅盡定由未永斷此種子故所以從滅盡定及出世聖道起已此染汙意仍復現行乃至未滅位中恆相續轉然此染意相應煩惱是俱生故非見道之所斷是染汙故非是非所斷攝此染汙意相應煩惱極微細故所有種子與有頂地下下煩惱一時頓斷以其勢力等故直須金剛喻定現在前時頓斷此種成阿羅漢故無學位方得永不復起若夫二乘無學回趣大乘者從初發心至未成佛雖實是菩薩亦名阿羅漢以應供等三義等故不別說之有頂地下下煩惱謂第六識中俱生之極微細貪癡慢也約三界九地各分九品此當第八十一由其最極微細故與第七識之煩惱勢力齊等非金剛喻定不能斷彼種子然第六識中俱生煩惱既分八十一品則是品品漸斷此第七識相應煩惱惟是微細一類不分三界九地故云頓斷也二申明有淨末那二初出謬解二出正解今初此中有義末那唯有煩惱障俱聖教皆言三位無故又說四惑恆相應故又說為前六識之雜染依故二出正解二初正明無染有淨二通釋染淨差別初中二初斥前非二申正義今初有義彼說教理相違出世末那經說有故無染意識如有染時定有俱生不共依故此先總斥也經說有出世末那而彼說無豈不違教又無染意識必有所依意根而彼說無豈不違理言無染意識者即無漏道相應之第六淨識也言俱生不共依者指第七意根也量云淨意識是有法定有淨末那為俱生不共依宗因云轉識攝故喻如有染時意識論說藏識決定恆與一識俱轉所謂末那意識起時則藏識與二俱轉所謂意識及與末那若五識中隨起一識則藏識與三俱轉乃至或時頓起五識則藏識與七俱轉明文若此若汝執住滅定無第七識爾時藏識應無識俱便非恆定一識俱轉又第六識入無漏觀住聖道時若無第七爾時藏識應但與第六一識俱如何可言若起意識爾時藏識定二俱轉顯揚論說末那恆與四煩惱相應是為染位或翻彼相應恃舉為行成平等行是不染位故知此意通染不染若由本論說阿羅漢位無染意故便謂竟無第七應由本論說阿羅漢位捨藏識故便亦并無第八彼第八既不爾此第七云何然又諸論言轉第七識得平等智彼平等智亦如餘大圓鏡妙觀察等智定有所依相應之淨識此第七識若無者彼平等智亦復應無非離所依之心王得有能依之淨無漏慧心所故又不可說彼平等性智依六轉識論許諸佛恆行平等性智猶如大圓鏡智之無間斷故此廣明違教也又無學位若無第七識彼第八識應無俱有依然第八識必有此俱有依如餘眼識等性故又如未證補特伽羅無我者彼我執恆行亦應未證法無我者法我執恆行此第七識于三位中若無彼三位中之法我執將依何識非可謂三位中之法我執依于第八以法我見即是慧而彼第八識無慧心所與之相應故由此應信二乘聖道滅定無學位中此第七識恆行彼未證得法無我故又諸論中以前五識為同法證有第七意根為第六意識之俱有依聖道起時及無學位若無淨第七為淨第六依所立宗因便俱有失或應五識亦無有五根為依既五識恆有依則第六識亦應爾此廣明違理也應立量云無學位第八識是有法定有淨第七為俱有依宗因云以是識性故喻如眼等識補特伽羅無我即生空理法無我即法空理以五同法等者謂立量云第六識是有法定有第七意根為俱有依宗因云轉識攝故喻如前五識必以五根為俱有依今若謂二乘聖道及無學位但有第六識相應之生空智慧而無第七淨識為俱有依則宗上有能別不極成之過以俱有依不必定有故因中犯共不定之失以前六識共是轉識攝故之因而五識定有所依第六於無漏位不定有依則外人反出不定過云為第六如前五一切時中定有依耶為前五如無漏位中第六亦不必有依耶初斥前非竟二申正義是故定有無染汙意於上無學滅定及出世道三位恆起現前頌中言彼三位無有者但依染意而說如說四位無阿賴耶非無第八此亦應爾四位無阿賴耶者三乘無學及佛也初正明無染有淨竟二通釋染淨差別此意差別略有三種一補特伽羅我見相應之意二法我見相應之意三平等性智相應之意補特伽羅我見即俱生我執法我見即俱生法執也初我執相應之意通一切異生恆時相續若夫二乘有學及七地以前但除無學回心者餘一類有學菩薩于無漏位則不現起而于有漏心位彼意仍緣阿賴耶識起補特伽羅我見次法執相應之意通一切異生聲聞獨覺皆悉恆時相續若夫一切菩薩于法空智果現前之時則不現起而于法空智果不現前位彼意仍緣異熟識起法我見後平等性智相應之意通一切如來恆時相續若夫菩薩于初地見道及初地後修道位中法空智果不現前時則不現起而于法空智果現在前位彼意或緣無垢淨識或緣異熟識等起平等性智如來平等性智緣無垢識菩薩平等性智緣異熟識也餘可知補特伽羅我見起位彼法我見亦必現前我執必依法執而起如夜迷杌等方謂人等故我法二見用雖有別而不相違同依一慧心所如眼識等體雖是一而有了別青黃赤等多用不相違故此亦應然迷杌等喻法執謂人等喻補特伽羅執也我法下釋伏難謂有難曰上云我我所執決不俱起此中我法二見何得俱起今釋之曰用雖有別而不相違以同依一慧非一心中有二慧故又難曰既唯一慧何有二執今釋之曰如一眼識頓別青黃如一耳識齊聞鐘鼓亦復何違應立量云我法二執是有法用不相違宗因云同依一慧故喻如眼識體一而了別多色二乘有學於或聖道或滅定現在前時頓悟菩薩於修道位中及有學回心之漸悟菩薩若生空智果現在前時此三等人皆唯起法執以彼我執已被聖道滅定生空智果所伏故二乘無學及此無學回心漸悟菩薩於法空智果不現前時亦唯起法執以彼我執已斷故八地以上一切若頓若漸菩薩所有我執皆永不行或無學回心固已永斷或頓悟及有學回心亦永伏故若夫法空智果不現前時雖在八地以上猶起法執以生空智果與法執不相違故如有經說八地以上一切煩惱不復現行唯有我執所依之所知障在當知此所知障是現行非種子若不爾者煩惱種子猶未永斷亦應名為在故然此與法執俱之意根於二乘等雖名不染而於諸菩薩亦名為染以正障彼法空智故由此亦名有覆無記惟於二乘等說名無覆以此法執相應之意不障彼生空智故又此第七識雖隨第八所生所繫然非真異熟識但是異熟生所攝以從第八真異熟識恆時生故名異熟生非即引業所招之異熟果問曰前六識一分無記性者名異熟生此第七識云何亦名異熟生耶答曰以此異熟生之名可通攝故喻如增上緣雖正指六根然凡餘三緣所不攝者皆入此增上緣攝今異熟生亦爾初正釋頌文竟二證有第七三初問答總標二別明教理三通妨總結今初問曰云何應知此第七識離眼等識有別自體答曰聖教正理為定量故二別明教理二初明聖教二顯正理初中二初正釋二指廣今初謂薄伽梵處處經中說心意識三種別義集起名心思量名意了別名識是三別義薄伽梵即世尊也而含六義佛地經論云謂諸如來永不繫屬諸煩惱故具自在義炎猛智火所燒鍊故具熾盛義妙三十二大士相等所莊飾故具端嚴義一切殊勝功德圓滿無不知故具名稱義一切世間親近供養咸稱讚故具吉祥義具一切德常起方便利益安樂一切有情無懈廢故具尊貴義或能破壞四魔怨故名薄伽梵按小乘不知三種別義妄計過去名意現在名識未來名心今以大乘實義開曉之也如是三義雖通八識而隨勝顯第八名心集諸法之種子起諸法之現行故第七名意緣藏識等恆審思量為我等故餘六名識於六塵各別境界粗動間斷了別轉故如入楞伽伽他中說藏識說名心思量性名意能了諸境相是說名為識三義通八識者八皆名心心王有八亦皆有集起義故八皆名意八識皆有前滅等無間意又皆有思量義故八皆名識稱為八識一一皆有了別用故隨勝顯者第八集起之義獨勝第七思量之義獨勝前六了境之義獨勝也緣藏識等思量為我等者一切凡夫二乘有學及八地前菩薩於有漏心位此第七識緣阿賴耶恆審思量補特伽羅我二乘菩薩於滅定位及生空智果現在前位此第七識緣異熟識恆審思量法我地上菩薩於法空智果現在前位此第七識緣異熟識恆審思量二種無我如來位中此第七識緣無垢識恆審思量二種無我也又大乘經處處別說有第七識故此第七識是決定別有諸大乘經是至教量前于初能變中既已廣說故不須重為極成又復解脫經中亦別說有此第七識如彼頌言染汙意恆時諸惑俱生滅若解脫諸惑非曾非當有彼經自釋此頌意言有染汙意從無始來與四煩惱恆俱生滅謂我見我愛及我慢我癡對治道生斷煩惱已此意從彼便得解脫爾時此意相應煩惱非唯於今現無亦無現在過去未來以諸煩惱無實自體性故若約迷情則現前一念積集過去無量惑業苦種能起未來無量惑業苦事然過去已滅未來未生唯此一剎那心可名有體而此心體念念遷流新新不住亦何嘗有實體哉依此妄心故妄見有三世差別果能覓心了不可得則現在既無三世何有惟其坐斷三世方能普達三世又覓心既不可得豈有形相方隅惟其消殞十方方能遍照十方故曰微塵剎土自他不隔於毫端十世古今始終不離于當念此所謂非曾非當有也是故所謂對治道生斷煩惱者非如世間軍陳相殺對壘抵敵之謂也直是以二空智深觀煩惱本無自性既不自生亦不他生又不共生不無因生只是因緣和合虗妄有生正妄生時仍不在內亦不在外不在中間不在過去不在現在不在未來生即無生終無自性自性既無他性何有自他既無豈有共性有尚叵得況無因生如此研觀勿令休息解種熏發惑種自消故瑜伽論決擇分中云問斷煩惱時為捨纏耶捨隨眠耶纏謂現行隨眠謂種子也答但捨隨眠纏即不起問為斷過去為斷未來為斷現在答非斷去來今然說三世斷何以故若在過去有隨眠心任運滅故其性已斷復何所斷若在未來有隨眠心性未生故體既是無當何所斷若在現在有隨眠心此剎那後性必不住更何須斷又有隨眠離隨眠心二不和合是故現在亦非所斷然從他意內正作意二因緣故正見相應隨所治惑能治心生諸有隨眠所治心滅此心生時彼心滅時平等平等對治生滅道理應知正見相應能對治心於現在世無有隨眠於過去世亦無隨眠此剎那後離隨眠心在未來世亦無隨眠從此已後於己轉依已斷隨眠身相續中所有後得世間所攝善無記心去來今位皆離隨眠是故三世皆得說斷初正釋竟二指廣如是等教諸部皆有恐厭廣文故不繁述初明聖教竟二顯正理三初結前起後二顯示正理三指廣勸信今初已引聖教當顯正理二顯示正理六初恆行無明二為緣生識三思量名意四無心定別五無想天染六三性時染初中二初正顯恆行二轉釋不共今初謂契經說不共無明微細恆行覆蔽真實若無此第七識則彼不共無明便應非有謂諸異生於一切分恆起迷理不共無明覆真實義障聖慧眼如伽他說真義心當生常能為障礙俱行一切分謂不共無明謂能照真義之智心正當生時有一法常能為其障礙此障礙法俱行於一切異生善惡無記三性分位之中所謂不共無明是也是故契經說異生類恆處長夜無明所盲醉纏心曾無醒覺若使異生位中或有暫不起此無明之時便違經中所說恆處長夜等義在俱在異生位中而迷理無明有行不行不應理故此不共無明若謂依于六識皆不得成應此無明如六識之間斷或彼六識如此無明之恆染故許有末那便無此失初正顯恆行竟二轉釋不共染意恆與四惑相應此所俱之無明何獨名不共耶此設問徵起也下文有三家釋第三為正有義此俱我見慢愛非根本煩惱名不共何失謂此意所俱無明是根本煩惱其所俱我見我慢我愛則非根本煩惱所攝但是隨煩惱性故雖四惑俱起而三非同類獨此無明名為不共亦復何失此初家釋全非有義彼說理教相違純隨煩惱中不說此見慢愛三故此三是其中十根本煩惱攝故處處皆說染汙末那與四煩惱恆相應故應說四中無明是主雖與見慢愛三俱起亦名不共以其從無始際恆內昏迷不了空理曾不省察惟妄執我無循反時癡增上故問曰此所俱見等三惑應名相應答曰若三法現行各為主時亦應名為不共如無明故許亦無失若為主時應名不共者謂生死流轉則貪愛為主障於聖道則見慢為主見則偏執一理不肯虗心慢則倨傲自恃不肯求他故也此第二家釋雖是然未曲盡其致有義此癡名不共者如十八不共佛法惟如來有今此無明亦爾唯此第七識有故難曰若爾則餘六識相應煩惱此第七識中所無亦應名不共耶答曰但依殊勝之義以立不共之名非謂但互所無皆名不共也謂第七識相應無明無始恆行障真實義及無漏智如是殊勝業用餘識所無唯此識有故名不共又難曰既爾則此所俱見慢愛三亦有勝用應名不共答曰無明是主故獨得此不共之名或許餘三為主之時亦名不共今但對餘識相應之癡心所故且說無明為不共耳然不共無明總有二種一恆行不共餘識所無二獨行不共此識非有且說無明以上與第二家釋同不共無明以下辨此不共一名而有二義方曲盡其致也一恆行不共者於有漏位常起現行不間斷故此惟第七識有之餘六識之所無今正指此為不共無明也二獨行不共者不與餘九根本煩惱同起獨迷諦境惟第六識有之故此第七識中非有今不指此為不共也故瑜伽說無明有二若與貪等俱者名相應無明非貪等俱者名獨行無明就獨行無明又分是主非主二義若是主獨行不與忿等小十俱者此能發業唯見道之所斷如契經說諸聖有學不共無明已永斷故所以更不造作新業此即偏指是主獨行以為不共無明非指第七識中恆行為不共也若夫非主獨行一任忿等小十各自為主此類無明亦通于修道所斷以與忿等十小隨惑皆通修道見道之所斷故若論第七識之無明亦仍與貪等俱亦是相應無明所攝但以恆行為主故又偏得不共之名若夫獨行不共又分是主非主二義是主則唯見所斷非主則通見修所斷而皆但與第六識俱非同第七恆行不共故特細剖析之恆行不共惟修所斷故是餘部所無獨行不共既有是主非主二種通于見修二斷故得此彼五部俱有按俱舍中惑分五部一者見苦諦所斷部二者見集諦所斷部三者見滅諦所斷部四者見道諦所斷部五者修所斷部部者分也類也根本十惑各由迷于諦理而起故各有部分一一諦下各起多惑故部類不同也恆行不共但在第七識有唯屬修所斷部故云餘部所無獨行不共若非主者通于五部故云此彼俱有然是主獨行惟見所斷亦應云此部非有以非此中正意故略不言之耳初恆行無明竟二為緣生識又契經說眼色為緣生於眼識廣說乃至意法為緣生於意識若無此第七識則彼意法為緣之意非有謂如五識必有眼等五根為增上不共俱有所依意識既是六識中攝理應許其亦有如是所依此第七識若無彼第六識之增上不共俱有所依寧有又不可說肉團心色為彼所依以說名為意非是色故且意識由依意故得具自性隨念計度三種分別設依色者便與五識一般但有自性分別應無隨念計度二分別故亦不可說五識無有俱有所依彼與五根俱時而轉如種與芽形與影故又識與根既必同境喻如心與心所決定俱時五根為五識依共有三義一者增上由根發識故二者不共眼識自依眼根不與耳識等共故三者俱有眼正見時識正了別同一剎那無前後故餘五亦然五根如種五識如芽五根如形五識如影五根如心王五識如心所意與第六應知亦然由此理趣極成意識猶如眼等五識必有不共他識顯自名為意識之意處等無間意根之所不攝是增上生緣所依極成六識各隨一根攝故量云極成意識是有法必有不共顯自名處等無間不攝增上生所依宗因云極成六識隨一攝故喻如眼等識言等無間不攝者謂瑜伽云若此六識為彼六識等無間緣即施設此名為意根此約前滅識為後開導依所以假立意根之名今此同時增上所依非彼等無間意所攝也二為緣生識竟三思量名意又契經說思量名意若無此第七識彼思量意則應非有謂若意識現在前時等無間意已滅非有過去未來理非有故彼過去等無間意思量之用定不得成既爾如何經中說思量名為意若謂思量名意乃是假說理亦不然既無正思量假名為意復依何立若謂意識于前現在之時曾有思量今雖已滅得名為意然殊不知第六意識爾時正現在位雖有思量但名為識寧得說為意乎故知別有第七末那恆審思量正名為意若夫已滅之等無間意乃依此第七而假立意名耳問二卷破外難云假必依真亦不應理今乃云無正思量假依何立不亦自語相違耶答世間名字固有依真說假者亦有不依真說假者元非一概依真說假如依真見道假說相見道依內種子假說外種子依思量意假說等無間意之類是也不依真說假如兔無角假說兔角龜無毛假說龜毛又如月無二假說二月空無華假說空華乃至見相二分非我法假說為我法等是也故云假必依真亦不應理倘更執假必不依實事亦豈應理也哉又若約諸法自相名真則思量名意亦唯于諸法共相而轉何嘗親得彼自相哉特于共相之中說實說假耳四無心定別又契經說無想定滅盡定二種不同假使第七染意若無彼二種定便應無別謂彼二定俱滅六識及彼相應心所體數無異若無第七染意於此二定之中一無想定是有一滅盡定是無則彼二定何別若謂加行界地所依等有差別者理亦不然彼差別之因正由此第七識而有故此第七識若無者彼差別因亦無是故定應別有此意體謂心王數謂心所言此二定之中所滅心王同是六識所滅心所同五十一設非有染無染二意差別則二定更無異矣加行謂作意所依謂教法等者等取自體假立也集論明此二定有五門差別一所依二自體三假立四作意五界地一所依別者無想定乃外道弟子依外道所說邪教而修滅盡定乃世尊弟子依世尊所說正教而修二自體者無想定體是有漏滅盡定體是無漏三假立者無想定依有覆意所緣阿賴耶假立滅盡定依無覆意所緣異熟識假立四作意者無想定由永出離作意以為加行滅盡定由暫止息作意以為加行五界地者無想定是色界捨念清淨地所繫滅盡定依無色界非非想地而入仍非所繫五無想天染又契經說無想天中有情一期生中心心所滅若無此第七識彼無想天便應無染謂彼長時無六轉識若無此意則俱生我執便無然非於餘處有具縛者一期生中或能都無我執彼無想天若無我執應如涅槃便非聖賢同所訶厭救曰彼無想天我執初半劫後方滅後半劫時又生則是有故無如是應如涅槃之失破曰中間四百九十九劫長時無我執故有如涅槃之過救曰過去未來有我執故無如是如涅槃之失破曰彼過去未來非現非常同于無故有如涅槃之過又所得之無想異熟既無故則能得無想報之有情亦無此無想異熟乃是不相應法不過依于色心分位假立前已遮破不是實有若無末那亦無藏識藏識無故熏習亦無餘法受熏已辨非理故應別有染汙末那於無想天恆起我執由斯賢聖同訶厭彼言所得無者謂彼有情於無想定前求無想果故所熏成種招彼異熟染汙末那緣彼執我依之粗動想等不行于此分位中假立無想報若無此第七識彼無想報則不應有也六三性時染又契經說異生善染無記心時恆帶我執若無此第七識彼我執不應有謂異生類三性心時前六轉識雖外起善惡諸業而內恆執我由執我故令六識中所起施戒禪等善業不能亡相故瑜伽說染汙末那為六識依止彼未滅時相了別縛不得解脫染汙末那滅已相縛解脫言相縛者謂由染意恆執我故令前六識於其所緣境相不能了達如幻事等由斯為彼見分相分所拘不得自在故名相縛依如是義有伽他言如是染汙意是識之所依此意未滅時識縛終不脫又善及無覆無記心時若無第七識恆起我執應非有漏以自相續中六識所有煩惱與彼善等不俱起故若謂過去未來煩惱緣縛則理非是有故非由他惑成有漏故勿由他解成無漏故他惑指過去未來惑他解指過去未來生空智慧也現在六識起善及無覆無記法時既不與煩惱俱起若謂過去未來有煩惱故名有漏者則須陀洹等於出觀後所起思惑應成無漏以過去已曾證無漏故又七方便人所有善無記心應成無漏以未來必當證無漏故又不可說異心心所之外別有隨眠是不相應行蘊所攝于善等時現相續起由斯善等成有漏法彼不相應非實有體前文已極成故亦不可說從有漏種生彼善等故成有漏以有漏因惟由第七執我若無第七執我則彼善等種子先無有因可令成有漏故亦非由于有漏種故令彼善等現行成有漏法勿學地中之無漏現行心由彼尚有有漏種子亦可成有漏故雖或由煩惱引施等業而煩惱已去不與善等俱起故非可為有漏之正因以有漏之言乃表與漏俱時起故又無記業非煩惱引彼復如何得成有漏然諸有漏由與自身現行煩惱俱生俱滅互相增益方成有漏由此熏成有漏法之種子後時由此種子現起有漏義成異生既然有學亦爾自身明非他惑現行煩惱明非隨眠種子俱生俱滅明非不俱時起互相增益謂六識所起施等與第七我執互相增長資益也無學有漏雖非漏俱而從先時有漏種起故成有漏於理無違此釋伏難也難曰若有漏言必表漏俱則無學位中已得漏盡何故五根五識仍名有漏今釋之曰無學位中五根五識有漏之法雖非與有漏第七心俱而由彼異熟未空仍從先時所熏有漏種起故成有漏此則于理無違由有末那恆起我執令善等法有漏義成此意若無彼有漏義則定非有故知別有此第七識二顯示正理竟二指廣勸信證有此識理趣甚多隨攝大乘略述六種諸有智者應隨信學二別明教理竟三通妨總結然有經中說六識者應知彼是隨轉理門或隨所依六根說六而識類別實有八種以意根中即攝第七第八兩識故也二釋第二能變竟三釋第三能變二初明差別等前六門二明共依等後三門初中二初釋差別等四門二釋心所受俱兩門初又二初設問舉頌二以論釋成今初如是已說第二能變第三能變其相云何頌曰次第三能變差別有六種一差別門了境為性相二體性門三行相門善不善俱非四三性門此下共以九門釋第三能變之相今先舉四門也五心所相應門即下文此心所遍行三句及初遍行觸等二十句是六受俱門即下文三受共相應一句是七共依門即依止根本識一句是八俱轉門即五識隨緣現三句是九起滅分位門即意識常現起四句是二以論釋成三初釋差別門二釋性相兩門三釋三性門今初論曰次中思量能變識後應辨了境能變識相此識差別總有六種隨六根六境種類異故謂名眼識乃至意識乃隨六根而立其名具五義故五謂依發屬助如根此正明依根而立六識名也言五義者一依眼等六俱有根而住二由六根所發三各繫屬于根四能助根了別五各如根所緣之境雖六識身皆依意轉然隨不共立意識名如五識身無相濫過或唯依意故名意識辨識得名心意非例此釋伏難也難曰五識亦以第七為染淨依何故第六獨名意識今釋之曰六識雖皆依意然前五識但以意為共依惟第六識以意為不共依故隨不共立意識名如五識身各依一根各隨不共立名故無相濫之過又或前五兼依色根第六唯依於意故名為意識耳又難曰若第六唯依于意得名意識則第八亦唯依意亦應名為意識又第七唯依第八應名為心識耶今釋之曰此中但辨六識所由得名若第八名心第七名意自約集起思量義勝立名雖互相依非在此依根得名之例也或名色識乃至法識則是隨境而立其名以順于識之義故謂於色聲香味觸法六境了別乃名為識色等五識唯了色等各各一塵法識通能了一切法或第六能了差別之法獨得法識名前五但能了自相分性境不能了差別法不名法識故六識名亦無相濫之失此復明依境而立六識名也色等下釋伏難難曰五塵亦皆名法法亦惟是五塵及五塵落謝影子何故第六獨名法識釋有二義一者前五識各局一塵第六識通了六塵二者前五識但了一味性境第六識能了種種差別之法故亦不相濫也此後隨境所立六識之名乃依五色根未自在位而說若得自在諸根互用一根發識緣一切境但可隨根立名乃無相濫之失謂此六識有兩種名字前云眼識乃至意識是隨根立名後云色識乃至法識是隨境立名然此後隨境所立之名但可依未自在位說耳若至諸根互用一根發識遍能緣一切境設名色識乃至法識未免相濫但可隨所依根立名始無相濫之失也莊嚴論中但說如來五根一一皆於五境轉者且依粗顯同類境說佛地經說成所作智決擇有情心行差別起三業化作四記等若不遍緣六塵諸境無此能故此釋難也難曰若謂諸根互用一根發識緣一切境何故莊嚴論中但說如來五根一一皆于五塵境轉不云遍于一切法轉耶釋曰且依粗顯同類境說耳非不遍緣一切境也故更引佛地經以證遍緣言粗顯同類境者即指五塵其相粗顯又同一性境之類故也此等粗顯同類之境未自在位決定不相融者今自在位尚可互緣況法塵境本來細微不相窒礙豈自在位反不得遍緣哉言四記者記即是答一者一向記二者分別記三者反詰記四者捨置記也然六轉識所依所緣粗顯極成故此頌中不說前隨義便已說所依此所緣境姑俟義便當說此釋疑也疑曰前第七識頌中有所依所緣二門今此六識何故不說答曰此六轉識依于六根緣于六塵粗顯極成故頌不說然前論中因義便故既已傍論諸識所依至于此六識所緣境相差別亦俟義便乃當說之初釋差別門竟二釋性相兩門次言了境為性相者雙顯六識自性行相識以了境為自性故即復用彼了境為行相故由斯兼釋所立了境名識之別名以能了別境者乃名之為識故如契經說眼識云何謂依眼根了別諸色廣說乃至意識云何謂依意根了別諸法彼經且說不共所依及未轉依位見分所了餘共所依及已轉依位所了如前已說共所依謂五識更須分別依染淨依根本依第六識亦更須根本依也餘可知三釋三性門問曰此六轉識何性攝耶答曰謂善不善俱非性攝俱非者謂無記非善不善故名俱非能為此世他世順益故名為善人天樂果雖於此世能為順益非於他世故不名善能為此世他世違損故名不善惡趣苦果雖於此世能為違損非於他世故非不善於善不善益損義中不可記別故名無記此先釋三性義也然無記中復分有覆無覆由前已解故不重出此六轉識若與信等十一相應是善性攝與無慚等十法相應不善性攝俱不相應無記性攝此示未轉依位中三性相也言無慚等十法者一無慚二無愧即二中隨煩惱三忿四恨五覆六惱七嫉八慳九害即小隨十煩惱之七十瞋即根本六煩惱之一此十唯是不善性攝若大隨八小隨餘三根本餘五皆通不善及有覆無記性攝故不說之且如有人雖起貪癡慢疑及諸見執若不與無慚無愧同起僅名有覆無記起掉舉沉等亦復如是起誑起諂起憍亦復如是但與無慚無愧相應方名不善不與無慚無愧同起皆名有覆無記也若不與善心所相應亦不與諸煩惱心所相應但與遍行別境及四不定隨一相應則皆名無覆無記有義六識三性起必不俱以此六識同外門轉善等三性互相違故謂前五識必由意識為分別依導引而起俱時而生同緣塵境方乃成善成染故若許五識三性俱行則意識爾時亦應通于三性便違正理故定不俱然瑜伽等說藏識一時與轉識相應三性俱起者彼云一時乃依多念而說如說一心非局在一生滅今依一念定不容俱故無相違之過此明三性俱不俱義有兩家解今初家明不俱也先正釋次瑜伽下通妨並可知然未當理故以下解為正有義六識三性容俱謂初起率爾無記之五識及齊等流類之善染眼等五識或五種四種多起或三種二種少起容俱起故又五識與意識雖定俱生而善性等不必同故前所設意識爾時應通三性之難於此唐捐故瑜伽說若人入于三昧或遇聲緣從定起者此是與定相應善意識俱轉之餘耳識生非唯是彼定相應之意識能取此聲也若不爾者既無耳識於此音聲不領受故不應出定亦非取聲時即便出定以先領受聲已若有希望後時方出此其在定之耳識率爾聞聲理應非善以凡未轉依者率爾墮境之五識心定皆屬無記故由此誠證與五識俱之意識非必定與五識善等性同諸處但言五俱意識亦緣五識所緣五塵之境不說意識定與五識同其善惡無記之性然雜集論中說等引位中五識無者彼依多分而說此第二家正明六識三性得俱也且如等流善眼識正觀佛時正讀經時耳忽聞聲鼻忽聞香身忽覺觸則其所有率爾墮心定屬無記又如等流染眼識正觀美色觀劇戲時耳忽聞聲等率爾墮心亦屬無記此三性得俱起之一驗也彼謂五識設使三性俱行意識爾時應通三性殊不知同時意識雖必同境不必同性且如入定意識是善性攝正於定中得聞聲者是率爾無記耳識何必同性又恐難曰定中那有耳識今故釋曰定中意識不能取聲若無率爾耳識則於音聲不能領受又恐難曰寧知定中必有率爾耳識領此音聲今故釋曰若不領聲不應出定恐更難曰取聲出定之時耳識既生則意識已非定善今故釋曰非取聲時即便出定以率爾無記耳識正領聲時意識正尚在定俟有希望方從定起故知在定意識雖是善性不妨無記耳識同時俱起恐更難曰寧知定中耳識非是善性今故釋曰未轉依者率爾墮心定無記故由此下結證可知雜集下更通妨也等引者梵語三摩呬多謂修習止觀平等不偏引生功德故翻等引等引位中善定善慧與第六識相應調柔正直而住故多分不起五識今雜集中乃依多分說無非謂定中決不起率爾五識也若五識中三性俱轉意隨偏注與彼性同無偏注者便無記性故六轉識三性容俱且如禮佛懺願之時眼識緣佛色像則是善性若緣華幡等任運起貪則是染性若非善染即無記性耳識緣法音聲則是善性若緣音聲有美有惡任運貪瞋則是染性若非善染即無記性鼻識聞香無所取著則是善性若緣好香任運貪著或緣餘氣任運憎惡則是染性若非善染即無記性身識翹勤謹肅不懈則是善性若多放逸不合威儀則是染性若非善染即無記性又如舌識正受食時于味不生貪染則是善性若于好味惡味任運貪瞋則是染性若非善染即無記性是故五識俱起之時或眼識善耳識染鼻識等無記或耳識善眼識染餘識無記或善多染少或染多善少或善染多無記少或無記多善染少或但一性或但二性或具三性事非一槩至于第六意識若隨五識有所偏注則與五識同其善染若無偏注便是無記性攝又如正禮拜時正習坐時身識是善而意識或起無記或起染心仍復不一故前五識不妨三性俱起而第六識無有一念通三性之過也上約未轉依位釋竟得自在位唯善性攝佛色心等道諦攝故無有不善已永滅除戲論種故亦無無記得自在謂佛果位中轉異熟識成無垢識爾時五根成無漏故所發五識亦成無漏又意根純無漏故所發意識亦純無漏五根名為佛無漏色八識皆名佛無漏心色即相好功德之所莊嚴心即四智菩提相應心品故皆道諦所攝戲論種子已永滅盡故此妙觀察智相應心品成所作智相應心品皆唯善性攝也初釋差別等四門竟二釋心所受俱兩門二初略標心所廣釋受俱二廣釋六位心所別相初中二初設問舉頌二以論釋成今初六識與幾心所相應頌曰此心所遍行別境善煩惱隨煩隨不定三受共相應二以論釋成二初略釋六位心所二廣釋三受相應初中二初總標二別釋今初論曰此六轉識總與六位心所相應謂遍行等二別釋二初釋心所名義二釋六位類別今初恆依心起與心相應繫屬於心故名心所猶如屬我之物便立我所之名須知心於所緣唯取總相心所於彼所緣既取總相亦取別相助成心事故得心所之名譬如畫家之師資師既作模資乃填彩故瑜伽說識能了別事之總相作意了𥌁識所未了之相即是明諸心所所別相之義也是故觸能了此識所緣可意等相受能了此識所緣攝受等相想能了此識所緣言說因相思能了此識所緣正因等相故作意等名心所法其言了此之一此字正表心所不惟緣別相而亦緣總相也即諸心所取所別相句一則轉釋上句二則兼解下四句義也可意等相者等取不可意相及中容相也攝受即順益也等者等取違損及非順非違也言說因即境之分齊相也正因等者等取邪因及非正非邪因也餘處復說欲亦能了識所緣之可樂事相勝解亦了識所緣之決定事相念亦能了識所緣之串習事相定慧亦了識所緣之得失等相由此方能於所緣境起善染等諸心所法亦是皆於所緣兼取別相之義此更釋別境等諸心所法皆有助成心事之功能也串與慣同定慧亦了得失等相者了於得相起善心所即名正定正慧了於失相起染心所即名邪定邪慧了於非得非失之相起餘無記心所即定慧亦屬無記也初釋心所名義竟二釋六位差別雖諸心所名義無異而有六位種類差別謂遍行有五別境有五善有十一煩惱有六隨煩惱有二十不定有四如是六位合五十一初名遍行者一切心中定可得故二名別境者緣別別境而得生故三名善者唯善心中可得生故四名煩惱者性是根本煩惱攝故五名隨煩惱者唯是煩惱等流性故六名不定者於善染等皆不定故然瑜伽論合六為五以根本煩惱與隨煩惱俱是染故復以四一切辨此五位差別謂一切性及一切地一切時一切心王俱此五位中遍行具四一切別境唯有初三性二九地之兩一切善唯有一謂一切地染四皆無不定唯一謂一切性由此五位種類差別一切性者善不善無記三性也一切地者三界九地謂五趣雜居地乃至非非想地也一切時者有心無心有漏無漏分位差別時也一切俱者遍與八識心王相應而俱起也初略釋六位心所竟二廣釋三受相應二初釋三受義二明俱不俱今初此六轉識易脫不定故皆容與三受相應皆領順相違相及非違順二之相故領順境相適悅身心說名樂受領違境相逼迫身心說名苦受領中容境相於身於心非逼非悅名不苦不樂受此總釋三受義也易謂變易脫謂轉脫餘可知如是三受或各分二五識相應說名身受別依身故意識相應說名心受唯依心故身受亦名外受心受亦名內受身受有三心受亦三則是六受更約六識差別則是十八受也又三皆通有漏無漏苦受亦由無漏起故謂修無漏者必備歷艱辛苦其心志故也或各分三謂見所斷三受修所斷三受非所斷三受見所斷謂與分別惑相應之三受也修所斷謂與俱生惑相應之三受也非所斷即無漏相應之三受也又學無學非二為三學位三受即修所斷無學三受即非所斷非二謂非學非無學指一切凡夫言之非二三受即見所斷又非二三受通二所斷及非所斷學位三受唯修所斷及非所斷無學三受唯非所斷或總分四謂樂受即善苦受即不善不苦不樂受即有覆無覆二種無記性受有義三受容各分為四性以與前五識俱起之任運貪癡及純苦趣中之任運煩惱不發惡業者是有覆無記故彼有覆無記皆容與苦根相應瑜伽論說若任運生一切煩惱皆於三受現行可得若通前六一切識身者遍與一切諸識中三受根相應若不通一切識身者惟與意地一切三受根相應雜集論說若欲界繫任運煩惱發惡行者亦是不善所餘不發惡者皆是有無覆記故知三受容各有四初以三受分配三性無記有二故總分四此義太局後以三受各通善惡有覆無覆之四方盡其致或總分五謂苦樂憂喜捨三中苦樂各分二者逼悅身心相各異故由無分別有分別故尤重輕微有差別故不苦不樂不分二者非逼身心非悅身心相無異故無分別故平等轉故此釋三受亦名五受之義苦分出憂樂分出喜故云各分二也凡有三義一者逼身名苦逼心名憂悅身名樂悅心名喜二者無分別名苦名樂有分別名憂名喜三者尤重名苦名樂輕微名憂名喜不苦不樂但名捨受不分二者一無逼悅身心之相二是一味無分別性三平等轉無有輕重故不可分也諸適悅受五識相應恆名為樂但悅身故無分別故不得名喜意識相應之適悅受若在欲界及色界中初二靜慮之近分止可名喜但悅心故若在初二靜慮之根本名樂名喜悅身心故若在第三靜慮之若近分若根本皆名為樂安靜尤重無分別故此細釋喜樂二受義也近分即未到定根本即正住于定餘可知諸逼迫受與五識相應者以逼身故無分別故恆名為苦不得名憂意識俱者有義唯憂逼迫心故諸聖教說意地戚受名憂根故瑜伽論說生地獄中諸有情類異熟無間有異熟生苦憂相續又說地獄尋伺憂俱更有一分純受苦之鬼趣傍生亦爾故知意地尤重戚受尚名為憂況餘輕者此下細釋憂苦二受義也五識相應恆名為苦此易可知意識逼迫應通憂苦二名今初家釋但許名憂不許名苦未達尤重無分別者即名苦故引證可知下文自破有義意識逼迫通憂苦二人天中者恆名為憂非尤重故傍生鬼界名憂名苦若雜受者名憂若純受者名苦以其有輕重故輕者名憂重者名苦也捺落迦中則唯名為苦以其純受尤重無分別故此第二家正釋也捺落迦此云苦器即是地獄瑜伽論說若任運生一切煩惱皆於三受現行可得廣說如前又說俱生薩迦耶見唯是有覆無記性攝彼邊執見應知亦爾有覆無記性攝此二見所俱之苦受定屬苦根非憂根攝何以故以論說憂根非無記故又瑜伽說地獄諸根餘三現行定不成就純苦鬼界傍生亦爾彼論所言餘三定是指樂喜憂之三根以彼地獄純苦趣中必成現行之捨根故此引論以證地獄意受唯名為苦不得名憂也廣說如前謂不通一切識身者唯與意地三受根相應此意地得名為苦之一證也又憂根非無記而第六識中俱生身見邊見唯屬無記得與苦受相應此意地應名為苦之二證也又瑜伽說地獄於十一根中現行止有八根餘三根之現行定不成就彼雖不曾說明何謂餘三而以義推之餘三定指樂喜憂根以地獄捨根必現行故此意地應名為苦之三證也言地獄成就八根者一眼根二耳根三鼻根四舌根五身根六命根七苦根八捨根也然于二十二根之中不言男女二根者地獄中無用故不言等無間意根者六識有時不行故不言信等五根及三無漏根者縱有種子定無現行易了知故定有五色根者所招苦報必有身故設無五根不受苦故有命根者由異熟業所引苦果一期相續不斷故有苦根者純受苦故有捨根者地獄中之七八二識仍與捨受恆相應故難曰豈不容捨根彼地獄中定不成就寧知彼瑜伽文唯說有中容受此不許地獄有捨根謂應有憂根也容受即捨受答曰應不說彼地獄定成等無間意根以彼論中容許地獄六識有時無故前文已明憂非無記故但破云若使第八非捨根者瑜伽豈以等無間意根為第八耶然地獄中六識既容有時而無安得復立等無間意既無意根則憂根更不待破矣又難曰不應彼論唯說有中容捨受以彼通說諸根更無異因惟說捨受故又若彼論縱使依于中容捨受而說如何說彼定成八根此縱許地獄無有意根得有捨根然未必以捨根為第八或復第七是捨第八是憂亦不可知以瑜伽論中無有明文可據故也答曰若謂五識不相續故惟逼迫心所以定說憂根為第八者則彼死時生時悶絶之時寧有憂根復有妄執喜根為第八者亦同此破設執男女二根隨分一形為第八者理亦不然以地獄中形不定故彼惡業招容無男女形故彼由惡業令五根門恆受苦故所以定成眼等五根設使必有男女一形於彼地獄亦有何用非於無間大地獄中可有希求淫欲事故由斯第八定是捨根以第七第八兩識恆與捨相應故此正以理推徵破彼地獄成就憂根之執兼破喜根形根之執明其必有捨根也如極樂地意悅名樂無有喜根故極苦處意迫名苦無有憂根故瑜伽論中餘三之言決定指憂喜樂此正結顯地獄意受是苦非憂也極樂地謂第三禪第三禪中五識不行唯有意悅既可名樂而不名喜以例地獄極苦五識不行唯有意迫定亦名苦而不名憂矣地獄既定成就苦根捨根則瑜伽所云餘三現行定不成就者非指憂喜樂而何哉餘處說彼惡道之中亦有似前善因之等流樂應知彼依隨轉理說或彼通說餘雜受處以必無異熟樂者乃名為純苦處故然諸聖教意地戚受名憂根者依多分說或隨轉門無相違過瑜伽論說生地獄中諸有情類異熟無間有異熟生苦憂相續又說地獄尋伺憂俱一分鬼趣傍生亦爾者亦依隨轉門又彼地獄中苦根與意識俱者是餘趣意俱憂根之同類假說為憂或彼苦根損身心故雖苦根攝而亦名憂喻如初二禪近分之喜根益身心故雖是喜根而亦名樂顯揚論等具顯此義然未至地定無樂根以論中說彼唯有眼耳鼻舌身意命苦憂喜捨十一根故由此應知意地戚受若于純受苦處亦苦根攝此等聖教差別多門恐文增廣故不繁述此通會諸餘論文也等流樂者如立世阿毗曇云人養六畜飲食溫涼者在熱地獄有涼間在寒地獄有溫間此之溫涼果似前因亦是異熟假名等流又如施設論云等活地獄中有時涼風所吹血肉還生有時出聲唱言等活彼諸有情歘然還活如是血肉生時暫生喜樂亦名為異熟樂此皆約有間地獄言之非指無間地獄也餘雜受處者指有間地獄及多分鬼畜也純苦者即無間地獄及一分鬼畜也依多分說者謂人天鬼畜等有分別處則意戚但名憂根也餘並可知初釋三受義竟二明俱不俱有義六識三受不俱皆外門轉互相違故五俱意識同五所緣五三受俱意亦應爾便違正理故必不俱瑜伽等說藏識一時與轉識相應三受俱起者彼依多念如說一心非一生滅無相違過此有二釋今初釋不俱也並如前文三性中義可知有義六識三受容俱順違中境容俱受故意不定與五識之受同故於偏注境起一受故無偏注者便起捨故由斯六識三受容俱此第二正釋也義並可知得自在位唯樂喜捨諸佛已斷憂苦事故二釋心所受俱兩門中初略標心所廣釋受俱竟二廣釋六位心所別相二初正釋別相二會示二諦初中五初釋遍行別境二釋善三釋根本煩惱四釋隨煩惱五釋不定心所初中二初舉頌二論釋今初前所略標六位心所今應廣顯彼差別相且初二位其相云何頌曰初遍行觸等次別境謂欲勝解念定慧所緣事不同二論釋二初釋遍行二釋別境今初論曰六位中初遍行心所即觸等五如前廣說問曰此遍行相云何應知答曰由教及理為定量故此中教者如契經言眼色為緣生於眼識三和合位定生于觸與觸俱生必有受想思三乃至廣說由斯觸等四是遍行又契經說若根不壞境界現前作意正起方能生識餘經復言若復於此境起作意即於此境起了別若於此境起了別即於此境起作意是故此作意與了別之二法恆共和合乃至廣說由此作意亦是遍行此等聖教誠證非一初乃至廣說者乃至意法為緣生於意識等也次乃至廣說者若于此觸對即於此了別等乃至領納取像造作一一作四句說也理謂識起必有根境識三和彼三和位定生于觸而彼三和又必由觸方有若無觸者心心所法應不和合觸一境故作意引心令趣自境此作意若無者則心亦應無故受能領納或順或違或中之境令心等起或歡或戚或捨之相曾無有心起之時而無此三相中之隨理相故想能安立自境分齊若心起時無此想者應不能取境分齊相思令心取正因等相造作善等曾無有心起之位而無此三法中隨分一種思故故必有思由此證知觸等五法心起必有故是遍行餘非遍行義至當說心應無謂不觸自境即是不起現行也思取正因相則造作善取邪因相則造作惡取非正非邪相則造作無記餘皆可知初釋遍行竟二釋別境三初正釋體用二現起分位三諸門分別初中三初釋通名二別解釋三結非遍行今初次別境者謂欲至慧所緣境事多分不同於六位中次初說故二別解釋五初釋欲至五釋慧初中二初正釋二斥異解今初云何為欲於所樂境希求冀望而為體性精勤依此而生是為業用有義所樂謂可欣境於可欣事欲見聞等有希望故難曰於可厭事希彼不合望彼別離豈非有欲答曰此但求彼可厭之境不合時或離彼可厭境時別有可欣之自體合而不離非求彼可厭事而起希望故於可厭及中容境一向無欲即緣可欣事時若不希望亦無欲起有義所樂謂所求境於可欣厭求離合等有希望故於中容境一向無欲緣欣厭事若不希求亦無欲起有義所樂謂欲觀境於一切事不論可欣可厭及中容境但是欲觀察者即便有希望故若不欲觀隨因境勢任運緣者即全無欲由斯理趣欲非遍行初正釋體性業用次轉釋所樂凡有三義初義但約可欣則太局第二雙約欣厭以釋所求亦未盡理第三約欲觀乃為正也二斥異解有說要由希望境力諸心心所方取所緣故經說欲為諸法本應是遍行彼說不然心等取境由作意故諸聖教說作意現前能生識故曾無處說由欲能生心心所故如說諸法愛為根本豈心心所皆由愛生故說欲為諸法本者乃是說欲所起一切事業或說善欲能發正勤由彼正勤助成一切善事故論說此欲以勤依為業善事必由正勤得成正勤又由善欲得發故說善欲為諸法本非謂由欲生心心所也餘可知初釋欲竟二釋勝解二初正釋二斥異解今初云何勝解於決定境印可任持為性不可以他緣誘引轉動為業謂依于邪正等教理證明之力於所取境審決印持由此異緣不能引轉故猶豫境勝解全無非審決心亦無勝解由斯勝解非遍行攝決定境即非猶豫境也餘可知二斥異解有說心等取自境時無拘礙故皆有勝解故是遍行彼說非理所以者何能不為礙者即所緣諸法故所不被礙者即能緣心等故能作增上勝緣發起心心所者乃根及作意故若謂由此勝解故彼勝緣得發起者則此勝解應復待餘發起便有無窮之失義並可知二釋勝解竟三釋念二初正釋二斥異解今初云何為念於過去曾習之境令心明審憶記不忘為性定之所依為業謂數憶持曾所受境令不忘失能引生于定故於曾未受體類境中全不起念設曾所受不能明記念亦不生故念必非遍行所攝二斥異解有說心起必與念俱由念于境明記能為後時憶念因故應是遍行彼說非理勿於後時有癡信等前亦有故然前心心所或想取境分齊之勢力足為後時憶念因故若謂後時憶念由心起時有念為因則後時有癡等惡或復有信等善豈亦由心起時有癡信等以為因耶況心心所及想勢力足為念因何必執心起時有念俱也三釋念竟四釋定二初正釋二斥異解今初云何為定於所觀境令心專注不散為性智依此生為業謂觀得失俱非境中由定令心專注不散依斯便有決擇智生然而心專注之為言但是顯所欲住即便能住非必唯住一境設不爾者則見道位中歷觀上下苦等諸諦前後境別而不專一應無等持若不繫心專注境位便無定起故非遍行如理名得背理名失非得非失名俱非境若善決擇智則取得而捨失若染決擇智則取失而捨得若無記決擇智則取俱非境相是故定慧並通三性也見道歷觀諸諦者欲界四諦色無色界四諦周遍觀察乃成八忍八智也等持者平等任持之義梵語稱三麼地蓋定心所百法論中本名三麼地也二斥異解有說爾時雖不繫心專注于境亦有定起但相微隱故是遍行所攝破曰應說誠言若謂此定能令心等和合同趣一境故是遍行理亦不然和合是觸之用非定之用故若謂此定令剎那頃心不易緣故遍行攝亦不應理一剎那心自於所緣無有改易義故若言由定心取所緣故遍行攝彼亦非理作意令心取所緣境非由定故又有說言此定體即是心非別有體經說三學之中定為心學又說此定為心一境性故彼非誠證依定攝心令心一境所以說彼心一境性及心學之言故以定乃五根五力七覺支八道支等所攝猶如念慧等各有自體非即心故五根中有定根五力中有定力七覺支中有定覺分八道支中有正定故如念慧等別有自體也量云定是有法非即心宗因云根力覺道攝故喻如念慧等四釋定竟五釋慧二初正釋二斥異解今初云何為慧於所觀境簡別決擇為性斷疑為業謂觀得失俱非境中由慧推求得決定故於非觀境愚昧心中無簡擇故非遍行攝善慧則于得境決定染慧則于失境決定無記慧則于俱非境決定也二斥異解有說爾時愚昧心中亦有慧起但相微隱故似于無如小物為大器所受寧知是有然不可直謂之無以對法藏中說此慧為大地法故對法藏即阿毗曇論也此敘執下正破諸部對法展轉相違汝等如何執為定量唯觸等五經說遍行說十大地本亦非經不應固執二別解釋竟三結非遍行然欲等五非觸等故定非遍行如信貪等欲等五心所是有法定非遍行宗因云非觸等五故喻如信貪等初正釋體用竟二現起分位二初解定俱者非二解不定俱為正今初有義此五定互相資隨一起時必有餘四二解不定俱有義不定瑜伽說此五別境心所於四一切中無後一切時一切俱之二故又說此五緣所樂決定曾習所觀四境而生所緣之四境及能緣之五法皆非決定俱故應說此五或時只單起一謂於所樂唯起希望或於決定唯起印解或於曾習唯起憶念或於所觀唯起專注謂愚昧類為止散心雖專注所緣而不能簡擇世共知彼有定無慧但因彼愚昧人於加行位少有聞思故說等持緣所觀境或依所觀之境多分是定慧俱有者故說是等持緣所觀境之言耳且如戲忘天專注一境起貪瞋等有定無慧諸如是等其類實繁不可謂定必有慧也或於所觀唯起簡擇謂不專注馳散推求則是有慧無定或時此五心所但于同時起二謂於所樂決定境中起欲勝解或於所樂曾習境中起欲及念如是乃至於所觀境起定及慧合有十箇起二一欲解二欲念三欲定四欲慧五解念六解定七解慧八念定九念慧十定慧也或時此五心所但于同時起三謂於所樂決定曾習起欲解念如是乃至於曾所觀起念定慧合有十箇起三一欲解念二欲解定三欲解慧四欲念定五欲念慧六欲定慧七解念定八解念慧九解定慧十念定慧也或時此五心所有於同時起四謂於所樂決定曾習所觀境中起前四種如是乃至於決定曾習所觀境中起後四種合有五箇起四一欲解念定二欲解念慧三欲解定慧四欲念定慧五解念定慧也或時起五謂於所樂決定曾習所觀境中俱起五種如是於四境中起欲等五總起一句別三十句合有三十一句或有心位五皆不起如非四境并率爾墮境之心及藏識俱如是等位五皆不起此類非一二現起分位竟三諸門分別三初諸識相應門二諸受相應門三結例餘諸門今初第七八識此別境五隨未轉依已轉依位而為有無如前已說第六意識諸位容俱依轉未轉皆不遮故第八識未轉皆無已轉皆有第七識未轉但得有慧已轉亦得有五也第六識可知有義五識此五皆無緣已得境無希望故不能審決無印持故恆取新境無追憶故自性散動無專注故不能推度無簡擇故前五識有二解今初解直明無此五心所也有義五識容有此五雖無於境增上希望而有微劣樂境義故於境雖無增上審決而有微劣印境義故雖無明記曾習境體而有微劣念境類故雖不作意繫念一境而有微劣專注義故但為遮等引故所以論說五識之性散動非遮等持故前五識亦容有定雖於所緣不能推度而有微劣簡擇義故由此聖教說天眼天耳二通是即眼識耳識相應之智性也餘鼻舌身三淮此眼耳亦可有慧無失此第二解亦許五識得有別境五心所也三摩呬多翻為等引以離沉掉名之為等引生功德名之為引故惟第六意識所能修習三麼地翻為等持即定心所不過專注一境之義故五識亦得有之未自在位此五或無得自在時此五定有樂觀諸境欲無減故印境勝解常無減故憶習曾受念無減故又佛五識緣三世故緣過去者即是念故如來無有不定心故五識皆有作事智故得自在時謂轉五識為成所作智時也初諸識相應門竟二諸受相應門問曰此別境五何受相應有義欲心所與喜樂捨三受相應除憂苦受以彼二境非所樂故餘四心所通于四受唯除苦受以審決等心所乃是五識之所無故答有二義初義未確下義為正有義一切皆與五受相應論說憂根於無上法思慕愁戚求欲證故是欲與憂受相應也純受苦處希求解脫是欲與苦受相應也意有苦根前已說故論說貪愛憂苦相應此貪愛俱必有欲故苦根既有意識相應則審決等四即與苦俱亦復何咎又五識俱亦有微細印境等四義如前說由斯欲等各與五受相應三結例餘諸門此五復依三性三界學無學等諸門分別如理應思具二一切故通三性亦通三界又第六識轉未轉位皆不遮故故知學等位中應有初釋遍行別境竟
